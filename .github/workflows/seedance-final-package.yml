name: Seedance Final Package

on:
  push:
    paths:
      - '.github/workflows/seedance-final-package.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Recover v47 patch source from Git history
        shell: bash
        run: |
          DELETE_COMMIT="$(git log --all --diff-filter=D --format=%H -- seedance/app-v47.js | head -n 1)"
          test -n "$DELETE_COMMIT"
          git show "${DELETE_COMMIT}^:seedance/app-v47.js" > /tmp/app-v47.js
          test -s /tmp/app-v47.js

      - name: Build standalone app.js and update HTML
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          base_path = Path('seedance/app-v46.js')
          patch_path = Path('/tmp/app-v47.js')
          html_path = Path('ai-assistant.html')
          out_path = Path('seedance/app.js')

          base = base_path.read_text(encoding='utf-8')
          patch = patch_path.read_text(encoding='utf-8')
          html = html_path.read_text(encoding='utf-8')

          OLD_BUILD = '20260723-google-drive-only-output-v46'
          NEW_BUILD = '20260723-production-app'
          if OLD_BUILD not in base:
              raise RuntimeError('Unexpected app-v46 build')

          def extract_function(source, name):
              match = re.search(rf'(?m)^function\s+{re.escape(name)}\s*\(', source)
              if not match:
                  raise RuntimeError(f'Function not found: {name}')
              start = match.start()
              brace = source.find('{', match.end())
              depth = 0
              quote = None
              escape = False
              i = brace
              while i < len(source):
                  ch = source[i]
                  if quote:
                      if escape:
                          escape = False
                      elif ch == '\\':
                          escape = True
                      elif ch == quote:
                          quote = None
                  else:
                      if ch in ('"', "'", '`'):
                          quote = ch
                      elif ch == '/' and i + 1 < len(source) and source[i + 1] == '/':
                          end = source.find('\n', i + 2)
                          i = len(source) if end < 0 else end
                          continue
                      elif ch == '/' and i + 1 < len(source) and source[i + 1] == '*':
                          end = source.find('*/', i + 2)
                          if end < 0:
                              raise RuntimeError(f'Unclosed comment in {name}')
                          i = end + 2
                          continue
                      elif ch == '{':
                          depth += 1
                      elif ch == '}':
                          depth -= 1
                          if depth == 0:
                              return source[start:i + 1]
                  i += 1
              raise RuntimeError(f'Function end not found: {name}')

          def renamed(source, old, new):
              fn = extract_function(source, old)
              return re.sub(rf'(?m)^function\s+{re.escape(old)}', f'function {new}', fn, count=1)

          def replace_section(source, start_marker, end_marker, replacement):
              start = source.find(start_marker)
              end = source.find(end_marker, start + len(start_marker))
              if start < 0 or end < 0 or end <= start:
                  raise RuntimeError(f'Cannot locate section: {start_marker}')
              return source[:start] + replacement + '\n\n' + source[end:]

          fixed = base.replace(OLD_BUILD, NEW_BUILD, 1)
          fixed = replace_section(fixed,
              'async function fetchVideoBlobThroughProxy(output) {',
              'async function hydrateProxyVideoElements() {',
              renamed(patch, 'v47FetchVideoBlobThroughProxy', 'fetchVideoBlobThroughProxy'))
          fixed = replace_section(fixed,
              'async function hydrateProxyVideoElements() {',
              'function outputCardMarkup(',
              renamed(patch, 'v47HydrateProxyVideoElements', 'hydrateProxyVideoElements'))
          fixed = replace_section(fixed,
              'async function recoverLatestDriveOutputWhenEmpty(force = false) {',
              'function renderJobs() {',
              renamed(patch, 'v47RecoverLatestDriveOutputWhenEmpty', 'recoverLatestDriveOutputWhenEmpty'))
          fixed = replace_section(fixed,
              'function renderJobs() {',
              'function findSegmentIdByOutputIndex(',
              renamed(patch, 'v47RenderJobs', 'renderJobs'))
          fixed = replace_section(fixed,
              'async function loadOutputs() {',
              'function startPolling() {',
              renamed(patch, 'v47LoadOutputs', 'loadOutputs'))

          migration = '''
          const STRICT_OUTPUT_MIGRATION_KEY = 'seedance_strict_output_migration_20260723_v1';

          async function migratePollutedBindingsOnce(drafts) {
            if (localStorage.getItem(STRICT_OUTPUT_MIGRATION_KEY) === 'done') return drafts;
            let changed = 0;
            for (const draft of drafts || []) {
              migrateDraftWorkspaces(draft);
              for (const mode of ['first_last', 'multi_frame', 'text_only']) {
                const workspace = getWorkspace(draft, mode);
                const segments = Array.isArray(workspace.segments) ? workspace.segments : [];
                const staleOutputs = [...(workspace.outputs || []), ...(workspace.outputHistory || [])]
                  .some(output => output?.storageMode === 'ark-temp' || String(output?.url || '').includes('tos-cn-beijing.volces.com'));
                if (!staleOutputs) continue;
                workspace.outputs = [];
                workspace.outputHistory = [];
                workspace.jobs = [];
                for (const segment of segments) {
                  segment.providerTaskId = null;
                  segment.remoteTaskId = null;
                  segment.remoteSegmentId = null;
                  segment.status = 'draft';
                  segment.progress = 0;
                  segment.error = null;
                }
                changed += 1;
              }
              await saveDraft(draft);
            }
            localStorage.setItem(STRICT_OUTPUT_MIGRATION_KEY, 'done');
            if (changed) console.log('[Seedance Studio] cleaned stale local video bindings', changed);
            return drafts;
          }
          '''.strip()

          fixed = fixed.replace('async function init() {', migration + '\n\nasync function init() {', 1)
          load_marker = '  state.drafts = await listDrafts();'
          if load_marker not in fixed:
              raise RuntimeError('listDrafts marker not found')
          fixed = fixed.replace(load_marker, load_marker + '\n  state.drafts = await migratePollutedBindingsOnce(state.drafts);', 1)
          fixed += '\n//# sourceURL=seedance/app.js\n'
          out_path.write_text(fixed, encoding='utf-8')

          tag = '<script type="module" src="./seedance/app.js?v=20260723-production-app"></script>'
          pattern = re.compile(r'<script\s+type=["\']module["\']\s+src=["\']\.\/seedance\/app(?:-v\d+)?\.js(?:\?[^"\']*)?["\']\s*><\/script>')
          updated, count = pattern.subn(tag, html)
          if count != 1:
              raise RuntimeError(f'Expected one Seedance script tag, got {count}')
          html_path.write_text(updated, encoding='utf-8')
          PY

      - name: Verify source files
        shell: bash
        run: |
          cp seedance/app.js /tmp/app.mjs
          node --check /tmp/app.mjs
          grep -F "20260723-production-app" seedance/app.js
          grep -F './seedance/app.js?v=20260723-production-app' ai-assistant.html
          ! grep -F 'app-v47.js' ai-assistant.html

      - name: Build Windows-compatible ZIP and validate
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import zipfile, hashlib, shutil

          root = Path('release')
          if root.exists(): shutil.rmtree(root)
          (root / 'seedance').mkdir(parents=True)
          shutil.copy2('ai-assistant.html', root / 'ai-assistant.html')
          shutil.copy2('seedance/app.js', root / 'seedance/app.js')
          (root / 'README.txt').write_text(
              'Upload and overwrite these paths in GitHub:\r\n'
              '1. ai-assistant.html\r\n'
              '2. seedance/app.js\r\n\r\n'
              'Delete app-v44.js and app-v45.js.\r\n'
              'Keep app-v46.js temporarily as rollback backup.\r\n',
              encoding='utf-8-sig')

          zpath = Path('Seedance-final-package-Windows.zip')
          if zpath.exists(): zpath.unlink()
          with zipfile.ZipFile(zpath, 'w', compression=zipfile.ZIP_STORED, allowZip64=False) as zf:
              for path in sorted(root.rglob('*')):
                  if path.is_file():
                      zf.write(path, path.relative_to(root).as_posix())
          with zipfile.ZipFile(zpath, 'r') as zf:
              assert zf.testzip() is None
              assert set(zf.namelist()) == {'README.txt', 'ai-assistant.html', 'seedance/app.js'}
              assert zf.read('ai-assistant.html') == Path('ai-assistant.html').read_bytes()
              assert zf.read('seedance/app.js') == Path('seedance/app.js').read_bytes()
          print('ZIP_SHA256=' + hashlib.sha256(zpath.read_bytes()).hexdigest())
          print('ZIP_SIZE=' + str(zpath.stat().st_size))
          PY
          unzip -t Seedance-final-package-Windows.zip

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Seedance-final-package-Windows
          path: Seedance-final-package-Windows.zip
          retention-days: 7

      - name: Commit production files and remove workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ai-assistant.html seedance/app.js
          git rm -f .github/workflows/seedance-final-package.yml
          git commit -m 'fix(seedance): publish standalone app.js and update HTML entry'
          git push
