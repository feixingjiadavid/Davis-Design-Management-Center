<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计助手戴维斯 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }

        .chat-bubble-enter { animation: bubbleFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: bottom center; }
        @keyframes bubbleFadeIn { 0% { opacity: 0; transform: translateY(10px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        /* 渲染聊天里的链接 */
        .chat-content a { color: #818cf8; text-decoration: underline; text-underline-offset: 2px; font-weight: 600; }
        .chat-content a:hover { color: #a5b4fc; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-indigo-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 left-1/4 w-[800px] h-[600px] bg-indigo-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">设计助手戴维斯</h1>
            </div>
        </div>

        <div class="p-5 border-b border-white/5 shrink-0 space-y-3">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 px-4 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-zinc-300 transition-colors btn-press">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span class="text-[13px] font-bold">返回排号大厅</span>
            </button>
            <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-white font-bold transition-colors btn-press shadow-md">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span class="text-[13px]">开启新对话</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar" id="chat-session-list">
            </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p class="text-[10px] text-zinc-500 truncate">系统成员</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.location.href='login.html'" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出系统">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative z-10 bg-[#0c0c0e]">
        
        <header class="px-10 py-6 border-b border-white/5 shrink-0 bg-[#09090b]/80 backdrop-blur-xl flex flex-col z-20">
            <div class="flex justify-between items-center w-full">
                <div>
                    <h2 class="text-[22px] font-bold text-white tracking-tight flex items-center gap-3">
                        智能助手小戴维斯
                        <span class="bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 text-[10px] px-2 py-0.5 rounded uppercase font-mono tracking-wider">Powered by Coze</span>
                    </h2>
                    <p class="text-[12px] text-zinc-500 mt-1">提单前，您可以先在此获取各项目的标准 Logo、字体包、常用宣发物料及历史规范链接。</p>
                </div>
                <button onclick="deleteCurrentSession()" class="text-zinc-500 hover:text-rose-400 text-[12px] flex items-center gap-1.5 transition-colors btn-press bg-white/5 px-3 py-1.5 rounded-lg border border-white/5 hover:border-rose-500/30">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 删除当前对话
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-10 flex flex-col items-center pb-32" id="chat-container">
            <div class="w-full max-w-[850px] space-y-6 flex flex-col" id="chat-box">
                </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#09090b] via-[#09090b]/95 to-transparent pt-10 pb-8 px-10 flex justify-center z-20">
            <div class="w-full max-w-[850px] relative">
                <textarea id="chat-input" rows="1" class="w-full bg-[#121217] border border-zinc-700/80 focus:border-indigo-500 rounded-2xl pl-5 pr-14 py-4 text-[14px] text-white outline-none resize-none shadow-2xl transition-all custom-scrollbar max-h-[150px]" placeholder="描述你需要找的物料或规范，例如：请给我发一下今年年度大会的Logo矢量图链接..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                <button onclick="sendUserMessage()" id="btn-send" class="absolute right-3 bottom-3 w-9 h-9 rounded-xl bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center text-white transition-all btn-press shadow-md" title="发送 (Enter)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // 🚀 配置你的 Coze API (V3版本)
        // ==========================================
        const COZE_API_URL = 'https://api.coze.cn/v3/chat'; 
        const COZE_PAT = 'pat_FbgsPIfAiUkR2TWqw16MZMjxeafODI93LWcy35hlJNpVnL00YD2o0ifxc90jkfct'; 
        const COZE_BOT_ID = '7559104686386036777'; 

        let currentUserName = 'User';
        let currentUserAvatar = 'U';
        let currentUserEnName = 'guest';

        let sessions = [];
        let currentSessionId = null;

        function initApp() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);
            
            document.getElementById('sidebar-avatar').innerText = user.avatar || '?';
            document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            
            currentUserName = user.displayName || user.cnName || user.enName;
            currentUserAvatar = user.avatar || '?';
            currentUserEnName = user.enName || 'guest';

            loadSessions();
        }

        // ================= 💡 多会话管理引擎 =================
        function loadSessions() {
            sessions = JSON.parse(localStorage.getItem('coze_sessions_' + currentUserEnName) || '[]');
            if (sessions.length === 0) {
                startNewChat();
            } else {
                renderSessionList();
                switchSession(sessions[0].id);
            }
        }

        function saveSessions() {
            localStorage.setItem('coze_sessions_' + currentUserEnName, JSON.stringify(sessions));
        }

        window.startNewChat = function() {
            const id = 'chat_' + new Date().getTime();
            const newSession = { id: id, title: '新对话', date: new Date().toISOString() };
            sessions.unshift(newSession); // 插入到最前面
            saveSessions();
            switchSession(id);
        }

        window.deleteCurrentSession = function() {
            if (!currentSessionId) return;
            if (confirm("确定要彻底删除当前对话吗？此操作不可恢复。")) {
                sessions = sessions.filter(s => s.id !== currentSessionId);
                localStorage.removeItem(currentSessionId); 
                saveSessions();
                if (sessions.length === 0) startNewChat();
                else switchSession(sessions[0].id);
            }
        }

        function renderSessionList() {
            const list = document.getElementById('chat-session-list');
            list.innerHTML = sessions.map(s => `
                <div onclick="switchSession('${s.id}')" class="p-3 rounded-xl cursor-pointer transition-colors ${s.id === currentSessionId ? 'bg-indigo-500/20 border border-indigo-500/30 text-indigo-300' : 'hover:bg-white/5 text-zinc-400 border border-transparent'} flex flex-col gap-1 group">
                    <p class="text-[13px] font-bold truncate group-hover:text-white transition-colors">${s.title}</p>
                    <p class="text-[10px] opacity-50 font-mono">${new Date(s.date).toLocaleDateString()}</p>
                </div>
            `).join('');
        }

        window.switchSession = function(id) {
            currentSessionId = id;
            renderSessionList();
            
            // 重置聊天区并打底欢迎语
            document.getElementById('chat-box').innerHTML = `
                <div class="flex items-start gap-4 self-start max-w-[85%]">
                    <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <span class="text-[11px] text-zinc-500 font-medium ml-1">小戴维斯</span>
                        <div class="bg-[#18181b] border border-white/5 text-zinc-200 text-[14px] leading-relaxed p-4 rounded-2xl rounded-tl-sm shadow-md chat-content break-words">
                            👋 欢迎来到 TIG Design，<b>${currentUserName}</b>。我是小戴维斯，你可以找我要：<br><br>1. 公司/项目Logo、VI、源文件<br>2. 企微、邮件等渠道的 标准排版规范及尺寸等<br><br>💡 <b>试试这样问我：</b><br><span class="text-indigo-400">“请给我发一下今年年度大会的Logo矢量图链接”</span><br><span class="text-indigo-400">“企微推文的首图标准尺寸是多少？”</span>
                        </div>
                    </div>
                </div>`;
            
            // 加载当前会话的具体记录
            const history = JSON.parse(localStorage.getItem(currentSessionId) || '[]');
            history.forEach(msg => appendMessageToUI(msg.role, msg.content, false));
            
            setTimeout(scrollToBottom, 100);
        }

        // ================= UI 交互 =================
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendUserMessage();
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function parseMessageText(text) {
            let html = text.replace(/\n/g, '<br>');
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            html = html.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" title="${url}" class="text-indigo-400 font-mono hover:text-indigo-300 transition-colors">${url} ↗</a>`;
            });
            html = html.replace(/\*\*(.*?)\*\*/g, '<b class="text-white">$1</b>');
            return html;
        }

        function appendMessageToUI(role, content, saveToLocal = true) {
            const box = document.getElementById('chat-box');
            let html = '';

            if (role === 'user') {
                html = `
                <div class="flex items-start gap-4 self-end max-w-[85%] flex-row-reverse chat-bubble-enter">
                    <div class="w-9 h-9 rounded-full bg-zinc-700 flex items-center justify-center text-white shrink-0 font-bold text-xs border border-white/10 shadow-lg">${currentUserAvatar}</div>
                    <div class="flex flex-col gap-1.5 items-end">
                        <span class="text-[11px] text-zinc-500 font-medium mr-1">${currentUserName}</span>
                        <div class="bg-indigo-600 text-white text-[14px] leading-relaxed p-4 rounded-2xl rounded-tr-sm shadow-md chat-content break-words text-left">
                            ${parseMessageText(content)}
                        </div>
                    </div>
                </div>`;
            } else {
                html = `
                <div class="flex items-start gap-4 self-start max-w-[85%] chat-bubble-enter">
                    <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <span class="text-[11px] text-zinc-500 font-medium ml-1">小戴维斯</span>
                        <div class="bg-[#18181b] border border-white/5 text-zinc-300 text-[14px] leading-relaxed p-5 rounded-2xl rounded-tl-sm shadow-md chat-content break-words">
                            ${parseMessageText(content)}
                        </div>
                    </div>
                </div>`;
            }

            box.insertAdjacentHTML('beforeend', html);
            scrollToBottom();

            if (saveToLocal && currentSessionId) {
                const hist = JSON.parse(localStorage.getItem(currentSessionId) || '[]');
                hist.push({ role, content });
                localStorage.setItem(currentSessionId, JSON.stringify(hist));
            }
        }

        function appendThinkingUI() {
            const box = document.getElementById('chat-box');
            const id = 'thinking-' + new Date().getTime();
            const html = `
            <div id="${id}" class="flex items-start gap-4 self-start max-w-[85%] chat-bubble-enter">
                <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <div class="bg-[#18181b] border border-white/5 text-zinc-200 p-4 rounded-2xl rounded-tl-sm shadow-md flex gap-1.5 items-center h-[52px] mt-5">
                    <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full typing-dot"></div>
                </div>
            </div>`;
            box.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
            return id;
        }

        function removeThinkingUI(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        async function sendUserMessage() {
            const inputEl = document.getElementById('chat-input');
            const btnEl = document.getElementById('btn-send');
            const text = inputEl.value.trim();
            if (!text || !currentSessionId) return;

            // 更新会话标题
            const currentSessionObj = sessions.find(s => s.id === currentSessionId);
            if (currentSessionObj && currentSessionObj.title === '新对话') {
                currentSessionObj.title = text.substring(0, 12) + (text.length > 12 ? '...' : '');
                saveSessions();
                renderSessionList();
            }

            inputEl.value = '';
            inputEl.style.height = 'auto'; 
            inputEl.disabled = true;
            btnEl.disabled = true;
            btnEl.classList.add('opacity-50');
            
            appendMessageToUI('user', text);
            const thinkingId = appendThinkingUI();

            try {
                // 🟢 真实请求扣子 Coze API V3 逻辑
                const requestBody = {
                    bot_id: COZE_BOT_ID,
                    user_id: currentSessionId, // 使用唯一的会话 ID 来维持上下文
                    stream: false, 
                    auto_save_history: true,
                    additional_messages: [
                        { role: "user", content: text, content_type: "text" }
                    ]
                };

                const response = await fetch(COZE_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${COZE_PAT}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`API 连接异常: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                removeThinkingUI(thinkingId);

                // 解析 Coze V3 返回结构
                if (data.code === 0 && data.data && data.data.messages) {
                    const ansMsg = data.data.messages.find(m => m.type === 'answer');
                    if (ansMsg && ansMsg.content) {
                        appendMessageToUI('assistant', ansMsg.content);
                    } else {
                        appendMessageToUI('assistant', '⚠️ 抱歉，小戴维斯未能匹配到相关结果，或接口未返回内容。');
                    }
                } else {
                    throw new Error(data.msg || '未知解析错误');
                }
                
            } catch (error) {
                console.error("Coze API 报错:", error);
                removeThinkingUI(thinkingId);
                if (error.message.includes('Failed to fetch')) {
                    appendMessageToUI('assistant', `❌ **连接被浏览器拦截 (CORS 跨域错误)**\n\n您直接从浏览器调用了 Coze API。由于安全策略，浏览器阻止了此次请求。您可以尝试以下方式解决：\n1. 安装浏览器插件：搜索并安装 \`Allow CORS: Access-Control-Allow-Origin\` 插件，开启后即可正常对话。\n2. 或者在后端架设一个简单的 Nginx / Node.js 代理转发请求。`);
                } else {
                    appendMessageToUI('assistant', `❌ **发生错误**\n${error.message}`);
                }
            } finally {
                inputEl.disabled = false;
                btnEl.disabled = false;
                btnEl.classList.remove('opacity-50');
                inputEl.focus();
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
