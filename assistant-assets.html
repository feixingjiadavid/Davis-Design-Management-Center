<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的过稿资产库 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .asset-card { break-inside: avoid; margin-bottom: 1.5rem; transition: transform 0.2s; }
        .asset-card:hover { transform: translateY(-4px); }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-orange-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 left-1/4 w-[800px] h-[600px] bg-orange-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-medium text-[14px]">执行看板 (Kanban)</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-bold text-[14px]">我的过稿资产库</span>
            </button>
            <button onclick="window.location.href='assistant-calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="font-medium text-[14px]">工时与 AI 绩效</span>
            </button>
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-[9999]">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-orange-400 hover:bg-orange-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        
        <header class="px-8 py-5 border-b border-white/5 shrink-0 flex items-center justify-between bg-[#09090b]/80 backdrop-blur-xl relative z-[999]">
            <div>
                <h2 class="text-[22px] font-bold text-white tracking-tight mb-1.5">我的过稿数字资产</h2>
                <p class="text-xs text-zinc-500">所有被需求方验收结项的作品均会沉淀于此，沉淀复用，拒绝重复造轮子。</p>
            </div>
            
            <div class="flex items-center gap-6">
                
                <div class="relative" id="date-selector-wrapper">
                    <button onclick="window.toggleDateDropdown()" class="px-5 py-2.5 h-full bg-[#121217] border border-white/10 rounded-xl text-[13px] font-bold text-white hover:bg-white/5 transition-colors btn-press flex items-center gap-2 min-w-[140px] justify-between shadow-inner">
                        <span id="current-date-text">全部月份</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div id="date-dropdown" class="hidden absolute top-full left-0 mt-2 w-full bg-[#1a1a24] border border-white/10 rounded-2xl shadow-2xl py-2 z-50 dropdown-enter max-h-[300px] overflow-y-auto custom-scrollbar">
                        </div>
                </div>

                <div class="relative w-64 flex items-center group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input type="text" id="asset-search" oninput="window.filterAssets()" class="w-full bg-[#121217] border border-white/10 rounded-xl pl-10 pr-10 py-2.5 text-sm text-white placeholder-zinc-500 outline-none focus:border-orange-500 transition-colors shadow-inner" placeholder="支持搜：202603、标签...">
                    <button id="clear-search-btn" onclick="window.clearAssetSearch()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-zinc-500 hover:text-white transition-colors hidden btn-press">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <div class="w-px h-8 bg-white/10"></div>

                <div class="flex items-center gap-4 relative pt-1 z-[110]">
                    <div class="relative" id="notif-wrapper">
                        <button id="notifBtn" class="w-10 h-10 rounded-xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                            <span id="bell-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                        </button>
                        <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                            <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                                <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                                <button onclick="window.markAllAsRead(event)" class="text-[11px] text-indigo-400 hover:text-indigo-300 btn-press transition-colors">全部已读</button>
                            </div>
                            <div class="max-h-[300px] overflow-y-auto custom-scrollbar" id="notif-list-container">
                                <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>
                            </div>
                            <div class="pt-3 px-5 border-t border-white/5 text-center">
                                <button onclick="window.location.href='message-center.html?role=design'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                            </div>
                        </div>
                    </div>

                    <div class="relative" id="identity-wrapper">
                        <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-4 py-2.5 rounded-xl flex items-center gap-2.5 text-[12px] font-medium hover:bg-white/5 transition-colors btn-press">
                            加载中...
                        </button>
                        <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                            <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto custom-scrollbar flex justify-center relative">
            
            <div id="assets-loading" class="absolute inset-0 bg-[#0c0c0e]/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-orange-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">SYNCING ASSETS...</p>
            </div>

            <div id="emptyState" class="hidden flex-col items-center justify-center py-24 opacity-50 w-full h-full">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-zinc-500 mb-4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p class="text-[14px] font-medium text-zinc-400" id="emptyStateText">尚未发现任何匹配的完结资产</p>
                <p class="text-[11px] text-zinc-500 mt-2">当需求被验收完结后，作品会自动收录在此处</p>
            </div>

            <div class="w-full max-w-[1400px] flex flex-col">
                <div class="w-full flex flex-col gap-12 pb-10" id="assets-container">
                    </div>
            </div>

        </div>
    </main>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-orange-500 to-amber-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-orange-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="window.closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label><input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入原密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label><input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入新密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label><input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="再次输入新密码"></div>
            </div>
            <button onclick="window.submitPwdChange()" class="w-full mt-6 py-3.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(249,115,22,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-orange-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 bg-emerald-500/20 text-emerald-400">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        if(window.loadAssetsFromCloud) window.loadAssetsFromCloud();
    </script>

    <script>
        const PAGE_TYPE = 'design';

        // ================= 高定弹窗引擎 =================
        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0'); dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-orange-500';
                icon.className = 'w-8 h-8 rounded-full bg-orange-500/20 text-orange-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
        }

        function showDialogUI() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); dialog.classList.remove('scale-95'); }, 10);
        }

        window.showAlert = function(title, message, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-orange-600 hover:bg-orange-500');
            btnContainer.innerHTML = `<button onclick="closeCustomDialog()" class="w-full py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">我知道了</button>`;
            showDialogUI();
        }

        // ================= 基础交互 =================
        window.logout = function(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('activeUserObj'); 
            window.location.href = 'login.html'; 
        }

        window.openPwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');
            const pwdModal = document.getElementById('pwd-modal');
            pwdOverlay.classList.remove('hidden'); setTimeout(() => { pwdOverlay.classList.remove('opacity-0'); pwdModal.classList.remove('hidden'); pwdModal.classList.remove('scale-95'); }, 10);
            document.getElementById('old-pwd').value = ''; document.getElementById('new-pwd').value = ''; document.getElementById('new-pwd-confirm').value = '';
        }
        
        window.closePwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');
            const pwdModal = document.getElementById('pwd-modal');
            pwdOverlay.classList.add('opacity-0'); pwdModal.classList.add('scale-95'); setTimeout(() => { pwdOverlay.classList.add('hidden'); pwdModal.classList.add('hidden'); }, 300);
        }
        
        window.submitPwdChange = function() { window.showAlert('提示', '系统演示环境暂不可自助修改密码，请联系管理员。', 'info'); window.closePwdModal(); }

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);

            if (!(user.perms || []).includes(PAGE_TYPE)) {
                window.showAlert("权限拦截", "您没有执行层做图权限，为您退回大厅。", "danger");
                setTimeout(()=> window.location.href = 'index.html', 1500);
                return false;
            }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar || '?'; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-orange-600'} border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg shrink-0`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            if(document.getElementById('sidebar-role')) document.getElementById('sidebar-role').innerHTML = `<span class="text-orange-400 font-bold">当前视角: 设计方</span>`;
            
            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = '';
                if ((user.perms || []).includes('req')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='index.html'"><div class="w-7 h-7 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-400"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-medium">需求方 (去发单/验收)</span></div>`; 
                }
                if ((user.perms || []).includes('design')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#362013] text-orange-400 cursor-default border border-orange-900/50"><div class="w-7 h-7 rounded-lg bg-orange-500/20 flex items-center justify-center text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-bold">设计方 (当前)</span></div>`; 
                }
                if ((user.perms || []).includes('admin')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='manager-workspace.html'"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/10 flex items-center justify-center text-fuchsia-400"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div><span class="text-[13px] font-medium">管理方 (统筹/大盘)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-orange-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span></span> 身份: 设计方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }

            return user;
        }

        function formatDateToDisplay(dateStr) {
            if (!dateStr) return '--';
            const d = new Date(dateStr);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        window.activeMonthFilter = 'all';

        // ================= 💡 核心：全量拉取过稿资产 =================
        window.loadAssetsFromCloud = async function() {
            if(!window.supabase) return;
            const currentUser = initRBAC();
            if(!currentUser) return;
            const currentUserEn = currentUser.enName ? currentUser.enName.toLowerCase() : '';
            const isSuperAdmin = currentUserEn === 'davidxxu' || currentUserEn === 'judyzzhang';

            try {
                const { data, error } = await window.supabase.from(window.DB_TABLE)
                    .select('id, title, project, created_at, creator, assignee, channels, history_json, source_file_link')
                    .in('status', ['completed', 'archived'])
                    .order('created_at', { ascending: false });

                if(error) throw error;

                const container = document.getElementById('assets-container');
                container.innerHTML = '';
                let renderCount = 0;
                
                let groupedAssets = {};

                (data || []).forEach(task => {
                    const taskAssignee = task.assignee ? task.assignee.toLowerCase() : 'none';
                    const isMyDesignTask = taskAssignee === currentUserEn;

                    if (!isSuperAdmin && !isMyDesignTask) return;

                    let finalImg = '';
                    let finalSourceLink = task.source_file_link || '';
                    let endDate = task.created_at; 
                    
                    try {
                        const historyArr = JSON.parse(task.history_json || '[]');
                        for(let i = historyArr.length - 1; i >= 0; i--) {
                            if(historyArr[i].action === 'submit_draft') {
                                if(!finalImg && historyArr[i].img_url) finalImg = historyArr[i].img_url;
                                if(!finalSourceLink && historyArr[i].source_link) finalSourceLink = historyArr[i].source_link;
                            }
                            if(historyArr[i].action === 'complete' || historyArr[i].action === 'approve_draft') {
                                endDate = historyArr[i].created_at || historyArr[i].time || endDate;
                            }
                        }
                        if (endDate === task.created_at && historyArr.length > 0) {
                            endDate = historyArr[historyArr.length - 1].created_at || historyArr[historyArr.length - 1].time || endDate;
                        }
                    } catch(e){}

                    if (!finalImg) return; 

                    const d = new Date(endDate);
                    const label = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
                    const sortKey = d.getFullYear() * 100 + d.getMonth(); 
                    const searchKey = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}`;

                    if(!groupedAssets[sortKey]) {
                        groupedAssets[sortKey] = { label: label, searchKey: searchKey, tasks: [] };
                    }

                    task._finalImg = finalImg;
                    task._finalSourceLink = finalSourceLink;
                    task._startDateStr = formatDateToDisplay(task.created_at);
                    task._endDateStr = formatDateToDisplay(endDate);

                    groupedAssets[sortKey].tasks.push(task);
                    renderCount++;
                });

                // 💡 高级月份生成：固定列出 2024~2026 所有月份
                const dateDropdownList = document.getElementById('date-dropdown');
                if (dateDropdownList) {
                    let dropHtml = `<div class="py-1">`;
                    dropHtml += `<button onclick="window.setMonthFilter('all', '全部月份')" class="w-full text-left px-5 py-2.5 text-[13px] text-zinc-300 hover:bg-white/5 hover:text-white transition-colors">全部月份</button>`;
                    
                    for (let y = 2026; y >= 2024; y--) {
                        for (let m = 12; m >= 1; m--) {
                            const key = (y * 100 + (m - 1)).toString();
                            const label = `${y}年 ${m}月`;
                            dropHtml += `<button onclick="window.setMonthFilter('${key}', '${label}')" class="w-full text-left px-5 py-2.5 text-[13px] text-zinc-300 hover:bg-white/5 hover:text-white transition-colors">${label}</button>`;
                        }
                    }
                    dropHtml += `</div>`;
                    dateDropdownList.innerHTML = dropHtml;
                }

                // 渲染存在的区块
                const sortedKeys = Object.keys(groupedAssets).sort((a, b) => b - a);
                sortedKeys.forEach(key => {
                    const group = groupedAssets[key];
                    
                    let sectionHtml = `
                    <div class="w-full flex flex-col month-section" data-month-key="${key}">
                        <div class="flex items-center gap-3 mb-6 border-b border-white/10 pb-4 pl-1">
                            <h3 class="text-xl font-bold text-white">${group.label}</h3>
                            <span class="text-xs font-mono text-zinc-500 bg-white/5 px-2 py-0.5 rounded border border-white/10">${group.tasks.length} 个资产</span>
                        </div>
                        <div class="w-full columns-1 md:columns-2 lg:columns-3 xl:columns-4 gap-6 space-y-6">
                    `;

                    group.tasks.forEach(task => {
                        let tagsHtml = '';
                        let tagsArr = [];
                        if(task.channels && task.channels.length > 0) {
                            try {
                                const arr = typeof task.channels === 'string' ? JSON.parse(task.channels) : task.channels;
                                tagsArr = arr;
                            }catch(e){}
                        }
                        tagsArr.forEach(t => {
                            tagsHtml += `<span class="text-[10px] bg-sky-500/10 text-sky-400 border border-sky-500/20 px-2 py-0.5 rounded truncate max-w-[120px]">${t}</span>`;
                        });
                        if(!tagsHtml) tagsHtml = `<span class="text-[10px] bg-zinc-800 border border-zinc-700 px-2 py-0.5 rounded text-zinc-400">通用物料</span>`;

                        let downloadBtnHtml = '';
                        if (task._finalSourceLink) {
                            let href = task._finalSourceLink.trim();
                            if(!href.match(/^https?:\/\//i) && !href.startsWith('//')) href = 'http://' + href;
                            downloadBtnHtml = `<button onclick="event.stopPropagation(); window.open('${href}', '_blank')" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-black/50 text-white flex items-center justify-center hover:bg-orange-500 hover:scale-110 transition-all btn-press opacity-0 group-hover:opacity-100 z-20 backdrop-blur-md border border-white/10" title="提取源文件"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></button>`;
                        }

                        const targetUrl = `task-detail-designer.html?id=${task.id}`;
                        const searchStr = `${group.label} ${group.searchKey} ${task.title} ${task.project} ${task.creator} ${tagsArr.join(' ')}`;

                        sectionHtml += `
                            <div class="asset-card bg-[#121217] rounded-2xl border border-white/5 overflow-hidden group cursor-pointer shadow-lg relative" data-search="${searchStr}" onclick="window.location.href='${targetUrl}'">
                                ${downloadBtnHtml}
                                <div class="bg-zinc-900 relative overflow-hidden min-h-[150px]">
                                    <img src="${task._finalImg}" class="w-full object-cover group-hover:scale-105 transition-transform duration-500">
                                </div>
                                <div class="p-5 flex flex-col gap-3">
                                    <div>
                                        <h3 class="text-[14px] font-bold text-zinc-100 mb-1 leading-snug group-hover:text-orange-400 transition-colors">${task.title}</h3>
                                        <p class="text-[10px] text-zinc-500 font-mono">${task.id}</p>
                                    </div>
                                    
                                    <div class="bg-[#09090b] rounded-xl p-3 border border-white/5 space-y-2">
                                        <div class="flex justify-between items-center text-[11px]">
                                            <span class="text-zinc-500 flex items-center gap-1"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> 归属项目</span>
                                            <span class="text-zinc-300 font-medium truncate max-w-[120px]" title="${task.project}">${task.project || '--'}</span>
                                        </div>
                                        <div class="flex justify-between items-center text-[11px]">
                                            <span class="text-zinc-500 flex items-center gap-1"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> 需求方</span>
                                            <span class="text-orange-400 font-bold truncate max-w-[120px]" title="${task.creator}">${task.creator || '未知'}</span>
                                        </div>
                                        <div class="flex justify-between items-center text-[11px] pt-1.5 border-t border-white/5">
                                            <span class="text-zinc-500 flex items-center gap-1"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> 流转周期</span>
                                            <span class="text-emerald-500/80 font-mono tracking-tight">${task._startDateStr.slice(5)} ~ ${task._endDateStr.slice(5)}</span>
                                        </div>
                                    </div>

                                    <div class="flex gap-1.5 flex-wrap pt-1">
                                        ${tagsHtml}
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    sectionHtml += `</div></div>`; 
                    container.insertAdjacentHTML('beforeend', sectionHtml);
                });

                document.getElementById('assets-loading').classList.add('hidden');
                
                if(renderCount === 0) {
                    document.getElementById('emptyState').style.display = 'flex';
                }

            } catch (err) {
                console.error(err);
                document.getElementById('assets-loading').innerHTML = `<p class="text-rose-500 font-bold">数据拉取失败</p><p class="text-xs text-zinc-500">${err.message}</p>`;
            }
        }

        // ================= 💡 月份切换与超级检索 =================
        window.toggleDateDropdown = function() {
            document.getElementById('date-dropdown').classList.toggle('hidden');
        }

        window.setMonthFilter = function(key, label) {
            window.activeMonthFilter = key;
            document.getElementById('current-date-text').innerText = label;
            document.getElementById('date-dropdown').classList.add('hidden');
            window.filterAssets();
        }

        // 💡 带 X 一键清空的输入框逻辑
        window.filterAssets = function() {
            const inputEl = document.getElementById("asset-search");
            const input = inputEl.value.toLowerCase().trim();
            const clearBtn = document.getElementById("clear-search-btn");
            
            if (input.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            const sections = document.querySelectorAll('.month-section');
            let globalVisibleCount = 0;

            sections.forEach(sec => {
                const secMonthKey = sec.dataset.monthKey;
                
                if (window.activeMonthFilter !== 'all' && window.activeMonthFilter !== secMonthKey) {
                    sec.style.display = "none";
                    return;
                }

                const cards = sec.querySelectorAll('.asset-card');
                let secVisibleCount = 0;

                cards.forEach(card => {
                    const searchStr = card.getAttribute('data-search').toLowerCase();
                    if (searchStr.includes(input)) {
                        card.style.display = "";
                        secVisibleCount++;
                        globalVisibleCount++;
                    } else {
                        card.style.display = "none";
                    }
                });

                if (secVisibleCount === 0) {
                    sec.style.display = "none";
                } else {
                    sec.style.display = "flex";
                }
            });

            if(globalVisibleCount === 0) {
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('emptyStateText').innerText = window.activeMonthFilter === 'all' ? '没有找到匹配的资产' : '该月份下暂无任何资产';
            } else {
                document.getElementById('emptyState').style.display = 'none';
            }
        }

        window.clearAssetSearch = function() {
            const inputEl = document.getElementById("asset-search");
            inputEl.value = "";
            window.filterAssets();
            inputEl.focus();
        }

        // ================= 🔔 全局消息通知 =================
        window.loadNotifications = function() {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';
            const isLeader = enName === 'judyzzhang' || enName === 'davidxxu';

            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            let myNotifs = sysNotifs.filter(n => {
                if (n.role === 'design') return true;
                if (isLeader && n.role === 'admin') return true;
                return false;
            });
            myNotifs.sort((a, b) => b.id - a.id);

            const unreadCount = myNotifs.filter(n => !n.read).length;
            const bellDot = document.getElementById('bell-dot');
            const notifContainer = document.getElementById('notif-list-container');

            if (bellDot) {
                if (unreadCount > 0) {
                    bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent');
                    bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]');
                } else {
                    bellDot.classList.add('hidden');
                }
            }

            if (notifContainer) {
                if (myNotifs.length === 0) {
                    notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>';
                } else {
                    let html = '';
                    myNotifs.forEach(n => {
                        const dot = n.read ? '' : '<span class="w-2 h-2 rounded-full bg-rose-500 shrink-0 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></span>';
                        const opacity = n.read ? 'opacity-50' : '';
                        const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        html += `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer ${opacity}" onclick="window.markSingleAsRead(${n.id}, '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-[13px] font-bold text-white flex items-center gap-2">${n.title} ${dot}</h4>
                                    <span class="text-[10px] text-zinc-500">${dateStr}</span>
                                </div>
                                <p class="text-[11px] text-zinc-400 leading-relaxed">${n.desc}</p>
                            </div>
                        `;
                    });
                    notifContainer.innerHTML = html;
                }
            }
        }

        window.markSingleAsRead = function(id, taskId) {
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            let target = sysNotifs.find(n => n.id === id);
            if(target) { target.read = true; localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs)); }
            if (taskId && taskId !== 'KANBAN') window.location.href = `task-detail-designer.html?id=${taskId}`;
            else window.loadNotifications();
        }

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            sysNotifs.forEach(n => { if (n.role === 'design' || n.role === 'admin') n.read = true; });
            localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs));
            window.loadNotifications();
            window.showAlert("提示", "所有消息已标记为已读", "success");
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(initRBAC()) {
                const idBtn = document.getElementById('identityBtn');
                const idMenu = document.getElementById('identityMenu');
                if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
                
                const notifBtn = document.getElementById('notifBtn');
                const notifMenu = document.getElementById('notifMenu');
                if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

                document.addEventListener('click', (e) => { 
                    if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                    if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
                    const dateWrap = document.getElementById('date-selector-wrapper');
                    const dateDrop = document.getElementById('date-dropdown');
                    if (dateWrap && dateDrop && !dateWrap.contains(e.target)) dateDrop.classList.add('hidden');
                });

                window.loadNotifications();
            }
        });
    </script>
</body>
</html>
