<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的过稿资产库 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .asset-card { break-inside: avoid; margin-bottom: 1.5rem; transition: transform 0.2s; }
        .asset-card:hover { transform: translateY(-4px); }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-orange-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 left-1/4 w-[800px] h-[600px] bg-orange-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-medium text-[14px]">执行看板 (Kanban)</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-bold text-[14px]">我的过稿资产库</span>
            </button>
            <button onclick="window.location.href='assistant-calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="font-medium text-[14px]">工时与 AI 绩效</span>
            </button>
        </div>

        <div class="px-7 py-7 mt-auto border-t border-white/5 bg-[#09090b] shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-orange-900 border border-orange-700 flex items-center justify-center text-white font-bold text-sm shadow-[0_0_10px_rgba(249,115,22,0.4)]">SK</div>
                <div><p class="text-xs font-bold text-white mb-0.5">Skyler</p><p class="text-[10px] text-orange-400">资深视觉设计</p></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        
        <header class="px-8 py-5 border-b border-white/5 shrink-0 flex items-center justify-between bg-[#09090b]/80 backdrop-blur-xl relative z-[999]">
            <div>
                <h2 class="text-[22px] font-bold text-white tracking-tight mb-1.5">我的过稿数字资产</h2>
                <p class="text-xs text-zinc-500">所有被需求方验收结项的作品均会沉淀于此，沉淀复用，拒绝重复造轮子。</p>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="relative w-64">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input type="text" class="w-full bg-[#121217] border border-white/10 rounded-xl pl-10 pr-4 py-2 text-sm text-white placeholder-zinc-500 outline-none focus:border-orange-500 transition-colors" placeholder="搜索项目、标签...">
                </div>

                <div class="w-px h-8 bg-white/10"></div>

                <div class="flex items-center gap-4 relative pt-1 z-[110]">
                    <div class="relative" id="notif-wrapper">
                        <button id="notifBtn" class="w-10 h-10 rounded-xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                            <span id="bell-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse"></span>
                        </button>
                        <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                            <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                                <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                                <button onclick="document.getElementById('notifMenu').classList.add('hidden'); document.getElementById('bell-dot').classList.add('hidden');" class="text-[11px] text-indigo-400 hover:text-indigo-300 btn-press transition-colors">全部已读</button>
                            </div>
                            <div class="max-h-[300px] overflow-y-auto custom-scrollbar">
                                <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors relative btn-press">
                                    <div class="absolute left-2 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-rose-500 rounded-full"></div>
                                    <p class="text-[12px] font-bold text-white mb-1 leading-tight"><span class="text-rose-400 mr-1">[被打回]</span>TK-0810 画册排版被退回</p>
                                    <p class="text-[11px] text-zinc-400 leading-relaxed mb-1.5">需求方 Debbie 提出了修改意见，请及时查看并更新方案。</p>
                                    <p class="text-[10px] text-zinc-500">10 分钟前</p>
                                </div>
                                <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors relative btn-press opacity-60">
                                    <p class="text-[12px] font-bold text-white mb-1 leading-tight"><span class="text-emerald-400 mr-1">[派单提醒]</span>TK-0825 新单指派</p>
                                    <p class="text-[11px] text-zinc-400 leading-relaxed mb-1.5">文哥指派了一个新任务给你：宣传片脚本分镜梳理。</p>
                                    <p class="text-[10px] text-zinc-500">1 小时前</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="relative" id="identity-wrapper">
                        <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-4 py-2.5 rounded-xl flex items-center gap-2.5 text-[12px] font-medium hover:bg-white/5 transition-colors btn-press">
                            <span class="text-orange-500 font-black flex items-center gap-1.5">
                                <span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span>
                            </span>
                            设计方 (接单)
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                            <div class="px-2 space-y-1">
                                <div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='index.html'">
                                    <div class="w-7 h-7 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                    </div>
                                    <span class="text-[13px] font-medium">需求方 (去发单/验收)</span>
                                </div>
                                <div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#362013] text-orange-400 cursor-default border border-orange-900/50">
                                    <div class="w-7 h-7 rounded-lg bg-orange-500/20 flex items-center justify-center text-orange-500">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                    </div>
                                    <span class="text-[13px] font-bold">设计方 (当前)</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto custom-scrollbar flex justify-center">
            <div class="w-full max-w-[1400px] columns-1 md:columns-2 lg:columns-3 xl:columns-4 gap-6 space-y-6">
                
                <div class="asset-card bg-[#121217] rounded-2xl border border-white/5 overflow-hidden group cursor-pointer shadow-lg">
                    <div class="aspect-[4/3] bg-zinc-900 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
                            <button class="w-10 h-10 rounded-full bg-white/20 text-white flex items-center justify-center hover:bg-orange-500 transition-colors" title="下载源文件"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></button>
                        </div>
                    </div>
                    <div class="p-5">
                        <h3 class="text-[14px] font-bold text-zinc-100 mb-1">科技风发布会 KV 源文件</h3>
                        <p class="text-[11px] text-zinc-500 mb-3">TK-0621 · 2026-02</p>
                        <div class="flex gap-1.5 flex-wrap">
                            <span class="text-[10px] bg-white/5 border border-white/10 px-2 py-0.5 rounded text-zinc-400">PSD</span>
                            <span class="text-[10px] bg-white/5 border border-white/10 px-2 py-0.5 rounded text-zinc-400">3D元素</span>
                        </div>
                    </div>
                </div>

                <div class="asset-card bg-[#121217] rounded-2xl border border-white/5 overflow-hidden group cursor-pointer shadow-lg">
                    <div class="aspect-[3/4] bg-zinc-900 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1586075010923-2dd4570fb338?q=80&w=2564&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
                            <button class="w-10 h-10 rounded-full bg-white/20 text-white flex items-center justify-center hover:bg-orange-500 transition-colors" title="下载源文件"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></button>
                        </div>
                    </div>
                    <div class="p-5">
                        <h3 class="text-[14px] font-bold text-zinc-100 mb-1">企业文化画册通用排版</h3>
                        <p class="text-[11px] text-zinc-500 mb-3">TK-0580 · 2026-01</p>
                        <div class="flex gap-1.5 flex-wrap">
                            <span class="text-[10px] bg-white/5 border border-white/10 px-2 py-0.5 rounded text-zinc-400">AI</span>
                            <span class="text-[10px] bg-white/5 border border-white/10 px-2 py-0.5 rounded text-zinc-400">画册模板</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // 💡 修复：确保交互脚本运行，控制下拉菜单
        document.addEventListener('DOMContentLoaded', () => {
            const idBtn = document.getElementById('identityBtn');
            const idMenu = document.getElementById('identityMenu');
            if(idBtn && idMenu) { idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); }); }
            
            const notifBtn = document.getElementById('notifBtn');
            const notifMenu = document.getElementById('notifMenu');
            if(notifBtn && notifMenu) { notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); }); }

            document.addEventListener('click', (e) => { 
                if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
            });
        });
    </script>
</body>
</html>
