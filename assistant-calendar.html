        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .bg-glow-orange { position: absolute; top: -10%; right: -5%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%); border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 日历专属样式 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 1px; background-color: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; overflow: hidden; }
        .calendar-cell { background-color: #121217; min-height: 120px; padding: 0.75rem; transition: background-color 0.2s; display: flex; flex-direction: column; }
        .calendar-cell:hover { background-color: #18181b; cursor: pointer; }
        .calendar-cell.muted { background-color: #0c0c0e; opacity: 0.5; }
        
        /* 工时热力图颜色 */
        .workload-safe { background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399; }
        .workload-heavy { background-color: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .workload-overload { background-color: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2); color: #fb7185; }
    </style>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        if(window.initCalendarApp) window.initCalendarApp();
    </script>

    <script>
        const PAGE_TYPE = 'design';
        
        let currentDate = new Date(); // 跟踪日历当前显示的年月
        let myAllTasks = []; // 存储该用户的所有云端任务

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);

            if (!(user.perms || []).includes(PAGE_TYPE)) {
                alert(`【权限拦截】您没有执行层做图权限，为您退回大厅。`);
                window.location.href = 'index.html';
                return false;
            }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar || '?'; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-orange-600'} border border-white/20 flex items-center justify-center text-white font-bold text-sm shadow-lg`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            
            return user;
        }

        function showToast(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        function logout(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('activeUserObj'); 
            window.location.href = 'login.html'; 
        }

        // ================= 💡 核心引擎：拉取云端数据 & 自动定位到有数据的月份 =================
        window.initCalendarApp = async function() {
            const currentUser = initRBAC();
            if(!currentUser) return;
            if(!window.supabase) return;

            const currentUserEn = currentUser.enName ? currentUser.enName.toLowerCase() : '';
            const isSuperAdmin = currentUserEn === 'davidxxu' || currentUserEn === 'judyzzhang';

            try {
                // 1. 拉取所有分配给我的任务（包含完成和未完成），如果是超管则拉取所有人以便看全盘
                let query = window.supabase.from(window.DB_TABLE).select('*');
                if (!isSuperAdmin) {
                    query = query.ilike('assignee', `%${currentUserEn}%`);
                }
                const { data, error } = await query;
                if (error) throw error;
                
                myAllTasks = data || [];

                // 2. 智能月份防呆：如果这个月是空的，自动跳转到“最近有期望交付日”的那一月
                if (myAllTasks.length > 0) {
                    let latestDateStr = '';
                    myAllTasks.forEach(t => {
                        if (t.due_date && t.due_date > latestDateStr) {
                            latestDateStr = t.due_date;
                        }
                    });
                    if (latestDateStr) {
                        const latestDateObj = new Date(latestDateStr);
                        // 如果最新数据距离现在的跨度不在当月，我们自动把日历拨过去
                        if (latestDateObj.getMonth() !== currentDate.getMonth() || latestDateObj.getFullYear() !== currentDate.getFullYear()) {
                            currentDate = new Date(latestDateObj.getFullYear(), latestDateObj.getMonth(), 1);
                        }
                    }
                }

                // 3. 渲染
                renderCalendarView();

                // 4. 关闭 Loading
                document.getElementById('calendar-loading').classList.add('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('calendar-loading').innerHTML = `<p class="text-rose-500 font-bold">数据拉取失败</p><p class="text-xs text-zinc-500">${err.message}</p>`;
            }
        }

        // ================= 💡 日历与大盘计算核心逻辑 =================
        function renderCalendarView() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); // 0-11
            
            // 顶部年月更新
            document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
            document.getElementById('dist-title-month').innerText = `${month + 1}`;

            // 计算日历网格所需参数 (以周日为一星期的第一天)
            const firstDay = new Date(year, month, 1);
            const startingDay = firstDay.getDay(); // 0 is Sunday
            const monthLength = new Date(year, month + 1, 0).getDate(); // 当月天数
            
            // 数据梳理池
            // dayData[day] = { totalHours: 0, tasks: [] }
            let dayData = {};
            for(let i=1; i<=monthLength; i++) {
                dayData[i] = { totalHours: 0, tasks: [] };
            }

            let monthTotalHours = 0;
            let monthTasksSet = new Set();
            let monthProjectsSet = new Set();
            let projectHoursMap = {};

            const currentUser = JSON.parse(localStorage.getItem('activeUserObj'));

            // 遍历所有我的任务，看它们是否“期望”在这个月交付，或者“确认”在这个月填写了工时
            myAllTasks.forEach(task => {
                let isTaskInThisMonth = false;

                // 1. 根据 Due Date 塞入对应的格子
                if (task.due_date) {
                    const d = new Date(task.due_date);
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        const day = d.getDate();
                        dayData[day].tasks.push(task);
                        isTaskInThisMonth = true;
                        monthTasksSet.add(task.id);
                        if(task.project) monthProjectsSet.add(task.project);
                    }
                }

                // 2. 解析 history_json，提取并累加属于我的真实工时
                let taskHoursByMeThisMonth = 0;
                try {
                    const hist = JSON.parse(task.history_json || '[]');
                    hist.forEach(h => {
                        // 确保是我填的工时
                        if (h.operator && (h.operator.includes(currentUser.enName) || h.operator.includes(currentUser.displayName))) {
                            const hDate = new Date(h.created_at || h.time);
                            // 如果工时填报时间在当前显示月份
                            if (hDate.getFullYear() === year && hDate.getMonth() === month) {
                                const hVal = parseFloat(h.work_hours) || 0;
                                taskHoursByMeThisMonth += hVal;
                                monthTotalHours += hVal;
                                
                                // 计入项目大盘
                                const pName = task.project || '其他支持';
                                if (!projectHoursMap[pName]) projectHoursMap[pName] = 0;
                                projectHoursMap[pName] += hVal;

                                // 如果没把任务算进本月，补充算入（就算 Due Date 不在本月，但在本月干了活）
                                if (!isTaskInThisMonth) {
                                    monthTasksSet.add(task.id);
                                    if(task.project) monthProjectsSet.add(task.project);
                                    // 我们把耗时显示在今天或填报那天
                                    const hDay = hDate.getDate();
                                    if(!dayData[hDay].tasks.find(t => t.id === task.id)) {
                                        dayData[hDay].tasks.push(task);
                                    }
                                }
                            }
                        }
                    });
                } catch(e){}

                // 把任务当月耗时挂在 Due Date 的格子上用于热力计算
                if (isTaskInThisMonth && task.due_date) {
                    const d = new Date(task.due_date);
                    dayData[d.getDate()].totalHours += taskHoursByMeThisMonth;
                }
            });

            // 💡 渲染三大指标
            document.getElementById('stat-hours').innerHTML = `${monthTotalHours.toFixed(1)} <span class="text-xs text-zinc-600 font-normal">h</span>`;
            document.getElementById('stat-tasks').innerHTML = `${monthTasksSet.size} <span class="text-xs text-zinc-600 font-normal">单</span>`;
            document.getElementById('stat-projects').innerHTML = `${monthProjectsSet.size} <span class="text-xs text-zinc-600 font-normal">个项目组</span>`;

            // 💡 渲染日历网格
            const gridEl = document.getElementById('calendar-grid');
            let gridHtml = '';
            
            const today = new Date();
            const isCurrentMonthReal = (year === today.getFullYear() && month === today.getMonth());

            // 填充月初空白
            for (let i = 0; i < startingDay; i++) {
                gridHtml += `<div class="calendar-cell muted"><span class="text-xs font-bold text-zinc-700 self-end"></span></div>`;
            }

            // 填充真实日期
            for (let i = 1; i <= monthLength; i++) {
                const isToday = isCurrentMonthReal && i === today.getDate();
                const dayInfo = dayData[i];
                
                let loadHtml = '';
                let cellOutline = isToday ? 'border border-orange-500/50 shadow-[inset_0_0_15px_rgba(249,115,22,0.15)] relative z-10' : '';
                let dayNumClass = isToday ? 'text-orange-400 bg-orange-500/20 w-5 h-5 flex items-center justify-center rounded-full ml-auto' : 'text-zinc-400';
                
                if (dayInfo.totalHours > 0) {
                    let loadClass = 'workload-safe';
                    let loadPulse = '';
                    if (dayInfo.totalHours >= 4 && dayInfo.totalHours <= 8) { loadClass = 'workload-heavy'; }
                    else if (dayInfo.totalHours > 8) { loadClass = 'workload-overload'; loadPulse = 'animate-pulse'; }
                    
                    loadHtml = `<span class="text-[10px] ${loadClass} px-1.5 rounded font-mono font-bold ${loadPulse}">${dayInfo.totalHours.toFixed(1)}h</span>`;
                } else if (dayInfo.tasks.length > 0) {
                    loadHtml = `<span class="text-[10px] bg-zinc-800 text-zinc-500 px-1.5 rounded font-mono font-bold">预排</span>`;
                }

                let tasksHtml = '';
                dayInfo.tasks.forEach(t => {
                    const isCompleted = ['completed', 'archived', 'terminated'].includes(t.status);
                    const colorMap = { 'routine': 'indigo', 'promo': 'emerald', 'other': 'sky' };
                    let tCol = 'zinc';
                    if(!isCompleted) {
                        tCol = t.status === 'rejected' ? 'rose' : (t.status === 'reviewing' ? 'emerald' : 'indigo');
                    }
                    
                    const borderStyle = isCompleted ? 'border border-zinc-800 border-dashed border-l-2 border-l-zinc-600 opacity-60' : `bg-${tCol}-500/10 border border-${tCol}-500/20 border-l-2 border-l-${tCol}-500`;
                    const textStyle = isCompleted ? 'text-zinc-500' : `text-${tCol}-400`;

                    tasksHtml += `<div onclick="event.stopPropagation(); window.location.href='task-detail-designer.html?id=${t.id}'" class="text-[10px] ${textStyle} truncate ${borderStyle} px-1.5 py-0.5 rounded mb-1 hover:brightness-125 transition-all" title="${t.title}">${t.title}</div>`;
                });

                gridHtml += `
                    <div class="calendar-cell ${cellOutline}">
                        ${isToday ? '<div class="absolute top-0 left-0 right-0 h-0.5 bg-orange-500"></div>' : ''}
                        <div class="flex justify-between items-start mb-2">
                            ${loadHtml}
                            <span class="text-xs font-bold ${dayNumClass} ${!isToday ? 'self-end' : ''}">${i}</span>
                        </div>
                        <div class="flex-1 overflow-y-auto custom-scrollbar pr-1">
                            ${tasksHtml}
                        </div>
                    </div>
                `;
            }

            // 填充月末空白
            const remainingCells = 42 - (startingDay + monthLength); // 固定 6 行 7 列
            for (let i = 0; i < remainingCells; i++) {
                gridHtml += `<div class="calendar-cell muted"></div>`;
            }

            gridEl.innerHTML = gridHtml;

            // 💡 渲染右侧项目大盘透视
            const distContainer = document.getElementById('project-dist-container');
            if (monthTotalHours === 0) {
                distContainer.innerHTML = `<div class="text-center text-zinc-500 py-10 text-sm">本月尚未记录有效工时</div>`;
            } else {
                let distHtml = '';
                // 排序项目
                const sortedProjects = Object.keys(projectHoursMap).map(p => {
                    return { name: p, hours: projectHoursMap[p] };
                }).sort((a, b) => b.hours - a.hours);

                const colors = ['orange', 'emerald', 'sky', 'indigo', 'fuchsia'];

                sortedProjects.forEach((p, idx) => {
                    const pct = ((p.hours / monthTotalHours) * 100).toFixed(0);
                    const col = colors[idx % colors.length];

                    distHtml += `
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <div>
                                    <h4 class="text-[13px] font-bold text-zinc-200">${p.name}</h4>
                                </div>
                                <div class="text-right">
                                    <span class="text-[14px] font-mono font-bold text-${col}-400">${p.hours.toFixed(1)} <span class="text-[10px] text-${col}-500/60">h</span></span>
                                    <p class="text-[10px] font-bold text-zinc-400 mt-0.5">占比 ${pct}%</p>
                                </div>
                            </div>
                            <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden">
                                <div class="h-full bg-${col}-500 rounded-full shadow-[0_0_10px_var(--tw-colors-${col}-500)] opacity-80" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    `;
                });
                distContainer.innerHTML = distHtml;
            }
        }

        // ================= 月份切换控制 =================
        window.changeMonth = function(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendarView();
        }
        
        window.goToToday = function() {
            currentDate = new Date();
            renderCalendarView();
        }

        // ================= 💡 真实数据导出 CSV =================
        window.exportMyExcel = function() {
            const btn = document.querySelector('button[onclick="exportMyExcel()"]');
            const txt = document.getElementById('export-btn-text');
            btn.disabled = true; txt.innerText = "数据打包中...";
            
            showToast('开始生成', '正在生成本月工时报表...');

            setTimeout(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                
                let csvContent = "工单编号,需求标题,归属项目,状态,期望交付日,填报工时总计\n";
                let hasData = false;
                const currentUser = JSON.parse(localStorage.getItem('activeUserObj'));

                myAllTasks.forEach(task => {
                    let taskHours = 0;
                    let isTaskInThisMonth = false;

                    if (task.due_date) {
                        const d = new Date(task.due_date);
                        if (d.getFullYear() === year && d.getMonth() === month) isTaskInThisMonth = true;
                    }

                    try {
                        const hist = JSON.parse(task.history_json || '[]');
                        hist.forEach(h => {
                            if (h.operator && (h.operator.includes(currentUser.enName) || h.operator.includes(currentUser.displayName))) {
                                const hDate = new Date(h.created_at || h.time);
                                if (hDate.getFullYear() === year && hDate.getMonth() === month) {
                                    taskHours += parseFloat(h.work_hours) || 0;
                                    isTaskInThisMonth = true;
                                }
                            }
                        });
                    } catch(e){}

                    if (isTaskInThisMonth) {
                        const title = `"${(task.title || '').replace(/"/g, '""')}"`;
                        csvContent += `${task.id},${title},${task.project},${task.status},${task.due_date || '未定'},${taskHours}\n`;
                        hasData = true;
                    }
                });

                btn.disabled = false; txt.innerText = "导出本月工时报表 (CSV)";

                if(!hasData) return showToast('导出失败', '当前月份没有工单或填报工时记录！', 'error');

                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' }); 
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `我的月度工时台账_${year}年${month+1}月.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast('导出成功', 'Excel 报表已下载至本地。', 'success');
            }, 1000);
        }

        // ================= 🔔 全局消息通知 =================
        window.loadNotifications = function() {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';
            const isLeader = enName === 'judyzzhang' || enName === 'davidxxu';

            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            let myNotifs = sysNotifs.filter(n => {
                if (n.role === 'design') return true;
                if (isLeader && n.role === 'admin') return true;
                return false;
            });
            myNotifs.sort((a, b) => b.id - a.id);

            const unreadCount = myNotifs.filter(n => !n.read).length;
            const bellDot = document.getElementById('bell-dot');
            const notifContainer = document.getElementById('notif-list-container');

            if (bellDot) {
                if (unreadCount > 0) {
                    bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent');
                    bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]');
                } else {
                    bellDot.classList.add('hidden');
                }
            }

            if (notifContainer) {
                if (myNotifs.length === 0) {
                    notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>';
                } else {
                    let html = '';
                    myNotifs.forEach(n => {
                        const dot = n.read ? '' : '<span class="w-2 h-2 rounded-full bg-rose-500 shrink-0 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></span>';
                        const opacity = n.read ? 'opacity-50' : '';
                        const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        html += `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer ${opacity}" onclick="window.markSingleAsRead(${n.id})">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-[13px] font-bold text-white flex items-center gap-2">${n.title} ${dot}</h4>
                                    <span class="text-[10px] text-zinc-500">${dateStr}</span>
                                </div>
                                <p class="text-[11px] text-zinc-400 leading-relaxed">${n.desc}</p>
                            </div>
                        `;
                    });
                    notifContainer.innerHTML = html;
                }
            }
        }

        window.markSingleAsRead = function(id) {
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            let target = sysNotifs.find(n => n.id === id);
            if(target) { target.read = true; localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs)); window.loadNotifications(); }
        }

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            sysNotifs.forEach(n => { if (n.role === 'design' || n.role === 'admin') n.read = true; });
            localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs));
            window.loadNotifications();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const idBtn = document.getElementById('identityBtn');
            const idMenu = document.getElementById('identityMenu');
            if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
            
            const notifBtn = document.getElementById('notifBtn');
            const notifMenu = document.getElementById('notifMenu');
            if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

            document.addEventListener('click', (e) => { 
                if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
            });

            window.loadNotifications();
        });
    </script>
</body>
</html>
