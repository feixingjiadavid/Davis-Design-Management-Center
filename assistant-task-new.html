<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待接单评估 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .modal-enter { animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { 0% { opacity: 0; transform: scale(0.97) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-sky-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-sky-900/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-bold text-[14px]">执行看板 (Kanban)</span>
            </button>
            <button onclick="window.location.href='assistant-assets.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">我的过稿资产库</span>
            </button>
        </div>

        <div class="px-5 py-5 mt-auto border-t border-white/5 bg-[#09090b] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg">?</div>
                <div><p id="sidebar-name" class="text-xs font-bold text-white mb-0.5">加载中...</p><p id="sidebar-role" class="text-[10px] text-zinc-500">设计方视角</p></div>
            </div>
            <button onclick="logout()" class="p-2 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出登录">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl shrink-0 flex items-center justify-between">
            <div>
                <button onclick="window.location.href='assistant-workspace.html'" class="text-zinc-500 hover:text-white text-[12px] font-bold mb-3 flex items-center gap-1.5 transition-colors btn-press">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    返回执行看板
                </button>
                <div class="flex items-center gap-4">
                    <div class="bg-sky-500/10 border border-sky-500/20 px-3 py-1.5 rounded-lg flex items-center gap-2">
                        <span class="text-sky-400 font-mono text-sm font-bold" id="req-id">读取中...</span>
                    </div>
                    <h2 class="text-[22px] font-bold text-white tracking-tight" id="req-title-display">正在获取云端需求详情...</h2>
                    <span class="bg-sky-500/20 text-sky-400 px-2.5 py-1 rounded text-[11px] font-bold border border-sky-500/30 flex items-center gap-1.5 shadow-[0_0_10px_rgba(56,189,248,0.2)]">
                        待您评估接单
                    </span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-10 flex justify-center">
            <div class="w-full max-w-[1400px] flex gap-10 items-start">
                
                <div class="flex-1 flex flex-col gap-8 min-w-0">
                    <div class="bg-[#121217] border border-white/5 rounded-2xl p-8 relative overflow-hidden">
                        <div class="absolute right-0 top-0 bg-white/5 text-zinc-500 text-[10px] font-bold px-3 py-1 rounded-bl-xl">需求全貌摘要</div>
                        
                        <div class="grid grid-cols-2 gap-8 mb-8 border-b border-white/5 pb-8">
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">归属项目</p>
                                <p class="text-sm font-bold text-zinc-300" id="dt-project">--</p>
                            </div>
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">期望交付日</p>
                                <p class="text-sm font-bold text-sky-400" id="dt-date">--</p>
                            </div>
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">发起人</p>
                                <p class="text-sm font-bold text-zinc-300" id="dt-creator">--</p>
                            </div>
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">期望分发渠道</p>
                                <p class="text-sm font-bold text-zinc-300" id="dt-channels">--</p>
                            </div>
                            <div class="col-span-2">
                                <p class="text-xs text-zinc-500 mb-1">需求参考链接</p>
                                <p class="text-sm font-bold text-zinc-300" id="dt-link">--</p>
                            </div>
                        </div>
                        
                        <h3 class="text-sm font-bold text-white mb-3">📋 详细描述</h3>
                        <div class="text-sm text-zinc-400 leading-relaxed bg-[#09090b] border border-white/5 p-5 rounded-xl min-h-[120px]" id="req-desc-display">
                            数据读取中...
                        </div>

                        <div id="attachment-container"></div>
                    </div>
                </div>

                <div class="w-[380px] shrink-0 flex flex-col gap-6">
                    <div class="bg-gradient-to-b from-[#18181b] to-[#121217] border border-sky-500/30 rounded-3xl p-7 shadow-2xl relative overflow-hidden">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-sky-400"></div>
                        <h3 class="text-[15px] font-bold text-white mb-5 flex items-center gap-2">接单评估决策</h3>
                        <p class="text-[12px] text-zinc-400 mb-6">请仔细阅读左侧的需求描述及附件，确认需求范围是否清晰。接单后将进入正式排期。</p>
                        
                        <div class="space-y-4">
                            <button onclick="openAcceptModal()" class="w-full py-3.5 bg-sky-600 hover:bg-sky-500 text-white rounded-xl text-[14px] font-bold shadow-[0_10px_20px_-10px_rgba(56,189,248,0.5)] btn-press transition-all flex items-center justify-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                需求清晰，确认接单
                            </button>
                            <button onclick="openRejectModal()" class="w-full py-3.5 bg-transparent border border-rose-500/50 hover:bg-rose-500/10 text-rose-500 rounded-xl text-[13px] font-bold btn-press transition-all flex items-center justify-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                需求模糊，暂不接受
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="accept-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeModals()">
        <div id="accept-modal" class="hidden w-full max-w-sm bg-[#121217] border border-sky-500/30 rounded-3xl shadow-[0_20px_50px_-10px_rgba(56,189,248,0.2)] flex flex-col scale-95 transition-transform duration-300 p-6 relative modal-enter">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-sky-400 to-indigo-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-4 mt-2">
                <h2 class="text-[16px] font-bold text-white">确认接单排期</h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white bg-zinc-800 rounded-full p-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <p class="text-[12px] text-zinc-400 mb-5 leading-relaxed">接单后需求方将收到通知，请给出你预计提供<span class="text-sky-400 font-bold">框架方案（草图/排版框架）</span>的时间。</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-[12px] font-bold text-zinc-300 mb-2">预计交框架方案时间 <span class="text-rose-500">*</span></label>
                    <input type="date" id="framework-date" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-sky-500 transition-colors" style="color-scheme: dark;">
                </div>
            </div>
            <button id="btn-accept-submit" onclick="submitAccept()" class="w-full mt-6 py-3.5 bg-sky-600 hover:bg-sky-500 text-white rounded-xl text-[13px] font-bold shadow-[0_5px_15px_rgba(56,189,248,0.3)] transition-all btn-press">保存排期并接单</button>
        </div>
    </div>

    <div id="reject-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeModals()">
        <div id="reject-modal" class="hidden w-full max-w-lg bg-[#121217] border border-rose-500/30 rounded-3xl shadow-[0_20px_50px_-10px_rgba(244,63,94,0.2)] flex flex-col scale-95 transition-transform duration-300 p-6 relative modal-enter">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-rose-500 to-orange-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-4 mt-2">
                <h2 class="text-[16px] font-bold text-white">打回该需求</h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white bg-zinc-800 rounded-full p-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <p class="text-[12px] text-zinc-400 mb-5 leading-relaxed">需求将被打回至需求方的大厅，状态变更为红色打回状态，请明确指出缺失的内容。</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-[12px] font-bold text-zinc-300 mb-2">打回原因 <span class="text-rose-500">*</span></label>
                    <textarea id="reject-reason" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-rose-500 transition-colors h-24 resize-none custom-scrollbar" placeholder="例如：缺少核心文案；尺寸未明确；参考图未上传..."></textarea>
                </div>
            </div>
            <button id="btn-reject-submit" onclick="submitReject()" class="w-full mt-6 py-3.5 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-[13px] font-bold shadow-[0_5px_15px_rgba(244,63,94,0.3)] transition-all btn-press">确认打回需求</button>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks';
        
        if(window.loadTaskDetail) window.loadTaskDetail();
    </script>

    <script>
        function logout() { localStorage.removeItem('activeUserObj'); window.location.href = 'login.html'; }

        // 获取 URL 里的单号 (例如 assistant-task-new.html?id=TEST-001)
        const urlParams = new URLSearchParams(window.location.search);
        const currentTaskId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('sidebar-avatar').innerText = user.avatar;
            document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            
            if(!currentTaskId) {
                alert("未找到需求编号！"); window.location.href='assistant-workspace.html'; 
            }
        });

        // 💡 必须：从 Supabase 完整拉取数据（包含 file_data）
        window.loadTaskDetail = async function() {
            if(!window.supabase || !currentTaskId) return;

            // 这里查询所有字段，因为是详情页，需要加载图片
            const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').eq('id', currentTaskId).single();
            
            if(error || !data) {
                alert("未找到该需求或已删除！");
                window.location.href = 'assistant-workspace.html';
                return;
            }

            renderTask(data);
        }

        // 渲染数据到页面
        function renderTask(task) {
            document.getElementById('req-id').innerText = task.id;
            document.getElementById('req-title-display').innerText = task.title;
            document.getElementById('dt-title').innerText = task.title;
            document.getElementById('dt-project').innerText = task.project || '--';
            document.getElementById('dt-date').innerText = task.due_date || '--';
            document.getElementById('dt-creator').innerText = task.creator || '系统记录';
            
            if(task.channels && task.channels.length > 0) {
                document.getElementById('dt-channels').innerText = task.channels.join('，');
            } else {
                document.getElementById('dt-channels').innerText = '未指定渠道';
            }

            if(task.link) {
                document.getElementById('dt-link').innerHTML = `<a href="${task.link}" target="_blank" class="text-sky-400 hover:underline break-all">${task.link}</a>`;
            } else {
                document.getElementById('dt-link').innerText = '未提供链接';
            }

            document.getElementById('req-desc-display').innerHTML = (task.full_desc || '无详细描述').replace(/\n/g, '<br>');
            
            // 附件渲染
            if(task.file_name && task.file_data) {
                document.getElementById('attachment-container').innerHTML = `
                    <div class="mt-6 p-4 bg-white/5 border border-white/10 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-indigo-500/20 text-indigo-400 flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg></div>
                            <div><p class="text-sm font-bold text-white">${task.file_name}</p><p class="text-[10px] text-zinc-500 mt-0.5">需求方提供的参考附件</p></div>
                        </div>
                        <button onclick="downloadAttachment('${task.file_name}', '${task.file_data}')" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg transition-colors btn-press">下载查看</button>
                    </div>
                `;
            } else if (task.file_name) {
                document.getElementById('attachment-container').innerHTML = `<div class="mt-6 text-xs text-zinc-500 italic">📎 包含附件：${task.file_name} (无实体文件流)</div>`;
            }
        }

        window.downloadAttachment = function(name, dataBase64) {
            const a = document.createElement('a');
            a.href = dataBase64;
            a.download = name;
            a.click();
            showToast('下载成功', '附件已开始下载', 'success');
        }

        // ================= 弹窗控制 =================
        const acceptOverlay = document.getElementById('accept-modal-overlay');
        const acceptModal = document.getElementById('accept-modal');
        const rejectOverlay = document.getElementById('reject-modal-overlay');
        const rejectModal = document.getElementById('reject-modal');

        window.openAcceptModal = function() {
            acceptOverlay.classList.remove('hidden');
            setTimeout(() => { acceptOverlay.classList.remove('opacity-0'); acceptModal.classList.remove('hidden'); }, 10);
        }

        window.openRejectModal = function() {
            rejectOverlay.classList.remove('hidden');
            setTimeout(() => { rejectOverlay.classList.remove('opacity-0'); rejectModal.classList.remove('hidden'); }, 10);
        }

        window.closeModals = function() {
            acceptOverlay.classList.add('opacity-0');
            rejectOverlay.classList.add('opacity-0');
            setTimeout(() => {
                acceptOverlay.classList.add('hidden');
                acceptModal.classList.add('hidden');
                rejectOverlay.classList.add('hidden');
                rejectModal.classList.add('hidden');
            }, 300);
        }

        // ================= 💡 核心业务：接单与打回逻辑 =================
        window.submitAccept = async function() {
            const fwDate = document.getElementById('framework-date').value;
            if(!fwDate) return alert("请填写预计交框架方案的时间！");

            const btn = document.getElementById('btn-accept-submit');
            btn.disabled = true; btn.innerText = "提交中...";

            if (window.supabase) {
                // 接单后进入排期中 (processing)
                const summary = `排期中，预计 ${fwDate} 上传框架方案`;
                const user = JSON.parse(localStorage.getItem('activeUserObj'));
                const { error } = await window.supabase.from(window.DB_TABLE).update({
                    status: 'processing',
                    summary_desc: summary,
                    assignee: user.enName // 锁定执行人为自己
                }).eq('id', currentTaskId);

                if (error) {
                    btn.disabled = false; btn.innerText = "保存排期并接单";
                    return alert("云端更新失败：" + error.message);
                }
            }

            closeModals();
            showToast('✅ 接单成功', '任务已进入【制作中】泳道', 'success');
            setTimeout(() => { window.location.href = 'assistant-workspace.html'; }, 1500);
        }

        window.submitReject = async function() {
            const reason = document.getElementById('reject-reason').value.trim();
            if(!reason) return alert("请填写打回原因！");

            const btn = document.getElementById('btn-reject-submit');
            btn.disabled = true; btn.innerText = "提交中...";

            if (window.supabase) {
                // 打回后状态变为 rejected，需求大厅接收红灯预警
                const summary = `需求被退回：${reason}`;
                const { error } = await window.supabase.from(window.DB_TABLE).update({
                    status: 'rejected',
                    summary_desc: summary
                }).eq('id', currentTaskId);

                if (error) {
                    btn.disabled = false; btn.innerText = "确认打回需求";
                    return alert("云端更新失败：" + error.message);
                }
            }

            closeModals();
            showToast('已打回', '该需求已退回给需求方重新修改', 'info');
            setTimeout(() => { window.location.href = 'assistant-workspace.html'; }, 1500);
        }

        window.showToast = function(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            const icon = document.getElementById('toast-icon');
            if(type === 'success') {
                icon.className = "w-8 h-8 rounded-full bg-sky-500/20 text-sky-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else if(type === 'info') {
                icon.className = "w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }
    </script>
</body>
</html>
