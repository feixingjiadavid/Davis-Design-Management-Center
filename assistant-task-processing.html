<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>执行工作台 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* 拖拽上传区高亮 */
        .drag-active { border-color: #f97316 !important; background-color: rgba(249, 115, 22, 0.05) !important; }
        
        /* AI 工具多选按钮样式 */
        .ai-tool-cb:checked + div {
            background-color: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #34d399;
            font-weight: 600;
        }

        /* 💡 全屏大图预览组件 */
        #image-preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #image-preview-modal.visible {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background-color: #121217;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 90vw;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.8);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        #image-preview-modal.visible .modal-content {
            transform: scale(1);
        }
        #image-preview-modal img {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
            object-fit: contain;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-orange-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-orange-900/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-bold text-[14px]">执行看板 (Kanban)</span>
            </button>
            <button onclick="window.location.href='assistant-assets.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">我的过稿资产库</span>
            </button>
        </div>

        <div class="px-5 py-5 mt-auto border-t border-white/5 bg-[#09090b] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg">?</div>
                <div><p id="sidebar-name" class="text-xs font-bold text-white mb-0.5">加载中...</p><p id="sidebar-role" class="text-[10px] text-zinc-500">设计方视角</p></div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="openPwdModal()" class="p-2 text-zinc-500 hover:text-orange-400 hover:bg-orange-500/10 rounded-lg transition-colors btn-press" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="logout(event)" class="p-2 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl shrink-0 flex items-center justify-between">
            <div>
                <button onclick="window.location.href='assistant-workspace.html'" class="text-zinc-500 hover:text-white text-[12px] font-bold mb-3 flex items-center gap-1.5 transition-colors btn-press">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    返回执行看板
                </button>
                <div class="flex items-center gap-4">
                    <div class="bg-orange-500/10 border border-orange-500/20 px-3 py-1.5 rounded-lg flex items-center gap-2">
                        <span class="text-orange-500 font-mono text-sm font-bold" id="req-id">读取中...</span>
                    </div>
                    <h2 class="text-[22px] font-bold text-white tracking-tight" id="req-title-display">正在拉取云端需求...</h2>
                </div>
            </div>
            
            <div class="flex items-center gap-5 relative z-[110]">
                <div class="relative" id="identity-wrapper">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-4 py-2.5 rounded-xl flex items-center gap-2.5 text-[12px] font-medium hover:bg-white/5 transition-colors btn-press">
                        加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-10 flex justify-center">
            <div class="w-full max-w-[1400px] flex gap-10 items-start">
                
                <div class="flex-1 flex flex-col gap-8 min-w-0">
                    
                    <div class="bg-[#121217] border border-white/5 rounded-2xl p-8 relative overflow-hidden">
                        <div class="absolute right-0 top-0 bg-white/5 text-zinc-500 text-[10px] font-bold px-3 py-1 rounded-bl-xl">甲方原始需求</div>
                        
                        <div class="grid grid-cols-2 gap-8 mb-8 border-b border-white/5 pb-8">
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">归属项目</p>
                                <p class="text-sm font-bold text-zinc-300" id="dt-project">--</p>
                            </div>
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">期望交付日</p>
                                <p class="text-sm font-bold text-sky-400" id="dt-date">--</p>
                            </div>
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">发起人</p>
                                <p class="text-sm font-bold text-zinc-300" id="dt-creator">--</p>
                            </div>
                            <div>
                                <p class="text-xs text-zinc-500 mb-1">期望分发渠道</p>
                                <div class="flex flex-wrap gap-1.5 mt-0.5" id="dt-channels">
                                    <span class="text-[10px] text-zinc-500">读取中...</span>
                                </div>
                            </div>
                            <div class="col-span-2">
                                <p class="text-xs text-zinc-500 mb-1">需求参考链接</p>
                                <p class="text-sm font-bold text-zinc-300" id="dt-link">--</p>
                            </div>
                        </div>
                        
                        <h3 class="text-sm font-bold text-white mb-3">📋 详细描述</h3>
                        <div class="text-sm text-zinc-400 leading-relaxed bg-[#09090b] border border-white/5 p-5 rounded-xl min-h-[120px]" id="req-desc-display">
                            数据读取中...
                        </div>

                        <div id="attachment-container"></div>
                    </div>

                    <div>
                        <h3 class="text-[15px] font-bold text-orange-400 mb-3 flex items-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            上传框架方案
                        </h3>
                        <div class="bg-[#121217] border border-orange-500/20 p-6 rounded-2xl shadow-xl">
                            
                            <div id="dropzone" class="w-full h-48 border-2 border-dashed border-zinc-700 rounded-xl bg-[#09090b] flex flex-col items-center justify-center text-zinc-500 mb-6 transition-colors hover:border-orange-500/50 cursor-pointer relative overflow-hidden">
                                <input type="file" id="design-upload" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="handleDesignUpload(event)" accept="image/*,.pdf,.psd,.zip">
                                
                                <div id="upload-placeholder" class="flex flex-col items-center pointer-events-none">
                                    <div class="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center mb-3 text-zinc-400">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                    </div>
                                    <p class="text-[13px] font-bold text-zinc-300 mb-1">点击或将设计稿拖拽至此</p>
                                    <p class="text-[11px] text-zinc-600">支持 JPG, PNG, PDF 预览图，及 ZIP 源文件包</p>
                                </div>

                                <div id="upload-preview" class="hidden w-full h-full p-4 flex flex-col items-center justify-center bg-orange-500/5 border border-orange-500/20 pointer-events-none">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" class="mb-2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                    <p class="text-sm font-bold text-orange-400" id="filename-display">已选中文件</p>
                                    <p class="text-[10px] text-orange-500/60 mt-1">点击可全屏预览</p>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[12px] font-bold text-zinc-400 mb-2">致需求方的交付说明 / 浏览指引</label>
                                <textarea id="delivery-desc" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-[13px] text-white outline-none focus:border-orange-500 transition-colors h-20 resize-none custom-scrollbar" placeholder="例如：按照您的要求，这是初版的排版框架，请查阅元素比例是否合适..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-[380px] shrink-0 flex flex-col gap-6">
                    
                    <div class="bg-gradient-to-b from-[#18181b] to-[#121217] border border-orange-500/30 rounded-3xl p-7 shadow-2xl relative overflow-hidden">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-orange-500"></div>
                        <h3 class="text-[15px] font-bold text-white mb-6 border-b border-white/5 pb-4">效能填报与交付</h3>
                        
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[12px] font-bold text-zinc-300 mb-2 flex items-center justify-between">
                                    <span>本节点实际消耗工时 (h) <span class="text-rose-500">*</span></span>
                                    <span class="text-[10px] text-orange-400 font-normal">将计入本周负荷</span>
                                </label>
                                <input type="number" id="work-hours" step="0.5" placeholder="例: 4.5" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-[14px] text-white font-mono font-bold outline-none focus:border-orange-500 transition-colors">
                            </div>

                            <div>
                                <label class="block text-[12px] font-bold text-zinc-300 mb-2 flex items-center justify-between">
                                    <span>借助的 AI 工具 (多选)</span>
                                    <span class="text-[10px] text-emerald-500 font-normal">计入提效指标</span>
                                </label>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="cursor-pointer">
                                        <input type="checkbox" class="hidden ai-tool-cb" value="豆包">
                                        <div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-3 py-2 rounded-lg transition-colors text-center font-medium">豆包</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="checkbox" class="hidden ai-tool-cb" value="Gemini">
                                        <div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-3 py-2 rounded-lg transition-colors text-center font-medium">Gemini</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="checkbox" class="hidden ai-tool-cb" value="Gpt">
                                        <div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-3 py-2 rounded-lg transition-colors text-center font-medium">Gpt</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="checkbox" class="hidden ai-tool-cb" value="DeepSeek">
                                        <div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-3 py-2 rounded-lg transition-colors text-center font-medium">DeepSeek</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="checkbox" class="hidden ai-tool-cb" value="ClaudeClaw">
                                        <div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-3 py-2 rounded-lg transition-colors text-center font-medium">ClaudeClaw</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="checkbox" class="hidden ai-tool-cb" value="PS生成式填充">
                                        <div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-3 py-2 rounded-lg transition-colors text-center font-medium">PS生成式填充</div>
                                    </label>
                                    <label class="cursor-pointer col-span-2">
                                        <input type="checkbox" class="hidden ai-tool-cb" value="即梦">
                                        <div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-3 py-2 rounded-lg transition-colors text-center font-medium">即梦</div>
                                    </label>
                                </div>
                                <div class="mt-2">
                                    <input type="text" id="ai-tool-other" placeholder="其他工具可在此手填..." class="w-full bg-[#09090b] border border-zinc-700 border-dashed rounded-xl px-4 py-2.5 text-[12px] text-zinc-300 outline-none focus:border-emerald-500 transition-colors">
                                </div>
                            </div>
                        </div>

                        <div class="mt-8 pt-5 border-t border-white/5">
                            <button id="btn-submit-design" onclick="submitDesign()" class="w-full py-3.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-[14px] font-bold shadow-[0_10px_20px_-10px_rgba(249,115,22,0.6)] btn-press transition-all flex items-center justify-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="clipboard-icon"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M9 12h6"></path><path d="M9 16h6"></path><path d="M12 8h.01"></path></svg>
                                提交框架方案审核
                            </button>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <div id="image-preview-modal" onclick="closePreview()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <p class="text-[13px] font-bold text-white" id="modal-filename-label">预览图</p>
                <button onclick="closePreview()" class="text-zinc-500 hover:text-white transition-colors p-1 btn-press">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="flex justify-center bg-black/50 rounded-xl overflow-hidden relative">
                <img id="modal-image" src="" alt="设计稿预览图" class="max-h-[75vh] object-contain">
            </div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-orange-500 to-rose-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-orange-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label>
                    <input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入原密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label>
                    <input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入新密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label>
                    <input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="再次输入新密码">
                </div>
            </div>
            <button onclick="submitPwdChange()" class="w-full mt-6 py-3.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(249,115,22,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks';
        
        if(window.loadTaskDetail) window.loadTaskDetail();
    </script>

    <script>
        function logout() { localStorage.removeItem('activeUserObj'); window.location.href = 'login.html'; }

        const urlParams = new URLSearchParams(window.location.search);
        const currentTaskId = urlParams.get('id');
        let currentDesignFileData = null; // 存放设计师传的Base64稿件

        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);
            
            // 身份加载
            document.getElementById('sidebar-avatar').innerText = user.avatar;
            document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            
            // 身份切换器
            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = '';
                if (user.perms.includes('req')) { html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='index.html'"><div class="w-7 h-7 rounded-lg bg-indigo-500/10 text-indigo-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-medium">需求方大厅</span></div>`; }
                if (user.perms.includes('design')) { html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#362013] text-orange-400 cursor-default border border-orange-900/50"><div class="w-7 h-7 rounded-lg bg-orange-500/20 text-orange-500 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-bold">设计方视角 (当前)</span></div>`; }
                if (user.perms.includes('admin')) { html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='manager-workspace.html'"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/10 text-fuchsia-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div><span class="text-[13px] font-medium">管理方 (统筹大盘)</span></div>`; }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-orange-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span></span> 身份: 设计方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }

            const idMenu = document.getElementById('identityMenu');
            if(triggerBtn && idMenu) triggerBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
            document.addEventListener('click', (e) => { if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); });

            if(!currentTaskId) {
                alert("未获取到需求单号！"); window.location.href='assistant-workspace.html'; 
            }
        });

        // 💡 抓取发单时的原始需求信息
        window.loadTaskDetail = async function() {
            if(!window.supabase || !currentTaskId) return;

            const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').eq('id', currentTaskId).single();
            
            if(error || !data) {
                alert("未找到该需求或它已被撤销删除！");
                window.location.href = 'assistant-workspace.html';
                return;
            }

            // 渲染数据
            document.getElementById('req-id').innerText = data.id || '--';
            document.getElementById('req-title-display').innerText = data.title || '无标题';
            
            const pEl = document.getElementById('dt-project'); if(pEl) pEl.innerText = data.project || '--';
            const dEl = document.getElementById('dt-date'); if(dEl) dEl.innerText = data.due_date || '--';
            const cEl = document.getElementById('dt-creator'); if(cEl) cEl.innerText = data.creator || '系统记录';
            
            const chEl = document.getElementById('dt-channels');
            if(chEl) {
                if(data.channels && Array.isArray(data.channels) && data.channels.length > 0) {
                    chEl.innerHTML = data.channels.map(c => `<span class="text-[10px] bg-white/5 border border-white/10 px-2 py-0.5 rounded text-zinc-300">${c}</span>`).join('');
                } else {
                    chEl.innerHTML = '<span class="text-[10px] text-zinc-500">未指定具体渠道</span>';
                }
            }

            const linkEl = document.getElementById('dt-link');
            if(linkEl) {
                if(data.link) linkEl.innerHTML = `<a href="${data.link}" target="_blank" class="text-sky-400 hover:underline break-all">${data.link}</a>`;
                else linkEl.innerText = '未提供链接';
            }

            const descEl = document.getElementById('req-desc-display');
            if(descEl) descEl.innerHTML = (data.full_desc || '无详细描述').replace(/\n/g, '<br>');
            
            // 附件渲染 (甲方给的参考)
            const attachEl = document.getElementById('attachment-container');
            if(attachEl) {
                if(data.file_name && data.file_data) {
                    attachEl.innerHTML = `
                        <div class="mt-4 flex gap-3">
                            <button onclick="downloadAttachment('${data.file_name}', '${data.file_data}')" class="text-[11px] bg-[#1a1a24] text-indigo-400 px-3 py-1.5 rounded-lg border border-indigo-500/20 hover:bg-indigo-500/10 flex items-center gap-1.5 transition-colors btn-press">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg> 下载甲方源文件：${data.file_name}
                            </button>
                        </div>
                    `;
                } else if (data.file_name) {
                    attachEl.innerHTML = `<div class="mt-4 text-[11px] text-zinc-500 italic">📎 甲方附件名称：${data.file_name} (无实体文件流)</div>`;
                }
            }
        }

        window.downloadAttachment = function(name, dataBase64) {
            const a = document.createElement('a');
            a.href = dataBase64;
            a.download = name;
            a.click();
            showToast('下载成功', '附件已开始下载', 'success');
        }

        // ================= 上传交互与图片预览 =================
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('design-upload');

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-active'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('drag-active'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault(); dropzone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleDesignUpload({ target: fileInput });
            }
        });

        window.handleDesignUpload = function(event) {
            const files = event.target.files;
            if(files.length > 0) {
                document.getElementById('upload-placeholder').classList.add('hidden');
                const preview = document.getElementById('upload-preview');
                preview.classList.remove('hidden');
                
                let name = files[0].name;
                if(files.length > 1) name += ` (等 ${files.length} 个文件)`;
                document.getElementById('filename-display').innerText = name;

                // 提取 Base64 用于后续云端保存和全屏预览
                const reader = new FileReader();
                reader.onload = function(e) { currentDesignFileData = e.target.result; };
                reader.readAsDataURL(files[0]); 
            }
        }

        // 💡 触发全屏预览
        function openPreview() {
            if(!currentDesignFileData) return; // 没有文件则不触发
            
            document.getElementById('modal-image').src = currentDesignFileData;
            document.getElementById('modal-filename-label').innerText = document.getElementById('filename-display').innerText || '设计稿预览图';
            
            const modal = document.getElementById('image-preview-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('visible'), 10);
        }

        function closePreview() {
            const modal = document.getElementById('image-preview-modal');
            modal.classList.remove('visible');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // 绑定点击事件到虚线框
        document.getElementById('dropzone').addEventListener('click', function(e) {
            // 如果占位符已经隐藏（说明有文件了），才拦截点击并预览
            if(document.getElementById('upload-placeholder').classList.contains('hidden')) {
                e.preventDefault(); 
                openPreview();
            }
        });

        // ================= 💡 提交逻辑：状态推进到 pending_approval (让Judy审批) =================
        window.submitDesign = async function() {
            const fileEl = document.getElementById('design-upload');
            if(fileEl.files.length === 0) {
                return alert("【校验失败】\n交方案怎么能不传文件呢！请先上传您的框架草图。");
            }

            const hours = document.getElementById('work-hours').value;
            if(!hours || hours <= 0) {
                return alert("【校验失败】\n请准确填报您在本节点消耗的工时（不支持 0），这将影响您的个人产能绩效！");
            }

            // 收集 AI 工具数据
            const selectedAiTools = Array.from(document.querySelectorAll('.ai-tool-cb:checked')).map(cb => cb.value);
            const otherAi = document.getElementById('ai-tool-other').value.trim();
            if(otherAi) selectedAiTools.push(otherAi);

            const deliveryDesc = document.getElementById('delivery-desc').value.trim();

            const btn = document.getElementById('btn-submit-design');
            btn.disabled = true; btn.innerText = "数据同步中...";

            if (window.supabase) {
                // 💡 修改为 pending_approval 让主管审批！
                const summary = `框架已上传等待主管审核 (耗时: ${hours}h | AI提效: ${selectedAiTools.length > 0 ? selectedAiTools.join(',') : '无'})`;
                
                const { error } = await window.supabase.from(window.DB_TABLE).update({
                    status: 'pending_approval', 
                    summary_desc: summary,
                    // TODO: 生产环境这里应加入 design_file_data = currentDesignFileData 来存储设计师的图片
                }).eq('id', currentTaskId);

                if (error) {
                    btn.disabled = false; btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="clipboard-icon"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M9 12h6"></path><path d="M9 16h6"></path><path d="M12 8h.01"></path></svg> 提交框架方案审核`;
                    return alert("云端更新失败：" + error.message);
                }
            }

            showToast('交付成功', '框架方案已推送给主管审核。', 'success');
            setTimeout(() => { window.location.href = 'assistant-workspace.html'; }, 1500);
        }

        window.showToast = function(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            const icon = document.getElementById('toast-icon');
            
            if(type === 'error') {
                icon.className = "w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else {
                icon.className = "w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            }
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        window.openPwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');
            const pwdModal = document.getElementById('pwd-modal');
            pwdOverlay.classList.remove('hidden'); setTimeout(() => { pwdOverlay.classList.remove('opacity-0'); pwdModal.classList.remove('hidden'); pwdModal.classList.remove('scale-95'); }, 10);
        }
        window.closePwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');
            const pwdModal = document.getElementById('pwd-modal');
            pwdOverlay.classList.add('opacity-0'); pwdModal.classList.add('scale-95'); setTimeout(() => { pwdOverlay.classList.add('hidden'); pwdModal.classList.add('hidden'); }, 300);
        }
        window.submitPwdChange = function() { alert('请联系管理员修改密码。'); closePwdModal(); }
    </script>
</body>
</html>
