<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>被打回修改 - TK-0810 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .drag-active { border-color: #f97316 !important; background-color: rgba(249, 115, 22, 0.05) !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-orange-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-rose-900/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-bold text-[14px]">执行看板 (Kanban)</span>
            </button>
            <button onclick="window.location.href='assistant-assets.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">我的过稿资产库</span>
            </button>
            <button onclick="window.location.href='assistant-calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="font-medium text-[14px]">工时与 AI 绩效</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl shrink-0 flex items-center justify-between">
            <div>
                <button onclick="window.location.href='assistant-workspace.html'" class="text-zinc-500 hover:text-white text-[12px] font-bold mb-3 flex items-center gap-1.5 transition-colors btn-press">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    返回执行看板
                </button>
                <div class="flex items-center gap-4">
                    <div class="bg-rose-500/10 border border-rose-500/20 px-3 py-1.5 rounded-lg flex items-center gap-2">
                        <span class="text-rose-500 font-mono text-sm font-bold">TK-0810</span>
                    </div>
                    <h2 class="text-[22px] font-bold text-white tracking-tight">企业文化宣传册排版</h2>
                    <span class="bg-rose-500/20 text-rose-500 border border-rose-500/30 px-2.5 py-1 rounded text-[11px] font-bold flex items-center gap-1.5">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> 甲方打回修改
                    </span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-10 flex justify-center">
            <div class="w-full max-w-[1400px] flex gap-10 items-start">
                
                <div class="flex-1 flex flex-col gap-8 min-w-0">
                    
                    <div class="bg-rose-950/20 border border-rose-500/30 rounded-2xl p-6 relative overflow-hidden shadow-[0_0_30px_rgba(244,63,94,0.05)]">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-rose-500"></div>
                        <h3 class="text-[14px] font-bold text-rose-400 mb-3 flex items-center gap-2">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                            需求方反馈意见
                        </h3>
                        <p class="text-[13px] text-zinc-300 leading-relaxed mb-4">整体排版没问题，但是主色调有点暗，不够有活力。请根据附件截图标注的位置调整一下颜色，稍微提亮一些，然后重新发我看一下。</p>
                        <button class="text-[11px] bg-rose-500/10 text-rose-400 hover:bg-rose-500/20 px-3 py-1.5 rounded-lg border border-rose-500/20 flex items-center gap-1.5 transition-colors">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> 查看附图_反馈批注.png
                        </button>
                    </div>

                    <div>
                        <h3 class="text-[15px] font-bold text-orange-400 mb-3 flex items-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            上传修改后的新版本 (V-2)
                        </h3>
                        <div class="bg-[#121217] border border-orange-500/20 p-6 rounded-2xl shadow-xl">
                            <div id="dropzone" class="w-full h-40 border-2 border-dashed border-zinc-700 rounded-xl bg-[#09090b] flex flex-col items-center justify-center text-zinc-500 mb-6 transition-colors hover:border-orange-500/50 cursor-pointer relative overflow-hidden">
                                <input type="file" id="design-upload" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" multiple>
                                <div class="flex flex-col items-center pointer-events-none">
                                    <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center mb-2 text-zinc-400">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg>
                                    </div>
                                    <p class="text-[12px] font-bold text-zinc-300">拖拽新版本至此</p>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[12px] font-bold text-zinc-400 mb-2">本次修改说明回复</label>
                                <textarea class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-[13px] text-white outline-none focus:border-orange-500 transition-colors h-16 resize-none custom-scrollbar" placeholder="例如：已按要求调亮了主色调，请再次查阅..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-[380px] shrink-0 flex flex-col gap-6">
                    <div class="bg-gradient-to-b from-[#18181b] to-[#121217] border border-orange-500/30 rounded-3xl p-7 shadow-2xl relative overflow-hidden">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-orange-500"></div>
                        <h3 class="text-[15px] font-bold text-white mb-6 border-b border-white/5 pb-4">新一轮效能记录</h3>
                        
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[12px] font-bold text-zinc-300 mb-2">本次修改补充耗时 (h) <span class="text-rose-500">*</span></label>
                                <input type="number" step="0.5" placeholder="例如: 1.5" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-[14px] text-white font-mono font-bold outline-none focus:border-orange-500">
                            </div>
                        </div>

                        <div class="mt-8 pt-5 border-t border-white/5">
                            <button onclick="submitUpdate()" class="w-full py-3.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-[14px] font-bold shadow-[0_10px_20px_-10px_rgba(249,115,22,0.6)] btn-press transition-all flex items-center justify-center gap-2">
                                重新提交给甲方 (V-2)
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <script>
        function submitUpdate() {
            alert('修改版本提交成功！');
            window.location.href = 'assistant-workspace.html';
        }
    </script>
</body>
</html>
