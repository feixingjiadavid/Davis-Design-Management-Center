<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计执行看板 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .kanban-card { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; cursor: pointer; }
        .kanban-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.6); }
        .kanban-card:active { transform: scale(0.98); }
        
        .kanban-column { height: calc(100vh - 220px); }
        .bg-glow-orange { position: absolute; top: -10%; right: -5%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%); border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 同色系呼吸灯防漏 */
        @keyframes pulse-sky { 50% { box-shadow: inset 0 0 0 1px rgba(56,189,248,0.4), 0 0 20px rgba(56,189,248,0.2); } }
        @keyframes pulse-amber { 50% { box-shadow: inset 0 0 0 1px rgba(251,191,36,0.4), 0 0 20px rgba(251,191,36,0.2); } }
        @keyframes pulse-emerald { 50% { box-shadow: inset 0 0 0 1px rgba(16,185,129,0.4), 0 0 20px rgba(16,185,129,0.2); } }
        @keyframes pulse-rose { 50% { box-shadow: inset 0 0 0 1px rgba(244,63,94,0.4), 0 0 20px rgba(244,63,94,0.2); } }
        
        .breathe-sky { animation: pulse-sky 2s infinite ease-in-out; border-color: rgba(56,189,248,0.6) !important; }
        .breathe-amber { animation: pulse-amber 2s infinite ease-in-out; border-color: rgba(251,191,36,0.6) !important; }
        .breathe-emerald { animation: pulse-emerald 2s infinite ease-in-out; border-color: rgba(16,185,129,0.6) !important; }
        .breathe-rose { animation: pulse-rose 2s infinite ease-in-out; border-color: rgba(244,63,94,0.6) !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-orange-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 left-1/4 w-[800px] h-[600px] bg-orange-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-bold text-[14px]">执行看板 (Kanban)</span>
            </button>
            <button onclick="window.location.href='assistant-assets.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">我的过稿资产库</span>
            </button>
            <button onclick="window.location.href='assistant-calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="font-medium text-[14px]">工时与 AI 绩效</span>
            </button>
        </div>

        <div class="px-5 py-5 mt-auto border-t border-white/5 bg-[#09090b] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg">?</div>
                <div><p id="sidebar-name" class="text-xs font-bold text-white mb-0.5">加载中...</p><p id="sidebar-role" class="text-[10px] text-zinc-500">读取中</p></div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="openPwdModal()" class="p-2 text-zinc-500 hover:text-orange-400 hover:bg-orange-500/10 rounded-lg transition-colors btn-press" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="logout(event)" class="p-2 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        
        <header class="px-8 py-6 flex flex-col shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl relative z-[999]">
            <div class="flex justify-between items-start w-full">
                <div>
                    <h2 id="header-greeting" class="text-[24px] font-bold text-white tracking-tight mb-2 flex items-center gap-3">
                        加载中...
                        <span class="bg-orange-500/20 text-orange-400 text-[11px] px-2.5 py-0.5 rounded-lg border border-orange-500/30">设计看板</span>
                    </h2>
                    <p class="text-[13px] text-zinc-500 mb-6">所有的创意都在有条不紊地落地中。</p>
                    
                    <div class="flex items-center gap-5 mt-2">
                        <div class="bg-[#16161d] border border-white/5 rounded-2xl p-4 flex items-center gap-4 shadow-lg min-w-[220px]">
                            <div class="w-12 h-12 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-500 border border-orange-500/20">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            </div>
                            <div>
                                <p class="text-[11px] text-zinc-500 font-bold mb-1 uppercase tracking-wider">本周负荷工时</p>
                                <p class="text-[22px] font-black text-white font-mono leading-none" id="dashboard-hours">0 <span class="text-xs text-zinc-600 font-normal ml-0.5">/ 40h</span></p>
                            </div>
                        </div>
                        
                        <div class="bg-[#16161d] border border-white/5 rounded-2xl p-4 flex items-center gap-4 shadow-lg min-w-[220px]">
                            <div class="w-12 h-12 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-500 border border-emerald-500/20">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            </div>
                            <div>
                                <p class="text-[11px] text-zinc-500 font-bold mb-1 uppercase tracking-wider">AI 提效占比</p>
                                <div class="flex items-baseline gap-2">
                                    <p class="text-[22px] font-black text-emerald-400 font-mono leading-none">--%</p>
                                    <span class="text-[10px] bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-1.5 py-0.5 rounded font-bold">待评估</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-[#16161d] border border-white/5 rounded-2xl p-4 flex items-center gap-4 shadow-lg min-w-[220px]">
                            <div class="w-12 h-12 rounded-full bg-sky-500/10 flex items-center justify-center text-sky-400 border border-sky-500/20">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            </div>
                            <div>
                                <p class="text-[11px] text-zinc-500 font-bold mb-1 uppercase tracking-wider">当前我的待办</p>
                                <p class="text-[22px] font-black text-white font-mono leading-none" id="dashboard-tasks-count">0 <span class="text-[11px] text-zinc-600 font-normal ml-1">单</span></p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-5 relative pt-1 z-[110]">
                    <button id="clear-db-btn" onclick="clearTestData()" class="hidden bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 text-rose-500 px-4 py-3 rounded-[14px] text-[13px] font-bold transition-all btn-press items-center gap-1.5" title="仅清空提单数据，不影响账号">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        清空测试数据
                    </button>

                    <div class="relative" id="notif-wrapper">
                        <button id="notifBtn" class="w-10 h-10 rounded-xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        </button>
                        <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                            <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                                <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                                <button onclick="document.getElementById('notifMenu').classList.add('hidden');" class="text-[11px] text-indigo-400 hover:text-indigo-300 btn-press transition-colors">全部已读</button>
                            </div>
                            <div class="max-h-[300px] overflow-y-auto custom-scrollbar">
                                <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>
                            </div>
                            <div class="pt-3 px-5 border-t border-white/5 text-center">
                                <button onclick="window.location.href='message-center.html?role=design'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                            </div>
                        </div>
                    </div>

                    <div class="relative" id="identity-wrapper">
                        <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-4 py-2.5 rounded-xl flex items-center gap-2.5 text-[12px] font-medium hover:bg-white/5 transition-colors btn-press">
                            加载中...
                        </button>
                        <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                            <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-6 px-8 overflow-x-auto custom-scrollbar flex gap-6">
            
            <div class="flex-1 min-w-[280px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h3 class="text-[13px] font-bold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-sky-400 shadow-[0_0_8px_rgba(56,189,248,0.6)]"></span> 待排期/待接单
                    </h3>
                </div>
                <div class="flex-1 bg-[#121217]/60 border border-white/5 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 shadow-inner" id="lane-pending">
                    <div class="text-center py-10" id="loading-spinner">
                        <p class="text-xs text-zinc-500 flex justify-center items-center gap-2"><svg class="animate-spin h-3 w-3 text-zinc-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 同步云端数据中...</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 min-w-[280px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h3 class="text-[13px] font-bold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.6)]"></span> 制作中
                    </h3>
                </div>
                <div class="flex-1 bg-[#121217]/60 border border-white/5 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 shadow-inner" id="lane-processing">
                </div>
            </div>

            <div class="flex-1 min-w-[280px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h3 class="text-[13px] font-bold text-zinc-400 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-zinc-500"></span> 审核挂起中
                    </h3>
                </div>
                <div class="flex-1 bg-[#121217]/30 border border-white/5 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 opacity-80" id="lane-blocked">
                </div>
            </div>
            
            <div class="flex-1 min-w-[280px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h3 class="text-[13px] font-bold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span> 交付待验收
                    </h3>
                </div>
                <div class="flex-1 bg-gradient-to-b from-emerald-900/5 to-[#121217]/50 border border-emerald-500/10 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 shadow-inner" id="lane-review">
                </div>
            </div>

        </div>
    </main>

    <div id="transfer-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeTransferModal()">
        <div id="transfer-modal" class="hidden w-full max-w-lg bg-[#121217] border border-orange-500/20 rounded-3xl shadow-[0_20px_50px_-10px_rgba(249,115,22,0.2)] flex flex-col scale-95 transition-transform duration-300">
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-[#1a1a1f] rounded-t-3xl">
                <h2 class="text-[15px] font-bold text-white flex items-center gap-2">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.5"><path d="M17 3v2M7 3v2M3 14h18M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2-2v12a2 2 0 0 0 2 2z"></path></svg>
                    转单 / 呼叫支援
                </h2>
                <button onclick="closeTransferModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1.5 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            
            <div class="p-6 space-y-5">
                <div class="bg-orange-500/10 border border-orange-500/20 p-3 rounded-xl text-[12px] text-orange-400 leading-relaxed">
                    当前任务：<span class="font-bold text-white" id="transfer-task-name">加载中...</span><br>
                    请说明转单原因，系统将退回统筹池重新分配。
                </div>
                
                <div>
                    <label class="block text-[12px] font-bold text-zinc-300 mb-2">转单原因及进度说明 <span class="text-rose-500">*</span></label>
                    <textarea id="transfer-reason" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-[13px] text-white outline-none focus:border-orange-500 h-24 resize-none custom-scrollbar" placeholder="例如：甲方临时要求加3D特效，个人不擅长..."></textarea>
                </div>
            </div>
            
            <div class="p-5 border-t border-white/5 bg-[#09090b] flex justify-end gap-3 rounded-b-3xl">
                <button onclick="closeTransferModal()" class="px-5 py-2.5 bg-transparent border border-zinc-700 text-zinc-400 hover:text-white rounded-xl text-[12px] font-bold btn-press transition-colors">取消</button>
                <button onclick="submitTransfer()" class="px-6 py-2.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-[12px] font-bold shadow-[0_5px_15px_rgba(249,115,22,0.3)] btn-press transition-all">确认转单</button>
            </div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-orange-500 to-rose-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-orange-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label>
                    <input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入原密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label>
                    <input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入新密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label>
                    <input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="再次输入新密码">
                </div>
            </div>
            <button onclick="submitPwdChange()" class="w-full mt-6 py-3.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(249,115,22,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; // 保证设计看板查的也是 test_tasks 表！
        
        if(window.loadTasksFromCloud) window.loadTasksFromCloud();
    </script>

    <script>
        const PAGE_TYPE = 'design'; 

        function logout(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('activeUserObj'); 
            window.location.href = 'login.html'; 
        }

        function updateGreeting(user) {
            const hour = new Date().getHours();
            let timeStr = '晚上好';
            if (hour >= 5 && hour < 12) timeStr = '上午好';
            else if (hour >= 12 && hour < 18) timeStr = '下午好';
            const display = user.displayName || user.cnName || user.enName;
            document.getElementById('header-greeting').innerHTML = `${timeStr}，${display}。 <span class="bg-orange-500/20 text-orange-400 text-[11px] px-2.5 py-0.5 rounded-lg border border-orange-500/30 ml-2">设计看板</span>`;
        }

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';

            if (!user.perms.includes(PAGE_TYPE)) {
                alert(`【权限拦截】您没有执行层做图权限，为您退回大厅。`);
                window.location.href = 'index.html';
                return false;
            }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-orange-600'} border border-white/20 flex items-center justify-center text-white font-bold text-sm shadow-lg`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName;
            
            updateGreeting(user);

            // 💡 清空测试数据按钮白名单
            const testUsers = ['ponyxu', 'davidxxu', 'yoshyliu', '小戴维斯'];
            const isTestUser = testUsers.includes(enName) || testUsers.includes(user.displayName) || testUsers.includes(user.cnName);
            if(isTestUser) {
                const clrBtn = document.getElementById('clear-db-btn');
                if(clrBtn) { clrBtn.classList.remove('hidden'); clrBtn.classList.add('flex'); }
            }

            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = '';
                if (user.perms.includes('req')) { html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='index.html'"><div class="w-7 h-7 rounded-lg bg-indigo-500/10 text-indigo-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-medium">需求方 (发单/验收)</span></div>`; }
                if (user.perms.includes('design')) { html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#362013] text-orange-400 cursor-default border border-orange-900/50"><div class="w-7 h-7 rounded-lg bg-orange-500/20 text-orange-500 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-bold">设计方 (执行/接单) (当前)</span></div>`; }
                if (user.perms.includes('admin')) { html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='manager-workspace.html'"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/10 text-fuchsia-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div><span class="text-[13px] font-medium">管理方 (统筹/大盘)</span></div>`; }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-orange-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span></span> 身份: 设计方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }
            return true;
        }

        window.clearTestData = async function() {
            if(!window.supabase) return;
            if(!confirm("⚠️ 警告：这将直接清空云端测试表中的所有需求数据！且不可恢复！\n确定要继续吗？")) return;
            try {
                const { error } = await window.supabase.from(window.DB_TABLE).delete().neq('id', '0');
                if (error) throw error;
                showToast('已清空', '云端测试数据已全部清空！', 'success');
                setTimeout(() => window.location.reload(), 1500);
            } catch(e) { alert("清理失败: " + e.message); }
        }

        function showToast(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            const icon = document.getElementById('toast-icon');
            if(type === 'success') {
                icon.className = "w-8 h-8 rounded-full bg-orange-500/20 text-orange-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else if(type === 'info') {
                icon.className = "w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        // ================= 云端直连：动态拉取设计看板数据 =================
        window.loadTasksFromCloud = async function() {
            if(!window.supabase) return;
            
            const userStr = localStorage.getItem('activeUserObj');
            const currentUserEn = userStr ? JSON.parse(userStr).enName.toLowerCase() : '';

            const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').order('created_at', { ascending: false });
            if(error) return console.error(error);

            const pendingLane = document.getElementById('lane-pending');
            const processingLane = document.getElementById('lane-processing');
            const blockedLane = document.getElementById('lane-blocked');
            const reviewLane = document.getElementById('lane-review');

            pendingLane.innerHTML = '';
            processingLane.innerHTML = '';
            blockedLane.innerHTML = '';
            reviewLane.innerHTML = '';

            let myTaskCount = 0;

            data.forEach(task => {
                const taskAssignee = task.assignee ? task.assignee.toLowerCase() : 'none';
                const isForMe = (taskAssignee === 'none' || taskAssignee === currentUserEn);

                if (!isForMe) return; 

                // 💡 提取统一的临期判定 (<= 2天)
                let isUrgent = false;
                if (task.due_date && task.status !== 'completed' && task.status !== 'archived') {
                    const due = new Date(task.due_date);
                    const today = new Date();
                    due.setHours(0,0,0,0);
                    today.setHours(0,0,0,0);
                    const diffDays = (due - today) / (1000 * 60 * 60 * 24);
                    if (diffDays <= 2 && diffDays >= -999) isUrgent = true;
                }

                if(task.status !== 'completed' && task.status !== 'archived') {
                    myTaskCount++;
                }

                // ======= 待排期 / 待接单 =======
                if (task.status === 'pending' || task.status === 'pending_accept') {
                    let alertBadge = isUrgent ? `<div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl shadow-lg flex items-center gap-1 z-10"><span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> 临期预警</div>` : '';
                    let breatheClass = isUrgent ? 'breathe-rose' : '';
                    let cardBorder = isUrgent ? 'border-rose-500/60' : 'border-sky-500/30 hover:border-sky-500/60';

                    const cardHTML = `
                        <div class="bg-[#18181b] border ${cardBorder} rounded-xl p-4 kanban-card flex flex-col relative overflow-hidden group cursor-pointer ${breatheClass}" onclick="window.location.href='assistant-task-new.html'">
                            ${alertBadge}
                            <div class="absolute left-0 top-0 bottom-0 w-[4px] bg-sky-500"></div>
                            <div class="flex items-center justify-between mb-2 pl-1 relative z-10">
                                <span class="text-[10px] font-bold text-sky-400 bg-sky-500/10 px-2 py-0.5 rounded border border-sky-500/20">${task.id}</span>
                                <span class="text-[10px] text-zinc-500">${task.status === 'pending' ? '统筹池公海单' : '主管定向派发'}</span>
                            </div>
                            <h4 class="text-[14px] font-bold text-zinc-100 mb-1.5 pl-1 leading-snug relative z-10">${task.title}</h4>
                            <p class="text-[11px] text-zinc-400 line-clamp-2 mb-3 pl-1 relative z-10">${task.full_desc || ''}</p>
                            
                            <div class="mt-auto border-t border-white/5 pt-3 pl-1 flex gap-2 relative z-10">
                                <button onclick="event.stopPropagation(); window.location.href='assistant-task-new.html'" class="flex-1 bg-sky-600 hover:bg-sky-500 text-white rounded-lg py-2 text-[11px] font-bold btn-press transition-colors shadow-[0_4px_12px_rgba(56,189,248,0.25)]">去接单并上传框架</button>
                                <button onclick="event.stopPropagation(); openTransferModal('${task.id}', '${task.title}')" class="px-3 bg-[#1a1a24] text-sky-400 border border-sky-500/30 hover:bg-sky-500/10 rounded-lg text-[11px] font-bold btn-press transition-colors flex items-center justify-center gap-1" title="排期冲突，申请转单">转单</button>
                            </div>
                        </div>
                    `;
                    pendingLane.insertAdjacentHTML('beforeend', cardHTML);
                } 
                
                // ======= 制作中 =======
                else if (task.status === 'processing') {
                    let alertBadge = isUrgent ? `<div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl shadow-lg flex items-center gap-1 z-10"><span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> 临期预警</div>` : '';
                    let breatheClass = isUrgent ? 'breathe-rose' : '';
                    let cardBorder = isUrgent ? 'border-rose-500/60' : 'border-orange-500/30 hover:border-orange-500/60';

                    const cardHTML = `
                        <div class="bg-[#18181b] border ${cardBorder} rounded-xl p-4 kanban-card flex flex-col relative overflow-hidden group cursor-pointer ${breatheClass}" onclick="window.location.href='assistant-task-processing.html'">
                            ${alertBadge}
                            <div class="absolute left-0 top-0 bottom-0 w-[4px] bg-orange-500"></div>
                            <div class="flex items-center justify-between mb-2 pl-1 relative z-10">
                                <span class="text-[10px] font-bold text-zinc-300 bg-zinc-800 border border-zinc-700 px-2 py-0.5 rounded">${task.id}</span>
                                <span class="text-[10px] font-bold text-orange-400">您已接单</span>
                            </div>
                            <h4 class="text-[14px] font-bold text-zinc-100 mb-1.5 pl-1 leading-snug relative z-10">${task.title}</h4>
                            <p class="text-[11px] text-emerald-500 mb-3 pl-1 font-medium flex items-center gap-1 relative z-10"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg> 前置阶段已通过，推正稿</p>
                            
                            <div class="mt-auto border-t border-white/5 pt-3 flex gap-2 pl-1 relative z-10">
                                <button onclick="event.stopPropagation(); window.location.href='assistant-task-processing.html'" class="flex-1 bg-orange-600 hover:bg-orange-500 text-white rounded-lg py-2 text-[11px] font-bold btn-press transition-colors shadow-[0_4px_12px_rgba(249,115,22,0.25)]">上传产出方案</button>
                                <button onclick="event.stopPropagation(); openTransferModal('${task.id}', '${task.title}')" class="px-3 bg-[#1a1a24] text-orange-400 border border-orange-500/30 hover:bg-orange-500/10 rounded-lg text-[11px] font-bold btn-press transition-colors flex items-center justify-center gap-1" title="遇到阻力，转交他人">转单</button>
                            </div>
                        </div>
                    `;
                    processingLane.insertAdjacentHTML('beforeend', cardHTML);
                }
                
                // ======= 审核挂起中 =======
                else if (task.status === 'pending_approval') {
                    let alertBadge = isUrgent ? `<div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl shadow-lg flex items-center gap-1 z-10"><span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> 临期预警</div>` : '';
                    let breatheClass = isUrgent ? 'breathe-rose' : '';
                    let cardBorder = isUrgent ? 'border-rose-500/60' : 'border-amber-500/30 hover:border-amber-500/60';

                    const cardHTML = `
                        <div class="bg-[#16161d] border ${cardBorder} rounded-xl p-4 flex flex-col cursor-pointer kanban-card relative overflow-hidden ${breatheClass}" onclick="window.location.href='assistant-task-locked.html'">
                            ${alertBadge}
                            <div class="absolute left-0 top-0 bottom-0 w-[4px] bg-amber-500"></div>
                            <div class="flex items-center justify-between mb-2 pl-1 relative z-10">
                                <span class="text-[10px] font-bold text-zinc-500 bg-black px-2 py-0.5 rounded border border-white/5">${task.id}</span>
                                <span class="text-[10px] text-amber-500 flex items-center gap-1 font-bold"><svg class="animate-spin h-2.5 w-2.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 领导审批中</span>
                            </div>
                            <h4 class="text-[14px] font-bold text-zinc-400 mb-1.5 pl-1 leading-snug line-through decoration-zinc-600 relative z-10">${task.title}</h4>
                            <p class="text-[11px] text-zinc-500 mb-3 pl-1 relative z-10">您已提交前期草图。系统防偏离锁定中，等待审核。</p>
                            
                            <div class="mt-auto border-t border-white/5 pt-3 pl-1 relative z-10 flex">
                                <button onclick="event.stopPropagation(); showToast('已发送', '已催促主管审批', 'info')" class="w-full bg-amber-500/10 text-amber-500 hover:bg-amber-500/20 border border-amber-500/20 rounded-lg py-2 text-[11px] font-bold btn-press transition-colors">催促主管审批</button>
                            </div>
                        </div>
                    `;
                    blockedLane.insertAdjacentHTML('beforeend', cardHTML);
                }
                
                // ======= 交付待验收 =======
                else if (task.status === 'reviewing') {
                    let alertBadge = isUrgent ? `<div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl shadow-lg flex items-center gap-1 z-10"><span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> 临期预警</div>` : '';
                    let breatheClass = isUrgent ? 'breathe-rose' : '';
                    let cardBorder = isUrgent ? 'border-rose-500/60' : 'border-emerald-500/30 hover:border-emerald-500/60';

                    const cardHTML = `
                        <div class="bg-[#18181b] border ${cardBorder} rounded-xl p-4 kanban-card flex flex-col relative overflow-hidden group cursor-pointer ${breatheClass}" onclick="window.location.href='assistant-task-locked.html'">
                            ${alertBadge}
                            <div class="absolute left-0 top-0 bottom-0 w-[4px] bg-emerald-500"></div>
                            <div class="flex items-center justify-between mb-2 pl-1 relative z-10">
                                <span class="text-[10px] font-bold text-zinc-300 bg-zinc-800 px-2 py-0.5 rounded border border-zinc-700">${task.id}</span>
                                <span class="text-[10px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg> 等待甲方验收</span>
                            </div>
                            <h4 class="text-[14px] font-bold text-zinc-100 mb-1.5 pl-1 leading-snug relative z-10">${task.title}</h4>
                            <p class="text-[11px] text-zinc-400 line-clamp-2 mb-3 pl-1 relative z-10">终稿已提交，等待需求方最终确认或归档结算。</p>
                            
                            <div class="mt-auto border-t border-white/5 pt-3 flex gap-2 pl-1 relative z-10">
                                <button onclick="event.stopPropagation(); showToast('已提醒', '催促验交通知已发送给需求方', 'success')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_4px_12px_rgba(16,185,129,0.25)] rounded-lg py-2 text-[11px] font-bold btn-press transition-colors">催促甲方验收</button>
                            </div>
                        </div>
                    `;
                    reviewLane.insertAdjacentHTML('beforeend', cardHTML);
                }
            });

            if (pendingLane.innerHTML.trim() === '') {
                pendingLane.innerHTML = `<div class="text-center py-6 text-zinc-600 text-[11px]">暂无待排期任务</div>`;
            }
            if (processingLane.innerHTML.trim() === '') {
                processingLane.innerHTML = `<div class="text-center py-6 text-zinc-600 text-[11px]">暂无制作中任务</div>`;
            }
            if (blockedLane.innerHTML.trim() === '') {
                blockedLane.innerHTML = `<div class="text-center py-6 text-zinc-600 text-[11px]">暂无审核挂起任务</div>`;
            }
            if (reviewLane.innerHTML.trim() === '') {
                reviewLane.innerHTML = `<div class="text-center py-6 text-zinc-600 text-[11px]">暂无待验收任务</div>`;
            }

            document.getElementById('dashboard-tasks-count').innerHTML = `${myTaskCount} <span class="text-[11px] text-zinc-600 font-normal ml-1">单</span>`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(!initRBAC()) return;
            const idBtn = document.getElementById('identityBtn');
            const idMenu = document.getElementById('identityMenu');
            if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
            document.addEventListener('click', (e) => { if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); });
        });

        // ================= 转单功能写入云端 =================
        const modalOverlay = document.getElementById('transfer-modal-overlay');
        const modal = document.getElementById('transfer-modal');
        let currentTransferTaskId = null;

        window.openTransferModal = function(taskId, title = '') { 
            currentTransferTaskId = taskId;
            const titleSpan = document.getElementById('transfer-task-name');
            if (titleSpan) titleSpan.innerText = `${taskId} ${title}`;
            modalOverlay.classList.remove('hidden'); 
            setTimeout(() => { modalOverlay.classList.remove('opacity-0'); modal.classList.remove('hidden'); modal.classList.remove('scale-95'); }, 10); 
        }

        window.closeTransferModal = function() { 
            modalOverlay.classList.add('opacity-0'); modal.classList.add('scale-95'); 
            setTimeout(() => { modalOverlay.classList.add('hidden'); modal.classList.add('hidden'); currentTransferTaskId = null; }, 300); 
        }

        window.submitTransfer = async function() { 
            if (!window.supabase) return alert("云端未连接");
            if (!currentTransferTaskId) return;

            const reason = document.getElementById('transfer-reason').value.trim();
            if(!reason) return alert('请填写转单原因');

            const { error } = await window.supabase.from(window.DB_TABLE)
                .update({ status: 'pending', assignee: 'none', summary_desc: `原执行人转单：${reason}` })
                .eq('id', currentTransferTaskId);

            if(error) return alert("转单失败: " + error.message);

            closeTransferModal(); 
            showToast('转单成功', '任务已退回统筹池等待重新分配', 'success');
            
            // 乐观重载
            setTimeout(async () => { await loadTasksFromCloud(); }, 300);
        }

        const pwdOverlay = document.getElementById('pwd-modal-overlay');
        const pwdModal = document.getElementById('pwd-modal');
        function openPwdModal() { pwdOverlay.classList.remove('hidden'); setTimeout(() => { pwdOverlay.classList.remove('opacity-0'); pwdModal.classList.remove('hidden'); pwdModal.classList.remove('scale-95'); }, 10); }
        function closePwdModal() { pwdOverlay.classList.add('opacity-0'); pwdModal.classList.add('scale-95'); setTimeout(() => { pwdOverlay.classList.add('hidden'); pwdModal.classList.add('hidden'); }, 300); }
        function submitPwdChange() { alert('请联系管理员修改密码。'); closePwdModal(); }
    </script>
</body>
</html>
