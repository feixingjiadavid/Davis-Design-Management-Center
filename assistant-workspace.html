<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计执行看板 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .kanban-card { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; cursor: pointer; }
        .kanban-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.6); }
        
        .kanban-column { height: calc(100vh - 220px); }
        .bg-glow-orange { position: absolute; top: -10%; right: -5%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%); border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @keyframes pulse-rose { 50% { box-shadow: inset 0 0 0 1px rgba(244,63,94,0.6), 0 0 20px rgba(244,63,94,0.3); } }
        .breathe-rose { animation: pulse-rose 2s infinite ease-in-out; border-color: rgba(244,63,94,0.8) !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-orange-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="bg-glow-orange"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-bold text-[14px]">需求执行看板</span>
            </button>
            <button onclick="window.location.href='assistant-assets.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">我的过稿资产库</span>
            </button>
            <button onclick="window.location.href='assistant-calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="font-medium text-[14px]">工时与 AI 效能分析</span>
            </button>
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-[9999]">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-orange-400 hover:bg-orange-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 flex flex-col shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl relative z-[999]">
            <div class="flex justify-between items-start w-full">
                <div>
                    <h2 id="header-greeting" class="text-[24px] font-bold text-white tracking-tight mb-2 flex items-center gap-3">
                        加载中...
                        <span class="bg-orange-500/20 text-orange-400 text-[11px] px-2.5 py-0.5 rounded-lg border border-orange-500/30">设计看板</span>
                        <div id="sync-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 animate-pulse ml-2" title="云端监听中..."></div>
                    </h2>
                    <p class="text-[13px] text-zinc-500 mb-6">所有的创意都在有条不紊地落地中。</p>
                    
                    <div class="flex items-center gap-5 mt-2">
                        
                        <div class="bg-[#16161d] border border-white/5 rounded-2xl p-4 flex items-center gap-4 shadow-lg min-w-[190px]">
                            <div class="w-11 h-11 rounded-full bg-sky-500/10 flex items-center justify-center text-sky-500 border border-sky-500/20 shrink-0">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            </div>
                            <div>
                                <p class="text-[11px] text-zinc-500 font-bold mb-1 uppercase tracking-wider">进行中待办</p>
                                <p class="text-[20px] font-black text-white font-mono leading-none" id="metric-todo">0 <span class="text-[11px] text-zinc-600 font-normal ml-1 font-sans">单</span></p>
                            </div>
                        </div>

                        <div class="bg-[#16161d] border border-white/5 rounded-2xl p-4 flex items-center gap-4 shadow-lg min-w-[190px]">
                            <div class="w-11 h-11 rounded-full bg-rose-500/10 flex items-center justify-center text-rose-500 border border-rose-500/20 shrink-0">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            </div>
                            <div>
                                <p class="text-[11px] text-zinc-500 font-bold mb-1 uppercase tracking-wider">被打回重画</p>
                                <p class="text-[20px] font-black text-rose-400 font-mono leading-none" id="metric-rejected">0 <span class="text-[11px] text-zinc-600 font-normal ml-1 font-sans">单</span></p>
                            </div>
                        </div>

                        <div class="bg-[#16161d] border border-white/5 rounded-2xl p-4 flex items-center gap-4 shadow-lg min-w-[190px]">
                            <div class="w-11 h-11 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-500 border border-emerald-500/20 shrink-0">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </div>
                            <div>
                                <p class="text-[11px] text-zinc-500 font-bold mb-1 uppercase tracking-wider">本月已完结</p>
                                <p class="text-[20px] font-black text-emerald-400 font-mono leading-none" id="metric-completed">0 <span class="text-[11px] text-zinc-600 font-normal ml-1 font-sans">单</span></p>
                            </div>
                        </div>

                    </div>
                </div>
                
                <div class="flex items-center gap-5 relative pt-1 z-[110]">
                    <div class="relative z-[120]" id="notif-wrapper">
                        <button id="notifBtn" class="w-11 h-11 rounded-2xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                            <span id="bell-dot" class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                        </button>
                        <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                            <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                                <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                                <button onclick="window.markAllAsRead(event)" class="text-[11px] text-orange-400 hover:text-orange-300 btn-press transition-colors">全部已读</button>
                            </div>
                            <div class="max-h-[300px] overflow-y-auto custom-scrollbar" id="notif-list-container">
                                <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>
                            </div>
                            <div class="pt-3 px-5 border-t border-white/5 text-center">
                                <button onclick="window.location.href='message-center.html?role=design'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                            </div>
                        </div>
                    </div>

                    <div class="relative" id="identity-wrapper">
                        <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-5 py-3 rounded-[14px] flex items-center gap-3 text-[13px] font-medium hover:bg-[#1a1a1f] transition-colors btn-press">
                            身份加载中...
                        </button>
                        <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                            <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-6 px-10 overflow-x-auto custom-scrollbar flex gap-6">
            
            <div class="flex-1 min-w-[300px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2 mt-2">
                    <h3 class="text-[13px] font-bold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-sky-400 shadow-[0_0_8px_rgba(56,189,248,0.6)]"></span> 待接受/待分配
                    </h3>
                </div>
                <div class="flex-1 bg-[#121217]/60 border border-white/5 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 shadow-inner" id="lane-pending">
                    <div class="text-center py-10" id="loading-spinner">
                        <p class="text-xs text-zinc-500 flex justify-center items-center gap-2"><svg class="animate-spin h-3 w-3 text-zinc-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 极速同步云端数据...</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 min-w-[300px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2 mt-2">
                    <h3 class="text-[13px] font-bold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.6)]"></span> 方案设计中
                    </h3>
                </div>
                <div class="flex-1 bg-[#121217]/60 border border-white/5 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 shadow-inner" id="lane-processing">
                </div>
            </div>

            <div class="flex-1 min-w-[300px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2 mt-2">
                    <h3 class="text-[13px] font-bold text-zinc-400 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.6)]"></span> 领导框架审核中
                    </h3>
                </div>
                <div class="flex-1 bg-[#121217]/30 border border-white/5 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 opacity-90" id="lane-blocked">
                </div>
            </div>
            
            <div class="flex-1 min-w-[300px] max-w-[360px] flex flex-col kanban-column">
                <div class="flex items-center justify-between mb-4 px-2 mt-2">
                    <h3 class="text-[13px] font-bold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span> 方案已提待验收
                    </h3>
                </div>
                <div class="flex-1 bg-gradient-to-b from-emerald-900/5 to-[#121217]/50 border border-emerald-500/10 rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3 shadow-inner" id="lane-review">
                </div>
            </div>

            <div class="flex-1 min-w-[300px] max-w-[360px] flex flex-col kanban-column opacity-80 hover:opacity-100 transition-opacity">
                <div class="flex items-center justify-between mb-4 px-2 mt-2">
                    <h3 class="text-[13px] font-bold text-zinc-400 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-zinc-500 shadow-[0_0_8px_rgba(113,113,122,0.6)]"></span> 已完结 / 归档
                    </h3>
                </div>
                <div class="flex-1 bg-[#121217]/30 border border-white/5 border-dashed rounded-2xl p-3 overflow-y-auto custom-scrollbar space-y-3" id="lane-completed">
                </div>
            </div>

        </div>
    </main>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeCustomDialog()">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-indigo-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <div id="transfer-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeTransferModal()">
        <div id="transfer-modal" class="hidden w-full max-w-lg bg-[#121217] border border-orange-500/20 rounded-3xl shadow-[0_20px_50px_-10px_rgba(249,115,22,0.2)] flex flex-col scale-95 transition-transform duration-300">
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-[#1a1a1f] rounded-t-3xl">
                <h2 class="text-[15px] font-bold text-white flex items-center gap-2">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.5"><path d="M17 3v2M7 3v2M3 14h18M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2-2v12a2 2 0 0 0 2 2z"></path></svg>
                    转单 / 呼叫支援
                </h2>
                <button onclick="closeTransferModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1.5 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            
            <div class="p-6 space-y-5">
                <div class="bg-orange-500/10 border border-orange-500/20 p-3 rounded-xl text-[12px] text-orange-400 leading-relaxed">
                    当前任务：<span class="font-bold text-white" id="transfer-task-name">加载中...</span><br>
                    请说明转单原因，并选择转交对象。
                </div>
                
                <div>
                    <label class="block text-[12px] font-bold text-zinc-300 mb-2">转交给谁 <span class="text-zinc-500 font-normal">(不选则退回公海池)</span></label>
                    <div class="relative">
                        <select id="transfer-assignee" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-[13px] text-white outline-none focus:border-orange-500 custom-scrollbar appearance-none cursor-pointer">
                            <option value="none">退回大厅统筹池 (不指定人)</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-zinc-300 mb-2">转单原因及进度说明 <span class="text-rose-500">*</span></label>
                    <textarea id="transfer-reason" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-[13px] text-white outline-none focus:border-orange-500 h-24 resize-none custom-scrollbar" placeholder="例如：排期有冲突，请求支援..."></textarea>
                </div>
            </div>
            
            <div class="p-5 border-t border-white/5 bg-[#09090b] flex justify-end gap-3 rounded-b-3xl">
                <button onclick="closeTransferModal()" class="px-5 py-2.5 bg-transparent border border-zinc-700 text-zinc-400 hover:text-white rounded-xl text-[12px] font-bold btn-press transition-colors">取消</button>
                <button onclick="submitTransfer()" class="px-6 py-2.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-[12px] font-bold shadow-[0_5px_15px_rgba(249,115,22,0.3)] btn-press transition-all">确认转单</button>
            </div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-orange-500 to-amber-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-orange-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>

    <script>
        const PAGE_TYPE = 'design'; 

        // 🚀 系统级通知写入引擎（安全对接 SysNotification）
        window.insertDbNotification = async function(targetIdentifier, content, link_url) {
            if (!window.SysNotification || !targetIdentifier) return;
            try {
                let targetEmail = '';
                let targetUserId = '00000000-0000-0000-0000-000000000000'; 

                const { data: allUsers } = await window.supabase.from('users').select('id, email, name, enName');
                if (allUsers && allUsers.length > 0) {
                    const targetUser = allUsers.find(u => 
                        (u.email && u.email.toLowerCase().includes(targetIdentifier.toLowerCase())) ||
                        (u.name && u.name.toLowerCase().includes(targetIdentifier.toLowerCase())) ||
                        (u.enName && u.enName.toLowerCase().includes(targetIdentifier.toLowerCase())) ||
                        targetIdentifier.toLowerCase().includes((u.enName||'').toLowerCase())
                    );
                    if (targetUser) {
                        targetEmail = targetUser.email;
                        targetUserId = targetUser.id;
                    }
                }

                if (!targetEmail) {
                    if (/^[a-zA-Z]+$/.test(targetIdentifier)) targetEmail = targetIdentifier.toLowerCase() + '@webank.com';
                    else targetEmail = 'davidxxu@webank.com'; 
                }

                await window.SysNotification.sendNotice({
                    targetId: targetUserId,
                    targetEmail: targetEmail,
                    content: content,
                    category: 'update',
                    url: link_url
                });
            } catch(e) { console.error("发送通知异常", e); }
        };

        // ================= 高定弹窗引擎 =================
        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0'); dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-sky-500';
                icon.className = 'w-8 h-8 rounded-full bg-sky-500/20 text-sky-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
        }

        function showDialogUI() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); dialog.classList.remove('scale-95'); }, 10);
        }

        window.showAlert = function(title, message, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-sky-600 hover:bg-sky-500');
            btnContainer.innerHTML = `<button onclick="closeCustomDialog()" class="w-full py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">我知道了</button>`;
            showDialogUI();
        }

        window.showConfirm = function(title, message, onConfirm, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-sky-600 hover:bg-sky-500');
            btnContainer.innerHTML = `
                <button onclick="closeCustomDialog()" class="flex-1 py-2.5 bg-transparent border border-zinc-700 text-zinc-400 hover:text-white rounded-xl text-[13px] font-bold transition-colors btn-press">取消</button>
                <button id="dialog-confirm-btn" class="flex-1 py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">确认执行</button>
            `;
            document.getElementById('dialog-confirm-btn').onclick = () => { closeCustomDialog(); onConfirm(); };

        }

        }
        
        window.submitPwdChange = function() { window.showAlert('提示', '系统演示环境暂不可自助修改密码，请联系管理员。', 'info'); window.closePwdModal(); }

                <div id="sync-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 animate-pulse ml-3" title="云端监听中..."></div>
            `;
        }

            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }

            const menuContainer = document.getElementById('dynamic-identity-list');

                }
                if ((user.perms || []).includes('design')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#362013] text-orange-400 cursor-default border border-orange-900/50"><div class="w-7 h-7 rounded-lg bg-orange-500/20 flex items-center justify-center text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-bold">设计方 (当前)</span></div>`; 
                }
                if ((user.perms || []).includes('admin')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='manager-workspace.html'"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/10 text-fuchsia-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="21"></line></svg></div><span class="text-[13px] font-medium">管理方 (统筹/大盘)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-orange-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span></span> 身份: 设计方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }

        window.showToast = function(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            const icon = document.getElementById('toast-icon');
            if(type === 'success') {
                icon.className = "w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else if(type === 'info') {
                icon.className = "w-8 h-8 rounded-full bg-sky-500/20 text-sky-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            } else {
                icon.className = "w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            }
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        window.kanbanUrge = function(e, btn, assignee) {
            e.stopPropagation();
            btn.innerHTML = '✓ 已提醒';
            btn.classList.remove('hover:bg-zinc-700', 'bg-zinc-800', 'text-zinc-300', 'border-zinc-600', 'hover:text-white');
            btn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-zinc-900', 'text-zinc-500', 'border-zinc-800');
            btn.disabled = true;
            window.showToast('催办已发送', `已向 ${assignee} 发送系统提醒。`, 'success');
        }

        // ================= 💡 核心：看板卡片引擎 =================
        function createKanbanCard(task, currentUser) {
            const currentUserEn = currentUser.enName ? currentUser.enName.toLowerCase() : '';
            const taskAssignee = task.assignee ? task.assignee.toLowerCase() : 'none';
            
            const isSuperAdmin = currentUserEn === 'davidxxu' || currentUserEn === 'judyzzhang';
            const isMyDesignTask = taskAssignee === currentUserEn;
            const isUnassignedPool = taskAssignee === 'none'; 
            let isJudy = currentUserEn === 'judyzzhang';
            
            if (!isSuperAdmin && !isMyDesignTask && !(isUnassignedPool && task.status === 'pending')) return null;

            let laneId = '';
            let sColor = '', sText = '', strokeColor = '';
            
            switch(task.status) {
                case 'pending':
                case 'pending_accept':
                    laneId = 'lane-pending';
                    sColor = 'text-sky-400'; 
                    sText = task.status === 'pending' ? '待分配/认领' : '待确认接单';
                    strokeColor = 'sky';
                    break;
                case 'processing':
                case 'rejected':
                    laneId = 'lane-processing';
                    sColor = task.status === 'rejected' ? 'text-rose-500' : 'text-orange-500';
                    sText = task.status === 'rejected' ? '被驳回重画' : '设计制作中';
                    strokeColor = task.status === 'rejected' ? 'rose' : 'orange';
                    break;
                case 'pending_approval':
                    laneId = 'lane-blocked';
                    sColor = 'text-amber-500'; 
                    sText = '领导审批中';
                    strokeColor = 'amber';
                    break;
                case 'reviewing':
                    laneId = 'lane-review';
                    sColor = 'text-emerald-500'; 
                    sText = '待甲方验收';
                    strokeColor = 'emerald';
                    break;
                case 'completed':
                case 'archived':
                case 'terminated':
                    laneId = 'lane-completed';
                    sColor = 'text-zinc-500';
                    sText = task.status === 'terminated' ? '已强行终止' : '已验收完结';
                    strokeColor = 'zinc';
                    break;
                default:
                    return null; 
            }

            const targetUrl = `task-detail-designer.html?id=${task.id}`;
            let isUrgent = false;
            if(task.due_date && !['completed','archived','terminated'].includes(task.status)) {
                const due = new Date(task.due_date);
                const today = new Date();
                due.setHours(0,0,0,0); today.setHours(0,0,0,0);
                const diffDays = (due - today) / (1000 * 60 * 60 * 24);
                if(diffDays <= 2 && diffDays >= -999) isUrgent = true;
            }

            const borderColBase = isUrgent ? 'rgba(225,29,72,0.6)' : sColor.replace('text-', 'rgba(').replace('sky','56,189,248').replace('amber','251,191,36').replace('emerald','16,185,129').replace('rose','244,63,94').replace('orange','249,115,22').replace('zinc','113,113,122') + ',0.3)';
            const breatheClass = isUrgent ? 'breathe-rose' : '';
            const isFinished = ['completed','archived','terminated'].includes(task.status);
            const iconHtml = (task.status === 'reviewing' || task.status === 'rejected' || isFinished) ? '' : `<svg class="animate-spin h-3.5 w-3.5 ${sColor}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            let primaryBtnText = '查看进度详情';
            let primaryBtnClass = 'bg-[#0284c7] hover:bg-sky-500 text-white border border-transparent';
            let primaryBtnAction = `event.stopPropagation(); window.location.href='${targetUrl}'`;

            if (isFinished) {
                primaryBtnText = '查看留档快照';
                primaryBtnClass = 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border-zinc-700';
            } else if (isMyDesignTask || (isUnassignedPool && task.status === 'pending')) {
                if (task.status === 'pending' || task.status === 'pending_accept') {
                    primaryBtnText = '去确认需求';
                } else if (task.status === 'processing' || task.status === 'rejected') {
                    primaryBtnText = '去处理并传稿';
                    primaryBtnClass = 'bg-orange-600 hover:bg-orange-500 text-white border-transparent';
                } else if (task.status === 'pending_approval') {
                    primaryBtnText = '查看需求进度';
                    primaryBtnClass = 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border-zinc-700';
                } else if (task.status === 'reviewing') {
                    primaryBtnText = '查看验收进度';
                    primaryBtnClass = 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border-zinc-700';
                }
            } else {
                if (task.status === 'pending_accept') {
                    primaryBtnText = `提醒 ${task.assignee} 接单`;
                    primaryBtnClass = 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border-zinc-600 hover:text-white';
                    primaryBtnAction = `window.kanbanUrge(event, this, '${task.assignee}')`;
                } else if (task.status === 'processing' || task.status === 'rejected') {
                    primaryBtnText = `提醒 ${task.assignee} 交方案`;
                    primaryBtnClass = 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border-zinc-600 hover:text-white';
                    primaryBtnAction = `window.kanbanUrge(event, this, '${task.assignee}')`;
                } else if (task.status === 'pending_approval') {
                    if (isJudy) {
                        primaryBtnText = '去审批框架方案';
                        primaryBtnClass = 'bg-amber-600 hover:bg-amber-500 text-white border-amber-500';
                        primaryBtnAction = `event.stopPropagation(); window.location.href='task-detail-locked.html?id=${task.id}'`;
                    } else {
                        primaryBtnText = '等待领导审批';
                        primaryBtnClass = 'bg-zinc-800 text-zinc-500 border-zinc-700 cursor-not-allowed';
                        primaryBtnAction = `event.stopPropagation();`;
                    }
                } else if (task.status === 'reviewing') {
                    primaryBtnText = '等待甲方验收';
                    primaryBtnClass = 'bg-zinc-800 text-zinc-500 border-zinc-700 cursor-not-allowed';
                    primaryBtnAction = `event.stopPropagation();`;
                }
            }

            const canTransfer = !isFinished && (task.status === 'pending_accept' || task.status === 'processing' || task.status === 'rejected') && (isMyDesignTask || isSuperAdmin);
            
            let btnHtml = `
                <div class="flex items-center gap-2 mt-4 relative z-10 pl-2">
                    <button onclick="${primaryBtnAction}" class="flex-1 py-2.5 rounded-lg text-[13px] font-bold transition-all btn-press border ${primaryBtnClass}">${primaryBtnText}</button>
                    ${canTransfer ? `<button onclick="event.stopPropagation(); window.openTransferModal('${task.id}', '${task.title}')" class="px-5 py-2.5 rounded-lg text-[13px] font-bold text-zinc-300 bg-transparent border border-zinc-600 hover:text-white hover:bg-zinc-700 transition-all btn-press">转单</button>` : ''}
                </div>
            `;

            if (!strokeColor) strokeColor = sColor.split('-')[1] || 'sky';
            if(strokeColor === 'zinc') strokeColor = 'gray';

            const html = `
                <div class="rounded-xl p-4 kanban-card flex flex-col relative overflow-hidden bg-[#18181b] border border-zinc-800 group ${breatheClass} ${isFinished ? 'opacity-60' : ''}" onclick="window.location.href='${targetUrl}'" style="border-color: ${borderColBase}">
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-${strokeColor}-500 z-10 shadow-[0_0_8px_rgba(var(--tw-colors-${strokeColor}-500),0.5)]"></div>
                    ${isUrgent ? '<div class="absolute top-0 right-0 bg-[#e11d48] text-white text-[11px] font-bold px-3 py-1 rounded-bl-xl z-20 shadow-md animate-pulse">临期预警</div>' : ''}
                    
                    <div class="flex items-center justify-between mb-3 mt-1 relative z-10 pl-2">
                        <div class="flex gap-2 items-center">
                            <span class="font-mono text-[11px] font-black ${sColor} bg-${strokeColor}-500/10 px-2 py-0.5 rounded border border-${strokeColor}-500/20">${task.id}</span>
                            <span class="text-[12px] ${sColor} font-bold tracking-wide flex items-center gap-1.5">${iconHtml} ${sText}</span>
                        </div>
                    </div>
                    
                    <h4 class="text-[16px] font-bold text-white mb-2 relative z-10 pl-2 leading-snug group-hover:text-${strokeColor}-400 transition-colors">${task.title}</h4>
                    ${task.summary_desc ? `<p class="text-[13px] text-zinc-400 mb-3 line-clamp-2 relative z-10 pl-2">${task.summary_desc}</p>` : ''}
                    
                    <div class="bg-[#27272a]/50 rounded-xl p-3.5 mt-1 space-y-2.5 relative z-10 ml-2">
                        <p class="text-[12px] text-zinc-400 flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-zinc-500"></span> 发起人: <span class="text-white font-bold">${task.creator || '未知'}</span></p>
                        <p class="text-[12px] text-zinc-400 flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-[#0ea5e9]"></span> 期望交付: <span class="${isUrgent ? 'text-[#f43f5e]' : 'text-[#f43f5e]'} font-bold">${task.due_date || '未定'}</span></p>
                    </div>
                    
                    ${btnHtml}
                </div>
            `;

            return { laneId, html };
        }

        // ================= 💡 看板数据拉取与更新 =================
        window.loadTasksFromCloud = async function(isSilent = false) {
            if(!window.supabase) return;
            
            const userStr = localStorage.getItem('activeUserObj');
            const currentUser = userStr ? JSON.parse(userStr) : null;
            if(!currentUser) return;
            const currentUserEn = currentUser.enName ? currentUser.enName.toLowerCase() : '';
            
            const syncDot = document.getElementById('sync-indicator');
            if(syncDot && isSilent) syncDot.classList.remove('hidden');

            try {
                const { data, error } = await window.supabase.from(window.DB_TABLE).select(window.LIGHT_FIELDS)
                    .order('created_at', { ascending: false }).limit(100);

                if(error) throw error;

                const lanes = {
                    'lane-pending': document.getElementById('lane-pending'),
                    'lane-processing': document.getElementById('lane-processing'),
                    'lane-blocked': document.getElementById('lane-blocked'),
                    'lane-review': document.getElementById('lane-review'),
                    'lane-completed': document.getElementById('lane-completed')
                };
                
                if(!isSilent) {
                    Object.values(lanes).forEach(lane => { if(lane) lane.innerHTML = ''; });
                }

                let myTodoCount = 0;
                let myRejectedCount = 0;
                let myMonthCompletedCount = 0;
                const now = new Date();

                (data || []).forEach(task => {
                    const taskAssignee = task.assignee ? task.assignee.toLowerCase() : 'none';
                    const isMyDesignTask = taskAssignee === currentUserEn;
                    
                    if (isMyDesignTask) {
                        if (!['completed', 'archived', 'terminated'].includes(task.status)) {
                            myTodoCount++;
                        }
                        if (task.status === 'rejected') {
                            myRejectedCount++;
                        }
                        if (['completed', 'archived'].includes(task.status)) {
                            let completeDateStr = task.created_at;
                            try {
                                let historyArr = JSON.parse(task.history_json || '[]');
                                if (historyArr.length > 0) completeDateStr = historyArr[historyArr.length-1].time || historyArr[historyArr.length-1].created_at || completeDateStr;
                            }catch(e){}
                            const cDate = new Date(completeDateStr);
                            if (cDate.getFullYear() === now.getFullYear() && cDate.getMonth() === now.getMonth()) {
                                myMonthCompletedCount++;
                            }
                        }
                    }

                    if(!isSilent) {
                        const cardData = createKanbanCard(task, currentUser);
                        if(cardData && lanes[cardData.laneId]) {
                            lanes[cardData.laneId].insertAdjacentHTML('beforeend', cardData.html);
                        }
                    }
                });

                if(!isSilent) {
                    document.getElementById('metric-todo').innerHTML = `${myTodoCount} <span class="text-[11px] text-zinc-600 font-normal ml-1 font-sans">单</span>`;
                    document.getElementById('metric-rejected').innerHTML = `${myRejectedCount} <span class="text-[11px] text-zinc-600 font-normal ml-1 font-sans">单</span>`;
                    document.getElementById('metric-completed').innerHTML = `${myMonthCompletedCount} <span class="text-[11px] text-zinc-600 font-normal ml-1 font-sans">单</span>`;

                    Object.values(lanes).forEach(lane => {
                        if(lane && lane.innerHTML === '') {
                            lane.innerHTML = `<div class="text-center py-10 opacity-50"><div class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-2 text-zinc-600"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div><p class="text-[11px] text-zinc-600">当前状态暂无需求</p></div>`;
                        }
                    });
                }

                // 💡 渲染完数据后，触发全局通知引擎同步
                await window.syncNotificationsFromCloud(data, isSilent);

            } catch(e) { console.error(e); } finally {
                if(syncDot) setTimeout(() => syncDot.classList.add('hidden'), 500);
            }
        }

        // ================= 🚀🚀🚀 新增强化的转单选人逻辑 =================
        const modalOverlay = document.getElementById('transfer-modal-overlay');
        const modal = document.getElementById('transfer-modal');
        let currentTransferTaskId = null;
        
        // 名单库
        const PREDEFINED_ASSIGNEES = ['anckyyu', 'davidxxu', 'debbiehuang', 'evazzhu', 'hscheng', 'mengmengli', 'skylerhuang', 'sophiachen', 'tiaouyang', 'v_lijuangchen', 'v_lucui', 'v_sijieli', 'v_siyifu', 'v_sjtian', 'v_wbchye', 'v_wbjgao', 'v_wbmtli', 'v_zqlan', 'wenjiawu', 'yamyzhang', 'yaozhong', 'yoshyliu', 'zoeyzhou'];

        window.openTransferModal = function(taskId, title = '') { 
            currentTransferTaskId = taskId;
            const titleSpan = document.getElementById('transfer-task-name');
            if (titleSpan) titleSpan.innerText = `${taskId} ${title}`;
            
            // 自动填充下拉选人列表
            const selectEl = document.getElementById('transfer-assignee');
            if (selectEl && selectEl.options.length <= 1) {
                PREDEFINED_ASSIGNEES.sort().forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.innerText = `指派给: ${name}`;
                    selectEl.appendChild(opt);
                });
            }
            if (selectEl) selectEl.value = 'none';
            document.getElementById('transfer-reason').value = '';

            modalOverlay.classList.remove('hidden'); 
            setTimeout(() => { modalOverlay.classList.remove('opacity-0'); modal.classList.remove('hidden'); modal.classList.remove('scale-95'); }, 10); 
        }

        window.closeTransferModal = function() { 
            modalOverlay.classList.add('opacity-0'); modal.classList.add('scale-95'); 
            setTimeout(() => { modalOverlay.classList.add('hidden'); modal.classList.add('hidden'); currentTransferTaskId = null; }, 300); 
        }

        // 提交转单动作
        window.submitTransfer = async function() { 
            if (!window.supabase) return window.showAlert("错误", "云端未连接", "danger");
            if (!currentTransferTaskId) return;

            const reason = document.getElementById('transfer-reason').value.trim();
            if(!reason) return window.showAlert("提示", "请填写转单原因", "danger");
            
            // 获取目标人员
            const newAssignee = document.getElementById('transfer-assignee').value;
            const isToPool = newAssignee === 'none';
            const newStatus = isToPool ? 'pending' : 'pending_accept';

            const btn = document.querySelector('#transfer-modal button:last-child');
            const originTxt = btn.innerText;
            btn.innerText = '正在转单...'; btn.disabled = true;

            const userStr = localStorage.getItem('activeUserObj');
            const user = JSON.parse(userStr);
            const dispName = user.displayName || user.cnName || user.enName;

            const { data: curTask } = await window.supabase.from(window.DB_TABLE).select('title, history_json').eq('id', currentTransferTaskId).single();
            let hist = [];
            if(curTask && curTask.history_json) { try { hist = JSON.parse(curTask.history_json); } catch(e){} }
            
            const actionReply = isToPool ? `因排期或其他原因退回大厅，备注：${reason}` : `将任务转交给了 ${newAssignee}，备注：${reason}`;

            hist.push({
                action: 'transfer', operator: `${dispName} (设计师)`, time: new Date().toISOString(),
                reply: actionReply
            });
            
            const summaryDesc = isToPool ? `设计方已将单据退回公海：${reason}` : `设计方已将单据转交给 ${newAssignee}：${reason}`;

            const { error } = await window.supabase.from(window.DB_TABLE)
                .update({ 
                    status: newStatus, 
                    assignee: newAssignee, 
                    summary_desc: summaryDesc,
                    history_json: JSON.stringify(hist)
                })
                .eq('id', currentTransferTaskId);
                
            // 🚀 发送实时邮件与通知 (加入兜底机制！)
            if (!error && !isToPool && window.SysNotification) {
                let targetEmail = `${newAssignee}@webank.com`; // 强制兜底邮箱！
                let targetId = '00000000-0000-0000-0000-000000000000';
                
                try {
                    const { data: uData } = await window.supabase.from('users').select('id, email').ilike('email', `${newAssignee}%`).single();
                    if (uData) { targetEmail = uData.email; targetId = uData.id; }
                } catch(err) { console.warn("用户表未找到此人，使用默认Webank邮箱后缀触发通知"); }
                
                await window.SysNotification.sendNotice({
                    targetId: targetId,
                    targetEmail: targetEmail,
                    content: `${dispName} 将需求转交给了你：《${curTask.title || currentTransferTaskId}》，请查收！`,
                    category: 'transfer',
                    url: `task-detail-designer.html?id=${currentTransferTaskId}`
                });
            }

            btn.innerText = originTxt; btn.disabled = false;

            if(error) return window.showAlert("错误", "转单失败: " + error.message, "danger");

            window.closeTransferModal(); 
            window.showToast('转单成功', isToPool ? '任务已退回统筹池等待分配' : `任务已转交给 ${newAssignee}`, 'success');
            
            setTimeout(async () => { await window.loadTasksFromCloud(); }, 800);
        }

        // ================= 🚀 全局跨角色实时消息引擎 (基于 Supabase Notifications) =================
        window.syncNotificationsFromCloud = async function(tasksData = null, isSilent = false) {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const userKeyword = (currentUser.enName || currentUser.cnName || '').toLowerCase();

            try {
                // 直接从统一的新通知库拉取，彻底解决催办不亮红点的问题
                const { data, error } = await window.supabase.from('notifications')
                    .select('*').order('created_at', { ascending: false }).limit(100);
                if (error) throw error;

                // 精准筛选只属于当前设计师的消息
                let myNotifs = data.filter(n => {
                    const target = (n.target_email || '').toLowerCase();
                    const targetPrefix = target.split('@')[0];
                    const isForMe = (targetPrefix === userKeyword) || (currentUser.email && target === currentUser.email.toLowerCase());
                    if (!isForMe) return false;

                    const content = n.content || '';
                    // 💡 100%保留的核心隔离：过滤掉属于需求方和领导的消息
                    if (content.includes('已接手你的需求') || content.includes('上传了中期方案') || content.includes('交付了正式设计稿')) {
                        return false; 
                    }
                    return true;
                });

                const unreadNotifs = myNotifs.filter(n => !n.is_read);
                const unreadCount = unreadNotifs.length;

                // 新消息系统级 Toast 提醒
                let prevUnreadCount = parseInt(localStorage.getItem('prevUnreadCount_design_' + userKeyword) || '0');
                if (isSilent && unreadCount > prevUnreadCount) {
                    const newCount = unreadCount - prevUnreadCount;
                    if(window.showToast) window.showToast('🔔 收到新消息', `您有 ${newCount} 条新通知，请点击右上角铃铛查看。`, 'info');
                }
                localStorage.setItem('prevUnreadCount_design_' + userKeyword, unreadCount.toString());
                
                // 顶部铃铛红点控制
                const bellDot = document.getElementById('bell-dot');
                if (bellDot) {
                    if (unreadCount > 0) {
                        bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent');
                        bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]');
                    } else {
                        bellDot.classList.add('hidden');
                    }
                }

                // 铃铛下拉列表精准渲染，保留原版所有 UI 判断和颜色区分
                const notifContainer = document.getElementById('notif-list-container');
                if (notifContainer) {
                    if (unreadCount === 0) {
                        notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息，工作都在掌控中</div>';
                    } else {
                        let html = '';
                        unreadNotifs.forEach(n => {
                            let titleText = '系统通知';
                            let contentText = n.content || '';
                            let iconDot = 'bg-sky-500';
                            
                            // 保留原汁原味的颜色标识逻辑
                            let titleMatch = contentText.match(/^(【.*?】)/);
                            if(titleMatch) {
                                titleText = titleMatch[1];
                                contentText = contentText.replace(titleMatch[1], '').trim();
                            } else if(n.category === 'urgent' || contentText.includes('催办') || contentText.includes('🚨')) {
                                titleText = '🚨 紧急催办';
                                iconDot = 'bg-rose-500';
                            }

                            if (contentText.includes('审批通过') || contentText.includes('验收满意')) iconDot = 'bg-emerald-500';
                            if (contentText.includes('打回')) iconDot = 'bg-rose-500';
                            if (contentText.includes('指派了新需求')) iconDot = 'bg-indigo-500';
                            if (n.category === 'transfer' || contentText.includes('转交')) iconDot = 'bg-orange-500';
                            
                            const dateStr = new Date(n.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            
                            html += `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer group" onclick="window.markSingleAsRead('${n.id}', '${n.link_url}')">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-[13px] font-bold text-white flex items-center gap-2 group-hover:text-orange-400 transition-colors">
                                        <span class="w-2 h-2 rounded-full ${iconDot} shrink-0 shadow-[0_0_8px_currentColor]"></span>
                                        ${titleText}
                                    </h4>
                                    <span class="text-[10px] text-zinc-500">${dateStr}</span>
                                </div>
                                <p class="text-[11px] text-zinc-400 leading-relaxed pl-4 line-clamp-2">${n.sender_name || '系统'} : ${contentText}</p>
                            </div>`;
                        });
                        notifContainer.innerHTML = html;
                    }
                }
                window.currentMyUnreadIds = unreadNotifs.map(n => n.id);
            } catch(e) { console.error("消息同步失败", e); }
        };

        // 强隔离路由控制
        window.markSingleAsRead = async function(id, url) {
            if(window.supabase) { 
                try { await window.supabase.from('notifications').update({ is_read: true }).eq('id', id); } catch(e){} 
            }
            
            // 💡 强制跳转为设计师专属详情页，杜绝越权访问
            let finalUrl = url || '#';
            let match = finalUrl.match(/id=(TK-\d+)/);
            if (match) {
                finalUrl = 'task-detail-designer.html?id=' + match[1];
            }
            window.location.href = finalUrl;
        }

        window.markAllAsRead = async function(event) {
            if(event) event.stopPropagation();
            if (!window.supabase || !window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "处理中...";
            try {
                await window.supabase.from('notifications').update({ is_read: true }).in('id', window.currentMyUnreadIds);
                await window.syncNotificationsFromCloud(null, true);
                if(window.showToast) window.showToast('全部已读', '收件箱已清空。', 'success');
            } catch(e) {}
            btn.innerHTML = originalText;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(initRBAC()) {
                const idBtn = document.getElementById('identityBtn');
                const idMenu = document.getElementById('identityMenu');
                if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
                
                const notifBtn = document.getElementById('notifBtn');
                const notifMenu = document.getElementById('notifMenu');
                if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

                document.addEventListener('click', (e) => { 
                    if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                    if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
                });

                // 启动看板和通知渲染引擎
                window.loadTasksFromCloud(false);
                
                // 💡 部署 8秒后台静默雷达，同时扫描面板变化和新消息通知！
                setInterval(() => { window.loadTasksFromCloud(true); }, 8000); 
            }
        });
    </script>
</body>
</html>
