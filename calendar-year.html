<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求日历 - 年视图 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .month-card { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .month-card:hover { border-color: rgba(99,102,241,0.3); background-color: rgba(255,255,255,0.02); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5); transform: translateY(-2px); }
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top center; }
        @keyframes dropIn { 0% { opacity: 0; transform: scaleY(0.95) translateY(-5px); } 100% { opacity: 1; transform: scaleY(1) translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-indigo-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 right-1/4 w-[800px] h-[600px] bg-indigo-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-medium text-[14px]">需求排号大厅</span>
            </button>
            <button onclick="window.location.href='record-list.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                <span class="font-medium text-[14px]">我的提单记录</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="font-bold text-[14px]">我的需求日历</span>
            </button>
        </div>
        <div class="px-7 py-7 mt-auto border-t border-white/5 bg-[#09090b] shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm">DE</div>
                <div><p class="text-xs font-bold text-white mb-0.5">Debbie</p><p class="text-[10px] text-zinc-500">行政部门 · 需求方</p></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl z-20">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight mb-1.5">需求日历看板</h2>
                <p class="text-xs text-zinc-500">以“期望交付日”为维度，直观纵览设计任务与时段集中度。</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex bg-[#121217] border border-white/10 rounded-xl p-1 shadow-inner">
                    <button onclick="window.location.href='calendar-week.html'" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">周</button>
                    <button onclick="window.location.href='calendar.html'" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">月</button>
                    <button class="px-5 py-1.5 text-[13px] font-bold bg-indigo-500/20 text-indigo-400 border border-indigo-500/20 rounded-lg shadow-sm cursor-default">年</button>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="navYear(-1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    
                    <div class="relative" id="date-selector-wrapper">
                        <button onclick="toggleDropdown('date-dropdown')" class="px-6 py-2 h-full bg-[#121217] border border-white/5 rounded-xl text-[15px] font-bold text-white hover:bg-white/5 transition-colors btn-press">
                            <span id="current-date-text">2026 年度</span>
                        </button>
                        <div id="date-dropdown" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 w-48 bg-[#1a1a24] border border-white/10 rounded-2xl shadow-2xl py-2 z-50 dropdown-enter max-h-[300px] overflow-y-auto custom-scrollbar"></div>
                    </div>

                    <button onclick="navYear(1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <button onclick="jumpToCurrent()" class="px-5 py-2 bg-indigo-600/20 text-indigo-400 font-bold border border-indigo-500/20 rounded-xl hover:bg-indigo-500/30 transition-colors btn-press text-[13px]">回到今年</button>
            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-auto custom-scrollbar flex justify-center z-10">
            <div class="w-full max-w-[1400px] flex gap-8 items-start h-[calc(100vh-160px)]">
                
                <div class="flex-1 grid grid-cols-4 gap-4 min-w-0 transition-opacity duration-200" id="year-grid">
                </div>

                <div class="w-[340px] bg-[#121217] border border-white/5 rounded-3xl p-7 flex flex-col shadow-2xl shrink-0">
                    <h3 class="text-[15px] font-bold text-white mb-6 flex items-center gap-2 pb-4 border-b border-white/5">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                        分布与频次总结
                    </h3>
                    
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-[#09090b] border border-white/5 p-5 rounded-2xl flex flex-col justify-center">
                            <p class="text-[12px] text-zinc-500 mb-1 font-medium">本年累计需求</p>
                            <p class="text-[48px] font-black text-white font-mono leading-none tracking-tight" id="stat-year-count">26</p>
                        </div>
                        <div class="bg-[#09090b] border border-white/5 p-5 rounded-2xl flex flex-col justify-center">
                            <p class="text-[12px] text-zinc-500 mb-1 font-medium">对比去年同期</p>
                            <p class="text-[28px] font-black text-emerald-500 leading-none shadow-sm" id="stat-year-trend">↓ 5%</p>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-5">
                            <h4 class="text-[13px] font-bold text-zinc-300">年度需求走势</h4>
                        </div>
                        <div class="bg-[#09090b] border border-white/5 p-4 rounded-2xl h-36 relative flex items-end justify-between px-2 pb-6">
                            <svg class="absolute inset-0 w-full h-full text-indigo-500/20" preserveAspectRatio="none" viewBox="0 0 100 100">
                                <path id="trend-line" d="M0,80 L20,60 L40,30 L60,90 L80,95 L100,95" fill="none" stroke="currentColor" stroke-width="2"></path>
                            </svg>
                            <div class="absolute bottom-2 left-2 right-2 flex justify-between text-[10px] text-zinc-600 font-mono">
                                <span>Q1</span><span>Q2</span><span>Q3</span><span>Q4</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <div id="period-detail-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal('period-detail-modal')"></div>
        <div class="bg-[#121217] border border-white/10 w-full max-w-md rounded-3xl shadow-2xl relative flex flex-col z-10 transform transition-all duration-300 scale-95 opacity-0" id="period-detail-content">
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-[#09090b]/50 rounded-t-3xl">
                <h3 id="period-modal-title" class="text-white font-bold text-[16px]">月度 需求清单</h3>
                <button onclick="closeModal('period-detail-modal')" class="text-zinc-500 hover:text-white transition-colors bg-white/5 hover:bg-white/10 p-1.5 rounded-full btn-press">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="period-modal-list" class="p-6 space-y-3 max-h-[60vh] overflow-y-auto custom-scrollbar"></div>
        </div>
    </div>

    <script>
        const dateArray = [2023, 2024, 2025, 2026, 2027, 2028, 2029];
        let currentIndex = 3; 

        function getHistoricalTasks(year, month) {
            if(year > 2026 || (year === 2026 && month > 3)) return [];
            if(year === 2026) {
                if(month === 1) return [{ id:'TK-1月结案', title:'新年活动物料', status:'已完结归档', url:'task-detail.html', tagClass:'text-zinc-400 bg-white/5 border border-white/10' }];
                if(month === 2) return [{ id:'TK-2月结案', title:'开工利是海报', status:'已完结归档', url:'task-detail.html', tagClass:'text-zinc-400 bg-white/5 border border-white/10' }];
                if(month === 3) return [
                    { id:'TK-0701', title:'双十一海报', status:'待验收', url:'task-detail.html', tagClass:'text-emerald-400 bg-emerald-500/20 border border-emerald-500/20' },
                    { id:'TK-0810', title:'企业画册', status:'待确认', url:'task-detail-v1.html', tagClass:'text-rose-400 bg-rose-500/20 border border-rose-500/20' },
                    { id:'TK-0817', title:'端午礼盒', status:'领导审批中', url:'task-detail-locked.html', tagClass:'text-amber-500 bg-amber-500/20 border border-amber-500/20' }
                ];
                if(month === 5) return [{ id:'TK-0817', title:'端午礼盒排期', status:'规划中', url:'task-detail-locked.html', tagClass:'text-amber-500 bg-amber-500/20 border border-amber-500/20' }];
            } else {
                return [
                    { id:`TK-${year%100}${month}01`, title:`${month}月度宣发`, status:'已完结归档', url:'task-detail.html', tagClass:'text-zinc-400 bg-white/5 border border-white/10' },
                    { id:`TK-${year%100}${month}02`, title:'部门团建海报', status:'已完结归档', url:'task-detail.html', tagClass:'text-zinc-400 bg-white/5 border border-white/10' }
                ];
            }
            return [];
        }

        function getMonthCount(year, month) {
            if(year > 2026 || (year === 2026 && month > 3 && month !== 5)) return 0;
            if(year === 2026) {
                if(month === 1) return 5;
                if(month === 2) return 8;
                if(month === 3) return 12;
                if(month === 5) return 1;
            }
            return ((year * 7 + month * 13) % 10) + 4; 
        }

        function renderDateDropdown() {
            const dropdown = document.getElementById('date-dropdown');
            let html = '<div class="py-2">';
            
            dateArray.forEach((y, index) => {
                let text = `${y} 年度`;
                if(index === currentIndex) {
                    html += `<div class="w-full text-left px-5 py-2.5 text-[14px] text-indigo-400 bg-indigo-500/10 font-bold cursor-default">${text} <span class="text-[10px] bg-indigo-500/20 px-1.5 py-0.5 rounded ml-2">当前</span></div>`;
                } else {
                    html += `<button onclick="jumpToYear(${index})" class="w-full text-left px-5 py-2.5 text-[14px] text-zinc-400 hover:bg-white/5 hover:text-white transition-colors">${text}</button>`;
                }
            });
            dropdown.innerHTML = html + '</div>';
            document.getElementById('current-date-text').innerText = `${dateArray[currentIndex]} 年度`;
            
            setTimeout(() => {
                const activeItem = dropdown.querySelector('.bg-indigo-500\\/10');
                if(activeItem) activeItem.scrollIntoView({ block: 'center' });
            }, 10);
        }

        function toggleDropdown(id) {
            renderDateDropdown();
            document.getElementById(id).classList.toggle('hidden');
        }

        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('date-selector-wrapper');
            const dropdown = document.getElementById('date-dropdown');
            if (wrapper && dropdown && !wrapper.contains(e.target)) dropdown.classList.add('hidden');
        });

        function renderYearGrid() {
            const grid = document.getElementById('year-grid');
            grid.style.opacity = '0';
            
            setTimeout(() => {
                let html = '';
                let totalCount = 0;
                let year = dateArray[currentIndex];

                for(let m=1; m<=12; m++) {
                    let count = getMonthCount(year, m);
                    totalCount += count;
                    let tasks = getHistoricalTasks(year, m);
                    let safeTasks = encodeURIComponent(JSON.stringify(tasks));
                    
                    if(year === 2026 && m === 3) {
                        html += `
                        <div onclick="openPeriodDetail('${year}年 ${m}月', '${safeTasks}')" class="bg-indigo-900/10 rounded-3xl p-6 month-card flex flex-col justify-between aspect-[4/3] border-indigo-500/30 shadow-[0_0_20px_rgba(99,102,241,0.1)] relative">
                            <div class="absolute top-4 right-4 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">当前</div>
                            <h3 class="text-indigo-400 font-bold text-[18px]">${m} 月</h3>
                            <div><p class="text-[42px] font-mono text-white font-black leading-none mb-1">${count}<span class="text-[14px] text-indigo-300 font-normal ml-1">件</span></p></div>
                        </div>`;
                    } else if(count > 0) {
                        let opacity = (year < 2026 || m < 3) ? 'opacity-80' : 'opacity-40';
                        html += `
                        <div onclick="openPeriodDetail('${year}年 ${m}月', '${safeTasks}')" class="bg-[#121217] rounded-3xl p-6 month-card flex flex-col justify-between aspect-[4/3] ${opacity}">
                            <h3 class="text-white font-bold text-[18px]">${m} 月</h3>
                            <div><p class="text-[36px] font-mono text-zinc-300 font-black">${count}<span class="text-[12px] text-zinc-600 font-normal ml-1">件</span></p></div>
                        </div>`;
                    } else {
                        html += `
                        <div onclick="openPeriodDetail('${year}年 ${m}月', [])" class="bg-[#121217] rounded-3xl p-6 month-card flex flex-col justify-between aspect-[4/3] opacity-20">
                            <h3 class="text-zinc-600 font-bold text-[18px]">${m} 月</h3>
                        </div>`;
                    }
                }
                
                grid.innerHTML = html;
                grid.style.opacity = '1';

                document.getElementById('stat-year-count').innerText = totalCount;
                let trend = document.getElementById('stat-year-trend');
                let line = document.getElementById('trend-line');
                
                if(year === 2026) {
                    trend.innerText = '↓ 5%'; trend.className = 'text-[28px] font-black text-emerald-500 leading-none shadow-sm';
                    line.setAttribute('d', "M0,80 L20,60 L40,30 L60,90 L80,95 L100,95");
                } else if(year < 2026) {
                    trend.innerText = '↑ 12%'; trend.className = 'text-[28px] font-black text-rose-500 leading-none shadow-sm';
                    line.setAttribute('d', "M0,90 L20,70 L40,50 L60,40 L80,20 L100,10");
                } else {
                    trend.innerText = '— 0%'; trend.className = 'text-[28px] font-black text-zinc-600 leading-none shadow-sm';
                    line.setAttribute('d', "M0,95 L20,95 L40,95 L60,95 L80,95 L100,95");
                }

            }, 150);
        }

        function jumpToYear(index) {
            currentIndex = index;
            document.getElementById('date-dropdown').classList.add('hidden');
            renderDateDropdown();
            renderYearGrid();
        }

        function navYear(step) {
            let newIndex = currentIndex + step;
            if(newIndex >= 0 && newIndex < dateArray.length) jumpToYear(newIndex);
        }
        
        function jumpToCurrent() { jumpToYear(3); }

        function openPeriodDetail(periodTitle, tasksStr) {
            let tasks = JSON.parse(decodeURIComponent(tasksStr));
            document.getElementById('period-modal-title').innerText = periodTitle + ' 需求清单';
            const list = document.getElementById('period-modal-list');
            list.innerHTML = '';
            
            if(tasks.length === 0) {
                list.innerHTML = `<div class="text-center py-12 flex flex-col items-center opacity-50"><p class="text-zinc-400 text-[13px]">该时段无任何交付任务。</p></div>`;
            } else {
                tasks.forEach(t => {
                    list.innerHTML += `
                        <div onclick="window.location.href='${t.url}'" class="bg-[#1a1a24] border border-white/5 p-4 rounded-2xl hover:border-indigo-500/50 cursor-pointer transition-colors group btn-press">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[10px] font-mono font-bold px-2 py-0.5 rounded ${t.tagClass}">${t.id}</span>
                                <span class="text-[11px] text-zinc-500 group-hover:text-indigo-400 transition-colors">去查看 ↗</span>
                            </div>
                            <h4 class="text-[15px] font-bold text-white mb-1.5">${t.title}</h4>
                            <p class="text-[12px] text-zinc-400">${t.status}</p>
                        </div>`;
                });
            }
            
            const modal = document.getElementById('period-detail-modal');
            const content = document.getElementById('period-detail-content');
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            if(id === 'period-detail-modal') {
                const content = document.getElementById('period-detail-content');
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                setTimeout(() => { modal.classList.add('hidden'); }, 300);
            }
        }
        
        initYear();
    </script>
</body>
</html>
