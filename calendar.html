<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的需求日历 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top center; }
        @keyframes dropIn { 0% { opacity: 0; transform: scaleY(0.95) translateY(-5px); } 100% { opacity: 1; transform: scaleY(1) translateY(0); } }

        /* 视图容器样式 */
        .view-section { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .view-section.active { display: flex; opacity: 1; }

        /* 月视图日历格 */
        .calendar-cell { transition: background-color 0.2s ease; min-height: 120px; display: flex; flex-direction: column; }
        .calendar-cell:hover { background-color: rgba(255, 255, 255, 0.05); }
        .calendar-cell.muted { background-color: #0c0c0e; opacity: 0.5; pointer-events: none; }
        
        /* 💡 核心优化：高弹力 Hover 放大镜特效 (带 z-index 跃层) */
        .event-pill { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; position: relative; z-index: 10; cursor: pointer; }
        .event-pill:hover { transform: scale(1.12); box-shadow: 0 15px 30px -5px rgba(0,0,0,0.8); border-color: rgba(99,102,241,0.6) !important; z-index: 50; }

        .week-card { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; position: relative; z-index: 10; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .week-card:hover { transform: scale(1.08); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8); border-color: rgba(99,102,241,0.5); z-index: 50; }
        
        .month-card { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; position: relative; z-index: 10; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .month-card:hover { transform: scale(1.05); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8); border-color: rgba(99,102,241,0.5); background-color: rgba(255,255,255,0.02); z-index: 50; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-indigo-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 right-1/4 w-[800px] h-[600px] bg-indigo-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-medium text-[14px]">需求排号大厅</span>
            </button>
            <button onclick="window.location.href='record-list.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                <span class="font-medium text-[14px]">我的提单记录</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="font-bold text-[14px]">我的需求日历</span>
            </button>
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-50">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-indigo-400 hover:bg-indigo-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl z-20">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight mb-1.5 flex items-center gap-2">
                    我的需求日历
                    <div id="sync-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 animate-pulse ml-2" title="云端连接中..."></div>
                </h2>
                <p class="text-xs text-zinc-500">以“期望交付日”为维度，直观纵览您名下发起的所有设计任务进度。</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex bg-[#121217] border border-white/10 rounded-xl p-1 shadow-inner">
                    <button id="btn-view-week" onclick="switchView('week')" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">周</button>
                    <button id="btn-view-month" onclick="switchView('month')" class="px-5 py-1.5 text-[13px] font-bold bg-indigo-500/20 text-indigo-400 border border-indigo-500/20 rounded-lg shadow-sm cursor-default">月</button>
                    <button id="btn-view-year" onclick="switchView('year')" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">年</button>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="navDate(-1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    
                    <div class="relative" id="date-selector-wrapper">
                        <button onclick="toggleDropdown('date-dropdown')" class="px-6 py-2 h-full bg-[#121217] border border-white/5 rounded-xl text-[15px] font-bold text-white hover:bg-white/5 transition-colors btn-press min-w-[160px]">
                            <span id="current-date-text">计算中...</span>
                        </button>
                        <div id="date-dropdown" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 w-56 bg-[#1a1a24] border border-white/10 rounded-2xl shadow-2xl py-2 z-50 dropdown-enter max-h-[300px] overflow-y-auto custom-scrollbar"></div>
                    </div>

                    <button onclick="navDate(1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <button onclick="jumpToCurrent()" class="px-5 py-2 bg-indigo-600/20 text-indigo-400 font-bold border border-indigo-500/20 rounded-xl hover:bg-indigo-500/30 transition-colors btn-press text-[13px]" id="btn-jump-current">回到本月</button>

                <div class="w-px h-8 bg-white/10 mx-1"></div>

                <div class="relative" id="notif-wrapper">
                    <button id="notifBtn" class="w-10 h-10 rounded-xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="bell-dot" class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                    </button>
                    <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                        <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                            <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                            <button onclick="window.markAllAsRead(event)" class="text-[11px] text-indigo-400 hover:text-indigo-300 btn-press transition-colors">全部已读</button>
                        </div>
                        <div class="max-h-[300px] overflow-y-auto custom-scrollbar" id="notif-list-container">
                            <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>
                        </div>
                        <div class="pt-3 px-5 border-t border-white/5 text-center">
                            <button onclick="window.location.href='message-center.html?role=req'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                        </div>
                    </div>
                </div>

                <div class="relative" id="identity-wrapper">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-5 py-3 rounded-[14px] flex items-center gap-3 text-[13px] font-medium hover:bg-[#1a1a1f] transition-colors btn-press">
                        身份加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>

            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-hidden flex justify-center z-10 relative">
            
            <div id="calendar-loading" class="absolute inset-0 bg-[#0c0c0e]/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">SYNCING DATA...</p>
            </div>

            <div class="w-full max-w-[1400px] flex gap-8 items-start h-full pb-4">
                
                <div class="flex-1 bg-[#121217] border border-white/5 rounded-3xl overflow-hidden shadow-2xl flex flex-col h-full min-w-0 transition-opacity duration-200" id="main-grid-wrapper">
                    
                    <div id="view-month" class="view-section active flex-col h-full">
                        <div class="grid grid-cols-7 border-b border-white/5 bg-[#16161d] shrink-0">
                            <div class="py-4 text-center text-[12px] font-bold text-zinc-500">周日</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周一</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周二</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周三</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周四</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周五</div><div class="py-4 text-center text-[12px] font-bold text-indigo-400/50">周六</div>
                        </div>
                        <div id="month-grid" class="flex-1 grid grid-cols-7 auto-rows-fr bg-white/5 gap-px"></div>
                    </div>

                    <div id="view-week" class="view-section flex-col h-full bg-transparent border-none shadow-none">
                        <div id="week-grid" class="flex-1 grid grid-cols-7 bg-white/5 gap-px rounded-3xl overflow-hidden border border-white/5"></div>
                    </div>

                    <div id="view-year" class="view-section flex-col h-full bg-transparent border-none shadow-none p-2 overflow-y-auto custom-scrollbar">
                        <div id="year-grid" class="grid grid-cols-4 gap-4"></div>
                    </div>

                </div>

                <div class="w-[340px] bg-[#121217] border border-white/5 rounded-3xl p-7 flex flex-col h-full shadow-2xl shrink-0 overflow-y-auto custom-scrollbar">
                    <h3 class="text-[15px] font-bold text-white mb-6 flex items-center gap-2 pb-4 border-b border-white/5">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                        需求全景与效能洞察
                    </h3>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-[#09090b] border border-white/5 p-4 rounded-2xl flex flex-col justify-center relative overflow-hidden group">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-indigo-500 group-hover:w-2 transition-all"></div>
                            <p class="text-[11px] text-zinc-500 mb-1 font-medium" id="stat-period-title">本期累计需求</p>
                            <p class="text-[32px] font-black text-white font-mono leading-none tracking-tight"><span id="stat-total">0</span><span class="text-xs text-zinc-600 ml-1 font-sans font-normal">单</span></p>
                        </div>
                        <div class="bg-[#09090b] border border-white/5 p-4 rounded-2xl flex flex-col justify-center relative overflow-hidden group" title="未曾被打回重修的单据占比">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-emerald-500 group-hover:w-2 transition-all"></div>
                            <p class="text-[11px] text-zinc-500 mb-1 font-medium">方案一稿通过率</p>
                            <p class="text-[32px] font-black text-emerald-400 font-mono leading-none tracking-tight" id="stat-pass-rate">--</p>
                        </div>
                    </div>

                    <div class="bg-[#09090b] border border-white/5 p-5 rounded-2xl flex flex-col justify-center relative overflow-hidden group mb-6" title="从提单到验收完毕的平均耗时">
                        <div class="absolute right-0 top-0 bottom-0 w-1 bg-sky-500 group-hover:w-2 transition-all"></div>
                        <p class="text-[12px] text-zinc-500 mb-2 font-bold flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> 需求平均交付时长</p>
                        <p class="text-[36px] font-black text-white font-mono leading-none tracking-tight"><span id="stat-avg-time">--</span> <span class="text-sm text-zinc-500 font-sans font-normal">天 / 单</span></p>
                    </div>

                    <div class="bg-rose-500/5 border border-rose-500/20 p-5 rounded-2xl mb-8 relative overflow-hidden hidden" id="warning-panel">
                        <div class="absolute top-0 right-0 w-20 h-20 bg-rose-500/10 blur-xl rounded-full"></div>
                        <h4 class="text-[13px] font-bold text-rose-400 mb-2 flex items-center gap-1.5">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                            <span id="warning-title">预警</span>
                        </h4>
                        <p class="text-[12px] text-zinc-400 leading-relaxed relative z-10" id="warning-desc">--</p>
                    </div>

                    <div class="flex-1 flex flex-col">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="text-[13px] font-bold text-zinc-300">归属项目资源消耗分布</h4>
                        </div>
                        <div class="space-y-5" id="project-dist-container">
                            <div class="text-center text-zinc-500 py-10 text-sm">暂无数据</div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>

    <div id="period-detail-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal('period-detail-modal')"></div>
        <div class="bg-[#121217] border border-white/10 w-full max-w-md rounded-3xl shadow-2xl relative flex flex-col z-10 transform transition-all duration-300 scale-95 opacity-0" id="period-detail-content">
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-[#09090b]/50 rounded-t-3xl">
                <h3 id="period-modal-title" class="text-white font-bold text-[16px]">需求清单</h3>
                <button onclick="closeModal('period-detail-modal')" class="text-zinc-500 hover:text-white transition-colors bg-white/5 hover:bg-white/10 p-1.5 rounded-full btn-press">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="period-modal-list" class="p-6 space-y-3 max-h-[60vh] overflow-y-auto custom-scrollbar"></div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-indigo-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="window.closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label>
                    <input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="输入原密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label>
                    <input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="输入新密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label>
                    <input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="再次输入新密码">
                </div>
            </div>
            <button onclick="window.submitPwdChange()" class="w-full mt-6 py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(79,70,229,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-indigo-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 bg-indigo-500/20 text-indigo-400">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">通知</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        if(window.initApp) window.initApp();
    </script>

    <script>
        const PAGE_TYPE = 'req'; 
        let currentView = 'month'; 
        let currentDate = new Date();
        let myAllTasks = []; 
        let dropdownData = []; 
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        let currentUserData = null;

        // ================= 高级弹窗引擎 =================
        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0');
            dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-indigo-500';
                icon.className = 'w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
        }

        function showDialogUI() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); dialog.classList.remove('scale-95'); }, 10);
        }

        window.showAlert = function(title, message, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-indigo-600 hover:bg-indigo-500');
            btnContainer.innerHTML = `<button onclick="closeCustomDialog()" class="w-full py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">我知道了</button>`;
            showDialogUI();
        }

        // ================= 基础交互库 =================
        window.logout = function(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('activeUserObj'); 
            window.location.href = 'login.html'; 
        }

        window.openPwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');
            const pwdModal = document.getElementById('pwd-modal');
            pwdOverlay.classList.remove('hidden'); setTimeout(() => { pwdOverlay.classList.remove('opacity-0'); pwdModal.classList.remove('hidden'); pwdModal.classList.remove('scale-95'); }, 10);
            document.getElementById('old-pwd').value = ''; document.getElementById('new-pwd').value = ''; document.getElementById('new-pwd-confirm').value = '';
        }
        
        window.closePwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');
            const pwdModal = document.getElementById('pwd-modal');
            pwdOverlay.classList.add('opacity-0'); pwdModal.classList.add('scale-95'); setTimeout(() => { pwdOverlay.classList.add('hidden'); pwdModal.classList.add('hidden'); }, 300);
        }
        
        window.submitPwdChange = function() { window.showAlert('提示', '系统演示环境暂不可自助修改密码，请联系管理员。', 'info'); window.closePwdModal(); }

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';

            if (!(user.perms || []).includes(PAGE_TYPE)) { window.showAlert("权限错误", "无权限访问此页面", "danger"); setTimeout(window.logout, 1500); return false; }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar || '?'; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-indigo-600'} border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg shrink-0`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            if(document.getElementById('sidebar-role')) document.getElementById('sidebar-role').innerText = user.role || '系统成员';
            
            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#2a2a35] text-indigo-300 cursor-default"><div class="w-7 h-7 rounded-lg bg-indigo-500/20 text-indigo-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-bold">需求方视角 (当前)</span></div>`;
                if ((user.perms || []).includes('design')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='assistant-workspace.html'"><div class="w-7 h-7 rounded-lg bg-orange-500/10 text-orange-500 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-medium">设计方视角 (去接单)</span></div>`; 
                }
                if ((user.perms || []).includes('admin')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='manager-workspace.html'"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/10 text-fuchsia-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div><span class="text-[13px] font-medium">管理方视角 (统筹大盘)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }
            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-indigo-400 font-black">•</span> 身份: 需求方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }
            
            currentUserData = user;
            return user;
        }

        // ================= 💡 核心：拉取云端数据 =================
        window.initApp = async function() {
            if(!initRBAC()) return;
            if(!window.supabase) return;

            const currentUserEn = currentUserData.enName ? currentUserData.enName.toLowerCase() : '';
            const cNames = [currentUserData.displayName, currentUserData.cnName, currentUserData.enName, currentUserEn].filter(Boolean).map(n => n.toLowerCase());
            const isSuperAdmin = currentUserEn === 'davidxxu' || currentUserEn === 'judyzzhang';

            const syncDot = document.getElementById('sync-indicator');
            if(syncDot) syncDot.classList.remove('hidden');

            try {
                const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').order('due_date', { ascending: true });
                if (error) throw error;
                
                myAllTasks = (data || []).filter(t => {
                    if (isSuperAdmin) return true;
                    const c = (t.creator || '').toLowerCase();
                    return cNames.includes(c);
                });

                if (myAllTasks.length > 0) {
                    let latestTaskWithDate = [...myAllTasks].reverse().find(t => t.due_date);
                    if (latestTaskWithDate) {
                        const latestDateObj = new Date(latestTaskWithDate.due_date);
                        if (latestDateObj.getMonth() !== currentDate.getMonth() || latestDateObj.getFullYear() !== currentDate.getFullYear()) {
                            currentDate = new Date(latestDateObj.getFullYear(), latestDateObj.getMonth(), 1);
                        }
                    }
                }

                switchView('month');
                document.getElementById('calendar-loading').classList.add('hidden');
                
                setInterval(window.syncNotificationsFromCloud, 8000);
                window.syncNotificationsFromCloud();

            } catch (err) {
                console.error(err);
                document.getElementById('calendar-loading').innerHTML = `<p class="text-rose-500 font-bold">数据拉取失败</p><p class="text-xs text-zinc-500">${err.message}</p>`;
            } finally {
                if(syncDot) setTimeout(() => syncDot.classList.add('hidden'), 500);
            }
        }

        // ================= 💡 解析状态与卡片 =================
        function parseTaskStatus(task) {
            let sColor, sText, iconHtml;
            const isFinished = ['completed','archived','terminated'].includes(task.status);
            
            switch(task.status) {
                case 'rejected': sColor = 'rose'; sText = '被打回修改'; iconHtml = `🔴`; break;
                case 'reviewing': sColor = 'emerald'; sText = '待您验收'; iconHtml = `🟢`; break;
                case 'pending_accept': sColor = 'sky'; sText = '待接单'; iconHtml = `⚪`; break;
                case 'pending_approval': sColor = 'amber'; sText = '审批框架中'; iconHtml = `🔒`; break;
                case 'processing': sColor = 'orange'; sText = '设计制作中'; iconHtml = `✍️`; break;
                case 'completed': 
                case 'archived': sColor = 'zinc'; sText = '已完结归档'; iconHtml = `✓`; break;
                case 'terminated': sColor = 'rose'; sText = '已强行终止'; iconHtml = `❌`; break;
                default: sColor = 'sky'; sText = '待排期统筹'; iconHtml = `⚪`; 
            }

            const borderStyle = isFinished ? 'border-zinc-700 bg-[#1a1a24] opacity-70' : `border-${sColor}-500/50 bg-[#1a1a24]`;
            const textStyle = isFinished ? 'text-zinc-500' : `text-${sColor}-400`;
            const tagClass = `text-${sColor}-400 bg-${sColor}-500/10 border border-${sColor}-500/20`;

            return { sColor, sText, iconHtml, borderStyle, textStyle, tagClass, isFinished };
        }

        // ================= 💡 视图控制 =================
        window.switchView = function(view) {
            currentView = view;
            
            const btns = ['week', 'month', 'year'];
            btns.forEach(b => {
                const btn = document.getElementById(`btn-view-${b}`);
                if(b === view) {
                    btn.className = "px-5 py-1.5 text-[13px] font-bold bg-indigo-500/20 text-indigo-400 border border-indigo-500/20 rounded-lg shadow-sm cursor-default";
                } else {
                    btn.className = "px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press";
                    btn.setAttribute('onclick', `switchView('${b}')`);
                }
            });

            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            const activeSec = document.getElementById(`view-${view}`);
            if(activeSec) {
                const mainWrapper = document.getElementById('main-grid-wrapper');
                if (view === 'month') {
                    mainWrapper.className = "flex-1 bg-[#121217] border border-white/5 rounded-3xl overflow-hidden shadow-2xl flex flex-col h-full min-w-0";
                } else {
                    mainWrapper.className = "flex-1 bg-transparent border-none rounded-3xl overflow-hidden flex flex-col h-full min-w-0";
                }
                activeSec.classList.add('active');
            }

            const jumpBtn = document.getElementById('btn-jump-current');
            if(view === 'month') jumpBtn.innerText = '回到本月';
            else if(view === 'week') jumpBtn.innerText = '回到本周';
            else jumpBtn.innerText = '回到今年';

            updateDataAndRender();
        }

        function getStartOfWeek(d) {
            d = new Date(d);
            var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1); 
            return new Date(d.setDate(diff));
        }

        window.navDate = function(step) {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + step);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + (step * 7));
            else if (currentView === 'year') currentDate.setFullYear(currentDate.getFullYear() + step);
            updateDataAndRender();
        }

        window.jumpToCurrent = function() {
            currentDate = new Date();
            updateDataAndRender();
        }

        // ================= 💡 数据计算与渲染 =================
        function updateDataAndRender() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            dropdownData = [];
            if (currentView === 'month') {
                for(let i = -5; i <= 5; i++) {
                    const d = new Date(year, month + i, 1);
                    dropdownData.push({ text: `${d.getFullYear()}年 ${d.getMonth()+1}月`, date: d, isCurrent: i===0 });
                }
                document.getElementById('current-date-text').innerText = `${year}年 ${month+1}月`;
            } 
            else if (currentView === 'week') {
                const startWeek = getStartOfWeek(currentDate);
                for(let i = -5; i <= 5; i++) {
                    const d = new Date(startWeek);
                    d.setDate(d.getDate() + (i * 7));
                    const end = new Date(d); end.setDate(end.getDate() + 6);
                    dropdownData.push({ text: `周 (${d.getMonth()+1}.${d.getDate()}-${end.getMonth()+1}.${end.getDate()})`, date: d, isCurrent: i===0 });
                }
                const e = new Date(startWeek); e.setDate(e.getDate() + 6);
                document.getElementById('current-date-text').innerText = `${startWeek.getMonth()+1}.${startWeek.getDate()} - ${e.getMonth()+1}.${e.getDate()}`;
            }
            else if (currentView === 'year') {
                for(let i = -3; i <= 3; i++) {
                    const y = year + i;
                    dropdownData.push({ text: `${y} 年度`, date: new Date(y, 0, 1), isCurrent: i===0 });
                }
                document.getElementById('current-date-text').innerText = `${year} 年度`;
            }

            let tasksInView = [];
            if (currentView === 'month') tasksInView = renderMonthGrid();
            else if (currentView === 'week') tasksInView = renderWeekGrid();
            else if (currentView === 'year') tasksInView = renderYearGrid();

            updateInsights(tasksInView);
        }

        // --- 核心大盘分析 ---
        function updateInsights(tasks) {
            document.getElementById('stat-total').innerText = tasks.length;
            
            const completedTasks = tasks.filter(t => ['completed', 'archived'].includes(t.status));
            
            let firstPassCount = 0;
            let totalTimeMs = 0;
            let projectDist = {};

            completedTasks.forEach(t => {
                let hist = [];
                try { hist = JSON.parse(t.history_json || '[]'); }catch(e){}
                
                let rejected = hist.some(h => h.is_rejected || (h.action && h.action.includes('reject')));
                if (!rejected) firstPassCount++;
                
                let cTime = new Date(t.created_at).getTime();
                let eTime = hist.length > 0 ? new Date(hist[hist.length-1].created_at || hist[hist.length-1].time).getTime() : cTime;
                totalTimeMs += (eTime - cTime);
            });

            tasks.forEach(t => {
                let p = t.project || '其他未定项目';
                projectDist[p] = (projectDist[p] || 0) + 1;
            });

            const firstPassRate = completedTasks.length > 0 ? Math.round((firstPassCount / completedTasks.length) * 100) : 0;
            const avgDays = completedTasks.length > 0 ? (totalTimeMs / completedTasks.length / (1000 * 3600 * 24)).toFixed(1) : 0;

            document.getElementById('stat-pass-rate').innerText = completedTasks.length > 0 ? `${firstPassRate}%` : '--';
            document.getElementById('stat-avg-time').innerText = completedTasks.length > 0 ? `${avgDays}` : '--';

            const distContainer = document.getElementById('project-dist-container');
            if (tasks.length === 0) {
                distContainer.innerHTML = '<div class="text-center text-zinc-500 py-10 text-sm">当前周期无数据</div>';
            } else {
                let distHtml = '';
                const sortedProj = Object.keys(projectDist).map(k => ({ name: k, count: projectDist[k] })).sort((a,b) => b.count - a.count);
                const colors = ['indigo', 'emerald', 'sky', 'orange', 'fuchsia'];

                sortedProj.forEach((p, idx) => {
                    const pct = Math.round((p.count / tasks.length) * 100);
                    const col = colors[idx % colors.length];
                    distHtml += `
                    <div class="mb-4">
                        <div class="flex justify-between items-end mb-1.5">
                            <h4 class="text-[13px] font-bold text-zinc-200">${p.name}</h4>
                            <div class="text-right">
                                <span class="text-[13px] font-mono font-bold text-${col}-400">${p.count} <span class="text-[10px] text-${col}-400/60 font-sans font-normal">单</span></span>
                            </div>
                        </div>
                        <div class="w-full h-1.5 bg-zinc-900 rounded-full overflow-hidden">
                            <div class="h-full bg-${col}-500 rounded-full opacity-80" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                });
                distContainer.innerHTML = distHtml;
            }
        }

        function triggerWarning(text) {
            const warningPanel = document.getElementById('warning-panel');
            if(text) {
                warningPanel.classList.remove('hidden');
                document.getElementById('warning-title').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg> ${text.includes('周末') ? '周末交付预警' : '集中爆发预警'}`;
                document.getElementById('warning-desc').innerText = text.includes('周末') 
                    ? '检测到本周有需求卡在周六日截止，请密切关注设计团队节假日的响应情况，避免延误。'
                    : '检测到该时段需求扎堆期望交付，存在一定的排期及质量风险。';
            } else {
                warningPanel.classList.add('hidden');
            }
        }

        // --- 月视图 ---
        function renderMonthGrid() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const startingDay = firstDay.getDay(); 
            const monthLength = new Date(year, month + 1, 0).getDate();
            
            let dayData = {};
            for(let i=1; i<=monthLength; i++) dayData[i] = [];

            let tasksInView = [];
            myAllTasks.forEach(t => {
                if (t.due_date) {
                    const d = new Date(t.due_date);
                    if(d.getFullYear() === year && d.getMonth() === month) {
                        dayData[d.getDate()].push(t);
                        tasksInView.push(t);
                    }
                }
            });

            const grid = document.getElementById('month-grid');
            let html = '';
            const today = new Date();
            const isCurrentMonthReal = (year === today.getFullYear() && month === today.getMonth());

            for (let i = 0; i < startingDay; i++) html += `<div class="calendar-cell muted"></div>`;

            let hasConcentration = false;
            for (let i = 1; i <= monthLength; i++) {
                const isToday = isCurrentMonthReal && i === today.getDate();
                const tasks = dayData[i];
                if (tasks.length >= 3) hasConcentration = true;
                
                let numHtml = isToday 
                    ? `<div class="absolute top-0 left-0 right-0 h-0.5 bg-indigo-500"></div><span class="text-[12px] text-white font-bold bg-indigo-600 px-2 rounded-full self-end mt-1">${i} (今天)</span>` 
                    : `<span class="text-[13px] font-bold text-zinc-400 self-end">${i}</span>`;
                
                let cellClass = isToday ? 'bg-indigo-900/10 border-indigo-500/20' : '';
                
                let pillsHtml = tasks.map(t => {
                    const st = parseTaskStatus(t);
                    const assignee = t.assignee === 'none' ? '待定' : t.assignee;
                    return `
                    <div onclick="event.stopPropagation(); window.location.href='task-detail-requester.html?id=${t.id}'" class="mt-1.5 p-2 rounded-lg border border-white/5 bg-[#16161d] hover:border-indigo-500/50 hover:bg-[#1a1a24] transition-all cursor-pointer shadow-sm group ${st.isFinished ? 'opacity-50' : ''} event-pill">
                        <div class="text-[11px] font-bold text-white mb-0.5 truncate group-hover:text-indigo-400 transition-colors" title="${t.title}">${t.title}</div>
                        <div class="text-[10px] ${st.textStyle} flex items-center gap-1 mb-1 truncate">${st.iconHtml} ${st.sText}</div>
                        <div class="text-[9px] text-zinc-500 border-t border-white/5 pt-1 mt-1 truncate">执: ${assignee}</div>
                    </div>`;
                }).join('');

                let safeTasks = encodeURIComponent(JSON.stringify(tasks));
                html += `
                    <div class="calendar-cell relative ${cellClass}" onclick="openPeriodDetail('${year}年${month+1}月${i}日', '${safeTasks}')">
                        ${numHtml}
                        <div class="flex-1 overflow-y-auto custom-scrollbar mt-1 p-1">${pillsHtml}</div>
                    </div>`;
            }

            const remainingCells = 42 - (startingDay + monthLength);
            for (let i = 0; i < remainingCells; i++) html += `<div class="calendar-cell muted"></div>`; 
            grid.innerHTML = html;

            document.getElementById('stat-period-title').innerText = '本月总计发单';
            triggerWarning(hasConcentration ? '本月' : null);
            return tasksInView;
        }

        // --- 周视图 ---
        function renderWeekGrid() {
            const startWeek = getStartOfWeek(currentDate);
            const grid = document.getElementById('week-grid');
            let html = '';
            let tasksInView = [];
            let hasWeekendTask = false;

            for(let i=0; i<7; i++) {
                let d = new Date(startWeek);
                d.setDate(d.getDate() + i);
                
                let y = d.getFullYear(), m = d.getMonth(), dateNum = d.getDate();
                const today = new Date();
                let isToday = (y === today.getFullYear() && m === today.getMonth() && dateNum === today.getDate());
                
                let tasks = myAllTasks.filter(t => {
                    if(!t.due_date) return false;
                    let td = new Date(t.due_date);
                    return td.getFullYear() === y && td.getMonth() === m && td.getDate() === dateNum;
                });
                
                tasksInView.push(...tasks);
                if(tasks.length > 0 && (i===0 || i===6)) hasWeekendTask = true; 

                let headerHtml = isToday 
                    ? `<div class="absolute top-0 left-0 right-0 h-1 bg-indigo-500"></div>
                       <div class="py-4 text-center border-b border-indigo-500/20 bg-indigo-500/10">
                            <p class="text-[11px] text-indigo-400 font-bold mb-1">${weekdays[i]} (今天)</p>
                            <p class="text-[18px] text-indigo-300 font-bold font-mono">${dateNum}</p>
                       </div>`
                    : `<div class="py-4 text-center border-b border-white/5 bg-[#16161d]">
                            <p class="text-[11px] ${(i===0||i===6)?'text-indigo-400/50':'text-zinc-500'} font-bold mb-1">${weekdays[i]}</p>
                            <p class="text-[16px] text-zinc-400 font-mono">${dateNum}</p>
                       </div>`;
                       
                let cardsHtml = tasks.map(t => {
                    const st = parseTaskStatus(t);
                    const assignee = t.assignee === 'none' ? '待定' : t.assignee;
                    const creator = t.creator || '未知';
                    return `
                    <div onclick="event.stopPropagation(); window.location.href='task-detail-requester.html?id=${t.id}'" class="p-3 rounded-xl week-card border-l-2 ${st.borderStyle} bg-[#1a1a24] ${st.isFinished?'opacity-50':''}">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] ${st.tagClass} px-1.5 py-0.5 rounded font-mono inline-block">${t.id}</span>
                            <span class="text-[10px] ${st.textStyle}">${st.iconHtml} ${st.sText}</span>
                        </div>
                        <p class="text-[13px] font-bold text-white mb-2 leading-tight line-clamp-2 hover:text-indigo-400 transition-colors">${t.title}</p>
                        <div class="flex justify-between items-center text-[10px] text-zinc-500 bg-[#0c0c0e] px-2 py-1.5 rounded-lg border border-white/5">
                            <span class="truncate flex-1">发起: ${creator}</span>
                            <div class="w-px h-3 bg-white/10 mx-2"></div>
                            <span class="truncate flex-1 text-right">执行: ${assignee}</span>
                        </div>
                    </div>`;
                }).join('');
                    
                let safeTasks = encodeURIComponent(JSON.stringify(tasks));
                let bgClass = isToday ? 'bg-indigo-900/10 border-x border-indigo-500/20 relative cursor-pointer hover:bg-indigo-900/20' : 'bg-[#0c0c0e] cursor-pointer hover:bg-white/5 border border-white/5';
                
                html += `<div class="${bgClass} flex flex-col transition-colors rounded-2xl overflow-hidden" onclick="openPeriodDetail('${m+1}月${dateNum}日', '${safeTasks}')">
                            ${headerHtml}
                            <div class="flex-1 p-3 space-y-3 overflow-y-auto custom-scrollbar">${cardsHtml}</div>
                         </div>`;
            }
            grid.innerHTML = html;
            document.getElementById('stat-period-title').innerText = '本周总计发单';
            triggerWarning(hasWeekendTask ? '周末' : null);
            return tasksInView;
        }

        // --- 年视图 ---
        function renderYearGrid() {
            const year = currentDate.getFullYear();
            const grid = document.getElementById('year-grid');
            let html = '';
            let tasksInView = [];

            for(let m=0; m<12; m++) {
                let tasks = myAllTasks.filter(t => {
                    if(!t.due_date) return false;
                    let td = new Date(t.due_date);
                    return td.getFullYear() === year && td.getMonth() === m;
                });
                
                tasksInView.push(...tasks);
                let count = tasks.length;
                let safeTasks = encodeURIComponent(JSON.stringify(tasks));
                const today = new Date();
                let isCurrentMonth = (year === today.getFullYear() && m === today.getMonth());

                if(isCurrentMonth) {
                    html += `
                    <div onclick="openPeriodDetail('${year}年 ${m+1}月', '${safeTasks}')" class="bg-indigo-900/10 rounded-3xl p-6 month-card flex flex-col justify-between aspect-[4/3] border-indigo-500/30 shadow-[0_0_20px_rgba(99,102,241,0.1)] relative">
                        <div class="absolute top-4 right-4 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">本月</div>
                        <h3 class="text-indigo-400 font-bold text-[18px]">${m+1} 月</h3>
                        <div><p class="text-[42px] font-mono text-white font-black leading-none mb-1">${count}<span class="text-[14px] text-indigo-300 font-normal ml-1">单</span></p></div>
                    </div>`;
                } else if(count > 0) {
                    html += `
                    <div onclick="openPeriodDetail('${year}年 ${m+1}月', '${safeTasks}')" class="bg-[#121217] rounded-3xl p-6 month-card flex flex-col justify-between aspect-[4/3] opacity-80">
                        <h3 class="text-white font-bold text-[18px]">${m+1} 月</h3>
                        <div><p class="text-[36px] font-mono text-zinc-300 font-black">${count}<span class="text-[12px] text-zinc-600 font-normal ml-1">单</span></p></div>
                    </div>`;
                } else {
                    html += `
                    <div onclick="openPeriodDetail('${year}年 ${m+1}月', '[]')" class="bg-[#121217] rounded-3xl p-6 month-card flex flex-col justify-between aspect-[4/3] opacity-20">
                        <h3 class="text-zinc-600 font-bold text-[18px]">${m+1} 月</h3>
                    </div>`;
                }
            }
            grid.innerHTML = html;
            document.getElementById('stat-period-title').innerText = '今年总计发单';
            triggerWarning(null);
            return tasksInView;
        }

        // ================= 💡 下拉框与弹窗交互 =================
        window.toggleDropdown = function(id) {
            const dropdown = document.getElementById(id);
            let html = '<div class="py-2">';
            dropdownData.forEach((item, index) => {
                if(item.isCurrent) {
                    html += `<div class="w-full text-left px-5 py-2.5 text-[14px] text-indigo-400 bg-indigo-500/10 font-bold cursor-default">${item.text} <span class="text-[10px] bg-indigo-500/20 px-1.5 py-0.5 rounded ml-2">当前</span></div>`;
                } else {
                    html += `<button onclick="selectDropdownDate(${index})" class="w-full text-left px-5 py-2.5 text-[14px] text-zinc-400 hover:bg-white/5 hover:text-white transition-colors">${item.text}</button>`;
                }
            });
            dropdown.innerHTML = html + '</div>';
            dropdown.classList.toggle('hidden');
            
            setTimeout(() => {
                const activeItem = dropdown.querySelector('.bg-indigo-500\\/10');
                if(activeItem) activeItem.scrollIntoView({ block: 'center' });
            }, 10);
        }

        window.selectDropdownDate = function(index) {
            currentDate = dropdownData[index].date;
            document.getElementById('date-dropdown').classList.add('hidden');
            updateDataAndRender();
        }

        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('date-selector-wrapper');
            const dropdown = document.getElementById('date-dropdown');
            if (wrapper && dropdown && !wrapper.contains(e.target)) dropdown.classList.add('hidden');
            
            const notifWrap = document.getElementById('notif-wrapper');
            const notifMenu = document.getElementById('notifMenu');
            if (notifWrap && notifMenu && !notifWrap.contains(e.target)) notifMenu.classList.add('hidden');
        });

        window.openPeriodDetail = function(periodTitle, tasksStr) {
            let tasks = JSON.parse(decodeURIComponent(tasksStr));
            document.getElementById('period-modal-title').innerText = periodTitle + ' 需求清单';
            const list = document.getElementById('period-modal-list');
            list.innerHTML = '';
            
            if(tasks.length === 0) {
                list.innerHTML = `<div class="text-center py-12 flex flex-col items-center opacity-50"><p class="text-zinc-400 text-[13px]">该时段您未曾发起任何需求。</p></div>`;
            } else {
                tasks.forEach(t => {
                    const st = parseTaskStatus(t);
                    const assignee = t.assignee === 'none' ? '待定' : t.assignee;
                    const creator = t.creator || '未知';
                    list.innerHTML += `
                        <div onclick="window.location.href='task-detail-requester.html?id=${t.id}'" class="bg-[#1a1a24] border border-white/5 p-4 rounded-2xl hover:border-indigo-500/50 cursor-pointer transition-colors group btn-press ${st.isFinished ? 'opacity-50' : ''}">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[10px] font-mono font-bold px-2 py-0.5 rounded ${st.tagClass}">${t.id}</span>
                                <span class="text-[11px] ${st.textStyle} font-bold">${st.iconHtml} ${st.sText}</span>
                            </div>
                            <h4 class="text-[15px] font-bold text-white mb-2 line-clamp-1">${t.title}</h4>
                            <div class="flex justify-between items-center text-[11px] text-zinc-500 bg-[#09090b] px-3 py-2 rounded-lg border border-white/5">
                                <span class="truncate">发起: ${creator}</span>
                                <span class="truncate">执行: ${assignee}</span>
                            </div>
                        </div>`;
                });
            }
            
            const modal = document.getElementById('period-detail-modal');
            const content = document.getElementById('period-detail-content');
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }

        window.closeModal = function(id) {
            const modal = document.getElementById(id);
            const content = document.getElementById('period-detail-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // ================= 💡 真实消息雷达监听 =================
        window.syncNotificationsFromCloud = async function() {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const currentUserEn = currentUser.enName ? currentUser.enName.toLowerCase() : '';
            const isLeader = currentUserEn === 'judyzzhang' || currentUserEn === 'davidxxu';

            try {
                // 去云端捞近期单子
                const { data, error } = await window.supabase.from('test_tasks').select('id, creator, assignee, status, history_json').order('created_at', { ascending: false }).limit(100);
                if(error) throw error;

                let knownHistories = JSON.parse(localStorage.getItem('known_histories_msgcenter') || '{}');
                let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
                let hasNew = false;

                (data || []).forEach(task => {
                    const creator = task.creator || '';
                    const isOwner = creator === currentUser.displayName || creator === currentUser.cnName || creator === currentUser.enName;
                    if (!isOwner && !isLeader) return;

                    let historyArr = [];
                    try { historyArr = JSON.parse(task.history_json || '[]'); } catch(e){}

                    const knownLen = knownHistories[task.id] || 0;
                    if (historyArr.length > knownLen) {
                        for(let i = knownLen; i < historyArr.length; i++) {
                            const newEvent = historyArr[i];
                            const opEnName = currentUser.enName || '';
                            const opDispName = currentUser.displayName || '';
                            if (newEvent.operator && (newEvent.operator.includes(opEnName) || newEvent.operator.includes(opDispName))) continue;
                            
                            sysNotifs.push({
                                id: new Date().getTime() + Math.random(),
                                taskId: task.id,
                                title: `💡 [${task.id}] 进展更新`,
                                desc: `${newEvent.operator || '系统'} 操作: ${newEvent.action}. ${newEvent.reply || newEvent.desc || ''}`,
                                role: 'req', 
                                read: false,
                                time: new Date().toISOString()
                            });
                            hasNew = true;
                        }
                        knownHistories[task.id] = historyArr.length;
                    }
                });

                if (hasNew) {
                    localStorage.setItem('known_histories_msgcenter', JSON.stringify(knownHistories));
                    localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs));
                }
                loadNotifications();
            } catch(e) {}
        }

        window.loadNotifications = function() {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';
            const isLeader = enName === 'judyzzhang' || enName === 'davidxxu';

            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            let myNotifs = sysNotifs.filter(n => {
                if (n.role === 'req') return true;
                if (isLeader && n.role === 'admin') return true;
                return false;
            });
            myNotifs.sort((a, b) => b.id - a.id);

            const unreadCount = myNotifs.filter(n => !n.read).length;
            const bellDot = document.getElementById('bell-dot');
            const notifContainer = document.getElementById('notif-list-container');

            if (bellDot) {
                if (unreadCount > 0) {
                    bellDot.classList.remove('hidden');
                } else {
                    bellDot.classList.add('hidden');
                }
            }

            if (notifContainer) {
                if (myNotifs.length === 0) {
                    notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>';
                } else {
                    let html = '';
                    myNotifs.forEach(n => {
                        const dot = n.read ? '' : '<span class="w-2 h-2 rounded-full bg-rose-500 shrink-0 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></span>';
                        const opacity = n.read ? 'opacity-50' : '';
                        const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        html += `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer ${opacity}" onclick="window.markSingleAsRead(${n.id}, '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-[13px] font-bold text-white flex items-center gap-2">${n.title} ${dot}</h4>
                                    <span class="text-[10px] text-zinc-500">${dateStr}</span>
                                </div>
                                <p class="text-[11px] text-zinc-400 leading-relaxed">${n.desc}</p>
                            </div>
                        `;
                    });
                    notifContainer.innerHTML = html;
                }
            }
        }

        window.markSingleAsRead = function(id, taskId) {
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            let target = sysNotifs.find(n => n.id === id);
            if(target) { target.read = true; localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs)); }
            if (taskId && taskId !== 'KANBAN') window.location.href = `task-detail-requester.html?id=${taskId}`;
            else window.loadNotifications();
        }

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            sysNotifs.forEach(n => { if (n.role === 'req' || n.role === 'admin') n.read = true; });
            localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs));
            window.loadNotifications();
        }

        // 统一在页面渲染完成后，挂载一次后台轮询和下拉框交互
        document.addEventListener('DOMContentLoaded', () => {
            const idBtn = document.getElementById('identityBtn');
            const idMenu = document.getElementById('identityMenu');
            if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
            
            const notifBtn = document.getElementById('notifBtn');
            const notifMenu = document.getElementById('notifMenu');
            if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

            document.addEventListener('click', (e) => { 
                if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
            });

            window.loadNotifications();
            // 每 10 秒刷新一次未读通知状态
            setInterval(() => { window.loadNotifications(); }, 10000);
        });

    </script>
</body>
</html>
