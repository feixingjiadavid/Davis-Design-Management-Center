<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求排号大厅 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        .modal-enter { animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { 0% { opacity: 0; transform: scale(0.97) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .interactive-card { transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.04); background-color: #121217; }
        .interactive-card:hover { transform: translateY(-2px); background-color: #18181b; border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .active-card { background-color: #18181b !important; border-color: rgba(99, 102, 241, 0.5) !important; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02); }

        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .pill-checkbox:checked + div { background-color: rgba(99, 102, 241, 0.15); border-color: #6366f1; color: #818cf8; font-weight: 600; }
        .pill-radio:checked + div { background-color: rgba(99, 102, 241, 0.15); border-color: #6366f1; color: #818cf8; font-weight: 600; }
        
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @keyframes checkDraw { to { stroke-dashoffset: 0; } }
        .animate-check-draw { animation: checkDraw 0.5s ease-out forwards; animation-delay: 0.4s; }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        .timeline-line { position: absolute; left: 13px; top: 12px; bottom: -20px; width: 2px; background-color: rgba(255,255,255,0.05); z-index: 0; }
        .timeline-item:last-child .timeline-line { display: none; }

        @keyframes urgentPulse {
            0%, 100% { box-shadow: inset 0 0 0 1px rgba(244,63,94,0.2), 0 0 15px rgba(244,63,94,0.15); border-color: rgba(244,63,94,0.3); background-color: rgba(244,63,94,0.02); }
            50% { box-shadow: inset 0 0 0 1px rgba(244,63,94,0.7), 0 0 35px rgba(244,63,94,0.4); border-color: rgba(244,63,94,0.9); background-color: rgba(244,63,94,0.08); }
        }
        .urgent-breathe { animation: urgentPulse 2s ease-in-out infinite; }
        .urgent-breathe:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-indigo-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 right-1/4 w-[800px] h-[600px] bg-indigo-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-bold text-[14px]">需求排号大厅</span>
            </button>
            <button onclick="window.location.href='record-list.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                <span class="font-medium text-[14px]">我的提单记录</span>
            </button>
            <button onclick="window.location.href='calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="font-medium text-[14px]">我的需求日历</span>
            </button>
        </div>

        <div class="px-5 py-5 mt-auto border-t border-white/5 bg-[#09090b] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg">?</div>
                <div><p id="sidebar-name" class="text-xs font-bold text-white mb-0.5">加载中...</p><p id="sidebar-role" class="text-[10px] text-zinc-500">读取中</p></div>
            </div>
            <button onclick="logout(event)" class="p-2 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出登录">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10">
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl relative z-[999]">
            <div>
                <h2 id="header-greeting" class="text-2xl font-bold text-white tracking-tight mb-1.5">上午好，加载中...</h2>
                <p class="text-xs text-zinc-500">云端协同数据已就绪，所有的工作都在有条不紊地推进中。</p>
            </div>
            
            <div class="flex items-center gap-5 relative">
                <div class="relative z-[120]" id="notif-wrapper">
                    <button id="notifBtn" class="w-11 h-11 rounded-2xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="bell-dot" class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                    </button>
                    <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                        <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                            <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                            <button onclick="markAllAsRead(event)" class="text-[11px] text-indigo-400 hover:text-indigo-300 btn-press transition-colors">全部已读</button>
                        </div>
                        <div class="max-h-[300px] overflow-y-auto custom-scrollbar">
                            <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>
                        </div>
                        <div class="pt-3 px-5 border-t border-white/5 text-center">
                            <button onclick="window.location.href='message-center.html?role=req'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                        </div>
                    </div>
                </div>

                <div class="relative z-[110]">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-5 py-3 rounded-[14px] flex items-center gap-3 text-[13px] font-medium hover:bg-[#1a1a1f] transition-colors btn-press">
                        身份加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>

                <button onclick="openModal('create-modal', false)" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-[14px] text-[14px] font-bold shadow-[0_5px_15px_rgba(79,70,229,0.25)] transition-all flex items-center gap-2 btn-press">
                    + 发起新需求
                </button>
            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-hidden flex justify-center">
            <div class="flex gap-10 h-full items-start w-full max-w-[1280px]">
                
                <div class="w-full max-w-[800px] flex flex-col h-full min-w-0 pb-4 shrink-0">
                    <div class="bg-[#1a1306] border border-amber-600/30 rounded-2xl p-5 mb-6 flex items-start gap-4 shrink-0">
                        <div class="text-amber-500 mt-0.5">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        </div>
                        <div>
                            <h4 class="text-[13px] font-bold text-amber-500 mb-1">系统提单必读规则</h4>
                            <p class="text-[12px] text-amber-500/80 leading-relaxed font-medium">
                                欢迎进入真实数据大厅。首创核心视觉请指派给【文哥/资深设计】；延展与部门排版指派给【文员】。您的所有需求将严格按优先级顺序流转。
                            </p>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
                        <div class="flex-1 overflow-y-auto custom-scrollbar pr-3 space-y-8" id="tasks-scroll-area">
                            
                            <div>
                                <h3 class="text-sm font-bold text-indigo-400 flex items-center gap-2.5 mb-4">
                                    <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full shadow-[0_0_8px_#6366f1]"></span>我的进行中工单
                                </h3>
                                
                                <div class="space-y-4 transition-opacity duration-300" id="ongoing-tasks-container">
                                    <div class="text-center py-10" id="loading-spinner">
                                        <p class="text-sm text-zinc-500 flex justify-center items-center gap-2"><svg class="animate-spin h-4 w-4 text-zinc-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 正在从云端拉取并排序...</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-8 pt-8 border-t border-white/5">
                                <h3 class="text-sm font-bold text-zinc-400 flex items-center gap-2.5 mb-4 shrink-0">
                                    <span class="w-1.5 h-1.5 bg-zinc-500 rounded-full"></span>已完结/归档工单
                                </h3>
                                <div class="space-y-4 transition-opacity duration-300" id="completed-tasks-container">
                                    </div>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="w-[310px] bg-[#121217] border border-white/5 rounded-3xl p-6 flex flex-col h-full shadow-2xl shrink-0">
                    <div class="mb-6 shrink-0 border-b border-white/5 pb-5">
                        <div class="flex items-center justify-between mb-2.5">
                            <h3 class="text-[14px] font-bold text-white flex items-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                                状态跟踪
                            </h3>
                        </div>
                        <p class="text-[11px] text-zinc-500">当前预览: <span class="text-zinc-400 font-mono font-bold" id="tracking-focus-text">无选中的单据</span></p>
                    </div>
                    
                    <div class="relative flex-1 custom-scrollbar pointer-events-none" id="all-timelines-container">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeAllModals()">
        <div id="create-modal" class="hidden w-full max-w-4xl bg-[#121217] border border-zinc-800 rounded-3xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="px-8 py-5 border-b border-zinc-800 flex justify-between items-center bg-[#09090b]/50">
                <h2 class="text-lg font-bold text-white tracking-tight" id="modal-title-text">起草新设计需求</h2>
                <button onclick="closeAllModals()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1.5 transition-colors btn-press"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            
            <div class="flex-1 p-8 overflow-y-auto space-y-7 custom-scrollbar">
                
                <div>
                    <label class="block text-[13px] font-bold text-zinc-300 mb-2">1. 需求标题 <span class="text-rose-500">*</span></label>
                    <input type="text" id="req-short-title" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="例如：年度大会主视觉设计">
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-zinc-300 mb-2">2. 需求描述 <span class="text-rose-500">*</span></label>
                    <textarea id="req-title" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors resize-none h-28 custom-scrollbar" placeholder="请详细说明设计内容、背景、目标受众、尺寸要求等细节..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">3. 产出类型 <span class="text-rose-500">*</span></label>
                        <div class="flex gap-2">
                            <label class="cursor-pointer flex-1"><input type="radio" name="rt" class="hidden pill-radio" checked><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-xs py-3 rounded-lg text-center transition-colors">平面视觉</div></label>
                            <label class="cursor-pointer flex-1"><input type="radio" name="rt" class="hidden pill-radio"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-xs py-3 rounded-lg text-center transition-colors">视频动效</div></label>
                        </div>
                    </div>
                    
                    <div class="relative" id="project-wrapper">
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">4. 归属项目 <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <input type="text" id="req-project" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-zinc-300 outline-none focus:border-indigo-500 transition-colors" placeholder="-- 请下拉选择或输入检索 --" autocomplete="off" onfocus="showProjectDropdown()" oninput="filterProjectDropdown()">
                            <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                        <div id="project-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.8)] z-[99999] max-h-56 overflow-y-auto custom-scrollbar py-2">
                            <div id="project-dropdown-list"></div>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-zinc-300 mb-2">5. 期望分发渠道 (可多选) <span class="text-rose-500">*</span></label>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer"><input type="checkbox" value="企业号" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">企业号</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="邮件" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">邮件</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="立地屏" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">立地屏</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="电视机" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">电视机</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="电脑屏保" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">电脑屏保</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="异形牌" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">异形牌</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="其他" id="channel-other-cb" class="hidden pill-checkbox req-channel" onchange="toggleOtherInput()"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">其他</div></label>
                    </div>
                    <div id="other-channel-input-container" class="mt-3 hidden">
                        <input type="text" id="req-channel-other" placeholder="请手写填入具体渠道名称..." class="w-full bg-[#09090b] border border-zinc-700 border-dashed rounded-xl px-4 py-2.5 text-sm text-zinc-300 outline-none focus:border-indigo-500 transition-colors">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="relative" id="assignee-wrapper">
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">6. 期望执行人 <span class="text-rose-500">*</span></label>
                        <input type="hidden" id="req-assignee" value="none">
                        <div class="relative">
                            <input type="text" id="req-assignee-input" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-zinc-300 outline-none focus:border-indigo-500 transition-colors cursor-pointer" placeholder="输入英文名检索或下拉选择..." autocomplete="off" onfocus="showAssigneeDropdown()" oninput="filterAssigneeDropdown()" onblur="validateAssigneeInput()">
                            <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                        <div id="assignee-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.8)] z-[99999] max-h-56 overflow-y-auto custom-scrollbar py-2">
                            <div id="assignee-dropdown-list"></div>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">7. 期望交付日 <span class="text-rose-500">*</span></label>
                        <input type="date" id="req-date" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-white outline-none transition-colors" style="color-scheme: dark;">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 pt-2">
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">8. 需求参考链接 (选填)</label>
                        <input type="url" id="req-link" placeholder="如腾讯文档地址..." class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">9. 本地附件上传 (选填)</label>
                        <label for="real-file-upload" id="upload-zone" class="w-full bg-[#09090b] border border-zinc-700 border-dashed rounded-xl px-4 py-2.5 flex flex-col items-center justify-center text-zinc-500 cursor-pointer hover:border-indigo-500 transition-colors h-[46px]">
                            <span id="upload-text" class="text-xs font-medium flex items-center gap-2">
                                <svg id="upload-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                点击选择参考附件...
                            </span>
                            <input type="file" id="real-file-upload" class="hidden" onchange="handleFileSelect(event)">
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="p-6 border-t border-zinc-800 bg-[#09090b] flex justify-end items-center rounded-b-3xl gap-4">
                <button onclick="closeAllModals()" class="px-6 py-3 bg-transparent border border-zinc-700 text-zinc-400 hover:text-white rounded-xl text-[13px] font-bold btn-press transition-colors">取消</button>
                <button onclick="saveDraft()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl text-[13px] font-bold btn-press transition-colors">暂存草稿</button>
                <button onclick="submitNewReq()" class="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[14px] font-bold shadow-[0_8px_15px_rgba(79,70,229,0.3)] btn-press transition-all">确认提交</button>
            </div>
        </div>
    </div>

    <div id="success-overlay" class="fixed inset-0 bg-[#09090b]/95 backdrop-blur-md z-[100000] hidden opacity-0 transition-opacity duration-300 flex flex-col items-center justify-center">
        <div id="success-content" class="flex flex-col items-center transform scale-95 opacity-0 transition-all duration-500 delay-100">
            <div class="w-20 h-20 rounded-full bg-indigo-500/20 border-2 border-indigo-500/50 flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(79,70,229,0.3)]">
                <svg class="w-10 h-10 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path class="success-check-path" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" style="stroke-dasharray: 50; stroke-dashoffset: 50;"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2 tracking-tight">需求提单成功</h2>
            <p class="text-zinc-400 text-sm">系统正在为您生成专属排号，数据同步云端中...</p>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        if(window.loadTasksFromCloud) window.loadTasksFromCloud();
        if(window.loadAssigneesFromCloud) window.loadAssigneesFromCloud();
    </script>

    <script>
        const PAGE_TYPE = 'req'; 
        let currentUploadedFileData = null;

        const PROJECT_LIST = [
            "Smart文化-OpenTalk", "Smart文化-1024", "Smart文化-后勤小管家", "Smart文化-小蓝书运营", "Smart文化-送物机器人",
            "荣誉体系-即时激励", "荣誉体系-荣誉奖项", "荣誉体系-AI奖项", "荣誉体系-最佳拍档", "荣誉体系-科技合作社", "荣誉体系-极客团",
            "年度大会-武汉", "年度大会-上海", "年度大会-行庆", "HR侧相关-周年庆", "HR侧相关-初八团拜", 
            "工会相关-团建旅游", "工会相关-运动季", "工会相关-文体活动",
            "常规活动-新人入职", "常规活动-科技合规银监人行类支持", "常规活动-年决", "常规活动-管理团队活动", "常规活动-外籍员工支持",
            "品宣支持", "科技子支持", "行品宣设计对接", 
            "部门-基科", "部门-数业", "部门-贷款", "部门-存款", "部门-企同", "部门-财富", "部门-政科", "部门-数发", "部门-安全", "部门-上海", "部门-武汉", "部门-成都", "部门-科管"
        ];

        const PREDEFINED_ASSIGNEES = ['anckyyu', 'davidxxu', 'debbiehuang', 'evazzhu', 'hscheng', 'mengmengli', 'skylerhuang', 'sophiachen', 'tiaouyang', 'v_lijuangchen', 'v_lucui', 'v_sijieli', 'v_siyifu', 'v_sjtian', 'v_wbchye', 'v_wbjgao', 'v_wbmtli', 'v_zqlan', 'wenjiawu', 'yamyzhang', 'yaozhong', 'yoshyliu', 'zoeyzhou'];
        let finalAssigneeList = [...PREDEFINED_ASSIGNEES];

        function renderProjects(filterText = '') {
            const listEl = document.getElementById('project-dropdown-list');
            let filtered = PROJECT_LIST.filter(p => p.toLowerCase().includes(filterText.toLowerCase()));
            let html = '';
            if(filtered.length === 0) {
                html = `<div class="px-4 py-3 text-[13px] text-zinc-500 cursor-default">将直接使用您的手写输入 "${filterText}"</div>`;
            } else {
                filtered.forEach(p => {
                    html += `<div class="px-4 py-2.5 text-[13px] text-zinc-300 hover:bg-indigo-500/20 hover:text-indigo-300 cursor-pointer transition-colors" onmousedown="selectProject('${p}')">${p}</div>`;
                });
            }
            listEl.innerHTML = html;
        }

        window.selectProject = function(val) {
            document.getElementById('req-project').value = val;
            document.getElementById('project-dropdown').classList.add('hidden');
        }
        window.showProjectDropdown = function() {
            renderProjects(document.getElementById('req-project').value);
            document.getElementById('project-dropdown').classList.remove('hidden');
            document.getElementById('assignee-dropdown').classList.add('hidden');
        }
        window.filterProjectDropdown = function() {
            renderProjects(document.getElementById('req-project').value);
        }

        window.renderAssignees = function(filterText = '') {
            const listEl = document.getElementById('assignee-dropdown-list');
            if(!listEl) return;
            let filtered = finalAssigneeList.filter(name => name.toLowerCase().includes(filterText.toLowerCase()));
            let html = '';
            if ('不指定 (系统统筹)'.includes(filterText)) {
                html += `<div class="px-4 py-3 text-[13px] text-zinc-300 hover:bg-indigo-500/20 hover:text-indigo-300 cursor-pointer transition-colors border-b border-zinc-800" onmousedown="selectAssignee('none', '不指定 (系统统筹)')">不指定 (系统统筹)</div>`;
            }
            if (filtered.length === 0 && !('不指定 (系统统筹)'.includes(filterText))) {
                html += `<div class="px-4 py-3 text-[13px] text-zinc-500 cursor-default">系统无此执行人，不可指派</div>`;
            } else {
                filtered.forEach(name => {
                    html += `<div class="px-4 py-2.5 text-[13px] text-zinc-300 hover:bg-indigo-500/20 hover:text-indigo-300 cursor-pointer transition-colors" onmousedown="selectAssignee('${name}', '${name}')">${name}</div>`;
                });
            }
            listEl.innerHTML = html;
        }

        window.loadAssigneesFromCloud = async function() {
            if(!window.supabase) return;
            try {
                const { data, error } = await window.supabase.from('user_profiles').select('en_name');
                if(!error && data) {
                    const dbNames = data.map(u => u.en_name).filter(n => n && n !== 'judyzzhang');
                    const mergedSet = new Set([...PREDEFINED_ASSIGNEES, ...dbNames]);
                    finalAssigneeList = Array.from(mergedSet).sort();
                }
            } catch(e) { console.log(e); }
        }

        window.selectAssignee = function(val, text) {
            document.getElementById('req-assignee').value = val;
            document.getElementById('req-assignee-input').value = text;
            document.getElementById('assignee-dropdown').classList.add('hidden');
        }

        window.showAssigneeDropdown = function() {
            renderAssignees('');
            document.getElementById('assignee-dropdown').classList.remove('hidden');
            document.getElementById('project-dropdown').classList.add('hidden');
        }

        window.filterAssigneeDropdown = function() {
            renderAssignees(document.getElementById('req-assignee-input').value);
            document.getElementById('assignee-dropdown').classList.remove('hidden');
        }

        window.validateAssigneeInput = function() {
            setTimeout(() => {
                const inputVal = document.getElementById('req-assignee-input').value.trim();
                const hiddenVal = document.getElementById('req-assignee').value;
                if (inputVal === '' || inputVal === '不指定 (系统统筹)') { selectAssignee('none', '不指定 (系统统筹)'); return; }
                const matchedName = finalAssigneeList.find(n => n.toLowerCase() === inputVal.toLowerCase());
                if (matchedName) { selectAssignee(matchedName, matchedName); } 
                else {
                    const prevVal = hiddenVal === 'none' ? '不指定 (系统统筹)' : hiddenVal;
                    document.getElementById('req-assignee-input').value = prevVal;
                }
            }, 150); 
        }

        function toggleOtherInput() {
            const otherCb = document.getElementById('channel-other-cb');
            const otherContainer = document.getElementById('other-channel-input-container');
            if(otherCb && otherCb.checked) {
                otherContainer.classList.remove('hidden');
                document.getElementById('req-channel-other').focus();
            } else {
                otherContainer.classList.add('hidden');
                document.getElementById('req-channel-other').value = ''; 
            }
        }

        function handleFileSelect(event) {
            const fileList = event.target.files;
            const uploadZone = document.getElementById('upload-zone');
            const uploadText = document.getElementById('upload-text');
            if(fileList.length > 0) {
                let file = fileList[0];
                let fileName = file.name;
                const reader = new FileReader();
                reader.onload = function(e) { currentUploadedFileData = e.target.result; };
                reader.readAsDataURL(file); 
                uploadText.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> 已选附件: <span class="font-bold truncate max-w-[120px]">${fileName}</span>`;
                uploadText.className = "text-xs font-medium flex items-center gap-1.5 text-indigo-400 w-full justify-center";
                uploadZone.className = "w-full bg-indigo-500/10 border border-indigo-500/50 rounded-xl px-4 py-2.5 flex flex-col items-center justify-center cursor-pointer transition-colors h-[46px]";
            }
        }

        function resetUploadZone() {
            document.getElementById('real-file-upload').value = '';
            currentUploadedFileData = null; 
            document.getElementById('upload-text').innerHTML = `<svg id="upload-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> 点击选择参考附件...`;
            document.getElementById('upload-text').className = "text-xs font-medium flex items-center gap-2 text-zinc-500";
            document.getElementById('upload-zone').className = "w-full bg-[#09090b] border border-zinc-700 border-dashed rounded-xl px-4 py-2.5 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500 transition-colors h-[46px]";
        }

        function getFileNameFromUI() {
            const uploadTextEl = document.getElementById('upload-text');
            if(uploadTextEl && uploadTextEl.innerText.includes('已选附件:')) { return uploadTextEl.innerText.split('已选附件:')[1].trim(); }
            return '';
        }

        function logout(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('activeUserObj'); 
            window.location.href = 'login.html'; 
        }

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';

            if (!user.perms.includes(PAGE_TYPE)) { alert(`无权限`); logout(); return false; }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-indigo-600'} border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName;
            if(document.getElementById('header-greeting')) document.getElementById('header-greeting').innerText = `上午好，${user.displayName}。`;

            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = '';
                html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#2a2a35] text-indigo-300 cursor-default"><div class="w-7 h-7 rounded-lg bg-indigo-500/20 text-indigo-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-bold">需求方 (当前)</span></div>`;
                if (enName !== 'judyzzhang') { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='assistant-workspace.html'"><div class="w-7 h-7 rounded-lg bg-orange-500/10 text-orange-500 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-medium">设计方 (去执行接单)</span></div>`; 
                }
                if (enName === 'davidxxu' || enName === 'judyzzhang') { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='manager-workspace.html'"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/10 text-fuchsia-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div><span class="text-[13px] font-medium">管理方 (统筹/大盘)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-indigo-400 font-black">•</span> 身份: 需求方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }
            return true;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(!initRBAC()) return;
            renderAssignees();

            const idBtn = document.getElementById('identityBtn');
            const idMenu = document.getElementById('identityMenu');
            if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
            
            const notifBtn = document.getElementById('notifBtn');
            const notifMenu = document.getElementById('notifMenu');
            if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

            document.addEventListener('click', (e) => { 
                if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
                
                const projWrap = document.getElementById('project-wrapper');
                const projDrop = document.getElementById('project-dropdown');
                if (projWrap && projDrop && !projWrap.contains(e.target)) projDrop.classList.add('hidden');
                
                const assWrap = document.getElementById('assignee-wrapper');
                const assDrop = document.getElementById('assignee-dropdown');
                if (assWrap && assDrop && !assWrap.contains(e.target)) assDrop.classList.add('hidden');
            });
        });

        const overlay = document.getElementById('modal-overlay');
        window.openModal = function(modalId, isEdit = false) {
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                document.getElementById(modalId).classList.remove('hidden');
                document.getElementById(modalId).classList.add('modal-enter');
            }, 10);
            if(modalId === 'create-modal' && !isEdit) {
                document.getElementById('req-short-title').value = '';
                document.getElementById('req-title').value = '';
                document.getElementById('req-project').value = '';
                document.getElementById('req-assignee').value = 'none';
                const assInput = document.getElementById('req-assignee-input');
                if(assInput) assInput.value = '';
                document.getElementById('req-date').value = '';
                document.getElementById('req-link').value = '';
                document.querySelectorAll('.req-channel').forEach(cb => cb.checked = false);
                document.getElementById('channel-other-cb').checked = false;
                toggleOtherInput();
                resetUploadZone();
            }
        }
        
        window.closeAllModals = function() {
            overlay.classList.add('opacity-0');
            const el = document.getElementById('create-modal');
            if(el) { el.classList.remove('modal-enter'); el.classList.add('hidden'); }
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function showToast(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            const icon = document.getElementById('toast-icon');
            if(type === 'info') {
                icon.className = "w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            } else if(type === 'error') {
                icon.className = "w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else {
                icon.className = "w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            }
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            const bellDot = document.getElementById('bell-dot');
            if (bellDot) { bellDot.classList.remove('bg-rose-500', 'animate-pulse', 'border-[#141417]'); bellDot.classList.add('bg-zinc-600', 'border-transparent', 'hidden'); }
            showToast('消息已清空', '所有未读消息已成功标记为已读。', 'info');
        }

        // ================= 核心一：草稿箱渲染与置顶 =================
        function renderDraftToUI() {
            const savedDraft = localStorage.getItem('myDraftTask');
            const container = document.getElementById('ongoing-tasks-container');
            if(!container) return;
            
            const existingDraft = document.getElementById('draft-card');
            if(existingDraft) existingDraft.remove();
            
            if (savedDraft) {
                const draft = JSON.parse(savedDraft);
                const draftHTML = `
                    <div class="task-page-1 border-indigo-700 border-dashed rounded-2xl p-5 interactive-card flex flex-col bg-indigo-900/10 relative group mb-4" onclick="editDraft()" id="draft-card">
                        <button onclick="deleteDraft(event, this)" class="absolute top-4 right-4 text-zinc-500 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all p-1.5 hover:bg-rose-500/10 rounded-lg btn-press z-20" title="删除草稿"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                        <div class="flex items-center justify-between mb-3 pr-8 relative z-10"><span class="text-indigo-400 font-bold text-[10px] border border-indigo-700 bg-indigo-500/20 px-2.5 py-0.5 rounded shadow-[0_0_10px_rgba(99,102,241,0.3)]">📝 需求待提交 (草稿置顶)</span><span class="text-[11px] text-indigo-400 font-bold opacity-0 group-hover:opacity-100 transition-opacity">继续编辑 ↗</span></div>
                        <h4 class="text-[16px] font-medium text-white mb-1 pr-8 relative z-10">${draft.title || '无标题草稿'}</h4>
                        <p class="text-xs text-zinc-400 line-clamp-1 relative z-10">点击恢复表单数据、渠道及附件并继续完善。</p>
                    </div>
                `;
                container.insertAdjacentHTML('afterbegin', draftHTML); // 保证永远在最前面
            }
        }

        window.saveDraft = function() { 
            const shortTitle = document.getElementById('req-short-title').value.trim();
            const fullDesc = document.getElementById('req-title').value.trim();
            if(!shortTitle || !fullDesc) return showToast('暂存失败', '请至少填写标题和需求描述！', 'error');
            
            const selectedChannels = Array.from(document.querySelectorAll('.req-channel:checked')).map(cb => cb.value);
            const otherChannelText = document.getElementById('req-channel-other').value;

            const draftData = { 
                title: shortTitle, fullText: fullDesc, project: document.getElementById('req-project').value, 
                assignee: document.getElementById('req-assignee').value, date: document.getElementById('req-date').value, 
                link: document.getElementById('req-link').value, channels: selectedChannels,
                otherChannel: otherChannelText, fileName: getFileNameFromUI(), fileData: currentUploadedFileData, time: new Date().getTime() 
            };
            
            try {
                localStorage.setItem('myDraftTask', JSON.stringify(draftData));
                closeAllModals(); 
                showToast('📝 暂存成功', '草稿与附件已保存，始终置顶。', 'info'); 
                
                // 瞬间渲染草稿，隐藏空状态提示
                renderDraftToUI();
                const spinner = document.getElementById('loading-spinner');
                if(spinner) spinner.classList.add('hidden');

            } catch (e) {
                alert("【存储失败】附件过大超出浏览器本地存储限制，请更换小文件。");
            }
        }

        window.editDraft = function() {
            document.getElementById('modal-title-text').innerText = '继续编辑草稿';
            const draftStr = localStorage.getItem('myDraftTask');
            if(draftStr) {
                const draft = JSON.parse(draftStr);
                document.getElementById('req-short-title').value = draft.title || '';
                document.getElementById('req-title').value = draft.fullText || '';
                document.getElementById('req-project').value = draft.project || '';
                
                const assVal = draft.assignee || 'none';
                document.getElementById('req-assignee').value = assVal;
                const assInput = document.getElementById('req-assignee-input');
                if(assInput) assInput.value = assVal === 'none' ? '不指定 (系统统筹)' : assVal;
                
                document.getElementById('req-date').value = draft.date || '';
                document.getElementById('req-link').value = draft.link || '';
                
                if(draft.channels) {
                    document.querySelectorAll('.req-channel').forEach(cb => { cb.checked = draft.channels.includes(cb.value); });
                    toggleOtherInput();
                    if(draft.otherChannel) document.getElementById('req-channel-other').value = draft.otherChannel;
                }

                if(draft.fileName && draft.fileData) {
                    currentUploadedFileData = draft.fileData;
                    const uploadText = document.getElementById('upload-text');
                    const uploadZone = document.getElementById('upload-zone');
                    uploadText.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> 已选附件: <span class="font-bold truncate max-w-[120px]">${draft.fileName}</span>`;
                    uploadText.className = "text-xs font-medium flex items-center gap-1.5 text-indigo-400 w-full justify-center";
                    uploadZone.className = "w-full bg-indigo-500/10 border border-indigo-500/50 rounded-xl px-4 py-2.5 flex flex-col items-center justify-center cursor-pointer transition-colors h-[46px]";
                }
            }
            openModal('create-modal', true);
        }

        window.deleteDraft = function(event, btn) {
            event.stopPropagation(); 
            if(confirm("确定要永久删除这条草稿吗？")) {
                localStorage.removeItem('myDraftTask');
                btn.closest('.interactive-card').remove();
                showToast('已删除', '草稿已永久移除。', 'info');

                // 如果没草稿了，再查一下当前云端数据，如果没有云端卡片则显示空状态
                const ongoingContainer = document.getElementById('ongoing-tasks-container');
                const realCards = ongoingContainer.querySelectorAll('.interactive-card:not(#draft-card)');
                if(realCards.length === 0) {
                    ongoingContainer.innerHTML = `
                        <div class="text-center py-20 bg-[#121217] rounded-3xl border border-white/5 border-dashed">
                            <div class="w-16 h-16 bg-zinc-800/50 rounded-full flex items-center justify-center mx-auto mb-4 text-zinc-500">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                            </div>
                            <p class="text-sm font-bold text-zinc-400 mb-1">大厅空空如也</p>
                            <p class="text-xs text-zinc-600">快点击右上角发起你的第一个需求吧！</p>
                        </div>`;
                }
            }
        }

        // ================= 核心二：状态UI工厂引擎 =================
        function createTaskHTML(task) {
            let sColor, sBorder, sBg, sText, targetUrl;
            let isCompleted = false;
            let isUrgent = false;

            switch(task.status) {
                case 'pending_accept':
                    sColor = 'text-amber-400'; sBorder = 'border-amber-500/30'; sBg = 'bg-amber-500/10';
                    sText = '已派单，待接单'; targetUrl = 'task-detail-new.html';
                    break;
                case 'pending_approval':
                    sColor = 'text-amber-500'; sBorder = 'border-amber-500/30'; sBg = 'bg-amber-500/10';
                    sText = '框架草图审核中'; targetUrl = 'task-detail-locked.html';
                    break;
                case 'processing':
                    sColor = 'text-emerald-500'; sBorder = 'border-emerald-500/30'; sBg = 'bg-emerald-500/10';
                    sText = '正稿设计制作中'; targetUrl = 'task-detail-processing.html';
                    break;
                case 'reviewing':
                    sColor = 'text-rose-500'; sBorder = 'border-rose-500/30'; sBg = 'bg-rose-500/10';
                    sText = '交付方案待您确认'; targetUrl = 'task-detail-v1.html'; 
                    isUrgent = true;
                    break;
                case 'completed':
                case 'archived':
                    sColor = 'text-zinc-400'; sBorder = 'border-zinc-700'; sBg = 'bg-zinc-800';
                    sText = '验收通过，已归档'; targetUrl = 'task-detail-archived.html';
                    isCompleted = true;
                    break;
                default: // pending
                    sColor = 'text-sky-400'; sBorder = 'border-sky-500/30'; sBg = 'bg-sky-500/10';
                    sText = '等待系统统筹分配'; targetUrl = 'task-detail-new.html';
            }

            const alertBadge = isUrgent ? `<div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl shadow-lg flex items-center gap-1 z-10"><span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> 临期预警</div>` : '';
            const urgentClass = isUrgent ? 'urgent-breathe' : '';
            
            // HTML 卡片构造
            const cardHTML = `
                <div class="task-page-1 rounded-2xl p-5 interactive-card flex flex-col relative overflow-hidden bg-[#18181b] ${sBorder} cursor-pointer mb-4 ${isCompleted ? 'opacity-60' : urgentClass}" id="card-${task.id}" onmouseenter="previewTask('${task.id}', '${task.title}', '${sColor}')" onclick="window.location.href='${targetUrl}'">
                    ${alertBadge}
                    <div class="flex items-center justify-between mb-3 mt-1 relative z-10">
                        <div class="flex gap-3 items-center">
                            <span class="font-mono text-[10px] font-bold ${sColor} ${sBg} px-2 py-0.5 rounded border border-white/10">${task.id}</span>
                            <span class="text-xs ${sColor} font-bold tracking-wide">${sText}</span>
                        </div>
                        <span class="text-[11px] ${sColor} font-bold opacity-0 group-hover:opacity-100 transition-opacity">查看详情 ↗</span>
                    </div>
                    <h4 class="text-[17px] font-bold text-zinc-100 mb-2 relative z-10">${task.title}</h4>
                    ${isCompleted ? '' : `<p class="text-xs text-zinc-400 mb-4 line-clamp-1 relative z-10">${task.full_desc || ''}</p>`}
                    <div class="flex items-center justify-between text-[11px] text-zinc-400 border-t border-white/5 pt-3 relative z-10">
                        <span>归属: ${task.project}</span>
                        <span>执行人: ${task.assignee === 'none' ? '待定' : task.assignee}</span>
                        <span class="${isCompleted ? 'text-zinc-500' : 'text-rose-500 font-bold'}">期望交付: ${task.due_date}</span>
                    </div>
                </div>
            `;

            let strokeColor = sColor.split('-')[1] || 'sky';
            if(strokeColor === 'zinc') strokeColor = 'gray'; // Tailwind fallback
            
            const iconHtml = (task.status === 'reviewing' || isCompleted) ? '' : `<svg class="animate-spin h-3 w-3 ${sColor}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            const timelineHTML = `
                <div id="timeline-${task.id}" class="relative z-10 hidden" data-col="${sColor}" data-title="${task.title}">
                    <div class="timeline-item relative flex gap-4 z-10 pb-6">
                        <div class="timeline-line"></div>
                        <div class="w-7 h-7 rounded-full bg-[#121217] border-[2px] border-${strokeColor}-500 flex items-center justify-center shrink-0 z-10 shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                            ${iconHtml || `<div class="w-2 h-2 bg-${strokeColor}-500 rounded-full"></div>`}
                        </div>
                        <div class="pt-0.5">
                            <p class="text-[13px] font-bold ${sColor} mb-0.5">${sText}</p>
                            <p class="text-[10px] text-zinc-500">${task.summary_desc || '系统跟踪中'}</p>
                        </div>
                    </div>
                    <div class="timeline-item relative flex gap-4 z-10 pb-2 opacity-40 grayscale hover:opacity-100 hover:grayscale-0 transition-all duration-300">
                        <div class="timeline-line"></div>
                        <div class="w-7 h-7 rounded-full bg-[#121217] border-[2px] border-zinc-500 flex items-center justify-center shrink-0 z-10">
                            <div class="w-2 h-2 bg-zinc-500 rounded-full"></div>
                        </div>
                        <div class="pt-0.5">
                            <p class="text-[13px] font-bold text-zinc-300 mb-0.5">需求发单成功</p>
                            <p class="text-[10px] text-zinc-500">发起人: ${task.creator || '系统'}</p>
                            ${task.file_name ? `<p class="text-[10px] text-indigo-400 mt-1 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> 附件已存入云端</p>` : ''}
                        </div>
                    </div>
                </div>
            `;

            return { cardHTML, timelineHTML, isCompleted };
        }

        // ================= 核心三：云端无感加载与智能排序 =================
        window.loadTasksFromCloud = async function() {
            if (!window.supabase) {
                const spinner = document.getElementById('loading-spinner');
                if(spinner) spinner.innerHTML = '<p class="text-sm font-bold text-zinc-400 mb-1">大厅空空如也</p><p class="text-xs text-zinc-600">快点击右上角发起你的第一个需求吧！</p>';
                return;
            }
            
            const { data, error } = await window.supabase.from('tasks').select('*');
            if (error) return console.error(error);

            // 分发池子
            const ongoing = [];
            const completed = [];
            
            data.forEach(t => {
                if (t.status === 'completed' || t.status === 'archived') completed.push(t);
                else ongoing.push(t);
            });

            // 【智能权重排序机制】优先级规则：reviewing(1) > pending(2) > pending_accept(3) > pending_approval(4) > processing(5)
            const weights = { 'reviewing': 1, 'pending': 2, 'pending_accept': 3, 'pending_approval': 4, 'processing': 5 };
            
            ongoing.sort((a, b) => {
                const wA = weights[a.status] || 99;
                const wB = weights[b.status] || 99;
                if (wA !== wB) return wA - wB; // 不同状态按权重排
                return new Date(b.created_at) - new Date(a.created_at); // 同状态按时间倒序
            });
            
            completed.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // 构建最终的 DOM
            let ongoingCardsHTML = '';
            let completedCardsHTML = '';
            let timelinesHTML = '';

            ongoing.forEach(task => {
                const res = createTaskHTML(task);
                ongoingCardsHTML += res.cardHTML;
                timelinesHTML += res.timelineHTML;
            });

            completed.forEach(task => {
                const res = createTaskHTML(task);
                completedCardsHTML += res.cardHTML;
                timelinesHTML += res.timelineHTML;
            });

            const ongoingContainer = document.getElementById('ongoing-tasks-container');
            const completedContainer = document.getElementById('completed-tasks-container');
            const timelineContainer = document.getElementById('all-timelines-container');

            // 清理容器但避免闪烁
            ongoingContainer.innerHTML = '';
            timelineContainer.innerHTML = timelinesHTML;

            // 1. 永远先渲染本地草稿在最上面
            renderDraftToUI();
            
            // 2. 追加排序好的真实进行中数据
            if (ongoing.length === 0 && !localStorage.getItem('myDraftTask')) {
                ongoingContainer.innerHTML = `
                    <div class="text-center py-20 bg-[#121217] rounded-3xl border border-white/5 border-dashed">
                        <div class="w-16 h-16 bg-zinc-800/50 rounded-full flex items-center justify-center mx-auto mb-4 text-zinc-500">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                        </div>
                        <p class="text-sm font-bold text-zinc-400 mb-1">大厅空空如也</p>
                        <p class="text-xs text-zinc-600">快点击右上角发起你的第一个需求吧！</p>
                    </div>`;
            } else {
                ongoingContainer.insertAdjacentHTML('beforeend', ongoingCardsHTML);
            }

            // 3. 追加已完结数据
            if (completed.length === 0) {
                completedContainer.innerHTML = `<div class="text-center py-8 text-zinc-600 text-sm">暂无已完结/归档的工单</div>`;
            } else {
                completedContainer.innerHTML = completedCardsHTML;
            }

            // 4. 自动聚焦第一个有效视图
            if (localStorage.getItem('myDraftTask')) {
                previewTask('draft-card', '草稿', 'text-indigo-400');
            } else if (ongoing.length > 0) {
                const firstTask = ongoing[0];
                const sColor = firstTask.status === 'reviewing' ? 'text-rose-500' : (firstTask.status === 'pending_accept' ? 'text-amber-400' : 'text-sky-400');
                previewTask(firstTask.id, firstTask.title, sColor);
            }
        }

        // ================= 核心四：无刷新秒出写入逻辑 =================
        window.submitNewReq = async function() {
            if(!window.supabase) return alert("云端服务仍在初始化，请稍等！");

            const shortTitle = document.getElementById('req-short-title').value.trim();
            const fullDesc = document.getElementById('req-title').value.trim();
            const projectVal = document.getElementById('req-project').value.trim();
            const assigneeVal = document.getElementById('req-assignee').value;
            const dateInput = document.getElementById('req-date').value;

            if(!shortTitle || !fullDesc || !projectVal || !dateInput) return alert("【校验失败】带星号的为必填项！");
            
            const selectedChannels = Array.from(document.querySelectorAll('.req-channel:checked')).map(cb => cb.value);
            const otherChannelText = document.getElementById('req-channel-other').value.trim();
            if(otherChannelText) selectedChannels.push('其他: ' + otherChannelText);
            
            const linkInput = document.getElementById('req-link').value || '';
            
            let finalStatus = 'pending';
            let finalDesc = '系统正在进行统筹评估，等待分配。';
            if (assigneeVal !== 'none' && assigneeVal !== '') {
                finalStatus = 'pending_accept'; 
                const assigneeName = document.getElementById('req-assignee-input').value;
                finalDesc = `已直接指派给设计师 ${assigneeName}，等待接单。`;
            }

            const activeUserStr = localStorage.getItem('activeUserObj');
            const creatorName = activeUserStr ? JSON.parse(activeUserStr).displayName : '未知提交者';
            const randomId = 'TK-' + Math.floor(Math.random() * 9000 + 1000);

            const btn = document.querySelector('button[onclick="submitNewReq()"]');
            const originalText = btn.innerText;
            btn.innerText = "数据同步云端中...";
            btn.disabled = true;

            const fakeTask = {
                id: randomId, title: shortTitle, full_desc: fullDesc, summary_desc: finalDesc, project: projectVal,
                due_date: dateInput, assignee: assigneeVal, link: linkInput, channels: selectedChannels,
                file_name: getFileNameFromUI(), file_data: currentUploadedFileData, status: finalStatus, creator: creatorName,
                created_at: new Date().toISOString()
            };

            // 1. 发送云端请求
            const { error } = await window.supabase.from('tasks').insert([fakeTask]);

            btn.innerText = originalText;
            btn.disabled = false;

            if (error) return alert("云端写入失败: " + error.message);

            // 2. 本地乐观处理
            localStorage.removeItem('myDraftTask');
            
            // 临时存一下供详情页读取
            localStorage.setItem('myNewTask', JSON.stringify({
                id: randomId, title: shortTitle, fullDesc: fullDesc, desc: finalDesc, project: projectVal,
                date: dateInput, assignee: assigneeVal, link: linkInput, channels: selectedChannels,
                fileName: getFileNameFromUI(), fileData: currentUploadedFileData, status: finalStatus, time: new Date().getTime() 
            }));

            closeAllModals();
            
            const successOverlay = document.getElementById('success-overlay'); 
            const successContent = document.getElementById('success-content'); 
            const checkPath = document.querySelector('.success-check-path');
            
            successOverlay.classList.remove('hidden'); 
            void successOverlay.offsetWidth; 
            successOverlay.classList.remove('opacity-0'); 
            successContent.classList.remove('scale-95', 'opacity-0'); 
            checkPath.classList.add('animate-check-draw');

            // 💡 3. 不刷新网页！执行无感云端重载！
            setTimeout(async () => {
                await window.loadTasksFromCloud(); // 瞬间重绘排好序的大厅
                successOverlay.classList.add('opacity-0');
                successContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    successOverlay.classList.add('hidden');
                    // 强制焦点回到新提交的单据
                    const sCol = finalStatus === 'pending_accept' ? 'text-amber-400' : 'text-sky-400';
                    previewTask(randomId, shortTitle, sCol);
                    document.getElementById('card-' + randomId)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }, 1200);
        }

        // ================= 悬浮预览逻辑 =================
        window.previewTask = function(taskId, title = '', colorClass = '') {
            document.querySelectorAll('.interactive-card').forEach(el => el.classList.remove('active-card'));
            const targetCard = document.getElementById('card-' + taskId);
            if(targetCard) targetCard.classList.add('active-card');
            
            document.querySelectorAll('[id^="timeline-"]').forEach(el => el.classList.add('hidden'));
            const timeline = document.getElementById('timeline-' + taskId);
            if(timeline) {
                timeline.classList.remove('hidden');
                const focusEl = document.getElementById('tracking-focus-text');
                if(focusEl) {
                    focusEl.innerText = `${taskId} (${timeline.dataset.title || title})`;
                    focusEl.className = `${timeline.dataset.col || colorClass} font-mono font-bold`;
                }
            } else if (taskId === 'draft-card') {
                const focusEl = document.getElementById('tracking-focus-text');
                if(focusEl) {
                    focusEl.innerText = `草稿 (暂存中)`;
                    focusEl.className = `text-indigo-400 font-mono font-bold`;
                }
            }
        }
    </script>
</body>
