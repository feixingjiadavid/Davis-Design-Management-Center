<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求排号大厅 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        .modal-enter { animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { 0% { opacity: 0; transform: scale(0.97) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .interactive-card { transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.04); background-color: #121217; }
        .interactive-card:hover { transform: translateY(-2px); background-color: #18181b; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .active-card { background-color: #18181b !important; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02); }

        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .pill-checkbox:checked + div { background-color: rgba(99, 102, 241, 0.15); border-color: #6366f1; color: #818cf8; font-weight: 600; }
        .pill-radio:checked + div { background-color: rgba(99, 102, 241, 0.15); border-color: #6366f1; color: #818cf8; font-weight: 600; }
        
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        @keyframes pulse-rose { 50% { box-shadow: inset 0 0 0 1px rgba(244,63,94,0.6), 0 0 20px rgba(244,63,94,0.3); } }
        .breathe-rose { animation: pulse-rose 2s infinite ease-in-out; border-color: rgba(244,63,94,0.8) !important; }

        .timeline-line { position: absolute; left: 13px; top: 12px; bottom: -20px; width: 2px; background-color: rgba(255,255,255,0.05); z-index: 0; }
        .timeline-item:last-child .timeline-line { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-indigo-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 right-1/4 w-[800px] h-[600px] bg-indigo-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-bold text-[14px]">需求排号大厅</span>
            </button>
            <button onclick="window.location.href='record-list.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                <span class="font-medium text-[14px]">我的提单记录</span>
            </button>
            <button onclick="window.location.href='calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="font-medium text-[14px]">我的需求日历</span>
            </button>
        </div>

        <div class="px-5 py-5 mt-auto border-t border-white/5 bg-[#09090b] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg">?</div>
                <div><p id="sidebar-name" class="text-xs font-bold text-white mb-0.5">加载中...</p><p id="sidebar-role" class="text-[10px] text-zinc-500">读取中</p></div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="openPwdModal()" class="p-2 text-zinc-500 hover:text-indigo-400 hover:bg-indigo-500/10 rounded-lg transition-colors btn-press" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="logout(event)" class="p-2 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10">
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl relative z-[999]">
            <div>
                <h2 id="header-greeting" class="text-2xl font-bold text-white tracking-tight mb-1.5">上午好，加载中...</h2>
                <p class="text-xs text-zinc-500">所有的工作都在有条不紊地推进中。</p>
            </div>
            
            <div class="flex items-center gap-5 relative">
                <button id="clear-db-btn" onclick="clearTestData()" class="hidden bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 text-rose-500 px-4 py-3 rounded-[14px] text-[13px] font-bold transition-all btn-press items-center gap-1.5" title="仅清空提单数据，不影响账号">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    清空测试数据
                </button>

                <div class="relative z-[120]" id="notif-wrapper">
                    <button id="notifBtn" class="w-11 h-11 rounded-2xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="bell-dot" class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                    </button>
                    <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                        <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                            <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                            <button onclick="window.markAllAsRead(event)" class="text-[11px] text-indigo-400 hover:text-indigo-300 btn-press transition-colors">全部已读</button>
                        </div>
                        <div class="max-h-[300px] overflow-y-auto custom-scrollbar">
                            <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>
                        </div>
                        <div class="pt-3 px-5 border-t border-white/5 text-center">
                            <button onclick="window.location.href='message-center.html?role=req'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                        </div>
                    </div>
                </div>

                <div class="relative" id="identity-wrapper">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-5 py-3 rounded-[14px] flex items-center gap-3 text-[13px] font-medium hover:bg-[#1a1a1f] transition-colors btn-press">
                        身份加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>

                <button onclick="openModal('create-modal', false)" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-[14px] text-[14px] font-bold shadow-[0_5px_15px_rgba(79,70,229,0.25)] transition-all flex items-center gap-2 btn-press">
                    + 发起新需求
                </button>
            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-hidden flex justify-center">
            <div class="flex gap-10 h-full items-start w-full max-w-[1280px]">
                
                <div class="w-full max-w-[800px] flex flex-col h-full min-w-0 pb-4 shrink-0">
                    <div class="bg-[#1a1306] border border-amber-600/30 rounded-2xl p-5 mb-6 flex items-start gap-4 shrink-0">
                        <div class="text-amber-500 mt-0.5">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        </div>
                        <div>
                            <h4 class="text-[13px] font-bold text-amber-500 mb-1">系统提单必读规则 (当前为测试数据库)</h4>
                            <p class="text-[12px] text-amber-500/80 leading-relaxed font-medium">
                                欢迎进入真实数据大厅。首创核心视觉请指派给【文哥/资深设计】；延展与部门排版指派给【文员】。您的所有需求将严格按优先级顺序流转。
                            </p>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
                        <div class="flex-1 overflow-y-auto custom-scrollbar pr-3 space-y-8" id="tasks-scroll-area">
                            
                            <div>
                                <h3 class="text-sm font-bold text-indigo-400 flex items-center gap-2.5 mb-4">
                                    <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full shadow-[0_0_8px_#6366f1]"></span>我的进行中工单
                                </h3>
                                
                                <div class="space-y-4 transition-opacity duration-300" id="ongoing-tasks-container">
                                    <div id="dynamic-draft-anchor"></div>
                                    <div class="text-center py-10" id="loading-spinner">
                                        <p class="text-sm text-zinc-500 flex justify-center items-center gap-2"><svg class="animate-spin h-4 w-4 text-zinc-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 数据正在载入中...</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-8 pt-8 border-t border-white/5">
                                <h3 class="text-sm font-bold text-zinc-400 flex items-center gap-2.5 mb-4 shrink-0">
                                    <span class="w-1.5 h-1.5 bg-zinc-500 rounded-full"></span>已完结/归档工单
                                </h3>
                                <div class="space-y-4 transition-opacity duration-300" id="completed-tasks-container">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="w-[310px] bg-[#121217] border border-white/5 rounded-3xl p-6 flex flex-col h-full shadow-2xl shrink-0">
                    <div class="mb-6 shrink-0 border-b border-white/5 pb-5">
                        <div class="flex items-center justify-between mb-2.5">
                            <h3 class="text-[14px] font-bold text-white flex items-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                                状态跟踪
                            </h3>
                        </div>
                        <p class="text-[11px] text-zinc-500">当前预览: <span class="text-zinc-400 font-mono font-bold" id="tracking-focus-text">无选中的单据</span></p>
                    </div>
                    <div class="relative flex-1 custom-scrollbar pointer-events-none" id="all-timelines-container">
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeAllModals()">
        <div id="create-modal" class="hidden w-full max-w-4xl bg-[#121217] border border-zinc-800 rounded-3xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="px-8 py-5 border-b border-zinc-800 flex justify-between items-center bg-[#09090b]/50">
                <h2 class="text-lg font-bold text-white tracking-tight" id="modal-title-text">起草新设计需求 (测试环境)</h2>
                <button onclick="closeAllModals()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1.5 transition-colors btn-press"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            
            <div class="flex-1 p-8 overflow-y-auto space-y-7 custom-scrollbar">
                <div>
                    <label class="block text-[13px] font-bold text-zinc-300 mb-2">1. 需求标题 <span class="text-rose-500">*</span></label>
                    <input type="text" id="req-short-title" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="例如：年度大会主视觉设计">
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-zinc-300 mb-2">2. 需求描述 <span class="text-rose-500">*</span></label>
                    <textarea id="req-title" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors resize-none h-28 custom-scrollbar" placeholder="请详细说明设计内容、背景、目标受众、尺寸要求等细节..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">3. 产出类型 <span class="text-rose-500">*</span></label>
                        <div class="flex gap-2">
                            <label class="cursor-pointer flex-1"><input type="radio" name="rt" class="hidden pill-radio" checked><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-xs py-3 rounded-lg text-center transition-colors">平面视觉</div></label>
                            <label class="cursor-pointer flex-1"><input type="radio" name="rt" class="hidden pill-radio"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-xs py-3 rounded-lg text-center transition-colors">视频动效</div></label>
                        </div>
                    </div>
                    <div class="relative" id="project-wrapper">
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">4. 归属项目 <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <input type="text" id="req-project" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-zinc-300 outline-none focus:border-indigo-500 transition-colors" placeholder="-- 请下拉选择或输入检索 --" autocomplete="off" onfocus="showProjectDropdown()" oninput="filterProjectDropdown()">
                        </div>
                        <div id="project-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.8)] z-[99999] max-h-56 overflow-y-auto custom-scrollbar py-2">
                            <div id="project-dropdown-list"></div>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-zinc-300 mb-2">5. 期望分发渠道 (可多选) <span class="text-rose-500">*</span></label>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer"><input type="checkbox" value="企业号" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">企业号</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="其他" id="channel-other-cb" class="hidden pill-checkbox req-channel" onchange="toggleOtherInput()"><div class="border border-zinc-700 bg-[#09090b] text-zinc-400 text-[11px] px-4 py-2 rounded-full transition-colors">其他</div></label>
                    </div>
                    <div id="other-channel-input-container" class="mt-3 hidden">
                        <input type="text" id="req-channel-other" placeholder="请手写填入具体渠道名称..." class="w-full bg-[#09090b] border border-zinc-700 border-dashed rounded-xl px-4 py-2.5 text-sm text-zinc-300 outline-none focus:border-indigo-500 transition-colors">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="relative" id="assignee-wrapper">
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">6. 期望执行人 <span class="text-rose-500">*</span></label>
                        <input type="hidden" id="req-assignee" value="none">
                        <div class="relative">
                            <input type="text" id="req-assignee-input" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-zinc-300 outline-none focus:border-indigo-500 transition-colors cursor-pointer" placeholder="输入英文名检索或下拉选择..." autocomplete="off" onfocus="showAssigneeDropdown()" oninput="filterAssigneeDropdown()" onblur="validateAssigneeInput()">
                        </div>
                        <div id="assignee-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.8)] z-[99999] max-h-56 overflow-y-auto custom-scrollbar py-2">
                            <div id="assignee-dropdown-list"></div>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">7. 期望交付日 <span class="text-rose-500">*</span></label>
                        <input type="date" id="req-date" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-white outline-none transition-colors" style="color-scheme: dark;">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 pt-2">
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">8. 需求参考链接 (选填)</label>
                        <input type="url" id="req-link" placeholder="如腾讯文档地址..." class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-[13px] font-bold text-zinc-300 mb-2">9. 本地附件上传 (选填)</label>
                        <label for="real-file-upload" id="upload-zone" class="w-full bg-[#09090b] border border-zinc-700 border-dashed rounded-xl px-4 py-2.5 flex flex-col items-center justify-center text-zinc-500 cursor-pointer hover:border-indigo-500 transition-colors h-[46px]">
                            <span id="upload-text" class="text-xs font-medium flex items-center gap-2">
                                <svg id="upload-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                点击选择参考附件...
                            </span>
                            <input type="file" id="real-file-upload" class="hidden" onchange="handleFileSelect(event)">
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="p-6 border-t border-zinc-800 bg-[#09090b] flex justify-end items-center rounded-b-3xl gap-4">
                <button onclick="closeAllModals()" class="px-6 py-3 bg-transparent border border-zinc-700 text-zinc-400 hover:text-white rounded-xl text-[13px] font-bold btn-press transition-colors">取消</button>
                <button onclick="saveDraft()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl text-[13px] font-bold btn-press transition-colors">暂存草稿</button>
                <button onclick="submitNewReq()" class="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[14px] font-bold shadow-[0_8px_15px_rgba(79,70,229,0.3)] btn-press transition-all">确认提交</button>
            </div>
        </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        </div>

    <div id="success-overlay" class="fixed inset-0 bg-[#09090b]/95 backdrop-blur-md z-[100000] hidden opacity-0 transition-opacity duration-300 flex flex-col items-center justify-center">
        <div id="success-content" class="flex flex-col items-center transform scale-95 opacity-0 transition-all duration-500 delay-100">
            <div class="w-20 h-20 rounded-full bg-indigo-500/20 border-2 border-indigo-500/50 flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(79,70,229,0.3)]">
                <svg class="w-10 h-10 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path class="success-check-path" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" style="stroke-dasharray: 50; stroke-dashoffset: 50;"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2 tracking-tight">需求提单成功</h2>
            <p class="text-zinc-400 text-sm">系统正在同步至云端...</p>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-indigo-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        window.LIGHT_FIELDS = 'id, title, status, project, due_date, creator, created_at, summary_desc, assignee, history_json';
        if(window.loadTasksFromCloud) window.loadTasksFromCloud();
    </script>

    <script>
        const PAGE_TYPE = 'req'; 
        let currentUploadedFileData = null;

        // ================= 高级弹窗引擎 =================
        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0');
            dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-indigo-500';
                icon.className = 'w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
        }

        function showDialogUI() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); dialog.classList.remove('scale-95'); }, 10);
        }

        window.showAlert = function(title, message, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-indigo-600 hover:bg-indigo-500');
            btnContainer.innerHTML = `<button onclick="closeCustomDialog()" class="w-full py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">我知道了</button>`;
            showDialogUI();
        }

        window.showConfirm = function(title, message, onConfirm, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-indigo-600 hover:bg-indigo-500');
            btnContainer.innerHTML = `
                <button onclick="closeCustomDialog()" class="flex-1 py-2.5 bg-transparent border border-zinc-700 text-zinc-400 hover:text-white rounded-xl text-[13px] font-bold transition-colors btn-press">取消</button>
                <button id="dialog-confirm-btn" class="flex-1 py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">确认执行</button>
            `;
            document.getElementById('dialog-confirm-btn').onclick = () => { closeCustomDialog(); onConfirm(); };
            showDialogUI();
        }

        // ================= 基础交互库 =================
        function logout(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('activeUserObj'); 
            window.location.href = 'login.html'; 
        }

        function updateGreeting(user) {
            const hour = new Date().getHours();
            let timeStr = '晚上好';
            if (hour >= 5 && hour < 12) timeStr = '上午好';
            else if (hour >= 12 && hour < 18) timeStr = '下午好';
            const display = user.displayName || user.cnName || user.enName;
            document.getElementById('header-greeting').innerText = `${timeStr}，${display}。`;
        }

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';

            if (!(user.perms || []).includes(PAGE_TYPE)) { showAlert("权限错误", "无权限", "danger"); logout(); return false; }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar || '?'; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-indigo-600'} border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            
            updateGreeting(user);

            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#2a2a35] text-indigo-300 cursor-default"><div class="w-7 h-7 rounded-lg bg-indigo-500/20 text-indigo-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-bold">需求方视角 (当前)</span></div>`;
                if ((user.perms || []).includes('design')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='assistant-workspace.html'"><div class="w-7 h-7 rounded-lg bg-orange-500/10 text-orange-500 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-medium">设计方视角 (去接单)</span></div>`; 
                }
                if ((user.perms || []).includes('admin')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='manager-workspace.html'"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/10 text-fuchsia-400 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div><span class="text-[13px] font-medium">管理方视角 (统筹大盘)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }
            return true;
        }

        window.showToast = function(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            const icon = document.getElementById('toast-icon');
            if(type === 'success') {
                icon.className = "w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else if(type === 'info') {
                icon.className = "w-8 h-8 rounded-full bg-amber-500/20 text-amber-400 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            } else {
                icon.className = "w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            }
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        window.clearTestData = async function() {
            if(!window.supabase) return;
            showConfirm("清空数据", "⚠️ 警告：这将直接清空云端测试表中的所有需求数据！且不可恢复！<br><br>确定要继续吗？", async () => {
                try {
                    const { error } = await window.supabase.from(window.DB_TABLE).delete().neq('id', '0');
                    if (error) throw error;
                    showToast('已清空', '云端测试数据已全部清空！', 'success');
                    setTimeout(() => window.location.reload(), 1500);
                } catch(e) { showAlert("清理失败", e.message, "danger"); }
            }, "danger");
        }

        window.cancelTask = async function(taskId) {
            if(!window.supabase) return;
            showConfirm("确认撤销", `确定要彻底撤销并删除需求单 ${taskId} 吗？此操作不可恢复。`, async () => {
                try {
                    const { error } = await window.supabase.from(window.DB_TABLE).delete().eq('id', taskId);
                    if (error) throw error;
                    const card = document.getElementById('card-' + taskId);
                    if(card) card.remove();
                    showToast('已撤销', `需求单 ${taskId} 已被彻底删除。`, 'info');
                    setTimeout(async () => { await window.loadTasksFromCloud(); }, 300);
                } catch(e) { showAlert("撤销失败", e.message, "danger"); }
            }, "danger");
        }

        // ================= 💡 核心：状态机与路由大脑 =================
        function createTaskHTML(task, currentUser) {
            const currentUserEn = currentUser.enName ? currentUser.enName.toLowerCase() : '';
            const creator = task.creator || '';
            const isOwner = creator === currentUser.displayName || creator === currentUser.cnName || creator === currentUser.enName || creator === currentUserEn;
            
            let isJudy = currentUserEn === 'judyzzhang';
            let isSuperAdmin = currentUserEn === 'davidxxu'; 
            
            // 💡 修复：确保已完结的单子能显示出来
            if(!isOwner && !isSuperAdmin && !(isJudy && ['pending_approval', 'reviewing', 'completed', 'archived', 'terminated'].includes(task.status))) return null;

            let sColor, sText;
            let targetUrl = `task-detail-requester.html?id=${task.id}`; 
            let isUrgent = false;

            if(task.due_date && !['completed','archived','terminated'].includes(task.status)) {
                const due = new Date(task.due_date);
                const today = new Date();
                due.setHours(0,0,0,0); today.setHours(0,0,0,0);
                const diffDays = (due - today) / (1000 * 60 * 60 * 24);
                if(diffDays <= 2 && diffDays >= -999) isUrgent = true;
            }

            switch(task.status) {
                case 'rejected': 
                    sColor = 'text-rose-500'; sText = '需求被打回修改'; 
                    isUrgent = true; 
                    break;
                case 'reviewing': 
                    sColor = 'text-emerald-500'; sText = '方案待验收'; 
                    break;
                case 'pending_accept': 
                    sColor = 'text-amber-400'; sText = '待接单'; 
                    break;
                case 'pending_approval': 
                    sColor = 'text-amber-500'; sText = '框架待审批'; 
                    break;
                case 'processing': 
                    sColor = 'text-orange-500'; sText = '设计制作中'; 
                    break;
                case 'completed': 
                case 'archived': 
                    sColor = 'text-zinc-400'; sText = '已完结'; 
                    break;
                case 'terminated': 
                    sColor = 'text-rose-700'; sText = '已强行终止'; 
                    break;
                default: 
                    sColor = 'text-sky-400'; sText = '待排期/待分配'; 
            }

            const isCompleted = ['completed','archived','terminated'].includes(task.status);
            const borderColBase = isUrgent ? 'rgba(244,63,94,0.7)' : sColor.replace('text-', 'rgba(').replace('sky','56,189,248').replace('amber','251,191,36').replace('emerald','16,185,129').replace('rose','244,63,94').replace('orange','249,115,22').replace('zinc','113,113,122') + ',0.3)';
            const breatheClass = isUrgent ? 'breathe-rose' : '';
            const canCancel = (task.status === 'pending' || task.status === 'pending_accept' || task.status === 'rejected') && isOwner;
            const cancelBtn = canCancel ? `<button onclick="event.stopPropagation(); window.cancelTask('${task.id}')" class="text-[10px] text-rose-500 bg-rose-500/10 px-2 py-0.5 rounded ml-2 hover:bg-rose-500 hover:text-white transition-colors">撤销</button>` : '';

            const iconHtml = (task.status === 'reviewing' || task.status === 'rejected' || isCompleted) ? '' : `<svg class="animate-spin h-3.5 w-3.5 ${sColor}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            const cardHTML = `
                <div class="rounded-2xl p-5 interactive-card flex flex-col relative overflow-hidden bg-[#121217] border ${breatheClass} mb-4 ${isCompleted ? 'opacity-60' : ''}" style="border-color: ${borderColBase}" id="card-${task.id}" onmouseenter="window.previewTask('${task.id}', '${task.title}', '${sColor}')" onclick="window.location.href='${targetUrl}'">
                    ${isUrgent ? '<div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl z-10 animate-pulse">临期预警</div>' : ''}
                    <div class="flex items-center justify-between mb-3 mt-1 relative z-10">
                        <div class="flex gap-2 items-center">
                            <span class="font-mono text-[10px] font-bold ${sColor} bg-white/5 px-2 py-0.5 rounded border border-white/5">${task.id}</span>
                            <span class="text-xs ${sColor} font-bold tracking-wide flex items-center gap-1.5">${iconHtml} ${sText}</span>
                        </div>
                        ${cancelBtn || `<span class="text-[11px] ${sColor} font-bold opacity-0 group-hover:opacity-100 transition-opacity">查看详情 ↗</span>`}
                    </div>
                    <h4 class="text-[17px] font-bold text-zinc-100 mb-2 relative z-10">${task.title}</h4>
                    ${isCompleted ? '' : `<p class="text-xs text-zinc-400 mb-4 line-clamp-1 relative z-10">${task.summary_desc || ''}</p>`}
                    <div class="flex items-center justify-between text-[11px] text-zinc-400 border-t border-white/5 pt-3 relative z-10">
                        <span>归属: ${task.project}</span>
                        <span>执行人: ${task.assignee === 'none' ? '待定' : task.assignee}</span>
                        <span class="${isCompleted ? 'text-zinc-500' : (isUrgent ? 'text-rose-500 font-bold' : 'text-zinc-400')}">期望交付: ${task.due_date}</span>
                    </div>
                </div>
            `;

            let strokeColor = sColor.split('-')[1] || 'sky';
            if(strokeColor === 'zinc') strokeColor = 'gray'; 

            const timelineHTML = `
                <div id="timeline-${task.id}" class="hidden" data-col="${sColor}" data-title="${task.title}">
                    <div class="timeline-item relative flex gap-4 z-10 pb-6">
                        <div class="timeline-line"></div>
                        <div class="w-7 h-7 rounded-full bg-[#121217] border-[2px] border-${strokeColor}-500 flex items-center justify-center shrink-0 z-10 shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                            ${iconHtml || `<div class="w-2 h-2 bg-${strokeColor}-500 rounded-full"></div>`}
                        </div>
                        <div class="pt-0.5">
                            <p class="text-[13px] font-bold ${sColor} mb-0.5">${sText}</p>
                            <p class="text-[10px] text-zinc-500">${task.summary_desc || '系统同步中'}</p>
                        </div>
                    </div>
                    <div class="timeline-item relative flex gap-4 z-10 pb-2 opacity-40 grayscale hover:opacity-100 hover:grayscale-0 transition-all duration-300">
                        <div class="timeline-line"></div>
                        <div class="w-7 h-7 rounded-full bg-[#121217] border-[2px] border-zinc-500 flex items-center justify-center shrink-0 z-10">
                            <div class="w-2 h-2 bg-zinc-500 rounded-full"></div>
                        </div>
                        <div class="pt-0.5">
                            <p class="text-[13px] font-bold text-zinc-300 mb-0.5">需求发单成功</p>
                            <p class="text-[10px] text-zinc-500">发起人: ${task.creator || '系统'}</p>
                        </div>
                    </div>
                </div>
            `;

            return { isCompleted, cardHTML, timelineHTML };
        }

        window.loadTasksFromCloud = async function() {
            if(!window.supabase) return;
            
            const userStr = localStorage.getItem('activeUserObj');
            const currentUser = userStr ? JSON.parse(userStr) : null;
            if(!currentUser) return;
            
            window.renderDraftToUI(); 
            const spinner = document.getElementById('loading-spinner');
            
            try {
                // 💡 修复：确保用数组语法正确拉取所有数据
                const [ongoingRes, completedRes] = await Promise.all([
                    window.supabase.from(window.DB_TABLE).select(window.LIGHT_FIELDS).not('status', 'in', '("completed","archived","terminated")').order('created_at', { ascending: false }),
                    window.supabase.from(window.DB_TABLE).select(window.LIGHT_FIELDS).in('status', ['completed', 'archived', 'terminated']).order('created_at', { ascending: false }).limit(20)
                ]);

                const ongoingC = document.getElementById('ongoing-tasks-container');
                const completedC = document.getElementById('completed-tasks-container');
                const timelineC = document.getElementById('all-timelines-container');

                if(ongoingC) ongoingC.querySelectorAll('.interactive-card:not(#draft-card)').forEach(el => el.remove());
                if(completedC) completedC.innerHTML = ''; 
                if(timelineC) timelineC.innerHTML = '';

                const weights = { 'reviewing': 1, 'rejected': 1.5, 'pending': 2, 'pending_accept': 3, 'pending_approval': 4, 'processing': 5 };
                const ongoingData = ongoingRes.data || [];
                ongoingData.sort((a, b) => (weights[a.status] || 99) - (weights[b.status] || 99));

                ongoingData.forEach(t => {
                    const res = createTaskHTML(t, currentUser);
                    if(res) { 
                        if(ongoingC) ongoingC.insertAdjacentHTML('beforeend', res.cardHTML); 
                        if(timelineC) timelineC.insertAdjacentHTML('beforeend', res.timelineHTML); 
                    }
                });

                const completedData = completedRes.data || [];
                completedData.forEach(t => {
                    const res = createTaskHTML(t, currentUser);
                    if(res) { 
                        if(completedC) completedC.insertAdjacentHTML('beforeend', res.cardHTML); 
                        if(timelineC) timelineC.insertAdjacentHTML('beforeend', res.timelineHTML); 
                    }
                });

                if(spinner) spinner.classList.add('hidden');
                
                if(ongoingC && !ongoingC.querySelector('.interactive-card')) {
                    ongoingC.innerHTML = `
                        <div class="text-center py-20 bg-[#121217] rounded-3xl border border-white/5 border-dashed">
                            <div class="w-16 h-16 bg-zinc-800/50 rounded-full flex items-center justify-center mx-auto mb-4 text-zinc-500">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                            </div>
                            <p class="text-sm font-bold text-zinc-400 mb-1">大厅空空如也</p>
                            <p class="text-xs text-zinc-600">快点击右上角发起你的第一个需求吧！</p>
                        </div>`;
                }

                if(completedC && completedC.innerHTML === '') {
                    completedC.innerHTML = `<div class="text-center py-8 text-zinc-600 text-sm">暂无已完结/归档的工单</div>`;
                }

                if (localStorage.getItem('myDraftTask')) {
                    window.previewTask('draft-card', '草稿', 'text-zinc-400');
                } else if (ongoingData.length > 0) {
                    window.previewTask(ongoingData[0].id, ongoingData[0].title, 'text-sky-400');
                }

            } catch(e) { 
                console.error(e); 
                if(spinner) spinner.classList.add('hidden');
            }
        }

        // ================= 弹窗/其余代码保持一致... (省略已有的发单逻辑等) =================
        // ... [发单、草稿等原有逻辑保持原样] ...
        
        document.addEventListener('DOMContentLoaded', () => {
            if(initRBAC()) {
                const idBtn = document.getElementById('identityBtn');
                const idMenu = document.getElementById('identityMenu');
                if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
                document.addEventListener('click', (e) => { 
                    if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                });
            }
        });
        
        // （为不超出长度，此处略去了发单弹窗、暂存草稿的具体函数，因为这些在此版本并未改动。如果你需要也可将之前的对应函数直接贴入）
    </script>
</body>
