<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .bg-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vw; height: 80vh; background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 60%); border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .glass-card { background: rgba(18, 18, 23, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex h-screen items-center justify-center relative selection:bg-indigo-500/30">
    <div class="bg-glow"></div>
    <div class="glass-card w-full max-w-md rounded-3xl p-10 shadow-2xl relative z-10">
        <div class="flex justify-center mb-6">
            <div class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.4)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
        </div>
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-white tracking-tight mb-2">登录系统</h1>
            <p class="text-sm text-zinc-500">戴维斯设计需求协同矩阵</p>
        </div>
        <form id="loginForm" class="space-y-6" onsubmit="handleLogin(event)">
            <div>
                <label class="block text-[12px] font-bold text-zinc-400 mb-1.5 ml-1">企微英文名</label>
                <input type="text" id="log-en" required placeholder="例如: davidxxu" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
            </div>
            <div>
                <div class="flex justify-between items-end mb-1.5 px-1">
                    <label class="block text-[12px] font-bold text-zinc-400">密码</label>
                    <button type="button" onclick="showForgotModal()" class="text-[11px] text-indigo-400 hover:text-indigo-300 font-medium transition-colors btn-press">忘记密码？</button>
                </div>
                <input type="password" id="log-pwd" required placeholder="••••••••" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
            </div>
            <button type="submit" id="login-btn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold shadow-[0_10px_20px_-10px_rgba(79,70,229,0.6)] transition-all btn-press mt-2">
                进入控制台
            </button>
        </form>
        <p class="text-center text-xs text-zinc-500 mt-8">还没有账号？ <a href="register.html" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors">去注册一个 ↗</a></p>
    </div>

    <div id="forgot-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100000] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div class="bg-[#121217] border border-white/10 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300" id="forgot-content">
            <div class="w-16 h-16 rounded-full bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center mx-auto mb-5 text-indigo-400 shadow-[0_0_20px_rgba(79,70,229,0.2)]">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h3 class="text-[18px] font-bold text-white mb-2">安全保护机制</h3>
            <p class="text-[13px] text-zinc-400 leading-relaxed mb-8">内部协同系统暂不支持外网自助找回密码。<br>请联系 <span class="text-indigo-400 font-bold">超级管理员 (许博文)</span> 在后台为您一键重置为初始密码。</p>
            <button onclick="hideForgotModal()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 border border-white/5 text-white rounded-xl text-sm font-bold transition-colors btn-press">我知道了</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
    </script>
    <script>
        function showForgotModal() { document.getElementById('forgot-modal').classList.remove('hidden'); setTimeout(() => { document.getElementById('forgot-modal').classList.remove('opacity-0'); document.getElementById('forgot-content').classList.remove('scale-95'); }, 10); }
        function hideForgotModal() { const modal = document.getElementById('forgot-modal'); modal.classList.add('opacity-0'); document.getElementById('forgot-content').classList.add('scale-95'); setTimeout(() => { modal.classList.add('hidden'); }, 300); }

        async function handleLogin(e) {
            e.preventDefault();
            if(!window.supabase) return alert("云端服务未连接！");
            const enName = document.getElementById('log-en').value.trim().toLowerCase();
            const pwd = document.getElementById('log-pwd').value;
            const realEmail = enName + '@webank.com';

            const btn = document.getElementById('login-btn');
            btn.innerText = "云端验证中...";
            btn.disabled = true;

            const { data, error } = await window.supabase.auth.signInWithPassword({ email: realEmail, password: pwd });

            if (error) { alert("账号或密码错误！"); btn.innerText = "进入控制台"; btn.disabled = false; return; }

            // 💡 提取用户登录配置
            let userData = data.user.user_metadata || {};
            
            // 💡 强行补全底层 enName（防范新注册账号由于解耦导致 metadata 丢失信息，影响后续页面的判断）
            if (!userData.enName) userData.enName = enName;
            
            localStorage.setItem('activeUserObj', JSON.stringify(userData));

            btn.innerText = "跳转中...";

            // 💡 核心路由拦截：如果登录者是部门领导 judyzzhang，直接重定向到全局大盘！
            if (enName === 'judyzzhang') {
                window.location.href = 'manager-workspace.html';
            } else {
                // 其他所有人统一进入需求大厅
                window.location.href = 'index.html'; 
            }
        }
    </script>
</body>
</html>
