    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }

        .btn-press:active { transform: scale(0.95); }
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top center; }

        @keyframes growUp { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
    </style>
</head>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        
        if(window.loadDashboardData) window.loadDashboardData();
    </script>

    <script>
        const PAGE_TYPE = 'admin'; 
        let currentView = 'month'; 
        let currentDate = new Date();
        let myAllTasks = []; 
        let systemUsers = []; // 💡 存储系统里所有具备设计/管理权限的真实名单
        let dropdownData = []; 

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase().trim() : '';

            if (!user.perms.includes('admin')) {
                alert("权限拦截：您没有总监控制台访问权限，为您退回大厅。");
                window.location.href = 'index.html';
                return false;
            }

            const avatarTxt = (user.displayName || user.name || user.cnName || user.enName || 'U').substring(0, 1).toUpperCase();
            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = avatarTxt; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-fuchsia-600'} border border-white/20 flex items-center justify-center text-white font-bold text-sm shadow-lg shrink-0`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.name || user.cnName || user.enName;
            
            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-fuchsia-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-fuchsia-500 animate-pulse shadow-[0_0_8px_#d946ef]"></span></span> 身份: 管理方`; }

            return user;
        }

        window.logout = function(e) { e.stopPropagation(); localStorage.removeItem('activeUserObj'); window.location.href = 'login.html'; }

        // ================= 💡 三维时间引擎 =================
        window.switchView = function(view) {
            currentView = view;
            const btns = ['week', 'month', 'year'];
            btns.forEach(b => {
                const btn = document.getElementById(`btn-view-${b}`);
                if(b === view) {
                    btn.className = "px-5 py-1.5 text-[13px] font-bold bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/20 rounded-lg shadow-sm cursor-default";
                } else {
                    btn.className = "px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press";
                    btn.setAttribute('onclick', `switchView('${b}')`);
                }
            });
            const jumpBtn = document.getElementById('btn-jump-current');
            if(view === 'month') jumpBtn.innerText = '回到本月';
            else if(view === 'week') jumpBtn.innerText = '回到本周';
            else jumpBtn.innerText = '回到今年';

            updateDataAndRender();
        }

        function getStartOfWeek(d) {
            d = new Date(d);
            var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1); 
            return new Date(d.setDate(diff));
        }

        window.navDate = function(step) {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + step);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + (step * 7));
            else if (currentView === 'year') currentDate.setFullYear(currentDate.getFullYear() + step);
            updateDataAndRender();
        }

        window.jumpToCurrent = function() {
            currentDate = new Date();
            updateDataAndRender();
        }

        window.toggleDropdown = function(id) {
            const dropdown = document.getElementById(id);
            if (id === 'date-dropdown') {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                dropdownData = [];
                if (currentView === 'month') {
                    for(let i = -5; i <= 5; i++) {
                        const d = new Date(year, month + i, 1);
                        dropdownData.push({ text: `${d.getFullYear()}年 ${d.getMonth()+1}月`, date: d, isCurrent: i===0 });
                    }
                } else if (currentView === 'week') {
                    const startWeek = getStartOfWeek(currentDate);
                    for(let i = -5; i <= 5; i++) {
                        const d = new Date(startWeek);
                        d.setDate(d.getDate() + (i * 7));
                        const end = new Date(d); end.setDate(end.getDate() + 6);
                        dropdownData.push({ text: `周 (${d.getMonth()+1}.${d.getDate()}-${end.getMonth()+1}.${end.getDate()})`, date: d, isCurrent: i===0 });
                    }
                } else {
                    for(let i = -3; i <= 3; i++) {
                        const y = year + i;
                        dropdownData.push({ text: `${y} 年度`, date: new Date(y, 0, 1), isCurrent: i===0 });
                    }
                }
                
                let html = '<div class="py-2">';
                dropdownData.forEach((item, index) => {
                    if(item.isCurrent) {
                        html += `<div class="w-full text-left px-5 py-2.5 text-[14px] text-fuchsia-400 bg-fuchsia-500/10 font-bold cursor-default">${item.text} <span class="text-[10px] bg-fuchsia-500/20 px-1.5 py-0.5 rounded ml-2">当前</span></div>`;
                    } else {
                        html += `<button onclick="selectDropdownDate(${index})" class="w-full text-left px-5 py-2.5 text-[14px] text-zinc-400 hover:bg-white/5 hover:text-white transition-colors">${item.text}</button>`;
                    }
                });
                dropdown.innerHTML = html + '</div>';
            }
            
            dropdown.classList.toggle('hidden');
            if(id === 'date-dropdown') {
                setTimeout(() => { const act = dropdown.querySelector('.bg-fuchsia-500\\/10'); if(act) act.scrollIntoView({ block: 'center' }); }, 10);
            }
        }

        window.selectDropdownDate = function(index) {
            currentDate = dropdownData[index].date;
            document.getElementById('date-dropdown').classList.add('hidden');
            updateDataAndRender();
        }

        document.addEventListener('click', (e) => {
            const dateWrap = document.getElementById('date-selector-wrapper');
            const dateDrop = document.getElementById('date-dropdown');
            if (dateWrap && dateDrop && !dateWrap.contains(e.target)) dateDrop.classList.add('hidden');
            
            const notifMenu = document.getElementById('notifMenu');
            const notifBtn = document.getElementById('notifBtn');
            if(notifMenu && !notifMenu.contains(e.target) && notifBtn && !notifBtn.contains(e.target)) notifMenu.classList.add('hidden'); 
        });

        function isDateInPeriod(dString, targetDate, viewType) {
            if (!dString) return false;
            const d = new Date(dString);
            if (isNaN(d.getTime())) return false;

            const tYear = targetDate.getFullYear();
            const tMonth = targetDate.getMonth();

            if (viewType === 'year') {
                return d.getFullYear() === tYear;
            } else if (viewType === 'month') {
                return d.getFullYear() === tYear && d.getMonth() === tMonth;
            } else if (viewType === 'week') {
                const sw = getStartOfWeek(targetDate);
                sw.setHours(0,0,0,0);
                const ew = new Date(sw);
                ew.setDate(ew.getDate() + 6);
                ew.setHours(23,59,59,999);
                return d >= sw && d <= ew;
            }
            return false;
        }

        // ================= 💡 核心：全量拉取数据并初始化名单 =================
        window.loadDashboardData = async function(isSilent = false) {
            if(!initRBAC()) return;
            if(!window.supabase) return;

            const syncDot = document.getElementById('sync-indicator');
            if(syncDot && !isSilent) syncDot.classList.remove('hidden');

            try {
                // 1. 获取全盘用户库（过滤出所有含设计或管理权限的人员，杜绝 0 工时盲区）
                const { data: users } = await window.supabase.from('users').select('enName, name, email, perms');
                systemUsers = [];
                if (users) {
                    users.forEach(u => {
                        let p = [];
                        if (typeof u.perms === 'string') try { p = JSON.parse(u.perms); } catch(e){}
                        else if (Array.isArray(u.perms)) p = u.perms;

                        if(p.includes('design') || p.includes('admin')) {
                            const en = (u.enName || (u.email ? u.email.split('@')[0] : '')).toLowerCase();
                            if(en && !systemUsers.some(x => x.en === en)) {
                                systemUsers.push({
                                    en: en,
                                    display: u.name || u.enName || en
                                });
                            }
                        }
                    });
                }

                // 2. 获取所有工单数据
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('id, title, project, status, creator, assignee, due_date, history_json').order('created_at', { ascending: false });
                if (error) throw error;
                myAllTasks = tasks || [];

                switchView('month'); 
                document.getElementById('dashboard-loading').classList.add('hidden');

            } catch (err) {
                console.error(err);
                if(!isSilent) document.getElementById('dashboard-loading').innerHTML = `<p class="text-rose-500 font-bold">数据拉取失败</p><p class="text-xs text-zinc-500">${err.message}</p>`;
            } finally {
                if(syncDot) setTimeout(() => syncDot.classList.add('hidden'), 500);
            }
        }

        // ================= 💡 数据提取与计算核心 =================
        function extractDataForPeriod(targetDate, viewType) {
            let totalHours = 0;
            let aiFreq = {};
            let aiCount = 0;
            let activeTasksSet = new Set();
            let projectSet = new Set();

            // 💡 初始化全员底库：0工时的人员也会包含在内！
            let peopleMap = {};
            systemUsers.forEach(u => {
                peopleMap[u.en] = { display: u.display, hours: 0, taskCount: 0, projects: new Set(), aiTools: {} };
            });

            let activeProjects = {};

            myAllTasks.forEach(t => {
                let taskActiveInPeriod = false;
                try {
                    const hist = JSON.parse(t.history_json || '[]');
                    hist.forEach(h => {
                        // 如果这条流水账处于被选中的时间范围内
                        if (isDateInPeriod(h.created_at || h.time, targetDate, viewType)) {
                            taskActiveInPeriod = true;
                            
                            // 1. 计算工时
                            let hVal = parseFloat(h.work_hours || h.hours);
                            if (!isNaN(hVal) && hVal > 0) {
                                totalHours += hVal;
                                
                                // 找是谁干的
                                if (h.operator) {
                                    let opLower = h.operator.toLowerCase();
                                    let matchedUser = systemUsers.find(u => opLower.includes(u.en) || opLower.includes((u.display||'').toLowerCase()));
                                    
                                    if (matchedUser) {
                                        peopleMap[matchedUser.en].hours += hVal;
                                        peopleMap[matchedUser.en].taskCount += 1;
                                        if(t.project) peopleMap[matchedUser.en].projects.add(t.project);
                                    } else {
                                        // 哪怕底库没有这个人，也强行建立临时档案展示
                                        const cleanName = h.operator.split(' ')[0].split('(')[0].trim();
                                        const key = cleanName.toLowerCase();
                                        if(!peopleMap[key]) {
                                            peopleMap[key] = { display: cleanName, hours: 0, taskCount: 0, projects: new Set(), aiTools: {} };
                                        }
                                        peopleMap[key].hours += hVal;
                                        peopleMap[key].taskCount += 1;
                                        if(t.project) peopleMap[key].projects.add(t.project);
                                        matchedUser = { en: key };
                                    }

                                    // 2. 抓取 AI 记录 (归属到个人)
                                    if (h.action === 'submit_draft' || h.action === 'submit_framework') {
                                        const tools = h.ai_tools || [];
                                        tools.forEach(tool => {
                                            if (tool && tool !== '无AI辅助') {
                                                aiCount++;
                                                if(!aiFreq[tool]) aiFreq[tool] = 0;
                                                aiFreq[tool]++;
                                                
                                                if(!peopleMap[matchedUser.en].aiTools[tool]) peopleMap[matchedUser.en].aiTools[tool] = 0;
                                                peopleMap[matchedUser.en].aiTools[tool]++;
                                            }
                                        });
                                    }
                                }

                                // 3. 记录项目总开销
                                const pName = t.project || '无归属';
                                if (!activeProjects[pName]) activeProjects[pName] = { count: 0, hours: 0, users: new Set() };
                                activeProjects[pName].hours += hVal;
                                activeProjects[pName].count += 1;
                                if (h.operator) activeProjects[pName].users.add(h.operator.split(' ')[0].trim());
                            }
                        }
                    });
                } catch(e){}

                if (taskActiveInPeriod) {
                    activeTasksSet.add(t.id);
                    if(t.project) projectSet.add(t.project);
                }
            });

            return { 
                totalHours, 
                peopleMap, 
                aiFreq, 
                aiCount, 
                activeProjects,
                tasksCount: activeTasksSet.size,
                projectsCount: projectSet.size
            };
        }

        // ================= 💡 数据重绘与更新 =================
        function updateDataAndRender() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            if (currentView === 'month') {
                document.getElementById('current-date-text').innerText = `${year}年 ${month+1}月`;
            } else if (currentView === 'week') {
                const startWeek = getStartOfWeek(currentDate);
                const end = new Date(startWeek); end.setDate(end.getDate() + 6);
                document.getElementById('current-date-text').innerText = `${startWeek.getMonth()+1}.${startWeek.getDate()} - ${end.getMonth()+1}.${end.getDate()}`;
            } else {
                document.getElementById('current-date-text').innerText = `${year} 年度`;
            }

            const currentData = extractDataForPeriod(currentDate, currentView);

            // 渲染顶栏 4 个基础指标
            document.getElementById('metric-cur-hours').innerText = currentData.totalHours.toFixed(1);
            document.getElementById('metric-total-projects').innerText = currentData.projectsCount;
            
            // 算实际有产出的人数
            const actualPeople = Object.values(currentData.peopleMap).filter(p => p.hours > 0).length;
            document.getElementById('metric-cur-people').innerText = actualPeople;
            document.getElementById('metric-cur-tasks').innerText = currentData.tasksCount;
            document.getElementById('metric-cur-ai').innerText = currentData.aiCount;

            // 💡 渲染左侧：项目分布耗时榜单
            const projContainer = document.getElementById('project-list-container');
            const sortedProj = Object.keys(currentData.activeProjects).map(k => ({ name: k, data: currentData.activeProjects[k] })).sort((a,b) => b.data.hours - a.data.hours);
            
            if (sortedProj.length === 0) {
                projContainer.innerHTML = '<div class="text-center py-20 text-zinc-500 text-sm">该周期无任何项目投入记录</div>';
            } else {
                let pHtml = '';
                const pColors = ['fuchsia', 'emerald', 'sky', 'orange'];
                sortedProj.forEach((p, idx) => {
                    const col = pColors[idx % pColors.length];
                    const pct = Math.round((p.data.hours / currentData.totalHours) * 100);
                    const userList = Array.from(p.data.users).join(', ');
                    
                    pHtml += `
                    <div class="bg-[#121217] border border-white/5 rounded-2xl p-4 shadow-sm relative overflow-hidden group hover:border-${col}-500/30 transition-colors">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-${col}-500/80 group-hover:w-1.5 transition-all"></div>
                        <div class="flex justify-between items-start mb-2 pl-2">
                            <h4 class="text-[14px] font-bold text-white group-hover:text-${col}-400 transition-colors">${p.name}</h4>
                            <span class="text-[16px] font-mono font-black text-${col}-400 leading-none">${p.data.hours.toFixed(1)}<span class="text-[10px] text-zinc-500 ml-1 font-normal font-sans">h</span></span>
                        </div>
                        <div class="pl-2 mb-3">
                            <p class="text-[11px] text-zinc-500 truncate" title="${userList}">参入者: <span class="text-zinc-300">${userList}</span> (${p.data.users.size}人)</p>
                            <p class="text-[10px] text-zinc-600 mt-0.5">当期流转节点数: ${p.data.count}</p>
                        </div>
                        <div class="w-full h-1.5 bg-zinc-900 rounded-full overflow-hidden ml-2"><div class="h-full bg-${col}-500 rounded-full opacity-80 bar-grow-h" style="width: ${pct}%"></div></div>
                    </div>`;
                });
                projContainer.innerHTML = pHtml;
            }

            // 💡 渲染右侧：全量人员效能摸底 (0也要展示，并带出AI频次)
            const pplContainer = document.getElementById('people-list-container');
            const sortedPpl = Object.values(currentData.peopleMap).sort((a,b) => b.hours - a.hours);

            if (sortedPpl.length === 0) {
                pplContainer.innerHTML = '<div class="text-center py-20 text-zinc-500 text-sm">系统暂无人员信息</div>';
            } else {
                let pHtml = '';
                sortedPpl.forEach(p => {
                    const isEmpty = p.hours === 0;
                    const bgClass = isEmpty ? 'bg-[#09090b] border-dashed border-zinc-800 opacity-60' : 'bg-[#121217] border-white/5 shadow-sm';
                    const titleCol = isEmpty ? 'text-zinc-500' : 'text-zinc-200';
                    const hourCol = isEmpty ? 'text-zinc-600' : 'text-white';
                    
                    let pTags = '';
                    if (!isEmpty && p.projects.size > 0) {
                        Array.from(p.projects).forEach(proj => {
                            pTags += `<span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-1.5 py-0.5 rounded text-[9px] truncate max-w-[120px] mr-1 mb-1 inline-block">${proj}</span>`;
                        });
                    }

                    // 💡 渲染该人员的 AI 工具使用情况
                    let aiTags = '';
                    if (!isEmpty) {
                        const aiKeys = Object.keys(p.aiTools);
                        if (aiKeys.length > 0) {
                            aiKeys.forEach(ai => {
                                aiTags += `<span class="text-[10px] text-amber-400 border border-amber-500/30 px-1.5 rounded">${ai}: ${p.aiTools[ai]}次</span> `;
                            });
                        } else {
                            aiTags = `<span class="text-[10px] text-zinc-500 italic">纯手绘 / 未用AI</span>`;
                        }
                    }

                    pHtml += `
                    <div class="${bgClass} border rounded-2xl p-4 relative overflow-hidden group">
                        ${!isEmpty ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500/50 group-hover:w-1.5 transition-all"></div>' : ''}
                        <div class="flex justify-between items-start mb-2 pl-2">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-zinc-800 flex items-center justify-center text-[10px] font-bold text-zinc-400">${p.display.substring(0,2).toUpperCase()}</div>
                                <h4 class="text-[14px] font-bold ${titleCol}">${p.display}</h4>
                            </div>
                            <div class="text-right">
                                <span class="text-[16px] font-mono font-black ${hourCol} leading-none">${p.hours.toFixed(1)}<span class="text-[10px] text-zinc-500 ml-1 font-normal font-sans">h</span></span>
                                ${isEmpty ? '' : `<p class="text-[10px] text-zinc-500 mt-0.5">处理 ${p.taskCount} 个节点</p>`}
                            </div>
                        </div>
                        ${isEmpty ? `<p class="text-[10px] text-zinc-600 pl-2 mt-2">该人员在此周期内无任何产出记录</p>` : `
                        <div class="pl-2 mt-3 space-y-2">
                            <div class="flex flex-wrap">${pTags}</div>
                            <div class="flex items-center gap-1.5 pt-1.5 border-t border-white/5">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                ${aiTags}
                            </div>
                        </div>`}
                    </div>`;
                });
                pplContainer.innerHTML = pHtml;
            }
        }

        // ================= 🔔 全局消息通知引擎 (基于 history_json 解析) =================
        let lastNotifHash = '';

        window.syncNotificationsFromCloud = async function(isSilent = true) {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();

            try {
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('id, title, creator, history_json').order('created_at', { ascending: false });
                if (error) throw error;

                let myNotifs = [];

                tasks.forEach(task => {
                    let hist = []; try { hist = JSON.parse(task.history_json || '[]'); } catch(e){}
                    hist.forEach((h, index) => {
                        const op = (h.operator || '').toLowerCase();
                        if (op.includes(myName)) return;

                        let title = ''; let content = ''; let icon = 'bg-fuchsia-500';
                        
                        if (h.action === 'submit_framework') { title = '👀 框架待审批'; content = `${h.operator} 提交了中期方案，等待审批：《${task.title}》`; icon = 'bg-amber-500'; }
                        else if (h.action === 'submit_draft') { title = '🎁 正稿待验收'; content = `${h.operator} 交付了正式稿，等待甲方验收：《${task.title}》`; icon = 'bg-emerald-500'; }
                        else if (h.action === 'reject_framework' || h.action === 'reject_draft' || h.is_rejected) { title = '💥 方案被打回'; content = `单据发生打回重修：《${task.title}》`; icon = 'bg-rose-500'; }
                        else if (h.action === 'complete') { title = '✅ 任务圆满结案'; content = `甲方已验收通过：《${task.title}》`; icon = 'bg-emerald-500'; }
                        else if (h.action && h.action.includes('urge')) { title = '🚨 紧急催办'; content = `单据产生催办行为：《${task.title}》`; icon = 'bg-rose-500'; }

                        if (title) {
                            const notifId = `${task.id}_${index}_${title}`;
                            if (!myNotifs.some(n => n.id === notifId)) {
                                myNotifs.push({ id: notifId, taskId: task.id, title: title, content: content, time: h.time || h.created_at || new Date().toISOString(), icon: icon });
                            }
                        }
                    });
                });

                myNotifs.sort((a, b) => new Date(b.time) - new Date(a.time));

                let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
                const unreadNotifs = myNotifs.filter(n => !readReceipts.includes(n.id));
                const unreadCount = unreadNotifs.length;

                const newHash = myNotifs.map(n => n.id + (readReceipts.includes(n.id) ? '_r' : '_u')).join(',');
                if (isSilent && newHash === lastNotifHash) return;
                lastNotifHash = newHash;

                const bellDot = document.getElementById('bell-dot');
                if (bellDot) {
                    if (unreadCount > 0) { bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent'); bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]'); } 
                    else { bellDot.classList.add('hidden'); }
                }
                const notifContainer = document.getElementById('notif-list-container');
                if (notifContainer) {
                    if (unreadCount === 0) { notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>'; } 
                    else {
                        notifContainer.innerHTML = unreadNotifs.map(n => {
                            const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            return `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors" onclick="window.markSingleAsRead('${n.id}', '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1"><h4 class="text-[13px] font-bold text-white flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full ${n.icon} shrink-0 shadow-[0_0_8px_currentColor]"></span>${n.title}</h4><span class="text-[10px] text-zinc-500">${dateStr}</span></div>
                                <p class="text-[11px] text-zinc-400 pl-4 line-clamp-2">${n.content}</p>
                            </div>`;
                        }).join('');
                    }
                }
                window.currentMyUnreadIds = unreadNotifs.map(n => n.id);
            } catch(e) {}
        };

        window.toggleNotificationPanel = function(event) {
            if(event) event.stopPropagation();
            const dropdown = document.getElementById('notifMenu');
            if(dropdown) { dropdown.classList.toggle('hidden'); if (!dropdown.classList.contains('hidden')) window.syncNotificationsFromCloud(true); }
        }

        window.markSingleAsRead = function(id, taskId) {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            if (!readReceipts.includes(id)) { readReceipts.push(id); localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts)); }
            window.location.href = 'task-detail-requester.html?id=' + taskId;
        };

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            if (!window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            const btn = event.currentTarget; const originalText = btn.innerHTML; btn.innerHTML = "处理中...";
            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            readReceipts = [...new Set([...readReceipts, ...window.currentMyUnreadIds])];
            localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts));
            window.syncNotificationsFromCloud(true); btn.innerHTML = originalText;
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('click', (e) => { 
                const notifMenu = document.getElementById('notifMenu'); const notifBtn = document.getElementById('notifBtn');
                if(notifMenu && !notifMenu.contains(e.target) && notifBtn && !notifBtn.contains(e.target)) notifMenu.classList.add('hidden'); 
            });
            window.loadDashboardData();
            setTimeout(() => { window.syncNotificationsFromCloud(true); }, 1500);
            setInterval(() => { window.loadDashboardData(true); window.syncNotificationsFromCloud(true); }, 8000);
        });
    </script>
</body>
