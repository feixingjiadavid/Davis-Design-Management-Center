<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队效能大盘 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .bg-glow-purple { position: absolute; top: -10%; left: 30%; width: 800px; height: 600px; background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%); border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-purple-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="bg-glow-purple"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-fuchsia-600 flex items-center justify-center shadow-[0_0_15px_rgba(192,38,211,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='manager-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <span class="font-medium text-[14px]">总监控制台</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span class="font-bold text-[14px]">团队效能大盘</span>
            </button>
            <button id="nav-members-btn" onclick="window.location.href='manager-members.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 1-4 4H5a4 4 0 0 1-4-4v-2"></path><polyline points="9 11 12 14 22 4"></polyline></svg>
                <span class="font-medium text-[14px]">组织架构与账号</span>
            </button>
            <button onclick="window.location.href='message-center.html?role=admin'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span class="font-medium text-[14px]">全局消息中心</span>
            </button>
        </div>

        <div class="px-5 py-5 mt-auto border-t border-white/5 bg-[#09090b] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg">?</div>
                <div><p id="sidebar-name" class="text-xs font-bold text-white mb-0.5">加载中...</p><p id="sidebar-role" class="text-[10px] text-zinc-500">读取中</p></div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="logout(event)" class="p-2 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 border-b border-white/5 shrink-0 bg-[#09090b]/80 backdrop-blur-xl relative z-[999]">
            <div class="flex justify-between items-start w-full">
                <div>
                    <h2 class="text-[24px] font-bold text-white tracking-tight mb-1.5">
                        团队产能与效能大盘 
                    </h2>
                    <p class="text-[12px] text-zinc-500">用真实流水数据量化设计价值，呈现 AI 带来的革命性提效。</p>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="flex bg-[#121217] border border-white/10 rounded-xl p-1 pointer-events-none opacity-50" title="基础版演示默认全量大盘">
                        <button class="px-5 py-1.5 rounded-lg text-[13px] font-bold text-white bg-zinc-800 shadow-sm transition-all btn-press">全量历史</button>
                        <button class="px-5 py-1.5 rounded-lg text-[13px] font-medium text-zinc-400 hover:text-white transition-all btn-press hidden">本月</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto custom-scrollbar flex justify-center relative">
            <div id="dash-loading" class="absolute inset-0 bg-[#0c0c0e]/90 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-fuchsia-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">COMPUTING GLOBAL DATA...</p>
            </div>

            <div class="w-full max-w-[1200px] flex flex-col gap-8">
                
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 bottom-0 w-1 bg-fuchsia-500 group-hover:w-2 transition-all"></div>
                        <p class="text-[12px] text-zinc-400 font-medium mb-2">全团队累计总发单需求</p>
                        <div class="flex items-baseline gap-2 mb-2">
                            <span class="text-4xl font-black text-white font-mono" id="val-total-tasks">0</span>
                            <span class="text-sm text-zinc-500">单</span>
                        </div>
                        <p class="text-[11px] text-emerald-400 font-bold bg-emerald-500/10 px-2 py-1 rounded inline-block">包含进行中与完结/终止记录</p>
                    </div>

                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 bottom-0 w-1 bg-sky-500 group-hover:w-2 transition-all"></div>
                        <p class="text-[12px] text-zinc-400 font-medium mb-2">行政团队设计接单量占比</p>
                        <div class="flex items-baseline gap-2 mb-2">
                            <span class="text-4xl font-black text-white font-mono" id="val-admin-pct">0</span>
                            <span class="text-sm text-zinc-500">%</span>
                        </div>
                        <p class="text-[11px] text-sky-400 font-bold bg-sky-500/10 px-2 py-1 rounded inline-block" id="val-admin-desc">行政人员撑起半边天</p>
                    </div>

                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 bottom-0 w-1 bg-emerald-500 group-hover:w-2 transition-all"></div>
                        <p class="text-[12px] text-zinc-400 font-medium mb-2">使用 AI 为团队共节约时间</p>
                        <div class="flex items-baseline gap-2 mb-2">
                            <span class="text-4xl font-black text-emerald-400 font-mono" id="val-ai-hours">0</span>
                            <span class="text-sm text-zinc-500">小时</span>
                        </div>
                        <p class="text-[11px] text-emerald-500 font-bold bg-emerald-500/10 px-2 py-1 rounded inline-block" id="val-ai-count">测算基准: 有AI辅助单据</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-8 shadow-xl flex flex-col">
                        <h3 class="text-[15px] font-bold text-white mb-6 flex items-center justify-between">
                            <span>🏆 团队历史接单产能排行榜</span>
                            <span class="text-[11px] text-zinc-500 font-normal border border-white/10 px-2 py-1 rounded-lg">按历史接单总量统计</span>
                        </h3>
                        
                        <div class="space-y-6 flex-1" id="leaderboard-container">
                            <div class="text-center py-10 text-zinc-500 text-sm">解析中...</div>
                        </div>
                    </div>

                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-8 shadow-xl flex flex-col">
                        <h3 class="text-[15px] font-bold text-white mb-6">🤖 团队 AI 辅助工具偏好占比</h3>
                        
                        <div class="flex-1 flex flex-col justify-center gap-6" id="ai-tools-container">
                            <div class="text-center py-10 text-zinc-500 text-sm">解析中...</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        if(window.initDashboard) window.initDashboard();
    </script>

    <script>
        const PAGE_TYPE = 'admin'; 
        
        // 我们需要拉取用户信息来区分“全职设计”和“行政”
        let allSystemUsers = {}; 
        
        // 定义预设的 AI 工具图谱颜色，保证美观
        const AI_COLOR_MAP = {
            'Midjourney': 'emerald',
            'Gemini': 'indigo',
            'PS生成填充': 'sky',
            '豆包': 'fuchsia',
            '即梦': 'orange',
            '无AI辅助': 'zinc'
        };

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);

            if (user.enName !== 'davidxxu') {
                document.getElementById('main-content-area').style.filter = 'blur(10px)';
                alert('超级权限拦截：管理大盘属于系统机密，仅系统超级管理员拥有访问权限。');
                window.location.href = 'manager-workspace.html'; 
                return false;
            }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar; avatarEl.className = `w-9 h-9 rounded-full ${user.color} border border-white/20 flex items-center justify-center text-white font-bold text-sm shadow-lg`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName;
            if(document.getElementById('sidebar-role')) document.getElementById('sidebar-role').innerHTML = `<span class="text-fuchsia-400 font-bold">当前视角: 管理方</span>`;
            return true;
        }

        window.initDashboard = async function() {
            if(!initRBAC()) return;
            if(!window.supabase) return;

            try {
                // 1. 获取所有真实用户信息（为了区分是不是全职设计师）
                const userDbStr = localStorage.getItem('system_users_db');
                if(userDbStr) {
                    allSystemUsers = JSON.parse(userDbStr);
                } else {
                    const { data: usersData } = await window.supabase.from('user_profiles').select('*');
                    (usersData || []).forEach(u => {
                        allSystemUsers[u.en_name.toLowerCase()] = {
                            name: u.cn_name,
                            isCoreDesign: (u.en_name === 'davidxxu' || u.en_name === 'judyzzhang') // 这里简单的判断规则，可优化
                        };
                    });
                }
                
                // 补齐一些默认没录入的测试人员
                if(!allSystemUsers['skyler']) allSystemUsers['skyler'] = { name: 'Skyler', isCoreDesign: false };
                if(!allSystemUsers['wang']) allSystemUsers['wang'] = { name: '王助理', isCoreDesign: false };
                if(!allSystemUsers['davidxxu']) allSystemUsers['davidxxu'] = { name: '许博文', isCoreDesign: true };

                // 2. 拉取全量单据（无视状态，我们要统筹所有）
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('*');
                if (error) throw error;

                // ===== 核心算法引擎 =====
                let totalTasks = 0;
                let adminAssignedCount = 0;
                let assignedTaskTotal = 0;
                let aiSavedHoursTotal = 0;
                let aiUsageCount = 0;

                let userLeaderboard = {}; // { 'enName': count }
                let toolsFreq = {}; // { 'ToolName': count }
                let totalToolUsage = 0;

                (tasks || []).forEach(t => {
                    totalTasks++;
                    
                    // 过滤掉没被接单的
                    if (t.assignee && t.assignee !== 'none') {
                        assignedTaskTotal++;
                        const lowerAssignee = t.assignee.toLowerCase();
                        
                        // 累计排行榜
                        if (!userLeaderboard[lowerAssignee]) userLeaderboard[lowerAssignee] = 0;
                        userLeaderboard[lowerAssignee]++;

                        // 判断是否属于行政下场作图
                        const userObj = allSystemUsers[lowerAssignee];
                        if (userObj && !userObj.isCoreDesign) {
                            adminAssignedCount++;
                        } else if (!userObj && lowerAssignee !== 'davidxxu' && lowerAssignee !== 'judyzzhang') {
                            // 未知用户默认算作行政
                            adminAssignedCount++;
                        }
                    }

                    // 深度解析 AI 数据和工具频次
                    let usedAI = false;
                    try {
                        const history = JSON.parse(t.history_json || '[]');
                        // 取最后一次提交作为本单的最终工具代表
                        for (let i = history.length - 1; i >= 0; i--) {
                            if (history[i].action === 'submit_draft' || history[i].action === 'submit_framework') {
                                const tools = history[i].ai_tools || [];
                                tools.forEach(tool => {
                                    if (tool && tool !== '无AI辅助') {
                                        usedAI = true;
                                        if(!toolsFreq[tool]) toolsFreq[tool] = 0;
                                        toolsFreq[tool]++;
                                        totalToolUsage++;
                                    }
                                });
                                break; // 只要取到该单的最终状态就跳出
                            }
                        }
                    } catch(e){}

                    // 假定：一单如果用了AI，平均能省 2.4 个小时
                    if (usedAI) {
                        aiSavedHoursTotal += 2.4;
                        aiUsageCount++;
                    }
                });

                // ===== 渲染顶级指标 =====
                document.getElementById('val-total-tasks').innerText = totalTasks;
                
                let adminPct = assignedTaskTotal > 0 ? ((adminAssignedCount / assignedTaskTotal) * 100).toFixed(1) : 0;
                document.getElementById('val-admin-pct').innerText = adminPct;
                document.getElementById('val-admin-desc').innerText = `行政承接了 ${adminAssignedCount} 单 (共分派 ${assignedTaskTotal} 单)`;

                document.getElementById('val-ai-hours').innerText = aiSavedHoursTotal.toFixed(1);
                document.getElementById('val-ai-count').innerText = `测算基准: 发现 ${aiUsageCount} 单使用了AI辅助`;

                // ===== 渲染排行榜 =====
                let sortedUsers = Object.keys(userLeaderboard).map(k => {
                    return { id: k, count: userLeaderboard[k] };
                }).sort((a, b) => b.count - a.count).slice(0, 5); // 取 Top 5

                const lbContainer = document.getElementById('leaderboard-container');
                let lbHtml = '';
                const maxCount = sortedUsers.length > 0 ? sortedUsers[0].count : 1; // 用于计算进度条百分比
                
                if (sortedUsers.length === 0) {
                    lbHtml = `<div class="text-center py-10 text-zinc-500">暂无接单数据</div>`;
                } else {
                    sortedUsers.forEach((u, index) => {
                        const uObj = allSystemUsers[u.id];
                        const displayName = uObj ? (uObj.name || uObj.displayName || u.id) : u.id;
                        const isCore = uObj ? uObj.isCoreDesign : (u.id === 'davidxxu' || u.id === 'judyzzhang');
                        
                        let rankCol, barBgClass, roleBadge;
                        if (index === 0) { rankCol = 'text-amber-500'; barBgClass = 'bg-gradient-to-r from-amber-600 to-amber-400 shadow-[0_0_10px_rgba(245,158,11,0.5)]'; }
                        else if (index === 1) { rankCol = 'text-zinc-300'; barBgClass = 'bg-zinc-400'; }
                        else if (index === 2) { rankCol = 'text-orange-600'; barBgClass = 'bg-orange-700'; }
                        else { rankCol = 'text-zinc-600'; barBgClass = 'bg-zinc-700'; }

                        if (isCore) { roleBadge = `<span class="text-[10px] bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-500/20 px-1.5 py-0.5 rounded">全职设计</span>`; }
                        else { roleBadge = `<span class="text-[10px] bg-sky-500/10 text-sky-400 border border-sky-500/20 px-1.5 py-0.5 rounded">非全职支撑</span>`; }

                        const pct = (u.count / maxCount) * 100;

                        lbHtml += `
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-3">
                                    <span class="w-5 text-center font-bold ${rankCol} text-[14px]">${index + 1}</span>
                                    <span class="text-[13px] font-bold text-zinc-200">${displayName}</span>
                                    ${roleBadge}
                                </div>
                                <span class="text-[13px] font-mono font-bold text-white">${u.count} <span class="text-[10px] text-zinc-500 font-sans font-normal">单</span></span>
                            </div>
                            <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden">
                                <div class="h-full ${barBgClass} rounded-full" style="width: ${pct}%"></div>
                            </div>
                        </div>`;
                    });
                }
                lbContainer.innerHTML = lbHtml;

                // ===== 渲染 AI 工具偏好 =====
                const toolContainer = document.getElementById('ai-tools-container');
                let toolHtml = '';
                
                if (totalToolUsage === 0) {
                    toolHtml = `<div class="text-center py-10 text-zinc-500">尚未收集到 AI 工具使用记录</div>`;
                } else {
                    // 排序工具
                    let sortedTools = Object.keys(toolsFreq).map(k => {
                        return { name: k, count: toolsFreq[k] };
                    }).sort((a, b) => b.count - a.count).slice(0, 5); // 展示前五名

                    sortedTools.forEach(t => {
                        const pct = ((t.count / totalToolUsage) * 100).toFixed(0);
                        const cTheme = AI_COLOR_MAP[t.name] || 'indigo'; // 未知工具默认为紫色
                        
                        toolHtml += `
                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <span class="text-[13px] font-bold text-${cTheme}-400 flex items-center gap-2"><div class="w-2 h-2 bg-${cTheme}-400 rounded-full"></div> ${t.name}</span>
                                <span class="text-[12px] font-mono font-bold">${pct}% <span class="text-[10px] font-normal text-zinc-500 ml-1">(${t.count}次)</span></span>
                            </div>
                            <div class="w-full h-1.5 bg-zinc-900 rounded-full"><div class="h-full bg-${cTheme}-500 rounded-full shadow-[0_0_10px_var(--tw-colors-${cTheme}-500)] opacity-80" style="width: ${pct}%"></div></div>
                        </div>`;
                    });
                }
                toolContainer.innerHTML = toolHtml;

                // 结束加载
                document.getElementById('dash-loading').classList.add('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('dash-loading').innerHTML = `<p class="text-rose-500 font-bold">大盘数据生成失败</p><p class="text-xs text-zinc-500">${err.message}</p>`;
            }
        }

    </script>
</body>
</html>
