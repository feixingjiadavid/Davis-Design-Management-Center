<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队效能大盘 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top center; }
        @keyframes dropIn { 0% { opacity: 0; transform: scaleY(0.95) translateY(-5px); } 100% { opacity: 1; transform: scaleY(1) translateY(0); } }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 水位条动画 */
        .progress-bar-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .workload-card { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.05); background: #121217; }
        .workload-card:hover { transform: translateX(4px); border-color: rgba(217,70,239,0.3); background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-fuchsia-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 right-1/4 w-[800px] h-[600px] bg-fuchsia-900/10 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-fuchsia-600 flex items-center justify-center shadow-[0_0_15px_rgba(217,70,239,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='manager-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <span class="font-medium text-[14px]">总监控制台</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span class="font-bold text-[14px]">团队效能大盘</span>
            </button>
            <button onclick="window.showAlert('提示','组织架构权限系统接入中...','info')" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">组织架构与账号</span>
            </button>
            <button onclick="window.location.href='message-center.html?role=admin'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span class="font-medium text-[14px]">全局消息中心</span>
            </button>
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-[9999]">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-fuchsia-400 hover:bg-fuchsia-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl z-20">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight mb-1.5 flex items-center gap-2">
                    团队产能与效能大盘
                    <div id="sync-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 animate-pulse ml-2" title="云端连接中..."></div>
                </h2>
                <p class="text-xs text-zinc-500">基于真实流水数据，全局洞察团队水位与产出质量。</p>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="flex bg-[#121217] border border-white/10 rounded-xl p-1 shadow-inner">
                    <button id="btn-view-week" onclick="switchView('week')" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">周</button>
                    <button id="btn-view-month" onclick="switchView('month')" class="px-5 py-1.5 text-[13px] font-bold bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/20 rounded-lg shadow-sm cursor-default">月</button>
                    <button id="btn-view-year" onclick="switchView('year')" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">年</button>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="navDate(-1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    
                    <div class="relative" id="date-selector-wrapper">
                        <button onclick="toggleDropdown('date-dropdown')" class="px-6 py-2 h-full bg-[#121217] border border-white/5 rounded-xl text-[15px] font-bold text-white hover:bg-white/5 transition-colors btn-press min-w-[160px]">
                            <span id="current-date-text">计算中...</span>
                        </button>
                        <div id="date-dropdown" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 w-56 bg-[#1a1a24] border border-white/10 rounded-2xl shadow-2xl py-2 z-50 dropdown-enter max-h-[300px] overflow-y-auto custom-scrollbar"></div>
                    </div>

                    <button onclick="navDate(1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <button onclick="jumpToCurrent()" class="px-5 py-2 bg-fuchsia-600/20 text-fuchsia-400 font-bold border border-fuchsia-500/20 rounded-xl hover:bg-fuchsia-500/30 transition-colors btn-press text-[13px]" id="btn-jump-current">回到本月</button>

                <div class="w-px h-8 bg-white/10 mx-1"></div>

                <div class="relative" id="identity-wrapper">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-5 py-3 rounded-[14px] flex items-center gap-3 text-[13px] font-medium hover:bg-[#1a1a1f] transition-colors btn-press">
                        身份加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-auto custom-scrollbar flex flex-col z-10 relative items-center">
            
            <div id="dashboard-loading" class="absolute inset-0 bg-[#0c0c0e]/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-fuchsia-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">CALCULATING METRICS...</p>
            </div>

            <div class="w-full max-w-[1400px] flex flex-col gap-8">
                
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-[#16161d] border border-white/5 rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-fuchsia-500 group-hover:w-2.5 transition-all"></div>
                        <p class="text-[13px] text-zinc-500 font-bold mb-2 uppercase tracking-wider" id="stat-period-title">本周期交付吞吐量</p>
                        <p class="text-[48px] font-black text-white font-mono leading-none mb-1"><span id="stat-completed">0</span> <span class="text-sm text-zinc-600 font-sans font-normal ml-1">单</span></p>
                        <p class="text-[11px] text-zinc-500 mt-2 bg-white/5 inline-block px-2 py-1 rounded">包含该时段内所有已完结记录</p>
                    </div>

                    <div class="bg-[#16161d] border border-white/5 rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-indigo-500 group-hover:w-2.5 transition-all"></div>
                        <p class="text-[13px] text-zinc-500 font-bold mb-2 uppercase tracking-wider">团队平均一稿通过率</p>
                        <p class="text-[48px] font-black text-indigo-400 font-mono leading-none mb-1" id="stat-first-pass">0%</p>
                        <p class="text-[11px] text-zinc-500 mt-2 bg-white/5 inline-block px-2 py-1 rounded" id="stat-first-pass-desc">当前周期无验收记录</p>
                    </div>

                    <div class="bg-[#16161d] border border-white/5 rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-emerald-500 group-hover:w-2.5 transition-all"></div>
                        <p class="text-[13px] text-zinc-500 font-bold mb-2 uppercase tracking-wider">AI 工具提效折算工时</p>
                        <p class="text-[48px] font-black text-emerald-400 font-mono leading-none mb-1">+<span id="stat-ai-hours">0.0</span> <span class="text-sm text-emerald-600/50 font-sans font-normal ml-1">h</span></p>
                        <p class="text-[11px] text-emerald-500/60 mt-2 bg-emerald-500/10 inline-block px-2 py-1 rounded border border-emerald-500/20" id="stat-ai-desc">无使用记录</p>
                    </div>
                </div>

                <div class="flex gap-8 items-start">
                    
                    <div class="flex-[3] bg-[#121217] border border-white/5 rounded-3xl p-8 flex flex-col shadow-2xl min-h-[500px]">
                        <h3 class="text-[16px] font-bold text-white mb-2 flex items-center gap-2">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d946ef" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            团队负荷与忙闲监控
                        </h3>
                        <p class="text-xs text-zinc-500 mb-6 pb-4 border-b border-white/5">基于该周期内每位成员的<span class="text-fuchsia-400">填报工时</span>与<span class="text-amber-500">压单量</span>动态计算，按极度饱和至空闲自动降序。</p>
                        
                        <div class="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2" id="workload-list">
                            </div>
                    </div>

                    <div class="flex-[2] flex flex-col gap-6">
                        <div class="bg-[#121217] border border-white/5 rounded-3xl p-7 shadow-xl">
                            <h3 class="text-[14px] font-bold text-zinc-300 mb-5 flex items-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                资源流向 (Top 项目消耗)
                            </h3>
                            <div class="space-y-4" id="project-dist-container">
                            </div>
                        </div>

                        <div class="bg-[#121217] border border-white/5 rounded-3xl p-7 shadow-xl flex-1">
                            <h3 class="text-[14px] font-bold text-zinc-300 mb-5 flex items-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                                团队 AI 辅助工具偏好
                            </h3>
                            <div class="space-y-4" id="ai-dist-container">
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-fuchsia-500 to-indigo-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-fuchsia-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="window.closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label><input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-fuchsia-500 transition-colors" placeholder="输入原密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label><input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-fuchsia-500 transition-colors" placeholder="输入新密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label><input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-fuchsia-500 transition-colors" placeholder="再次输入新密码"></div>
            </div>
            <button onclick="window.submitPwdChange()" class="w-full mt-6 py-3.5 bg-fuchsia-600 hover:bg-fuchsia-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(217,70,239,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-fuchsia-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        if(window.initApp) window.initApp();
    </script>

    <script>
        const PAGE_TYPE = 'admin'; 
        let currentView = 'month'; 
        let currentDate = new Date();
        let myAllTasks = []; 
        let allDesigners = [];
        let dropdownData = []; 
        let currentUserData = null;

        // ================= 高定弹窗引擎 =================
        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0'); dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-fuchsia-500';
                icon.className = 'w-8 h-8 rounded-full bg-fuchsia-500/20 text-fuchsia-400 flex items-center justify-center shrink-0';

                }

                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='assistant-workspace.html'"><div class="w-7 h-7 rounded-lg bg-orange-500/10 flex items-center justify-center text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-medium">设计方 (执行看板)</span></div>`; 
                }
                if ((user.perms || []).includes('admin')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#3b1740] text-fuchsia-400 cursor-default border border-fuchsia-900/50"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/20 flex items-center justify-center text-fuchsia-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div><span class="text-[13px] font-bold">管理方 (当前)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-fuchsia-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-fuchsia-500 animate-pulse"></span></span> 身份: 管理方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }

            currentUserData = user;
            return user;

        // ================= 💡 三位一体时间引擎 =================
        window.switchView = function(view) {
            currentView = view;
            
            const btns = ['week', 'month', 'year'];
            btns.forEach(b => {
                const btn = document.getElementById(`btn-view-${b}`);
                if(b === view) {
                    btn.className = "px-5 py-1.5 text-[13px] font-bold bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/20 rounded-lg shadow-sm cursor-default";
                } else {
                    btn.className = "px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press";
                    btn.setAttribute('onclick', `switchView('${b}')`);
                }
            });

            const jumpBtn = document.getElementById('btn-jump-current');
            if(view === 'month') jumpBtn.innerText = '回到本月';
            else if(view === 'week') jumpBtn.innerText = '回到本周';
            else jumpBtn.innerText = '回到今年';

            updateDataAndRender();
        }

        function getStartOfWeek(d) {
            d = new Date(d);
            var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1); 
            return new Date(d.setDate(diff));
        }

        window.navDate = function(step) {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + step);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + (step * 7));
            else if (currentView === 'year') currentDate.setFullYear(currentDate.getFullYear() + step);
            updateDataAndRender();
        }

        window.jumpToCurrent = function() {
            currentDate = new Date();
            updateDataAndRender();
        }

        window.toggleDropdown = function(id) {
            const dropdown = document.getElementById(id);
            let html = '<div class="py-2">';
            dropdownData.forEach((item, index) => {
                if(item.isCurrent) {
                    html += `<div class="w-full text-left px-5 py-2.5 text-[14px] text-fuchsia-400 bg-fuchsia-500/10 font-bold cursor-default">${item.text} <span class="text-[10px] bg-fuchsia-500/20 px-1.5 py-0.5 rounded ml-2">当前</span></div>`;
                } else {
                    html += `<button onclick="selectDropdownDate(${index})" class="w-full text-left px-5 py-2.5 text-[14px] text-zinc-400 hover:bg-white/5 hover:text-white transition-colors">${item.text}</button>`;
                }
            });
            dropdown.innerHTML = html + '</div>';
            dropdown.classList.toggle('hidden');
            setTimeout(() => { const act = dropdown.querySelector('.bg-fuchsia-500\\/10'); if(act) act.scrollIntoView({ block: 'center' }); }, 10);
        }

        window.selectDropdownDate = function(index) {
            currentDate = dropdownData[index].date;
            document.getElementById('date-dropdown').classList.add('hidden');
            updateDataAndRender();
        }

        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('date-selector-wrapper');
            const dropdown = document.getElementById('date-dropdown');
            if (wrapper && dropdown && !wrapper.contains(e.target)) dropdown.classList.add('hidden');
        });

        // ================= 💡 核心：全量数据解析与水位表渲染 =================
        window.initApp = async function() {
            if(!initRBAC()) return;
            if(!window.supabase) return;

            try {
                // 1. 抓取设计资源池 (用户表)
                const { data: users } = await window.supabase.from('user_profiles').select('en_name, display_name, cn_name, perms');
                if (users) {
                    allDesigners = users.filter(u => u.perms && u.perms.includes('design'));
                } else {
                    // Fallback to predefined if DB fails or lacks perms column
                    allDesigners = [
                        { en_name: 'davidxxu', display_name: 'Davidxxu (核心)' },
                        { en_name: 'skyler', display_name: 'Skyler' },
                        { en_name: 'wang', display_name: '王助理(排版)' }
                    ];
                }

                // 2. 抓取全量任务数据
                const { data: tasks, error } = await window.supabase.from('test_tasks').select('id, title, project, status, creator, assignee, due_date, history_json').order('created_at', { ascending: false });
                if (error) throw error;
                myAllTasks = tasks || [];

                switchView('month');
                document.getElementById('dashboard-loading').classList.add('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('dashboard-loading').innerHTML = `<p class="text-rose-500 font-bold">数据拉取失败</p><p class="text-xs text-zinc-500">${err.message}</p>`;
            }
        }

        function updateDataAndRender() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            dropdownData = [];
            if (currentView === 'month') {
                for(let i = -5; i <= 5; i++) {
                    const d = new Date(year, month + i, 1);
                    dropdownData.push({ text: `${d.getFullYear()}年 ${d.getMonth()+1}月`, date: d, isCurrent: i===0 });
                }
                document.getElementById('current-date-text').innerText = `${year}年 ${month+1}月`;
                document.getElementById('stat-period-title').innerText = '本月交付吞吐量';
            } 
            else if (currentView === 'week') {
                const startWeek = getStartOfWeek(currentDate);
                for(let i = -5; i <= 5; i++) {
                    const d = new Date(startWeek);
                    d.setDate(d.getDate() + (i * 7));
                    const end = new Date(d); end.setDate(end.getDate() + 6);
                    dropdownData.push({ text: `周 (${d.getMonth()+1}.${d.getDate()}-${end.getMonth()+1}.${end.getDate()})`, date: d, isCurrent: i===0 });
                }
                const e = new Date(startWeek); e.setDate(e.getDate() + 6);
                document.getElementById('current-date-text').innerText = `${startWeek.getMonth()+1}.${startWeek.getDate()} - ${e.getMonth()+1}.${e.getDate()}`;
                document.getElementById('stat-period-title').innerText = '本周交付吞吐量';
            }
            else if (currentView === 'year') {
                for(let i = -3; i <= 3; i++) {
                    const y = year + i;
                    dropdownData.push({ text: `${y} 年度`, date: new Date(y, 0, 1), isCurrent: i===0 });
                }
                document.getElementById('current-date-text').innerText = `${year} 年度`;
                document.getElementById('stat-period-title').innerText = '本年交付吞吐量';
            }

            // 💡 开始计算大盘数据
            let completedCount = 0;
            let firstPassCount = 0;
            let totalAiHours = 0;
            let projectDist = {};
            let aiToolsFreq = {};

            // 💡 构建字典用于动态水位表：以小写英文名为 key
            let designerStats = {};
            allDesigners.forEach(u => {
                const k = u.en_name.toLowerCase();
                designerStats[k] = { 
                    name: u.display_name || u.cn_name || u.en_name, 
                    loggedHours: 0, 
                    activeTasks: 0 
                };
            });

            myAllTasks.forEach(t => {
                let isCompletedInPeriod = false;
                let hasReject = false;
                let tUsedAiCount = 0;

                try {
                    const hist = JSON.parse(t.history_json || '[]');
                    
                    hist.forEach(h => {
                        // 找打回记录
                        if(h.is_rejected || (h.action && h.action.includes('reject'))) hasReject = true;
                        
                        // 找 AI 工具记录
                        if (h.action === 'submit_draft' || h.action === 'submit_framework') {
                            const tools = h.ai_tools || [];
                            tools.forEach(tool => {
                                if (tool && tool !== '无AI辅助') {
                                    tUsedAiCount++;
                                    if(!aiToolsFreq[tool]) aiToolsFreq[tool] = 0;
                                    aiToolsFreq[tool]++;
                                }
                            });
                        }

                        // 找每个人的填报工时 (只算当前所选周期内的)
                        const hDate = new Date(h.created_at || h.time);
                        let matchPeriod = false;
                        if (currentView === 'month') matchPeriod = (hDate.getFullYear() === year && hDate.getMonth() === month);
                        else if (currentView === 'year') matchPeriod = (hDate.getFullYear() === year);
                        else {
                            const sw = getStartOfWeek(currentDate);
                            const ew = new Date(sw); ew.setDate(ew.getDate()+6);
                            hDate.setHours(0,0,0,0);
                            matchPeriod = (hDate >= sw && hDate <= ew);
                        }

                        if (matchPeriod) {
                            if (h.operator) {
                                // 通过匹配 name 来定位归属
                                let opName = h.operator.toLowerCase();
                                for (let key in designerStats) {
                                    if (opName.includes(key) || opName.includes(designerStats[key].name.toLowerCase())) {
                                        designerStats[key].loggedHours += (parseFloat(h.work_hours) || 0);
                                        break;
                                    }
                                }
                            }
                        }

                        // 找完结量
                        if (['completed', 'archived'].includes(t.status)) {
                            if (h.action === 'complete' || h.action === 'approve_draft') {
                                const cDate = new Date(h.created_at || h.time);
                                let cMatch = false;
                                if (currentView === 'month') cMatch = (cDate.getFullYear() === year && cDate.getMonth() === month);
                                else if (currentView === 'year') cMatch = (cDate.getFullYear() === year);
                                else {
                                    const sw = getStartOfWeek(currentDate);
                                    const ew = new Date(sw); ew.setDate(ew.getDate()+6);
                                    cDate.setHours(0,0,0,0);
                                    cMatch = (cDate >= sw && cDate <= ew);
                                }
                                if(cMatch) {
                                    isCompletedInPeriod = true;
                                    const pName = t.project || '其他支持';
                                    if (!projectDist[pName]) projectDist[pName] = 0;
                                    projectDist[pName]++;
                                }
                            }
                        }
                    });
                } catch(e){}

                // 算顶部大盘
                if (isCompletedInPeriod) {
                    completedCount++;
                    if (!hasReject) firstPassCount++;
                    if (tUsedAiCount > 0) totalAiHours += (tUsedAiCount * 2.4); // 简单估算
                }

                // 算活体积压排期量 (不分周期，就是现在手里压着的活)
                if (t.assignee && t.assignee !== 'none' && !['completed', 'archived', 'terminated', 'pending'].includes(t.status)) {
                    let aKey = t.assignee.toLowerCase();
                    for (let key in designerStats) {
                        if (aKey.includes(key) || aKey.includes(designerStats[key].name.toLowerCase())) {
                            designerStats[key].activeTasks++;
                            break;
                        }
                    }
                }
            });

            // ================== 渲染顶部三大指标 ==================
            document.getElementById('stat-completed').innerText = completedCount;
            
            const firstPassRate = completedCount > 0 ? Math.round((firstPassCount / completedCount) * 100) : 0;
            document.getElementById('stat-first-pass').innerText = completedCount > 0 ? `${firstPassRate}%` : '--';
            document.getElementById('stat-first-pass-desc').innerText = completedCount > 0 ? `该时段内 ${firstPassCount} 单未曾被打回` : '该时段内无验收记录';
            
            document.getElementById('stat-ai-hours').innerText = totalAiHours.toFixed(1);
            document.getElementById('stat-ai-desc').innerText = totalAiHours > 0 ? '基于该时段内产出折算' : '无使用记录';

            // ================== 渲染项目分布 ==================
            const distContainer = document.getElementById('project-dist-container');
            if (completedCount === 0) {
                distContainer.innerHTML = '<div class="text-center text-zinc-500 py-10 text-sm">该周期无完结产出记录</div>';
            } else {
                let distHtml = '';
                const sortedProj = Object.keys(projectDist).map(k => ({ name: k, count: projectDist[k] })).sort((a,b) => b.count - a.count).slice(0,5);
                const colors = ['fuchsia', 'indigo', 'sky', 'emerald', 'orange'];

                sortedProj.forEach((p, idx) => {
                    const pct = Math.round((p.count / completedCount) * 100);
                    const col = colors[idx % colors.length];
                    distHtml += `
                    <div class="mb-4">
                        <div class="flex justify-between items-end mb-1.5">
                            <h4 class="text-[13px] font-bold text-zinc-200 truncate pr-2">${p.name}</h4>
                            <div class="text-right shrink-0">
                                <span class="text-[13px] font-mono font-bold text-${col}-400">${p.count} <span class="text-[10px] text-${col}-400/60 font-sans font-normal">单</span></span>
                            </div>
                        </div>
                        <div class="w-full h-1.5 bg-zinc-900 rounded-full overflow-hidden">
                            <div class="h-full bg-${col}-500 rounded-full opacity-80 shadow-[0_0_10px_var(--tw-colors-${col}-500)]" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                });
                distContainer.innerHTML = distHtml;
            }

            // ================== 渲染 AI 工具 ==================
            const aiContainer = document.getElementById('ai-dist-container');
            const totalToolTags = Object.values(aiToolsFreq).reduce((a, b) => a + b, 0);
            if (totalToolTags === 0) {
                aiContainer.innerHTML = '<div class="text-center text-zinc-500 py-10 text-sm">该周期未使用 AI 辅助</div>';
            } else {
                let aiHtml = '';
                const AI_COLOR_MAP = { 'Midjourney': 'emerald', 'Gemini': 'indigo', 'PS生成填充': 'sky', '豆包': 'fuchsia', '即梦': 'orange' };
                const sortedTools = Object.keys(aiToolsFreq).map(k => ({ name: k, count: aiToolsFreq[k] })).sort((a,b) => b.count - a.count).slice(0,5);
                
                sortedTools.forEach(t => {
                    const pct = Math.round((t.count / totalToolTags) * 100);
                    const col = AI_COLOR_MAP[t.name] || 'indigo';
                    aiHtml += `
                    <div class="mb-3">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="text-[12px] font-bold text-${col}-400 flex items-center gap-2"><div class="w-2 h-2 bg-${col}-400 rounded-full shadow-[0_0_8px_var(--tw-colors-${col}-400)]"></div> ${t.name}</span>
                            <span class="text-[12px] font-mono font-bold text-white">${pct}% <span class="text-[10px] font-normal text-zinc-500 ml-1">(${t.count}次)</span></span>
                        </div>
                        <div class="w-full h-1.5 bg-zinc-900 rounded-full"><div class="h-full bg-${col}-500 rounded-full opacity-80" style="width: ${pct}%"></div></div>
                    </div>`;
                });
                aiContainer.innerHTML = aiHtml;
            }

            // ================== 💡 渲染全员水位监控表 ==================
            const wlContainer = document.getElementById('workload-list');
            let wlHtml = '';
            
            // 计算排序：优先按记录填报工时排，没工时按积压单量排
            const sortedDesigners = Object.keys(designerStats).map(k => ({ key: k, ...designerStats[k] }))
                                  .sort((a,b) => {
                                      if (b.loggedHours !== a.loggedHours) return b.loggedHours - a.loggedHours;
                                      return b.activeTasks - a.activeTasks;
                                  });

            // 动态决定红线标准 (周: 40h, 月: 160h, 年: 1920h)
            let capacityLimit = currentView === 'week' ? 40 : (currentView === 'month' ? 160 : 1920);

            if (sortedDesigners.length === 0) {
                wlContainer.innerHTML = '<div class="text-center text-zinc-500 py-10 text-sm">系统未配置设计资源账号</div>';
            } else {
                sortedDesigners.forEach(d => {
                    let fillPct = Math.min(Math.round((d.loggedHours / capacityLimit) * 100), 100);
                    let statusColor = 'bg-zinc-600'; let textColor = 'text-zinc-400'; let statusTxt = '☕ 极度空闲'; let outlineCol = 'border-white/5';
                    
                    if (d.loggedHours > capacityLimit * 0.9) {
                        statusColor = 'bg-rose-500 shadow-[0_0_10px_#f43f5e]'; textColor = 'text-rose-400 font-bold'; statusTxt = '🔥 严重超负荷'; outlineCol = 'border-rose-500/30';
                    } else if (d.loggedHours > capacityLimit * 0.6) {
                        statusColor = 'bg-amber-500 shadow-[0_0_10px_#f59e0b]'; textColor = 'text-amber-400 font-bold'; statusTxt = '⚡ 高压饱和'; outlineCol = 'border-amber-500/20';
                    } else if (d.loggedHours > 0 || d.activeTasks > 0) {
                        statusColor = 'bg-emerald-500 shadow-[0_0_10px_#10b981]'; textColor = 'text-emerald-400'; statusTxt = '🟢 进度健康';
                    }
                    
                    // 特殊情况：没填工时但压了巨多单
                    if (fillPct === 0 && d.activeTasks > 3) {
                        statusTxt = '⚠️ 积压无产出'; textColor = 'text-orange-400'; outlineCol = 'border-orange-500/20';
                    }

                    wlHtml += `
                    <div class="workload-card p-4 rounded-2xl ${outlineCol} group">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-[10px] font-bold text-zinc-300 shadow-inner shrink-0 group-hover:scale-110 transition-transform">${d.name.substring(0,2).toUpperCase()}</div>
                                <div>
                                    <p class="text-[13px] font-bold text-white mb-0.5">${d.name}</p>
                                    <p class="text-[10px] ${textColor}">${statusTxt}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[14px] font-black text-white font-mono leading-none">${d.loggedHours.toFixed(1)} <span class="text-[10px] font-sans text-zinc-500 font-normal">h 耗时</span></p>
                                <p class="text-[10px] text-zinc-400 mt-1">手头积压: <span class="text-white font-bold">${d.activeTasks}</span> 件</p>
                            </div>
                        </div>
                        <div class="w-full h-1.5 bg-zinc-900 rounded-full overflow-hidden mt-2 relative">
                            <div class="absolute left-0 top-0 bottom-0 ${statusColor} progress-bar-fill opacity-90" style="width: ${fillPct}%"></div>
                        </div>
                    </div>`;
                });
                wlContainer.innerHTML = wlHtml;
            }
        }
    </script>
</body>
</html>
