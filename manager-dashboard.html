    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        if(window.loadDashboardData) window.loadDashboardData();
    </script>

    <script>

        // ================= 开灯 / 关灯主题切换：同步 index (1).html =================
        window.applyPageTheme = function(theme) {
            const isLight = theme === 'light';
            document.documentElement.classList.toggle('theme-light-preload', isLight);
            document.body.classList.toggle('theme-light', isLight);
            localStorage.setItem('requestHallTheme', isLight ? 'light' : 'dark');
            const icon = document.getElementById('themeToggleIcon');
            const btn = document.getElementById('themeToggleBtn');
            if (icon) {
                icon.innerHTML = isLight
                    ? `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 21h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M10 17h4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M8.5 14.5c-1.7-1.15-2.8-3.04-2.8-5.2A6.3 6.3 0 0 1 12 3a6.3 6.3 0 0 1 6.3 6.3c0 2.16-1.1 4.05-2.8 5.2-.86.58-1.22 1.07-1.35 1.5h-4.3c-.13-.43-.49-.92-1.35-1.5Z" fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="2.1" stroke-linejoin="round"/><path d="M12 6.5v2.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`
                    : `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 21h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M10 17h4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M8.5 14.5c-1.7-1.15-2.8-3.04-2.8-5.2A6.3 6.3 0 0 1 12 3a6.3 6.3 0 0 1 6.3 6.3c0 2.16-1.1 4.05-2.8 5.2-.86.58-1.22 1.07-1.35 1.5h-4.3c-.13-.43-.49-.92-1.35-1.5Z" stroke="currentColor" stroke-width="2.1" stroke-linejoin="round"/><path d="M12 6.5v2.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
            }
            if (btn) btn.title = isLight ? '切换为深色页面' : '切换为浅色页面';
            if (window._lastDashboardTasks && window.renderEcharts) window.renderEcharts(window._lastDashboardTasks);
        };
        window.togglePageTheme = function() {
            const current = localStorage.getItem('requestHallTheme') === 'light' ? 'light' : 'dark';
            window.applyPageTheme(current === 'light' ? 'dark' : 'light');
        };
        window.positionFloatingNotifMenu = function() {
            const btn = document.getElementById('notifBtn');
            const menu = document.getElementById('notifMenu');
            if (!btn || !menu || menu.classList.contains('hidden')) return;
            const rect = btn.getBoundingClientRect();
            menu.classList.add('is-floating-menu');
            const width = menu.offsetWidth || 340;
            let left = rect.right - width;
            left = Math.max(16, Math.min(left, window.innerWidth - width - 16));
            menu.style.left = left + 'px';
            menu.style.top = (rect.bottom + 12) + 'px';
        };

        const PAGE_TYPE = 'admin'; 
        
        // RBAC 初始化验证 (保持不变)
        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase().trim() : '';

            if (['davidxxu', 'davidxu', 'ponyxu'].includes(enName)) {
                user.perms = ['req', 'design', 'admin'];
            } else if (enName === 'judyzzhang') {
                if (!user.perms) user.perms = [];
                if (!user.perms.includes('admin')) user.perms.push('admin');
            }

            if (!(user.perms || []).includes('admin')) {
                alert("权限拦截：您没有总监控制台访问权限，为您退回大厅。");
                window.location.href = 'index.html';
                return false;
            }

            const avatarTxt = (user.displayName || user.name || user.cnName || user.enName || 'U').substring(0, 1).toUpperCase();
            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = avatarTxt; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-fuchsia-600'} border border-white/20 flex items-center justify-center text-white font-bold text-sm shadow-lg shrink-0`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.name || user.cnName || user.enName;
            
            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-fuchsia-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-fuchsia-500 animate-pulse shadow-[0_0_8px_#d946ef]"></span></span> 身份: 管理方`; }
            return user;
        }

        window.logout = function(e) { e.stopPropagation(); localStorage.removeItem('activeUserObj'); window.location.href = 'login.html'; }
        window.openPwdModal = function() { document.getElementById('pwd-modal-overlay').classList.remove('hidden'); setTimeout(() => { document.getElementById('pwd-modal-overlay').classList.remove('opacity-0'); document.getElementById('pwd-modal').classList.remove('hidden', 'scale-95'); }, 10); }
        window.closePwdModal = function() { document.getElementById('pwd-modal-overlay').classList.add('opacity-0'); document.getElementById('pwd-modal').classList.add('scale-95'); setTimeout(() => { document.getElementById('pwd-modal-overlay').classList.add('hidden'); document.getElementById('pwd-modal').classList.add('hidden'); }, 300); }
        window.submitPwdChange = function() { alert('提示：系统演示环境暂不可自助修改密码，请联系管理员。'); window.closePwdModal(); }
        window.showToast = function(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title; document.getElementById('toast-desc').innerText = desc;
            toast.classList.remove('hidden'); setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        // ================= 数据加载与图表渲染逻辑 =================
        let echartDist = null;
        let echartTrends = null;

        window.loadDashboardData = async function(isSilent = false) {
            if(!initRBAC() || !window.supabase) return;
            const syncDot = document.getElementById('sync-indicator');
            if(syncDot && !isSilent) syncDot.classList.remove('hidden');

            try {
                // 获取所有工单数据以供分析
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('*').order('created_at', { ascending: true });
                if (error) throw error;
                window._lastDashboardTasks = tasks || [];
                
                // --- 1. 顶部数据卡片计算 ---
                document.getElementById('stat-total-tasks').innerText = tasks.length;
                
                const terminatedCount = tasks.filter(t => t.status === 'terminated').length;
                document.getElementById('stat-terminated').innerText = terminatedCount;

                let totalDays = 0;
                let completedCount = 0;
                let rejectedCount = 0;

                tasks.forEach(task => {
                    // 计算打回率
                    let hist = [];
                    try { hist = JSON.parse(task.history_json || '[]'); } catch(e){}
                    
                    const hasReject = hist.some(h => h.action === 'reject_framework' || h.action === 'reject_draft' || h.is_rejected === true);
                    if(hasReject) rejectedCount++;

                    // 计算SLA (平均交付周期)
                    if (task.status === 'completed' || task.status === 'archived') {
                        let endTime = new Date(task.created_at);
                        if(hist.length > 0) {
                            endTime = new Date(hist[hist.length - 1].time || hist[hist.length - 1].created_at);
                        }
                        const startTime = new Date(task.created_at);
                        const diffTime = Math.abs(endTime - startTime);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                        totalDays += (diffDays === 0 ? 1 : diffDays); // 最少算1天
                        completedCount++;
                    }
                });

                const avgSLA = completedCount > 0 ? (totalDays / completedCount).toFixed(1) : 0;
                document.getElementById('stat-avg-time').innerText = avgSLA;

                const rejectRate = tasks.length > 0 ? Math.round((rejectedCount / tasks.length) * 100) : 0;
                document.getElementById('stat-rework-rate').innerText = rejectRate + '%';

                // --- 2. 渲染图表 ---
                renderEcharts(tasks);

                document.getElementById('dashboard-loading').classList.add('hidden');
            } catch (err) {
                console.error("Dashboard Load Error:", err);
                if(!isSilent) window.showToast('数据分析异常', err.message, 'error');
            } finally {
                if(syncDot) setTimeout(() => syncDot.classList.add('hidden'), 500);
            }
        }

        window.renderEcharts = function renderEcharts(tasks) {
            const isLight = document.body.classList.contains('theme-light');
            const chartBg = isLight ? '#FFFFFF' : '#18181b';
            const chartBorder = isLight ? '#E2E8F0' : '#3f3f46';
            const chartText = isLight ? '#515154' : '#e4e4e7';
            const chartMuted = isLight ? '#86868B' : '#a1a1aa';
            const axisLine = isLight ? '#E5E7EB' : '#3f3f46';
            const splitLine = isLight ? '#E5E7EB' : '#27272a';
            const pieBorder = isLight ? '#FFFFFF' : '#121217';
            // -- 业务分布数据预处理 (Pie Chart) --
            const projectCounts = {};
            tasks.forEach(t => {
                const proj = t.project && t.project !== 'none' ? t.project : '未分类/常规设计';
                projectCounts[proj] = (projectCounts[proj] || 0) + 1;
            });
            const pieData = Object.keys(projectCounts).map(key => ({
                name: key,
                value: projectCounts[key]
            })).sort((a,b) => b.value - a.value);

            if (!echartDist) { echartDist = echarts.init(document.getElementById('chart-distribution')); }
            echartDist.setOption({
                tooltip: { trigger: 'item', backgroundColor: chartBg, borderColor: chartBorder, textStyle: { color: chartText } },
                legend: { top: 'bottom', textStyle: { color: chartMuted, fontSize: 11 }, type: 'scroll' },
                series: [{
                    name: '需求占比',
                    type: 'pie',
                    radius: ['45%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 10, borderColor: pieBorder, borderWidth: 2 },
                    label: { show: false, position: 'center' },
                    emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold', color: chartText } },
                    labelLine: { show: false },
                    data: pieData.length > 0 ? pieData : [{value: 0, name: '暂无数据'}],
                    color: ['#d946ef', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b', '#f43f5e', '#64748b']
                }]
            });

            // -- 趋势数据预处理 (Line/Bar Chart) --
            // 按月份分组统计新增和完结
            const monthMap = {};
            // 初始化近6个月的结构
            for(let i=5; i>=0; i--) {
                const d = new Date(); d.setMonth(d.getMonth() - i);
                const mStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
                monthMap[mStr] = { created: 0, completed: 0 };
            }

            tasks.forEach(t => {
                // 统计新增
                const cDate = new Date(t.created_at);
                const cMonth = `${cDate.getFullYear()}-${String(cDate.getMonth()+1).padStart(2, '0')}`;
                if(monthMap[cMonth] !== undefined) monthMap[cMonth].created++;

                // 统计结单
                if (t.status === 'completed' || t.status === 'archived') {
                    let endD = new Date(t.created_at);
                    try {
                        let hist = JSON.parse(t.history_json || '[]');
                        if(hist.length > 0) endD = new Date(hist[hist.length - 1].time || hist[hist.length - 1].created_at);
                    } catch(e){}
                    const endMonth = `${endD.getFullYear()}-${String(endD.getMonth()+1).padStart(2, '0')}`;
                    if(monthMap[endMonth] !== undefined) monthMap[endMonth].completed++;
                }
            });

            const xAxisData = Object.keys(monthMap);
            const createdData = xAxisData.map(k => monthMap[k].created);
            const completedData = xAxisData.map(k => monthMap[k].completed);

            if (!echartTrends) { echartTrends = echarts.init(document.getElementById('chart-trends')); }
            echartTrends.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: chartBg, borderColor: chartBorder, textStyle: { color: chartText } },
                legend: { data: ['新增需求量', '完结消化量'], textStyle: { color: chartMuted } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: [{ type: 'category', data: xAxisData.map(d => d.substring(5) + '月'), axisLabel: { color: chartMuted }, axisLine: { lineStyle: { color: axisLine } } }],
                yAxis: [{ type: 'value', splitLine: { lineStyle: { color: splitLine, type: 'dashed' } }, axisLabel: { color: chartMuted } }],
                series: [
                    {
                        name: '新增需求量', type: 'bar', barWidth: '30%',
                        itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#38bdf8' }, { offset: 1, color: '#0284c7' }]), borderRadius: [4, 4, 0, 0] },
                        data: createdData
                    },
                    {
                        name: '完结消化量', type: 'line', smooth: true, symbol: 'circle', symbolSize: 8,
                        itemStyle: { color: '#10b981' }, lineStyle: { width: 3, shadowColor: 'rgba(16,185,129,0.3)', shadowBlur: 10 },
                        data: completedData
                    }
                ]
            });

            // 监听窗口缩放重绘
            window.addEventListener('resize', () => {
                echartDist.resize(); echartTrends.resize();
            });
        }

        // ================= 🔔 全局消息中心 (保持不变) =================
        let lastNotifHash = '';
        window.syncNotificationsFromCloud = async function(isSilent = true) {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            try {
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('id, title, history_json').order('created_at', { ascending: false });
                if (error) throw error;
                let myNotifs = [];
                tasks.forEach(task => {
                    let hist = []; try { hist = JSON.parse(task.history_json || '[]'); } catch(e){}
                    hist.forEach((h, index) => {
                        const op = (h.operator || '').toLowerCase(); if (op.includes(myName)) return;
                        let title = ''; let content = ''; let icon = 'bg-fuchsia-500';
                        if (h.action === 'submit_framework') { title = '👀 框架待审批'; content = `${h.operator} 提交了中期方案，等待审批：《${task.title}》`; icon = 'bg-amber-500'; }
                        else if (h.action === 'submit_draft') { title = '🎁 正稿待验收'; content = `${h.operator} 交付了正式稿，等待甲方验收：《${task.title}》`; icon = 'bg-emerald-500'; }
                        else if (h.action === 'reject_framework' || h.action === 'reject_draft' || h.is_rejected) { title = '💥 方案被打回'; content = `单据发生打回重修：《${task.title}》`; icon = 'bg-rose-500'; }
                        else if (h.action === 'complete') { title = '✅ 任务圆满结案'; content = `甲方已验收通过：《${task.title}》`; icon = 'bg-emerald-500'; }
                        else if (h.action && h.action.includes('urge')) { title = '🚨 紧急催办'; content = `单据产生催办行为：《${task.title}》`; icon = 'bg-rose-500'; }
                        if (title) myNotifs.push({ id: `${task.id}_${index}_${title}`, taskId: task.id, title: title, content: content, time: h.time || h.created_at || new Date().toISOString(), icon: icon });
                    });
                });
                myNotifs.sort((a, b) => new Date(b.time) - new Date(a.time));
                let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
                const unreadNotifs = myNotifs.filter(n => !readReceipts.includes(n.id));
                const unreadCount = unreadNotifs.length;
                const newHash = myNotifs.map(n => n.id + (readReceipts.includes(n.id) ? '_r' : '_u')).join(',');
                if (isSilent && newHash === lastNotifHash) return;
                lastNotifHash = newHash;

                const bellDot = document.getElementById('bell-dot');
                if (bellDot) {
                    if (unreadCount > 0) { bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent'); bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]'); } 
                    else { bellDot.classList.add('hidden'); }
                }
                const notifContainer = document.getElementById('notif-list-container');
                if (notifContainer) {
                    if (unreadCount === 0) { notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>'; } 
                    else {
                        notifContainer.innerHTML = unreadNotifs.map(n => {
                            const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            return `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors" onclick="window.markSingleAsRead('${n.id}', '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1"><h4 class="text-[13px] font-bold text-white flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full ${n.icon} shrink-0 shadow-[0_0_8px_currentColor]"></span>${n.title}</h4><span class="text-[10px] text-zinc-500">${dateStr}</span></div>
                                <p class="text-[11px] text-zinc-400 pl-4 line-clamp-2">${n.content}</p>
                            </div>`;
                        }).join('');
                    }
                }
                window.currentMyUnreadIds = unreadNotifs.map(n => n.id);
            } catch(e) {}
        };

        window.toggleNotificationPanel = function(event) {
            if(event) event.stopPropagation();
            const dropdown = document.getElementById('notifMenu');
            if(dropdown) { dropdown.classList.toggle('hidden'); if (!dropdown.classList.contains('hidden')) { window.syncNotificationsFromCloud(true); setTimeout(window.positionFloatingNotifMenu, 0); } }
        }

        window.markSingleAsRead = function(id, taskId) {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            if (!readReceipts.includes(id)) { readReceipts.push(id); localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts)); }
            window.location.href = 'task-detail-requester.html?id=' + taskId;
        };

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            if (!window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            const btn = event.currentTarget; const originalText = btn.innerHTML; btn.innerHTML = "处理中...";
            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            readReceipts = [...new Set([...readReceipts, ...window.currentMyUnreadIds])];
            localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts));
            window.syncNotificationsFromCloud(true); btn.innerHTML = originalText;
        };

        document.addEventListener('DOMContentLoaded', () => {
            window.applyPageTheme(localStorage.getItem('requestHallTheme') === 'light' ? 'light' : 'dark');
            window.addEventListener('resize', window.positionFloatingNotifMenu);
            window.addEventListener('scroll', window.positionFloatingNotifMenu, true);
            document.addEventListener('click', (e) => { 
                const notifMenu = document.getElementById('notifMenu'); const notifBtn = document.getElementById('notifBtn');
                if(notifMenu && !notifMenu.contains(e.target) && notifBtn && !notifBtn.contains(e.target)) notifMenu.classList.add('hidden'); 
            });
            window.loadDashboardData();
            setTimeout(() => { window.syncNotificationsFromCloud(true); }, 1500);
            setInterval(() => { window.loadDashboardData(true); window.syncNotificationsFromCloud(true); }, 8000); // 调整为8秒刷新大盘数据
        });
    </script>
</body>
</html>
