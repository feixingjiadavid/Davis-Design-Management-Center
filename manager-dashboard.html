<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队效能大盘 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-fuchsia-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 right-1/4 w-[800px] h-[600px] bg-fuchsia-900/10 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-fuchsia-600 flex items-center justify-center shadow-[0_0_15px_rgba(217,70,239,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='manager-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <span class="font-medium text-[14px]">总监控制台</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-500/20 transition-all cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span class="font-bold text-[14px]">团队效能大盘</span>
            </button>
            <button onclick="window.location.href='project-analysis.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <span class="font-medium text-[14px]">项目投入分析</span>
            </button>
            <button onclick="window.location.href='message-center.html?role=admin'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span class="font-medium text-[14px]">全局消息中心</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl z-20">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight mb-1.5 flex items-center gap-2">
                    团队产能与效能大盘
                    <span class="bg-fuchsia-500/20 text-fuchsia-400 text-[11px] px-2.5 py-0.5 rounded-lg border border-fuchsia-500/30 ml-2">管理视角</span>
                    <div id="sync-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 animate-pulse ml-2" title="云端连接中..."></div>
                </h2>
                <p class="text-xs text-zinc-500">直观呈现团队当期产出与负荷情况，支持多页签与分页检索。</p>
            </div>
            
            <div class="flex items-center gap-5 relative">
                <div class="relative z-[150]" id="notif-wrapper">
                    <button id="notifBtn" onclick="window.toggleNotificationPanel(event)" class="w-10 h-10 rounded-xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="bell-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                    </button>
                    <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                        <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                            <h3 class="text-[14px] font-bold text-white">全盘预警与通知</h3>
                            <button onclick="window.markAllAsRead(event)" class="text-[11px] text-fuchsia-400 hover:text-fuchsia-300 btn-press transition-colors">全部已读</button>
                        </div>
                        <div class="max-h-[300px] overflow-y-auto custom-scrollbar" id="notif-list-container">
                            <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-hidden flex flex-col z-10 relative">
            <div id="dashboard-loading" class="absolute inset-0 bg-[#0c0c0e]/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-fuchsia-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">SYNCING GLOBAL DATA...</p>
            </div>

            <div class="flex gap-6 mb-8 flex-wrap shrink-0">
                <div class="flex-1 bg-[#16161d] border border-white/5 rounded-3xl p-5 flex items-center gap-5 min-w-[200px] shadow-lg">
                    <div class="w-14 h-14 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-500 border border-emerald-500/20">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <div>
                        <p class="text-[12px] text-zinc-500 font-bold mb-1">进行中项目</p>
                        <p class="text-[32px] font-black text-emerald-400 font-mono leading-none" id="stat-ongoing">0</p>
                    </div>
                </div>

                <div class="flex-1 bg-[#16161d] border border-white/5 rounded-3xl p-5 flex items-center gap-5 min-w-[200px] shadow-lg">
                    <div class="w-14 h-14 rounded-full bg-amber-500/10 flex items-center justify-center text-amber-500 border border-amber-500/20">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                    <div>
                        <p class="text-[12px] text-zinc-500 font-bold mb-1">待响应/审批数</p>
                        <p class="text-[32px] font-black text-amber-400 font-mono leading-none" id="stat-pending">0</p>
                    </div>
                </div>
                
                <div class="flex-[1.5] bg-[#16161d] border border-white/5 rounded-3xl p-5 flex flex-col justify-center min-w-[240px] shadow-lg relative overflow-hidden group">
                    <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-indigo-500"></div>
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-full bg-indigo-500/10 flex items-center justify-center text-indigo-400 border border-indigo-500/20 shrink-0">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[12px] text-zinc-500 font-bold mb-1">累计完结工单 <span class="text-[10px] font-normal">(本月)</span></p>
                            <div class="flex items-end gap-6">
                                <p class="text-[32px] font-black text-indigo-400 font-mono leading-none" id="stat-completed-month">0</p>
                                <div class="flex gap-4 text-[11px] text-zinc-500 pb-1">
                                    <span class="flex items-center gap-1">本周: <b id="stat-completed-week" class="text-zinc-300 font-mono">0</b></span>
                                    <span class="flex items-center gap-1">全年: <b id="stat-completed-year" class="text-zinc-300 font-mono">0</b></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex gap-10 min-h-0">
                <div class="flex-[2] flex flex-col bg-[#121217]/50 border border-white/5 rounded-3xl p-6 shadow-xl relative min-w-0">
                    <div class="flex items-center gap-6 mb-4 border-b border-white/10 px-2 shrink-0">
                        <button onclick="window.switchTab('ongoing')" id="tab-ongoing" class="text-[14px] font-bold text-emerald-400 border-b-2 border-emerald-500 pb-3 flex items-center gap-2 transition-colors btn-press">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>流转中工单 (<span id="tab-count-ongoing" class="font-mono">0</span>)
                        </button>
                        <button onclick="window.switchTab('completed')" id="tab-completed" class="text-[14px] font-bold text-zinc-500 border-b-2 border-transparent pb-3 flex items-center gap-2 hover:text-zinc-300 transition-colors btn-press">
                            <span class="w-2 h-2 rounded-full bg-zinc-500"></span>已完结/归档 (<span id="tab-count-completed" class="font-mono">0</span>)
                        </button>
                    </div>
                    <div class="flex-1 flex flex-col min-h-0 relative">
                        <div class="absolute inset-0 overflow-y-auto custom-scrollbar pr-4 space-y-4" id="tasks-list-container"></div>
                    </div>
                    <div class="pt-4 mt-2 border-t border-white/10 flex justify-end items-center gap-3 shrink-0" id="pagination-controls"></div>
                </div>

                <div class="flex-[1] flex flex-col">
                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-6 h-full flex flex-col shadow-2xl">
                        <h3 class="text-[15px] font-bold text-white mb-6">实时资源池监控 <span class="text-xs text-zinc-500 font-normal ml-1">(全部人员)</span></h3>
                        <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2" id="resource-pool"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        if(window.loadDashboardData) window.loadDashboardData();
    </script>

    <script>
        window.ongoingTasksData = []; window.completedTasksData = []; window.currentTab = 'ongoing'; window.currentPage = 1; const ITEMS_PER_PAGE = 8;
        
        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            return JSON.parse(userStr);
        }

        window.loadDashboardData = async function(isSilent = false) {
            if(!initRBAC() || !window.supabase) return;
            const syncDot = document.getElementById('sync-indicator');
            if(syncDot && !isSilent) syncDot.classList.remove('hidden');

            try {
                // 1. 获取包含所有设计/管理权限的全量名单
                const { data: users } = await window.supabase.from('users').select('enName, name, email, perms');
                let systemUsers = [];
                if (users) {
                    users.forEach(u => {
                        let p = [];
                        if (typeof u.perms === 'string') try { p = JSON.parse(u.perms); } catch(e){}
                        else if (Array.isArray(u.perms)) p = u.perms;
                        if(p.includes('design') || p.includes('admin')) {
                            systemUsers.push({ en: (u.enName || '').toLowerCase(), display: u.name || u.enName });
                        }
                    });
                }

                // 2. 获取任务
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('id, title, status, creator, assignee, due_date, history_json, created_at').order('created_at', { ascending: false });
                if (error) throw error;
                
                window.ongoingTasksData = (tasks || []).filter(t => !['completed', 'archived', 'terminated'].includes(t.status));
                window.completedTasksData = (tasks || []).filter(t => ['completed', 'archived', 'terminated'].includes(t.status));
                const pendingCount = window.ongoingTasksData.filter(t => ['pending', 'pending_accept', 'pending_approval', 'reviewing'].includes(t.status)).length;

                let weekC = 0, monthC = 0, yearC = 0;
                const now = new Date();
                const startOfYear = new Date(now.getFullYear(), 0, 1);
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const day = now.getDay() || 7;
                const startOfWeek = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day + 1);
                startOfWeek.setHours(0,0,0,0);

                window.completedTasksData.forEach(t => {
                    let dStr = t.created_at;
                    try {
                        let hArr = JSON.parse(t.history_json || '[]');
                        if(hArr.length > 0) dStr = hArr[hArr.length-1].time || hArr[hArr.length-1].created_at || dStr;
                    } catch(e){}
                    const cDate = new Date(dStr);
                    if (cDate >= startOfWeek) weekC++;
                    if (cDate >= startOfMonth) monthC++;
                    if (cDate >= startOfYear) yearC++;
                });

                if(!isSilent) {
                    document.getElementById('stat-ongoing').innerText = window.ongoingTasksData.length;
                    document.getElementById('stat-pending').innerText = pendingCount;
                    document.getElementById('stat-completed-month').innerText = monthC;
                    document.getElementById('stat-completed-week').innerText = weekC;
                    document.getElementById('stat-completed-year').innerText = yearC;
                    document.getElementById('tab-count-ongoing').innerText = window.ongoingTasksData.length;
                    document.getElementById('tab-count-completed').innerText = window.completedTasksData.length;

                    window.renderTasksList();

                    // 资源池：0也要展示
                    let designersMap = {};
                    systemUsers.forEach(u => { designersMap[u.en] = { display: u.display, count: 0, hours: 0 }; });

                    window.ongoingTasksData.forEach(t => {
                        if (t.assignee && t.assignee !== 'none') {
                            const assKey = t.assignee.toLowerCase();
                            let matched = Object.keys(designersMap).find(k => assKey.includes(k));
                            if(matched) designersMap[matched].count += 1;
                        }
                    });

                    const poolContainer = document.getElementById('resource-pool');
                    let poolHtml = '';
                    Object.values(designersMap).sort((a,b) => b.count - a.count).forEach(data => {
                        const statusColor = data.count === 0 ? 'text-zinc-500' : (data.count > 2 ? 'text-rose-500' : 'text-emerald-500');
                        const statusText = data.count === 0 ? '空闲' : (data.count > 2 ? '高负荷' : '适中');
                        const opacity = data.count === 0 ? 'opacity-60' : 'opacity-100';
                        poolHtml += `<div class="flex items-center justify-between py-3 border-b border-white/5 last:border-0 ${opacity}">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-[10px] font-bold text-zinc-300 shadow-inner shrink-0">${data.display.substring(0,2).toUpperCase()}</div>
                                <div><p class="text-[13px] font-bold text-zinc-200 flex items-center gap-2">${data.display} <span class="text-[10px] text-zinc-500 bg-white/5 px-1.5 rounded border border-white/10 font-normal">${data.count} 单</span></p></div>
                            </div>
                            <div class="text-right shrink-0"><p class="text-[12px] font-bold ${statusColor} mb-0.5">${statusText}</p></div>
                        </div>`;
                    });
                    poolContainer.innerHTML = poolHtml;
                }
                document.getElementById('dashboard-loading').classList.add('hidden');
            } catch (err) { console.error(err); } finally { if(syncDot) setTimeout(() => syncDot.classList.add('hidden'), 500); }
        }

        window.switchTab = function(tabName) {
            window.currentTab = tabName; window.currentPage = 1; 
            const tOngoing = document.getElementById('tab-ongoing'); const tCompleted = document.getElementById('tab-completed');
            if (tabName === 'ongoing') {
                tOngoing.className = "text-[14px] font-bold text-emerald-400 border-b-2 border-emerald-500 pb-3 flex items-center gap-2 transition-colors btn-press";
                tOngoing.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>流转中工单 (<span id="tab-count-ongoing" class="font-mono">${window.ongoingTasksData.length}</span>)`;
                tCompleted.className = "text-[14px] font-bold text-zinc-500 border-b-2 border-transparent pb-3 flex items-center gap-2 hover:text-zinc-300 transition-colors btn-press";
                tCompleted.innerHTML = `<span class="w-2 h-2 rounded-full bg-zinc-500"></span>已完结/归档 (<span id="tab-count-completed" class="font-mono">${window.completedTasksData.length}</span>)`;
            } else {
                tOngoing.className = "text-[14px] font-bold text-zinc-500 border-b-2 border-transparent pb-3 flex items-center gap-2 hover:text-zinc-300 transition-colors btn-press";
                tOngoing.innerHTML = `<span class="w-2 h-2 rounded-full bg-zinc-500"></span>流转中工单 (<span id="tab-count-ongoing" class="font-mono">${window.ongoingTasksData.length}</span>)`;
                tCompleted.className = "text-[14px] font-bold text-indigo-400 border-b-2 border-indigo-500 pb-3 flex items-center gap-2 transition-colors btn-press";
                tCompleted.innerHTML = `<span class="w-2 h-2 rounded-full bg-indigo-500 shadow-[0_0_8px_#6366f1]"></span>已完结/归档 (<span id="tab-count-completed" class="font-mono">${window.completedTasksData.length}</span>)`;
            }
            window.renderTasksList();
        }

        window.changePage = function(delta) {
            const data = window.currentTab === 'ongoing' ? window.ongoingTasksData : window.completedTasksData;
            const totalPages = Math.ceil(data.length / ITEMS_PER_PAGE) || 1;
            const newPage = window.currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) { window.currentPage = newPage; window.renderTasksList(); }
        }

        window.renderTasksList = function() {
            const data = window.currentTab === 'ongoing' ? window.ongoingTasksData : window.completedTasksData;
            const container = document.getElementById('tasks-list-container');
            const pageControls = document.getElementById('pagination-controls');
            
            if (data.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-50"><p class="text-zinc-500 text-sm">此列表暂无工单</p></div>`; pageControls.innerHTML = ''; return;
            }

            const totalPages = Math.ceil(data.length / ITEMS_PER_PAGE);
            if (window.currentPage > totalPages) window.currentPage = totalPages;
            const start = (window.currentPage - 1) * ITEMS_PER_PAGE;
            const pageData = data.slice(start, start + ITEMS_PER_PAGE);
            
            let html = '';
            pageData.forEach(t => {
                let sColor, sText, btnHtml;
                if (window.currentTab === 'completed') {
                    sColor = t.status === 'terminated' ? 'rose' : 'zinc'; 
                    sText = t.status === 'terminated' ? '已强行终止' : '已验收完结';
                    btnHtml = `<button onclick="event.stopPropagation(); window.location.href='task-detail-requester.html?id=${t.id}'" class="text-zinc-300 bg-zinc-800 hover:bg-zinc-700 px-4 py-1.5 rounded-lg text-[11px] font-bold transition-colors btn-press border border-zinc-700 shadow-sm">查看详情快照</button>`;
                } else {
                    switch(t.status) {
                        case 'pending': sColor = 'sky'; sText = '待接单'; btnHtml = `<button class="text-sky-400 bg-sky-500/10 px-3 py-1 rounded text-[11px] font-bold">待响应</button>`; break;
                        case 'pending_accept': sColor = 'amber'; sText = '待确认接单'; btnHtml = `<button class="text-amber-400 bg-amber-500/10 px-3 py-1 rounded text-[11px] font-bold">待接单</button>`; break;
                        case 'processing': sColor = 'orange'; sText = '制作中'; btnHtml = `<button class="text-orange-400 bg-orange-500/10 px-3 py-1 rounded text-[11px] font-bold">查看进度</button>`; break;
                        case 'pending_approval': sColor = 'amber'; sText = '框架审批中'; btnHtml = `<button onclick="event.stopPropagation(); window.location.href='task-detail-requester.html?id=${t.id}'" class="text-white bg-amber-600 hover:bg-amber-500 px-4 py-1.5 rounded-lg text-[11px] font-bold transition-colors shadow-lg btn-press">⚡ 去审批</button>`; break;
                        case 'reviewing': sColor = 'emerald'; sText = '待甲方验收'; btnHtml = `<button class="text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded text-[11px] font-bold">甲方验收中</button>`; break;
                        case 'rejected': sColor = 'rose'; sText = '打回修改中'; btnHtml = `<button class="text-rose-400 bg-rose-500/10 px-3 py-1 rounded text-[11px] font-bold">督办催稿</button>`; break;
                        default: sColor = 'zinc'; sText = '未知状态'; btnHtml = '';
                    }
                }
                const opacityClass = window.currentTab === 'completed' ? 'opacity-70 hover:opacity-100' : '';
                html += `
                <div class="bg-[#18181b] border border-white/5 rounded-2xl p-5 hover:border-white/10 transition-colors cursor-pointer relative overflow-hidden group ${opacityClass}" onclick="window.location.href='task-detail-requester.html?id=${t.id}'">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-${sColor}-500 group-hover:w-1.5 transition-all"></div>
                    <div class="flex justify-between items-center mb-4 pl-1">
                        <div class="flex items-center gap-3"><span class="text-[10px] font-mono font-bold bg-white/5 px-2 py-0.5 rounded border border-white/10 text-zinc-400">${t.id}</span><span class="text-[14px] font-bold text-white group-hover:text-${sColor}-400 transition-colors">${t.title}</span></div>
                        ${btnHtml}
                    </div>
                    <div class="flex justify-between items-center text-[12px] text-zinc-500 pl-1">
                        <div class="flex items-center gap-4"><span class="flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> 委派: <strong class="text-zinc-300 font-normal">${t.assignee === 'none' ? '暂未分配' : t.assignee}</strong></span><span class="flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> 状态: <span class="text-${sColor}-400 font-bold">${sText}</span></span></div>
                        <span class="font-mono">期望交付: ${t.due_date || '未定'}</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            pageControls.innerHTML = `
                <button onclick="window.changePage(-1)" class="px-4 py-2 rounded-xl text-[12px] font-bold ${window.currentPage === 1 ? 'bg-zinc-800/50 text-zinc-600 cursor-not-allowed' : 'bg-[#18181b] text-zinc-300 hover:text-white border border-white/10 btn-press'} transition-all flex items-center gap-1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg> 上一页</button>
                <div class="bg-[#18181b] border border-white/5 rounded-xl px-4 py-2 flex items-center justify-center min-w-[80px]"><span class="text-[12px] text-white font-bold font-mono">${window.currentPage} <span class="text-zinc-500 font-normal mx-1">/</span> ${totalPages}</span></div>
                <button onclick="window.changePage(1)" class="px-4 py-2 rounded-xl text-[12px] font-bold ${window.currentPage === totalPages ? 'bg-zinc-800/50 text-zinc-600 cursor-not-allowed' : 'bg-[#18181b] text-zinc-300 hover:text-white border border-white/10 btn-press'} transition-all flex items-center gap-1">下一页 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            `;
        }

        // ================= 🔔 全局消息中心 (history_json 解析) =================
        let lastNotifHash = '';
        window.syncNotificationsFromCloud = async function(isSilent = true) {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            try {
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('id, title, history_json').order('created_at', { ascending: false });
                if (error) throw error;
                let myNotifs = [];
                tasks.forEach(task => {
                    let hist = []; try { hist = JSON.parse(task.history_json || '[]'); } catch(e){}
                    hist.forEach((h, index) => {
                        const op = (h.operator || '').toLowerCase(); if (op.includes(myName)) return;
                        let title = ''; let content = ''; let icon = 'bg-fuchsia-500';
                        if (h.action === 'submit_framework') { title = '👀 框架待审批'; content = `${h.operator} 提交了中期方案，等待审批：《${task.title}》`; icon = 'bg-amber-500'; }
                        else if (h.action === 'submit_draft') { title = '🎁 正稿待验收'; content = `${h.operator} 交付了正式稿，等待甲方验收：《${task.title}》`; icon = 'bg-emerald-500'; }
                        else if (h.action === 'reject_framework' || h.action === 'reject_draft' || h.is_rejected) { title = '💥 方案被打回'; content = `单据发生打回重修：《${task.title}》`; icon = 'bg-rose-500'; }
                        else if (h.action === 'complete') { title = '✅ 任务圆满结案'; content = `甲方已验收通过：《${task.title}》`; icon = 'bg-emerald-500'; }
                        else if (h.action && h.action.includes('urge')) { title = '🚨 紧急催办'; content = `单据产生催办行为：《${task.title}》`; icon = 'bg-rose-500'; }
                        if (title) myNotifs.push({ id: `${task.id}_${index}_${title}`, taskId: task.id, title: title, content: content, time: h.time || h.created_at || new Date().toISOString(), icon: icon });
                    });
                });
                myNotifs.sort((a, b) => new Date(b.time) - new Date(a.time));
                let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
                const unreadNotifs = myNotifs.filter(n => !readReceipts.includes(n.id));
                const unreadCount = unreadNotifs.length;
                const newHash = myNotifs.map(n => n.id + (readReceipts.includes(n.id) ? '_r' : '_u')).join(',');
                if (isSilent && newHash === lastNotifHash) return;
                lastNotifHash = newHash;

                const bellDot = document.getElementById('bell-dot');
                if (bellDot) {
                    if (unreadCount > 0) { bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent'); bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]'); } 
                    else { bellDot.classList.add('hidden'); }
                }
                const notifContainer = document.getElementById('notif-list-container');
                if (notifContainer) {
                    if (unreadCount === 0) { notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>'; } 
                    else {
                        notifContainer.innerHTML = unreadNotifs.map(n => {
                            const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            return `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors" onclick="window.markSingleAsRead('${n.id}', '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1"><h4 class="text-[13px] font-bold text-white flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full ${n.icon} shrink-0 shadow-[0_0_8px_currentColor]"></span>${n.title}</h4><span class="text-[10px] text-zinc-500">${dateStr}</span></div>
                                <p class="text-[11px] text-zinc-400 pl-4 line-clamp-2">${n.content}</p>
                            </div>`;
                        }).join('');
                    }
                }
                window.currentMyUnreadIds = unreadNotifs.map(n => n.id);
            } catch(e) {}
        };

        window.toggleNotificationPanel = function(event) {
            if(event) event.stopPropagation();
            const dropdown = document.getElementById('notifMenu');
            if(dropdown) { dropdown.classList.toggle('hidden'); if (!dropdown.classList.contains('hidden')) window.syncNotificationsFromCloud(true); }
        }

        window.markSingleAsRead = function(id, taskId) {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            if (!readReceipts.includes(id)) { readReceipts.push(id); localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts)); }
            window.location.href = 'task-detail-requester.html?id=' + taskId;
        };

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            if (!window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            const btn = event.currentTarget; const originalText = btn.innerHTML; btn.innerHTML = "处理中...";
            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            readReceipts = [...new Set([...readReceipts, ...window.currentMyUnreadIds])];
            localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts));
            window.syncNotificationsFromCloud(true); btn.innerHTML = originalText;
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('click', (e) => { 
                const notifMenu = document.getElementById('notifMenu'); const notifBtn = document.getElementById('notifBtn');
                if(notifMenu && !notifMenu.contains(e.target) && notifBtn && !notifBtn.contains(e.target)) notifMenu.classList.add('hidden'); 
            });
            window.loadDashboardData();
            setTimeout(() => { window.syncNotificationsFromCloud(true); }, 1500);
            setInterval(() => { window.loadDashboardData(true); window.syncNotificationsFromCloud(true); }, 8000);
        });
    </script>
</body>
</html>
