    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">

                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-fuchsia-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>

                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label><input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-fuchsia-500 transition-colors" placeholder="再次输入新密码"></div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-fuchsia-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        
        if(window.loadDashboardData) window.loadDashboardData();

    <script>
        const PAGE_TYPE = 'admin'; 

        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0'); dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-fuchsia-500';
                icon.className = 'w-8 h-8 rounded-full bg-fuchsia-500/20 text-fuchsia-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
        }

        function showDialogUI() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); dialog.classList.remove('scale-95'); }, 10);
        }

        window.showAlert = function(title, message, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-fuchsia-600 hover:bg-fuchsia-500');
            btnContainer.innerHTML = `<button onclick="closeCustomDialog()" class="w-full py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">我知道了</button>`;
            showDialogUI();
        }

        window.logout = function(e) { e.stopPropagation(); localStorage.removeItem('activeUserObj'); window.location.href = 'login.html'; }
        window.openPwdModal = function() { document.getElementById('pwd-modal-overlay').classList.remove('hidden'); setTimeout(() => { document.getElementById('pwd-modal-overlay').classList.remove('opacity-0'); document.getElementById('pwd-modal').classList.remove('hidden', 'scale-95'); }, 10); }
        window.closePwdModal = function() { document.getElementById('pwd-modal-overlay').classList.add('opacity-0'); document.getElementById('pwd-modal').classList.add('scale-95'); setTimeout(() => { document.getElementById('pwd-modal-overlay').classList.add('hidden'); document.getElementById('pwd-modal').classList.add('hidden'); }, 300); }
        window.submitPwdChange = function() { window.showAlert('提示', '系统演示环境暂不可自助修改密码，请联系管理员。', 'info'); window.closePwdModal(); }

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase().trim() : '';

            // 💡 终极兜底提权：保护这三个超管，且给领导授权
            if (['davidxxu', 'davidxu', 'ponyxu'].includes(enName)) {
                user.perms = ['req', 'design', 'admin'];
            } else if (enName === 'judyzzhang') {
                if (!user.perms) user.perms = [];
                if (!user.perms.includes('admin')) user.perms.push('admin');
                if (!user.perms.includes('req')) user.perms.push('req');
            }

            if (!(user.perms || []).includes('admin')) {
                window.showAlert("权限拦截", "您没有总监控制台访问权限，为您退回大厅。", "danger");
                setTimeout(()=> window.location.href = 'index.html', 1500);
                return false;
            }

            const avatarTxt = (user.displayName || user.name || user.cnName || user.enName || 'U').substring(0, 1).toUpperCase();
            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = avatarTxt; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-fuchsia-600'} border border-white/20 flex items-center justify-center text-white font-bold text-sm shadow-lg shrink-0`; }
            
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.name || user.cnName || user.enName;
            if(document.getElementById('sidebar-role')) document.getElementById('sidebar-role').innerHTML = `<span class="text-fuchsia-400 font-bold">当前视角: 管理方</span>`;
            
            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = '';
                if ((user.perms || []).includes('req')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='index.html'"><div class="w-7 h-7 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-400"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-medium">需求方 (去发单/验收)</span></div>`; 
                }
                if ((user.perms || []).includes('design')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='assistant-workspace.html'"><div class="w-7 h-7 rounded-lg bg-orange-500/10 flex items-center justify-center text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-medium">设计方 (执行看板)</span></div>`; 
                }
                if ((user.perms || []).includes('admin')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#3b1740] text-fuchsia-400 cursor-default border border-fuchsia-900/50"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/20 flex items-center justify-center text-fuchsia-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="21"></line></svg></div><span class="text-[13px] font-bold">管理方 (当前)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-fuchsia-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-fuchsia-500 animate-pulse shadow-[0_0_8px_#d946ef]"></span></span> 身份: 管理方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }

            return user;
        }

        // 💡 修复1：测试数据清理名单
        window.clearTestData = async function() {
            if(!window.supabase) return;
            window.showConfirm("清空测试数据", "⚠️ 提示：为了保护真实业务，此操作将<b>只清空测试账号（如 davidxu, ponyxu, 小戴维斯, 飞行家戴维, 测试）产生的需求数据</b>，不会影响其他人的正式数据！<br><br>确定要继续吗？", async () => {
                try {
                    const btn = document.getElementById('dialog-confirm-btn');
                    if(btn) { btn.innerText = "清理中..."; btn.disabled = true; }

                    const { data: tasks, error: fetchErr } = await window.supabase.from(window.DB_TABLE).select('id, creator');
                    if (fetchErr) throw fetchErr;

                    const testKeywords = ['davidxu', 'ponyxu', '小戴维斯', '飞行家戴维', '测试'];
                    const idsToDelete = tasks.filter(t => {
                        const c = (t.creator || '').toLowerCase().replace(/\s+/g, '');
                        if (c.includes('davidxxu') || c.includes('文哥')) return false;
                        return testKeywords.some(k => c.includes(k));
                    }).map(t => t.id);

                    if (idsToDelete.length === 0) {
                        window.showToast('提示', '当前大厅没有发现测试单据。', 'info');
                        window.closeCustomDialog();
                        return;
                    }

                    const { error: deleteErr } = await window.supabase.from(window.DB_TABLE).delete().in('id', idsToDelete);
                    if (deleteErr) throw deleteErr;

                    window.showToast('已清空', `成功清理了 ${idsToDelete.length} 条测试单据，正式数据安全保留！`, 'success');
                    setTimeout(() => window.location.reload(), 1500);
                } catch(e) { window.showAlert("清理失败", e.message, "danger"); }
            }, "danger");
        }

        window.loadDashboardData = async function(isSilent = false) {
            if(!initRBAC()) return;
            if(!window.supabase) return;

            const syncDot = document.getElementById('sync-indicator');
            if(syncDot && !isSilent) syncDot.classList.remove('hidden');

            try {
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE).select('id, title, status, creator, assignee, due_date, history_json').order('created_at', { ascending: false });
                if (error) throw error;

                const ongoingTasks = (tasks || []).filter(t => !['completed', 'archived', 'terminated'].includes(t.status));
                const pendingTasks = ongoingTasks.filter(t => ['pending', 'pending_accept', 'pending_approval', 'reviewing'].includes(t.status));

                let designersMap = {};
                try {
                    const { data: users } = await window.supabase.from('users').select('enName, name, email, perms');
                    if (users) {
                        users.forEach(u => {
                            let p = [];
                            if (typeof u.perms === 'string') try { p = JSON.parse(u.perms); } catch(e){}
                            else if (Array.isArray(u.perms)) p = u.perms;

                            if(p.includes('design') || p.includes('admin')) {
                                const key = (u.enName || (u.email ? u.email.split('@')[0] : '')).toLowerCase();
                                if(key && !designersMap[key]) {
                                    designersMap[key] = { display: u.name || u.enName, count: 0, hours: 0 };
                                }
                            }
                        });
                    }
                } catch(e){}

                if(!isSilent) {
                    document.getElementById('stat-ongoing').innerText = ongoingTasks.length;
                    document.getElementById('stat-pending').innerText = pendingTasks.length;
                    
                    const tasksC = document.getElementById('tasks-container');
                    let tasksHtml = '';
                    
                    if (ongoingTasks.length === 0) {
                        tasksHtml = `<div class="text-center py-10 opacity-50"><p class="text-zinc-500 text-sm">全盘目前无进行中的工单</p></div>`;
                    } else {
                        ongoingTasks.forEach(t => {
                            let sColor, sText, btnHtml;
                            switch(t.status) {
                                case 'pending': sColor = 'sky'; sText = '待接单'; btnHtml = `<button class="text-sky-400 bg-sky-500/10 px-3 py-1 rounded text-[11px] font-bold">待响应</button>`; break;
                                case 'pending_accept': sColor = 'amber'; sText = '待确认接单'; btnHtml = `<button class="text-amber-400 bg-amber-500/10 px-3 py-1 rounded text-[11px] font-bold">待接单</button>`; break;
                                case 'processing': sColor = 'orange'; sText = '制作中'; btnHtml = `<button class="text-orange-400 bg-orange-500/10 px-3 py-1 rounded text-[11px] font-bold">查看进度</button>`; break;
                                // 🚀 点击卡片跳转到审批详情页
                                case 'pending_approval': sColor = 'amber'; sText = '框架审批中'; btnHtml = `<button onclick="event.stopPropagation(); window.location.href='task-detail-requester.html?id=${t.id}'" class="text-white bg-amber-600 hover:bg-amber-500 px-3 py-1 rounded text-[11px] font-bold transition-colors shadow-lg">去审批</button>`; break;
                                case 'reviewing': sColor = 'emerald'; sText = '待甲方验收'; btnHtml = `<button class="text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded text-[11px] font-bold">甲方验收中</button>`; break;
                                case 'rejected': sColor = 'rose'; sText = '打回修改中'; btnHtml = `<button class="text-rose-400 bg-rose-500/10 px-3 py-1 rounded text-[11px] font-bold">督办催稿</button>`; break;
                                default: sColor = 'zinc'; sText = '未知状态'; btnHtml = '';
                            }

                            if (t.assignee && t.assignee !== 'none' && t.status !== 'pending') {
                                const assKey = t.assignee.toLowerCase();
                                if(!designersMap[assKey]) designersMap[assKey] = { display: t.assignee, count: 0, hours: 0 };
                                designersMap[assKey].count += 1;
                                designersMap[assKey].hours += 4.5;
                            }

                            tasksHtml += `
                            <div class="bg-[#18181b] border border-white/5 rounded-2xl p-5 hover:border-white/10 transition-colors cursor-pointer" onclick="window.location.href='task-detail-requester.html?id=${t.id}'">
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center gap-3">
                                        <span class="text-[10px] font-mono font-bold bg-white/5 px-2 py-0.5 rounded border border-white/10 text-zinc-400">${t.id}</span>
                                        <span class="text-[14px] font-bold text-white">${t.title}</span>
                                    </div>
                                    ${btnHtml}
                                </div>
                                <div class="flex justify-between items-center text-[12px] text-zinc-500">
                                    <div class="flex items-center gap-4">
                                        <span class="flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> 委派: ${t.assignee === 'none' ? '暂未分配' : t.assignee}</span>
                                    </div>
                                    <span>期望交付: ${t.due_date || '未定'}</span>
                                </div>
                            </div>
                            `;
                        });
                    }
                    tasksC.innerHTML = tasksHtml;
                }

                if(!isSilent) {
                    const poolContainer = document.getElementById('resource-pool');
                    let poolHtml = '';
                    const sortedDesigners = Object.keys(designersMap).sort((a,b) => designersMap[b].count - designersMap[a].count);
                    
                    sortedDesigners.forEach(key => {
                        const data = designersMap[key];
                        const statusColor = data.count === 0 ? 'text-zinc-500' : (data.count > 2 ? 'text-rose-500' : 'text-emerald-500');
                        const statusText = data.count === 0 ? '空闲' : (data.count > 2 ? '高负荷' : '适中');
                        const opacity = data.count === 0 ? 'opacity-60' : 'opacity-100';

                        poolHtml += `
                        <div class="flex items-center justify-between py-3 border-b border-white/5 last:border-0 ${opacity}">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-[10px] font-bold text-zinc-300 shadow-inner shrink-0">${data.display.substring(0,2).toUpperCase()}</div>
                                <div>
                                    <p class="text-[13px] font-bold text-zinc-200 flex items-center gap-2">${data.display} <span class="text-[10px] text-zinc-500 bg-white/5 px-1.5 rounded border border-white/10 font-normal">${data.count} 单</span></p>
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <p class="text-[12px] font-bold ${statusColor} mb-0.5">${statusText}</p>
                                <p class="text-[10px] text-zinc-600 font-mono">${data.hours.toFixed(1)}h 预估</p>
                            </div>
                        </div>
                        `;
                    });
                    poolContainer.innerHTML = poolHtml;
                }
                document.getElementById('dashboard-loading').classList.add('hidden');

            } catch (err) { console.error(err); } finally { if(syncDot) setTimeout(() => syncDot.classList.add('hidden'), 500); }
        }

        // 💡 修复2：基于 history_json 的通知拉取
        window.syncNotificationsFromCloud = async function(isSilent = true) {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();

            try {
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE)
                    .select('id, title, creator, assignee, status, history_json')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;

                let myNotifs = [];

                tasks.forEach(task => {
                    let hist = [];
                    try { hist = JSON.parse(task.history_json || '[]'); } catch(e){}

                    hist.forEach((h, index) => {
                        // 管理员/领导不看自己操作产生的结果（比如自己刚点了通过，不需要再通知自己）
                        const op = (h.operator || '').toLowerCase();
                        if (op.includes(myName)) return;

                        let title = ''; let content = ''; let icon = 'bg-fuchsia-500';

                        // 上帝视角：捕捉所有重要节点
                        if (h.action === 'submit_framework') {
                            title = '👀 框架待审批'; content = `${h.operator} 提交了中期方案，等待您的审批把关：《${task.title}》`; icon = 'bg-amber-500';
                        } else if (h.action === 'submit_draft') {
                            title = '🎁 正稿待验收'; content = `${h.operator} 交付了正式稿，等待甲方验收：《${task.title}》`; icon = 'bg-emerald-500';
                        } else if (h.action === 'reject_framework' || h.action === 'reject_draft' || h.is_rejected) {
                            title = '💥 方案被打回'; content = `单据发生打回重修：《${task.title}》- ${h.reply || h.desc}`; icon = 'bg-rose-500';
                        } else if (h.action === 'complete') {
                            title = '✅ 任务圆满结案'; content = `甲方已验收通过该单据：《${task.title}》`; icon = 'bg-emerald-500';
                        } else if (h.action === 'urge' || (h.reply && h.reply.includes('催办'))) {
                            title = '🚨 紧急催办提醒'; content = `单据产生催办行为：《${task.title}》`; icon = 'bg-rose-500';
                        } else if (h.action === 'transfer') {
                            title = '🔄 任务转单/退回'; content = `发生人员转单或退回大厅：《${task.title}》`; icon = 'bg-orange-500';
                        } else if (h.action === 'create') {
                            title = '🆕 新需求发布'; content = `大厅有新的需求发布：《${task.title}》`; icon = 'bg-indigo-500';
                        }

                        if (title) {
                            myNotifs.push({
                                id: `${task.id}_${index}`,
                                taskId: task.id,
                                title: title,
                                content: content,
                                time: h.time || h.created_at || new Date().toISOString(),
                                icon: icon
                            });
                        }
                    });
                });

                // 按时间倒序
                myNotifs.sort((a, b) => new Date(b.time) - new Date(a.time));

                // 本地已读隔离
                let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
                const unreadNotifs = myNotifs.filter(n => !readReceipts.includes(n.id));
                const unreadCount = unreadNotifs.length;

                let prevUnreadCount = parseInt(localStorage.getItem('prevUnreadCount_admin_' + myName) || '0');
                if (isSilent && unreadCount > prevUnreadCount) {
                    const newCount = unreadCount - prevUnreadCount;
                    if(window.showToast) window.showToast('🔔 收到新消息', `您有 ${newCount} 条全局预警动态，请点击右上角铃铛查看。`, 'info');
                }
                localStorage.setItem('prevUnreadCount_admin_' + myName, unreadCount.toString());
                
                // UI 更新
                const bellDot = document.getElementById('bell-dot');
                if (bellDot) {
                    if (unreadCount > 0) {
                        bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent');
                        bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]');
                    } else {
                        bellDot.classList.add('hidden');
                    }
                }

                const notifContainer = document.getElementById('notif-list-container');
                if (notifContainer) {
                    if (unreadCount === 0) {
                        notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读预警消息</div>';
                    } else {
                        notifContainer.innerHTML = unreadNotifs.map(n => {
                            const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            return `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors" onclick="window.markSingleAsRead('${n.id}', '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-[13px] font-bold text-white flex items-center gap-2"><span class="w-2 h-2 rounded-full ${n.icon} shrink-0 shadow-[0_0_8px_currentColor]"></span>${n.title}</h4>
                                    <span class="text-[10px] text-zinc-500">${dateStr}</span>
                                </div>
                                <p class="text-[11px] text-zinc-400 pl-4 line-clamp-2">${n.content}</p>
                            </div>`;
                        }).join('');
                    }
                }
                window.currentMyUnreadIds = unreadNotifs.map(n => n.id);
            } catch(e) { console.error("通知同步失败", e); }
        };

        window.markSingleAsRead = function(id, taskId) {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            
            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            if (!readReceipts.includes(id)) {
                readReceipts.push(id);
                localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts));
            }
            window.location.href = 'task-detail-requester.html?id=' + taskId;
        };

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            if (!window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();

            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "处理中...";

            let readReceipts = JSON.parse(localStorage.getItem('notif_read_admin_' + myName) || '[]');
            readReceipts = [...new Set([...readReceipts, ...window.currentMyUnreadIds])];
            localStorage.setItem('notif_read_admin_' + myName, JSON.stringify(readReceipts));
            
            window.syncNotificationsFromCloud(true);
            if(window.showToast) window.showToast('全部已读', '消息红点已清除。', 'success');
            
            btn.innerHTML = originalText;
        };

        document.addEventListener('DOMContentLoaded', () => {
            if(initRBAC()) {
                const idBtn = document.getElementById('identityBtn');
                const idMenu = document.getElementById('identityMenu');
                if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
                
                const notifBtn = document.getElementById('notifBtn');
                const notifMenu = document.getElementById('notifMenu');
                if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

                document.addEventListener('click', (e) => { 
                    if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                    if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
                });

                window.loadDashboardData(false);
                window.syncNotificationsFromCloud(true);
                setInterval(() => { window.loadDashboardData(true); window.syncNotificationsFromCloud(true); }, 8000);
            }
        });
    </script>
</body>
