<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全局统筹中心 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-fuchsia-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 right-1/4 w-[800px] h-[600px] bg-fuchsia-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-fuchsia-600 flex items-center justify-center shadow-[0_0_15px_rgba(217,70,239,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-500/20 transition-all cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <span class="font-bold text-[14px]">总监控制台</span>
            </button>
            <button onclick="window.location.href='manager-dashboard.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span class="font-medium text-[14px]">团队效能大盘</span>
            </button>
            <button onclick="window.location.href='project-analysis.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <span class="font-medium text-[14px]">项目投入分析</span>
            </button>
            <button onclick="window.location.href='org-chart.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">组织架构与账号</span>
            </button>
            <button onclick="window.location.href='message-center.html?role=admin'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span class="font-medium text-[14px]">全局消息中心</span>
            </button>
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-[9999]">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-fuchsia-400 hover:bg-fuchsia-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl z-20">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight mb-1.5 flex items-center gap-2">
                    全局统筹中心
                    <span class="bg-fuchsia-500/20 text-fuchsia-400 text-[11px] px-2.5 py-0.5 rounded-lg border border-fuchsia-500/30 ml-2">管理视角</span>
                    <div id="sync-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 animate-pulse ml-2" title="云端连接中..."></div>
                </h2>
                <p class="text-xs text-zinc-500">掌握全盘进度，对设计方向进行审批管控与质量验收。</p>
            </div>
            
            <div class="flex items-center gap-5 relative">
                <div class="relative z-[120]" id="notif-wrapper">
                    <button id="notifBtn" class="w-10 h-10 rounded-xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="bell-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                    </button>
                    <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                        <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                            <h3 class="text-[14px] font-bold text-white">全盘预警与通知</h3>
                            <button onclick="window.markAllAsRead(event)" class="text-[11px] text-fuchsia-400 hover:text-fuchsia-300 btn-press transition-colors">全部已读</button>
                        </div>
                        <div class="max-h-[300px] overflow-y-auto custom-scrollbar" id="notif-list-container">
                            <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>
                        </div>
                        <div class="pt-3 px-5 border-t border-white/5 text-center">
                            <button onclick="window.location.href='message-center.html?role=admin'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">进入全局消息中心 ↗</button>
                        </div>
                    </div>
                </div>

                <div class="relative" id="identity-wrapper">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-5 py-3 rounded-[14px] flex items-center gap-3 text-[13px] font-medium hover:bg-[#1a1a1f] transition-colors btn-press">
                        身份加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-hidden flex justify-center">
            <div class="flex gap-10 h-full items-start w-full max-w-[1400px]">
                
                <div class="flex-1 flex flex-col gap-6 min-w-0 pb-10 overflow-y-auto custom-scrollbar pr-4">
                    
                    <div class="bg-[#121217] border border-white/5 rounded-2xl p-8 relative overflow-hidden transition-opacity opacity-70 hover:opacity-100">
                        <div class="absolute right-0 top-0 bg-white/5 text-zinc-500 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-l border-b border-white/5">1. 甲方提单需求</div>
                        <div class="grid grid-cols-4 gap-4 mb-6 pb-6 border-b border-white/5">
                            <div><p class="text-[11px] text-zinc-500 mb-1">归属项目</p><p class="text-[13px] font-bold text-zinc-300 truncate" id="dt-project">--</p></div>
                            <div><p class="text-[11px] text-zinc-500 mb-1">期望交付日</p><p class="text-[13px] font-bold text-sky-400" id="dt-date">--</p></div>
                            <div><p class="text-[11px] text-zinc-500 mb-1">发起人</p><p class="text-[13px] font-bold text-zinc-300" id="dt-creator">--</p></div>
                            <div><p class="text-[11px] text-zinc-500 mb-1">执行人</p><p class="text-[13px] font-bold text-orange-400" id="dt-assignee">--</p></div>
                        </div>
                        <h3 class="text-sm font-bold text-white mb-3">📋 详细描述</h3>
                        <div class="text-[13px] text-zinc-400 leading-relaxed bg-[#09090b] border border-white/5 p-5 rounded-xl min-h-[60px]" id="req-desc-display">数据读取中...</div>
                        <div class="mt-4 space-y-3">
                            <div id="dt-link-container" class="hidden text-[12px] bg-[#09090b] border border-white/5 p-3 rounded-xl flex items-center gap-2">
                                <span class="text-zinc-500">🔗 参考链接：</span><span id="dt-link" class="truncate text-sky-400"></span>
                            </div>
                            <div id="attachment-container"></div>
                        </div>
                    </div>

                    <div id="version-history-block" class="hidden mt-4">
                        <h3 class="text-[16px] font-bold text-white mb-4 flex items-center gap-2">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                            历史流转版本库
                        </h3>
                        <div id="version-history-container" class="space-y-4"></div>
                    </div>
                </div>

                <div class="w-[380px] shrink-0 flex flex-col gap-6 sticky top-0 pb-10">
                    
                    <div id="smart-action-panel" class="bg-[#121217] border border-white/5 rounded-3xl p-7 shadow-2xl relative overflow-hidden transition-all duration-300">
                        <div class="text-center py-6 text-zinc-500 text-sm">面板初始化中...</div>
                    </div>

                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-7 flex flex-col shadow-xl">
                        <h3 class="text-[14px] font-bold text-white mb-6 border-b border-white/5 pb-4">全量流转生命周期日志</h3>
                        <div class="relative space-y-6 flex-1" id="task-timeline-container">
                            <div class="text-center py-4 text-zinc-500 text-xs">轨迹读取中...</div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>

    <div id="approve-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeActionModals()">
        <div id="approve-modal" class="hidden w-full max-w-lg bg-[#121217] border border-emerald-500/30 rounded-3xl shadow-[0_20px_50px_-10px_rgba(16,185,129,0.2)] flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-emerald-400 to-teal-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-4 mt-2">
                <h2 class="text-[16px] font-bold text-white">同意框架并推进设计</h2>
                <button onclick="closeActionModals()" class="text-zinc-500 hover:text-white bg-zinc-800 rounded-full p-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <textarea id="approve-notes" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-emerald-500 h-24 resize-none mb-4 custom-scrollbar" placeholder="写点鼓励的话，或附加细微调整意见 (选填)..."></textarea>
            <button id="btn-approve-submit" onclick="submitApprove()" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-[13px] font-bold btn-press transition-all">确认通过方向</button>
        </div>
    </div>

    <div id="reject-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closeActionModals()">
        <div id="reject-modal" class="hidden w-full max-w-lg bg-[#121217] border border-rose-500/30 rounded-3xl shadow-[0_20px_50px_-10px_rgba(244,63,94,0.2)] flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-rose-500 to-orange-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-4 mt-2">
                <h2 class="text-[16px] font-bold text-white" id="reject-title">打回要求重修</h2>
                <button onclick="closeActionModals()" class="text-zinc-500 hover:text-white bg-zinc-800 rounded-full p-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <textarea id="reject-reason" class="w-full bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-rose-500 h-24 resize-none mb-4 custom-scrollbar" placeholder="请详细指出不满意的地方，打回原因将作为关键修改依据永久记录进历史流水账..."></textarea>
            <button id="btn-reject-submit" onclick="submitReject()" class="w-full py-3.5 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-[13px] font-bold btn-press transition-all">确认打回修改</button>
        </div>
    </div>

    <div id="image-preview-modal" onclick="closePreview()">
        <div class="w-full h-full flex items-center justify-center relative p-8">
            <button onclick="closePreview()" class="absolute top-8 right-8 text-white/50 hover:text-white bg-white/10 hover:bg-rose-500 rounded-full p-2 transition-all btn-press z-50">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <img id="modal-image" src="" alt="全屏预览图" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-[0_0_50px_rgba(0,0,0,0.8)]" onclick="event.stopPropagation()">
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[1000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-[11px] text-zinc-400 mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-fuchsia-500 to-indigo-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-fuchsia-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="window.closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label><input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-fuchsia-500 transition-colors" placeholder="输入原密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label><input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-fuchsia-500 transition-colors" placeholder="输入新密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label><input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-fuchsia-500 transition-colors" placeholder="再次输入新密码"></div>
            </div>
            <button onclick="window.submitPwdChange()" class="w-full mt-6 py-3.5 bg-fuchsia-600 hover:bg-fuchsia-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(217,70,239,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-fuchsia-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>

    <script>
        const PAGE_TYPE = 'admin'; 

        // ================= 高定弹窗引擎 =================
        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0'); dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-fuchsia-500';
                icon.className = 'w-8 h-8 rounded-full bg-fuchsia-500/20 text-fuchsia-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
        }

        function showDialogUI() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); dialog.classList.remove('scale-95'); }, 10);
        }

        window.showAlert = function(title, message, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-fuchsia-600 hover:bg-fuchsia-500');
            btnContainer.innerHTML = `<button onclick="closeCustomDialog()" class="w-full py-2.5 ${btnColor} text-white rounded-xl text-[13px] font-bold shadow-lg transition-all btn-press">我知道了</button>`;
            showDialogUI();
        }

        window.showConfirm = function(title, message, onConfirm, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-fuchsia-600 hover:bg-fuchsia-500');
            btnContainer.innerHTML = `
                <button onclick="closeCustomDialog()" class="flex-1 py-2.5 bg-transparent border border-zinc-700 text-zinc-400 hover:text-white rounded-xl text-[13px] font-bold transition-colors btn-press">取消</button>

            `;
            document.getElementById('dialog-confirm-btn').onclick = () => { closeCustomDialog(); onConfirm(); };
            showDialogUI();
        }

        window.logout = function(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('activeUserObj'); window.location.href = 'login.html';

        window.openPwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');

        window.closePwdModal = function() {
            const pwdOverlay = document.getElementById('pwd-modal-overlay');
            const pwdModal = document.getElementById('pwd-modal');

        window.submitPwdChange = function() { window.showAlert('提示', '系统演示环境暂不可自助修改密码，请联系管理员。', 'info'); window.closePwdModal(); }

        const safeSetTxt = (id, txt) => { const el = document.getElementById(id); if (el) el.innerText = txt; };
        function showToast(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');

            document.getElementById('toast-desc').innerText = desc;

                icon.className = "w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0";
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

        window.openPreview = function(srcUrl) {
            if(!srcUrl) return;

            const modal = document.getElementById('image-preview-modal');
            modal.classList.remove('visible'); setTimeout(() => { modal.style.display = 'none'; modal.classList.add('hidden'); }, 300);
        }

        window.downloadAttachment = function(name, dataBase64) {
            const a = document.createElement('a'); a.href = dataBase64; a.download = name; a.click();
        }

        const approveOverlay = document.getElementById('approve-modal-overlay');
        const approveModal = document.getElementById('approve-modal');
        const rejectOverlay = document.getElementById('reject-modal-overlay');
        const rejectModal = document.getElementById('reject-modal');

        window.openActionModal = function(type) {
            if(type === 'approve') {
                approveOverlay.classList.remove('hidden'); setTimeout(() => { approveOverlay.classList.remove('opacity-0'); approveModal.classList.remove('hidden'); }, 10);
            } else if (type === 'reject') {
                rejectOverlay.classList.remove('hidden'); setTimeout(() => { rejectOverlay.classList.remove('opacity-0'); rejectModal.classList.remove('hidden'); }, 10);

            approveOverlay.classList.add('opacity-0'); rejectOverlay.classList.add('opacity-0');

        }

        // ================= 业务核心 =================
        const urlParams = new URLSearchParams(window.location.search);
        const currentTaskId = urlParams.get('id');
        let globalTaskData = null;
        let globalHistoryArr = [];  
        let rejectCountLimit = 5; 
        let currentRejectCount = 0;
        let currentUser = null;
        let isRequesterMode = false; 

        function initRBAC() {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';

            // 💡 终极兜底提权
            if (['davidxxu', 'davidxu', 'ponyxu'].includes(enName)) {
                user.perms = ['req', 'design', 'admin'];
            } else if (enName === 'judyzzhang') {
                if (!user.perms) user.perms = [];
                if (!user.perms.includes('admin')) user.perms.push('admin');
                if (!user.perms.includes('req')) user.perms.push('req');
            }

            if (!(user.perms || []).includes('admin')) {
                window.showAlert("权限拦截", "您没有总监控制台访问权限，为您退回大厅。", "danger");
                setTimeout(()=> window.location.href = 'index.html', 1500);
                return false;
            }

            const avatarTxt = (user.displayName || user.name || user.cnName || user.enName || 'U').substring(0, 1).toUpperCase();
            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = avatarTxt; avatarEl.className = `w-9 h-9 rounded-full ${user.color || 'bg-fuchsia-600'} border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg shrink-0`; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.name || user.cnName || user.enName;
            if(document.getElementById('sidebar-role')) document.getElementById('sidebar-role').innerHTML = `<span class="text-fuchsia-400 font-bold">当前视角: 管理方</span>`;
            
            const menuContainer = document.getElementById('dynamic-identity-list');
            if (menuContainer) {
                let html = '';
                if ((user.perms || []).includes('req')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='index.html'"><div class="w-7 h-7 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-400"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><span class="text-[13px] font-medium">需求方 (去发单/验收)</span></div>`; 
                }
                if ((user.perms || []).includes('design')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5 text-zinc-400 hover:text-white cursor-pointer btn-press transition-colors" onclick="window.location.href='assistant-workspace.html'"><div class="w-7 h-7 rounded-lg bg-orange-500/10 flex items-center justify-center text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div><span class="text-[13px] font-medium">设计方 (执行看板)</span></div>`; 
                }
                if ((user.perms || []).includes('admin')) { 
                    html += `<div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-[#3b1740] text-fuchsia-400 cursor-default border border-fuchsia-900/50"><div class="w-7 h-7 rounded-lg bg-fuchsia-500/20 flex items-center justify-center text-fuchsia-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="21"></line></svg></div><span class="text-[13px] font-bold">管理方 (当前)</span></div>`; 
                }
                menuContainer.innerHTML = html;
            }

            const triggerBtn = document.getElementById('identityBtn');
            if (triggerBtn) { triggerBtn.innerHTML = `<span class="text-fuchsia-500 font-black flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-fuchsia-500 animate-pulse shadow-[0_0_8px_#d946ef]"></span></span> 身份: 管理方 (当前) <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-500 ml-1"><polyline points="6 9 12 15 18 9"></polyline></svg>`; }

            currentUser = user;
            return true;
        }

        // 🚀 全局通用通知派发工厂 (双路并发：存入DB铃铛 + 发送邮件)
        window.insertDbNotification = async function(targetIdentifier, content, link_url, category = 'update') {
            if (!window.supabase || !targetIdentifier) return;
            try {
                let targetEmail = '';
                let targetUserId = null;

                const { data: allUsers } = await window.supabase.from('users').select('id, email, name, enName');
                if (allUsers) {
                    const targetUser = allUsers.find(u => 
                        (u.email && u.email.toLowerCase().includes(targetIdentifier.toLowerCase())) ||
                        (u.name && u.name.toLowerCase().includes(targetIdentifier.toLowerCase())) ||
                        (u.enName && u.enName.toLowerCase().includes(targetIdentifier.toLowerCase()))
                    );
                    if (targetUser) {
                        targetEmail = targetUser.email;
                        targetUserId = targetUser.id;
                    }
                }

                if (!targetEmail) targetEmail = targetIdentifier.toLowerCase() + '@webank.com';

                const senderName = currentUser.displayName || currentUser.name || currentUser.cnName || currentUser.enName || '系统';

                // 1. 强制写入数据库，点亮铃铛
                let insertPayload = {
                    content: content, 
                    link_url: link_url, 
                    target_email: targetEmail, 
                    sender_name: senderName, 
                    is_read: false
                };
                if(targetUserId) insertPayload.user_id = targetUserId; 

                const { error } = await window.supabase.from('notifications').insert([insertPayload]);
                if (error) console.error("写入DB铃铛失败:", error.message);
                
                // 2. 触发系统邮件
                if (!error && window.SysNotification && targetUserId) {
                    await window.SysNotification.sendNotice({
                        targetId: targetUserId,
                        targetEmail: targetEmail,
                        content: content,
                        category: category,
                        url: link_url
                    });
                }
            } catch(e) { console.error("通知执行异常:", e); }
        }

        window.initApp = async function() {
            if(!initRBAC()) return;
            if(!currentTaskId) { window.showAlert("错误", "非法访问：未找到需求单号！", "danger"); setTimeout(() => window.location.href = 'manager-dashboard.html', 1500); return; }

            const checkAndLoad = setInterval(() => {
                if(window.supabase) { clearInterval(checkAndLoad); fetchTaskData(); }
            }, 100);
            setTimeout(() => clearInterval(checkAndLoad), 5000); 
        }

        async function fetchTaskData() {
            try {
                const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').eq('id', currentTaskId).single();
                if(error || !data) { window.showAlert("错误", "需求拉取失败或已被撤销！", "danger"); setTimeout(() => window.location.href = 'manager-dashboard.html', 1500); return; }
                
                globalTaskData = data;
                try { globalHistoryArr = JSON.parse(data.history_json || '[]'); } catch(e) { globalHistoryArr = []; }
                
                calculateRejectThreshold();
                renderStaticInfo();
                renderVersionHistory(); 
                renderSmartActionPanel();
                renderTimeline();

            } catch(e) { console.error(e); showToast("数据加载失败", e.message, "error"); }
        }

        function calculateRejectThreshold() {
            currentRejectCount = 0;
            globalHistoryArr.forEach(h => {
                if(h.is_rejected === true || (h.action && h.action.startsWith('reject'))) currentRejectCount++;
            });
        }

        function renderStaticInfo() {
            const d = globalTaskData;
            safeSetTxt('req-id', d.id || '--');
            safeSetTxt('req-title-display', d.title || '无标题');
            safeSetTxt('dt-project', d.project || '--');
            safeSetTxt('dt-date', d.due_date || '--');
            safeSetTxt('dt-creator', d.creator || '系统记录');
            safeSetTxt('dt-assignee', (d.assignee && d.assignee !== 'none') ? d.assignee : '暂未分配');

            const descHTML = (d.full_desc || '暂无描述').replace(/\n/g, '<br>');
            document.getElementById('req-desc-display').innerHTML = descHTML;

            if(d.link) {
                document.getElementById('dt-link-container').classList.remove('hidden');
                document.getElementById('dt-link').innerHTML = `<a href="${d.link}" target="_blank" class="text-sky-400 hover:underline break-all">${d.link}</a>`;
            }
            if(d.file_name) {
                const attachEl = document.getElementById('attachment-container');
                if (d.file_data) {
                    attachEl.innerHTML = `<button onclick="window.downloadAttachment('${d.file_name}', '${d.file_data}')" class="text-[11px] bg-white/5 text-indigo-300 px-3 py-1.5 rounded-lg border border-white/10 hover:bg-white/10 flex items-center gap-1.5 transition-colors btn-press"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg> 下载甲方提单附件：${d.file_name}</button>`;
                } else {
                    attachEl.innerHTML = `<p class="text-[11px] text-zinc-500 italic mt-2 flex items-center gap-1">📎 提单附带文件名：${d.file_name} (无文件实体)</p>`;
                }
            }
        }

        function renderVersionHistory() {
            const container = document.getElementById('version-history-container');
            const block = document.getElementById('version-history-block');
            
            let submissions = [];
            for(let i=0; i<globalHistoryArr.length; i++) {
                let h = globalHistoryArr[i];
                if(h.action === 'submit_framework' || h.action === 'submit_draft') {
                    let fate = 'pending'; 
                    let fateReason = '';
                    for(let j = i + 1; j < globalHistoryArr.length; j++) {
                        let nextH = globalHistoryArr[j];
                        if (nextH.action.startsWith('reject_') || nextH.is_rejected) {
                            fate = 'rejected'; fateReason = nextH.reply || nextH.desc; break;
                        }
                        if (nextH.action.startsWith('approve_') || nextH.action === 'complete' || (nextH.reply && !nextH.is_rejected)) {
                            fate = 'approved'; fateReason = nextH.reply; break;
                        }
                        if (nextH.action.startsWith('submit_')) { break; }
                    }
                    submissions.push({ ...h, fate, fateReason });
                }
            }

            if(submissions.length === 0) { block.classList.add('hidden'); return; }

            block.classList.remove('hidden');
            let html = '';
            
            [...submissions].reverse().forEach((sub) => {
                let badgeCol = sub.fate === 'approved' ? 'emerald' : (sub.fate === 'rejected' ? 'rose' : 'amber');
                let badgeTxt = sub.fate === 'approved' ? '已过审 / 验收' : (sub.fate === 'rejected' ? '被打回' : '等待审核中');
                let typeTxt = sub.action === 'submit_framework' ? '框架方案' : '正式定稿';
                let toolsArr = sub.ai_tools || [];
                let toolsTxt = toolsArr.length > 0 ? toolsArr.join('、') : '纯手绘 / 未填';

                let sourceLinkHtml = '';
                if (sub.source_link) {
                    let href = sub.source_link.trim();
                    if(!href.match(/^https?:\/\//i) && !href.startsWith('//')) href = 'http://' + href;
                    sourceLinkHtml = `
                        <a href="${href}" target="_blank" class="mt-3 inline-flex items-center gap-1.5 text-[11px] text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 px-3 py-1.5 rounded-lg hover:bg-indigo-500/20 transition-colors w-fit btn-press">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            提取提交的源文件
                        </a>
                    `;
                }

                html += `
                    <div class="bg-[#16161d] border border-white/5 rounded-2xl p-5 relative overflow-hidden flex gap-6 hover:border-${badgeCol}-500/30 transition-colors group shadow-md">
                        <div class="absolute right-0 top-0 bg-${badgeCol}-500/10 text-${badgeCol}-500 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-b border-l border-${badgeCol}-500/20">${badgeTxt}</div>
                        
                        <div class="w-[280px] aspect-video bg-[#09090b] rounded-xl border border-white/10 overflow-hidden relative shadow-inner p-1 flex items-center justify-center shrink-0 cursor-pointer" onclick="openPreview('${sub.img_url}')">
                            <img src="${sub.img_url}" class="max-w-full max-h-full object-contain group-hover:scale-[1.02] transition-transform">
                            <div class="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded backdrop-blur-sm pointer-events-none">点击看大图</div>
                        </div>
                        
                        <div class="flex-1 flex flex-col justify-center space-y-3">
                            <div>
                                <h4 class="text-[15px] font-bold text-white mb-1 flex items-center gap-2">
                                    ${typeTxt} <span class="bg-white/10 px-2 py-0.5 rounded text-[11px] font-mono text-zinc-300 shadow-sm">${sub.version || 'v-X'}</span>
                                </h4>
                                <p class="text-[11px] text-zinc-500">执行人: <span class="text-orange-400 font-bold">${sub.operator || '未知'}</span> <span class="mx-2">|</span> 提交时间: ${new Date(sub.created_at || sub.time).toLocaleString()}</p>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4 bg-white/5 p-3 rounded-xl border border-white/5">

        // ================= 🚀🚀🚀 全局动作状态同步与智能邮件分发枢纽 🚀🚀🚀 =================
        async function updateSupabaseState(newStatus, newSummary, actionPayload) {
            globalHistoryArr.push(actionPayload);
            const { error } = await window.supabase.from(window.DB_TABLE).update({
                status: newStatus, 
                summary_desc: newSummary,
                history_json: JSON.stringify(globalHistoryArr)
            }).eq('id', currentTaskId);
            
            if(error) { window.showAlert("错误", "云端状态更新失败：" + error.message, "danger"); return false; }
            
            // 💡 智能判断并发送邮件+铃铛
            try {
                if (globalTaskData) {
                    const act = actionPayload.action;
                    let notifyRole = ''; 
                    let content = '';
                    let targetUrl = `task-detail-designer.html?id=${currentTaskId}`; // 默认指引设计师去看

                    if (act === 'approve_framework') { notifyRole = 'assignee'; content = `【审核通过】领导已同意大方向：《${globalTaskData.title}》，请继续推进正稿。`; }
                    else if (act.startsWith('reject_')) { notifyRole = 'assignee'; content = `【打回修改】你的设计单《${globalTaskData.title}》已被打回，请立刻查看修改意见。`; }
                    else if (act === 'complete') { notifyRole = 'assignee'; content = `【验收完结】恭喜！你的设计单《${globalTaskData.title}》已被甲方满意验收，任务闭环。`; }
                    else if (act === 'terminate') { notifyRole = 'assignee'; content = `【任务终止】注意：单据《${globalTaskData.title}》已被强行终止并废弃。`; }
                    
                    if (notifyRole && content) {
                        let targetIdentifier = '';
                        if (notifyRole === 'assignee') targetIdentifier = globalTaskData.assignee;

                        if (targetIdentifier && targetIdentifier !== 'none') {
                            await window.insertDbNotification(targetIdentifier, content, targetUrl, 'update');
                        }
                    }
                }
            } catch(err) { console.error("邮件触发布局失败", err); }
            
            return true;
        }

            window.showConfirm("确认撤销", "确定要强制撤销该需求单吗？该操作会将记录彻底删除。", async () => {
                const { error } = await window.supabase.from(window.DB_TABLE).delete().eq('id', currentTaskId);
                if(error) return window.showAlert("撤销失败", error.message, "danger");
                showToast('已撤销', `需求单已安全删除。`, 'info');
                setTimeout(() => window.location.href='manager-dashboard.html', 1000); 
            }, "danger");
        }

        window.actionUrge = async function(btn) {
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg class="animate-spin h-3.5 w-3.5 mr-2 inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 发送警报中...';
            btn.disabled = true;

            try {
                let targetIdentifier = '';
                let content = '';
                let targetUrl = '';
                const title = globalTaskData.title || currentTaskId;
                const status = globalTaskData.status;

                if (status === 'processing' || status === 'rejected') {
                    targetIdentifier = globalTaskData.assignee;
                    content = `🚨 催办强提醒：甲方很着急！请加快设计单《${title}》的制作进度。`;
                    targetUrl = `task-detail-designer.html?id=${currentTaskId}`;
                } else if (status === 'pending_approval') {
                    targetIdentifier = 'judyzzhang';
                    content = `🚨 催办强提醒：设计师已提交框架，等待您的火速审批：《${title}》。`;
                    targetUrl = `manager-workspace.html?id=${currentTaskId}`;
                } else if (status === 'reviewing' || status === 'pending') {
                    targetIdentifier = globalTaskData.creator;
                    content = `🚨 催办强提醒：系统提醒您及时跟进单据《${title}》的验收或处理。`;
                    targetUrl = `task-detail-requester.html?id=${currentTaskId}`;
                }

                if (targetIdentifier && targetIdentifier !== 'none') {
                    await window.insertDbNotification(targetIdentifier, content, targetUrl, 'urgent');
                }
            } catch(e) { console.error(e); }

            btn.innerHTML = '✓ 已发送警报通知(铃铛+邮件)';
            btn.className = "w-full py-3.5 bg-zinc-800 border border-zinc-700 text-zinc-500 rounded-xl text-[13px] font-bold cursor-not-allowed";

        window.submitApprove = async function() {
            const notes = document.getElementById('approve-notes').value.trim();
            const btn = document.getElementById('btn-approve-submit');
            btn.disabled = true; btn.innerText = "写入同步中...";

            const payload = {
                action: 'approve_framework', operator: '丹楠姐 (领导)', time: new Date().toISOString(),
                reply: notes || '大方向没问题，同意推进正稿。', is_rejected: false, reply_by: '丹楠姐 (领导)'
            };

            if(await updateSupabaseState('processing', notes ? `领导框架已过审：${notes}` : `领导已通过框架，继续制作正稿。`, payload)) {
                closeActionModals(); showToast('审批通过', '任务已流转回设计师推进正稿。', 'success');
                setTimeout(() => window.location.reload(), 1500);
            } else { btn.disabled = false; btn.innerText = "确认通过方向"; }
        }

        window.submitReject = async function() {
            const reason = document.getElementById('reject-reason').value.trim();
            if(!reason) return window.showAlert("提示", "为了设计师修改清晰，打回原因必填！", "danger");
            
            const btn = document.getElementById('btn-reject-submit');
            btn.disabled = true; btn.innerText = "写入同步中...";

            const dispName = currentUser.displayName || currentUser.name || currentUser.enName;
            const roleStr = isRequesterMode ? `${dispName} (需求方)` : '丹楠姐 (领导)';
            const actionStr = isRequesterMode ? 'reject_draft' : 'reject_framework';

            const payload = {
                action: actionStr, operator: roleStr, time: new Date().toISOString(),
                reply: reason, is_rejected: true, reply_by: roleStr
            };

            const summaryStr = isRequesterMode ? `甲方打回正式稿：${reason}` : `领导将框架打回：${reason}`;

            if(await updateSupabaseState('rejected', summaryStr, payload)) {
                closeActionModals(); showToast('已打回', '该任务已被打回修改池。', 'info');
                setTimeout(() => window.location.reload(), 1500);
            } else { btn.disabled = false; btn.innerText = "确认打回修改"; }
        }

        function renderTimeline() {
            let html = '';
            if (globalHistoryArr && globalHistoryArr.length > 0) {
                let revHistory = [...globalHistoryArr].reverse();
                revHistory.forEach(h => {
                    let dotColor = 'zinc', actionTxt = h.action, subTxt = '';
                    if(h.is_rejected) { dotColor = 'rose'; actionTxt = '被打回修改'; subTxt = `原因: ${h.reply || h.desc || ''}`; }
                    else if(h.action === 'approve_framework') { dotColor = 'emerald'; actionTxt = '领导审批通过'; subTxt = h.reply || '同意'; }
                    else if(h.action === 'submit_draft') { dotColor = 'sky'; actionTxt = '设计师上传了正稿版本 ' + h.version; }
                    else if(h.action === 'submit_framework') { dotColor = 'amber'; actionTxt = '设计师上传了框架版本 ' + h.version; }
                    else if(h.action === 'complete') { dotColor = 'emerald'; actionTxt = '甲方验收成功完结'; }
                    else if(h.action === 'terminate') { dotColor = 'rose'; actionTxt = '任务被强行终止'; subTxt = h.reply || ''; }
                    else if(h.action === 'transfer') { dotColor = 'orange'; actionTxt = '任务发生转单'; subTxt = h.reply || ''; }
                    else if(h.action === 'accept') { dotColor = 'sky'; actionTxt = '设计师接单并给出排期'; subTxt = h.reply || ''; }
                    
                    html += `
                    <div class="relative flex gap-4 z-10 pb-6 group">
                       <div class="timeline-line group-last:hidden"></div>
                       <div class="w-5 h-5 rounded-full bg-[#121217] border-[2px] border-${dotColor}-500 flex items-center justify-center shrink-0 z-10 mt-0.5 shadow-[0_0_8px_rgba(var(--tw-colors-${dotColor}-500),0.3)]"><div class="w-1.5 h-1.5 bg-${dotColor}-500 rounded-full"></div></div>
                       <div class="w-full pr-2 z-10">
                           <p class="text-[12px] font-bold text-zinc-300 flex justify-between">${actionTxt} <span class="text-[9px] text-zinc-600 font-mono font-normal">${new Date(h.created_at || h.time).toLocaleDateString()}</span></p>
                           ${subTxt ? `<p class="text-[10px] text-zinc-500 mt-1 line-clamp-2">${subTxt}</p>` : ''}
                       </div>
                    </div>`;
                });
            }
            html += `<div class="text-[10px] text-zinc-600 font-mono pl-9 mt-2">-- 需求创建起点 --</div>`;
            document.getElementById('task-timeline-container').innerHTML = html;
        }

        // ================= 🔔 全局消息通知引擎 =================
        window.syncNotificationsFromCloud = async function(isSilent = true) {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const userKeyword = (currentUser.enName || currentUser.cnName || '').toLowerCase();

            try {
                const { data, error } = await window.supabase.from('notifications')
                    .select('*').order('created_at', { ascending: false }).limit(100);
                if (error) throw error;

                // 管理端：不过滤专属某人的，只看所有重要更新或针对自己的消息！
                let myNotifs = data.filter(n => {
                    const target = (n.target_email || '').toLowerCase();
                    const targetPrefix = target.split('@')[0];
                    
                    const isForMe = (targetPrefix === userKeyword) || (currentUser.email && target === currentUser.email.toLowerCase());
                    const isGlobalUrgent = n.category === 'urgent' || (n.content && n.content.includes('框架待审')); 

                    return isForMe || isGlobalUrgent;
                });

                const unreadNotifs = myNotifs.filter(n => !n.is_read);
                const unreadCount = unreadNotifs.length;

                let prevUnreadCount = parseInt(localStorage.getItem('prevUnreadCount_admin_' + userKeyword) || '0');
                if (isSilent && unreadCount > prevUnreadCount) {
                    const newCount = unreadCount - prevUnreadCount;
                    if(window.showToast) window.showToast('🔔 收到新消息', `您有 ${newCount} 条总监预警动态，请点击右上角铃铛查看。`, 'info');
                }
                localStorage.setItem('prevUnreadCount_admin_' + userKeyword, unreadCount.toString());
                
                const bellDot = document.getElementById('bell-dot');
                if (bellDot) {
                    if (unreadCount > 0) {
                        bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent');
                        bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]');
                    } else {
                        bellDot.classList.add('hidden');
                    }
                }

                const notifContainer = document.getElementById('notif-list-container');
                if (notifContainer) {
                    if (unreadCount === 0) {
                        notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>';
                    } else {
                        notifContainer.innerHTML = unreadNotifs.map(n => {
                            let titleText = '系统通知';
                            let contentText = n.content || '';
                            let titleMatch = contentText.match(/^(【.*?】)/);
                            if(titleMatch) {
                                titleText = titleMatch[1];
                                contentText = contentText.replace(titleMatch[1], '').trim();
                            } else if(n.category === 'urgent') {
                                titleText = '🚨 紧急催办';
                            }
                            
                            return `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer" onclick="window.markSingleAsRead('${n.id}', '${n.link_url}')">
                                <h4 class="text-[13px] font-bold text-white mb-1"><span class="w-2 h-2 rounded-full bg-fuchsia-500 inline-block mr-1"></span>${titleText}</h4>
                                <p class="text-[11px] text-zinc-400 pl-3 line-clamp-2">${contentText}</p>
                            </div>`;
                        }).join('');
                    }
                }
                window.currentMyUnreadIds = unreadNotifs.map(n => n.id);
            } catch(e) { console.error("通知同步失败", e); }
        };

        window.markSingleAsRead = async function(id, url) {
            if(window.supabase) { try { await window.supabase.from('notifications').update({ is_read: true }).eq('id', id); } catch(e){} }
            let finalUrl = url || '#';
            let match = finalUrl.match(/id=(TK-\d+)/);
            if (match) {
                // 领导点击，跳转到审批详情页
                finalUrl = 'manager-workspace.html?id=' + match[1];
            }
            window.location.href = finalUrl;
        };

        window.markAllAsRead = async function(e) {
            if(e) e.stopPropagation();
            if (!window.supabase || !window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            const btn = e.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "处理中...";
            try {
                await window.supabase.from('notifications').update({ is_read: true }).in('id', window.currentMyUnreadIds);
                await window.syncNotificationsFromCloud(true);
                if(window.showToast) window.showToast('全部已读', '消息红点已清除。', 'success');
            } catch(e) {}
            btn.innerHTML = originalText;
        };

        document.addEventListener('DOMContentLoaded', () => {
            if(initRBAC()) {
                const idBtn = document.getElementById('identityBtn');
                const idMenu = document.getElementById('identityMenu');
                if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
                
                const notifBtn = document.getElementById('notifBtn');
                const notifMenu = document.getElementById('notifMenu');
                if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

                document.addEventListener('click', (e) => { 
                    if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                    if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
                });

                window.initApp(); // 启动数据拉取
                window.syncNotificationsFromCloud(true);
                setInterval(() => { window.syncNotificationsFromCloud(true); }, 8000);
            }
        });

    </script>
</body>
</html>
