<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全局消息中心 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .msg-card { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.05); }
        .msg-card:hover { border-color: rgba(255,255,255,0.15); background-color: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative text-zinc-300" id="body-container">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div id="bg-glow" class="absolute top-0 right-1/4 w-[800px] h-[600px] rounded-full blur-[180px] pointer-events-none z-0 opacity-50"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div id="logo-box" class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2" id="sidebar-menu">
            </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-[9999]">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-white hover:bg-white/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-8 border-b border-white/5 shrink-0 bg-[#09090b]/80 backdrop-blur-xl flex flex-col z-20">
            <button onclick="goBack()" class="text-[12px] font-bold text-zinc-500 hover:text-white transition-colors flex items-center gap-1.5 w-max mb-4 btn-press">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg> 返回工作台
            </button>
            <div class="flex items-center gap-3">
                <h2 class="text-[26px] font-bold text-white tracking-tight">全局消息中心</h2>
                <span id="unread-badge" class="hidden px-2.5 py-0.5 rounded-full bg-rose-500/20 border border-rose-500/30 text-rose-400 text-[11px] font-bold animate-pulse">0 未读</span>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto custom-scrollbar flex flex-col items-center">
            <div class="w-full max-w-[900px] flex flex-col">
                <div class="flex items-center justify-between mb-6 border-b border-white/5 pb-3">
                    <div class="flex gap-6 text-[14px] font-bold">
                        <button class="text-white border-b-2 border-white pb-3 relative top-[13px]">全部通知</button>
                    </div>
                    <button onclick="markAllAsRead(this)" class="text-[12px] text-zinc-500 hover:text-white transition-colors flex items-center gap-1.5 btn-press">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg> 全部标记为已读
                    </button>
                </div>

                <div class="space-y-4" id="msg-list-container">
                    <div class="text-center py-20 opacity-50 flex flex-col items-center">
                        <svg class="animate-spin h-8 w-8 text-zinc-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <p class="text-sm font-bold text-zinc-400">系统数据极速同步中...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div id="pwd-color-bar" class="absolute top-0 left-0 right-0 h-1 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label><input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors" placeholder="输入原密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label><input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors" placeholder="输入新密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label><input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors" placeholder="再次输入新密码"></div>
            </div>
            <button onclick="alert('系统演示环境暂不可修改密码'); closePwdModal();" class="w-full mt-6 py-3.5 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl text-sm font-bold transition-all btn-press">确认修改</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        if(window.initPage) window.initPage();
    </script>

    <script>
        let currentRole = 'req'; 
        let themeColor = 'indigo'; 

        window.initPage = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('role')) currentRole = urlParams.get('role');

            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);

            // 💡 核心：根据不同身份动态渲染对应的颜色和菜单
            if (currentRole === 'admin') {
                themeColor = 'fuchsia';
                document.getElementById('body-container').classList.add('selection:bg-fuchsia-500/30');
                document.getElementById('bg-glow').classList.add('bg-fuchsia-900/10');
                document.getElementById('logo-box').classList.add('bg-fuchsia-600', 'shadow-[0_0_15px_rgba(217,70,239,0.3)]');
                document.getElementById('pwd-color-bar').classList.add('bg-gradient-to-r', 'from-fuchsia-500', 'to-indigo-500');
                document.getElementById('sidebar-role').innerHTML = `<span class="text-fuchsia-400 font-bold">当前视角: 管理方</span>`;
                
                document.getElementById('sidebar-menu').innerHTML = `
                    <button onclick="window.location.href='manager-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                        <span class="font-medium text-[14px]">总监控制台</span>
                    </button>
                    <button onclick="window.location.href='manager-dashboard.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <span class="font-medium text-[14px]">团队效能大盘</span>
                    </button>
                    <button onclick="window.location.href='project-analysis.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                        <span class="font-medium text-[14px]">项目投入分析</span>
                    </button>
                    <button onclick="window.location.href='org-chart.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span class="font-medium text-[14px]">组织架构与账号</span>
                    </button>
                    <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-500/20 transition-all cursor-default">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="font-bold text-[14px]">全局消息中心</span>
                    </button>
                `;
            } else if (currentRole === 'design') {
                themeColor = 'orange';
                document.getElementById('body-container').classList.add('selection:bg-orange-500/30');
                document.getElementById('bg-glow').classList.add('bg-orange-900/5');
                document.getElementById('logo-box').classList.add('bg-orange-600', 'shadow-[0_0_15px_rgba(249,115,22,0.3)]');
                document.getElementById('pwd-color-bar').classList.add('bg-gradient-to-r', 'from-orange-500', 'to-amber-500');
                document.getElementById('sidebar-role').innerHTML = `<span class="text-orange-400 font-bold">当前视角: 设计方</span>`;
                
                document.getElementById('sidebar-menu').innerHTML = `
                    <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                        <span class="font-medium text-[14px]">执行看板 (Kanban)</span>
                    </button>
                    <button onclick="window.location.href='assistant-assets.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span class="font-medium text-[14px]">我的过稿资产库</span>
                    </button>
                    <button onclick="window.location.href='assistant-calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <span class="font-medium text-[14px]">工时与 AI 绩效</span>
                    </button>
                    <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all cursor-default">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="font-bold text-[14px]">全局消息中心</span>
                    </button>
                `;
            } else {
                // 默认 req 需求方
                themeColor = 'indigo';
                document.getElementById('body-container').classList.add('selection:bg-indigo-500/30');
                document.getElementById('bg-glow').classList.add('bg-indigo-900/5');
                document.getElementById('logo-box').classList.add('bg-indigo-600', 'shadow-[0_0_15px_rgba(79,70,229,0.3)]');
                document.getElementById('pwd-color-bar').classList.add('bg-gradient-to-r', 'from-indigo-500', 'to-purple-500');
                document.getElementById('sidebar-role').innerHTML = `<span class="text-indigo-400 font-bold">当前视角: 需求方</span>`;
                
                document.getElementById('sidebar-menu').innerHTML = `
                    <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                        <span class="font-medium text-[14px]">需求排号大厅</span>
                    </button>
                    <button onclick="window.location.href='record-list.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                        <span class="font-medium text-[14px]">我的提单记录</span>
                    </button>
                    <button onclick="window.location.href='calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span class="font-medium text-[14px]">我的需求日历</span>
                    </button>
                    <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 transition-all cursor-default">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="font-bold text-[14px]">全局消息中心</span>
                    </button>
                `;
            }

            const avatarEl = document.getElementById('sidebar-avatar');
            if(avatarEl) { avatarEl.innerText = user.avatar || '?'; }
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;
            
            loadMsgs();
        }

        // 🚀 核心更新：连接真实 Supabase 云端查询
        window.loadMsgs = async function() {
            const container = document.getElementById('msg-list-container');
            const badge = document.getElementById('unread-badge');

            if(!window.supabase) {
                container.innerHTML = '<div class="text-center py-20 text-zinc-500">云端数据库未连接，请刷新重试</div>';
                return;
            }

            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) return;
            const currentUser = JSON.parse(userStr);
            const userKeyword = (currentUser.enName || currentUser.cnName || '').toLowerCase();

            try {
                // 取最近的记录，前端过滤匹配 (最高效且不被RLS卡死)
                const { data, error } = await window.supabase.from('notifications')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(200);
                
                if (error) throw error;

                // 💡 智能拦截：只找包含当前用户邮箱或名字的记录
                let myNotifs = data.filter(n => {
                    const target = (n.target_email || '').toLowerCase();
                    return target.includes(userKeyword) || (currentUser.email && target.includes(currentUser.email.toLowerCase()));
                });

                const unreadCount = myNotifs.filter(n => !n.is_read).length;
                if(unreadCount > 0) {
                    badge.innerText = `${unreadCount} 未读`;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }

                if(myNotifs.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-24 opacity-50 flex flex-col items-center">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-zinc-500 mb-4"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                            <p class="text-[14px] font-medium text-zinc-400">消息列表空空如也</p>
                            <p class="text-[11px] text-zinc-500 mt-2">没有任何新的通知或动态</p>
                        </div>`;
                    return;
                }

                let html = '';
                myNotifs.forEach(n => {
                    const isRead = n.is_read;
                    const dotHtml = isRead ? `<div class="w-8 h-8 rounded-full bg-zinc-800/50 flex items-center justify-center text-zinc-600 shrink-0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg></div>` : 
                                           `<div class="w-8 h-8 rounded-full bg-${themeColor}-500/20 border border-${themeColor}-500/30 flex items-center justify-center text-${themeColor}-400 shrink-0 shadow-[0_0_15px_rgba(var(--tw-colors-${themeColor}-500),0.3)]"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>`;
                    
                    const bgClass = isRead ? 'bg-[#121217] opacity-60' : `bg-[#18181b] border-${themeColor}-500/30 shadow-[0_0_15px_rgba(var(--tw-colors-${themeColor}-500),0.05)]`;
                    const titleClass = isRead ? 'text-zinc-400' : 'text-white';
                    
                    let targetUrl = n.link_url || '#';
                    let taskIdMatch = targetUrl.match(/id=(TK-\d+)/);
                    let taskId = taskIdMatch ? taskIdMatch[1] : '系统通知';

                    // 💡 智能拆分标题和正文
                    let titleText = '业务动态更新';
                    let contentText = n.content || '';
                    let titleMatch = contentText.match(/^(【.*?】)/);
                    if(titleMatch) {
                        titleText = titleMatch[1];
                        contentText = contentText.replace(titleMatch[1], '').trim();
                    } else if(n.category === 'urgent') {
                        titleText = '🚨 紧急催办';
                    } else if(n.category === 'transfer') {
                        titleText = '🔄 转单提醒';
                    }

                    const dateStr = new Date(n.created_at).toLocaleString();

                    html += `
                    <div class="msg-card p-5 rounded-2xl flex items-start gap-4 ${bgClass}">
                        ${dotHtml}
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1.5">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-mono font-bold bg-white/5 px-2 py-0.5 rounded text-zinc-400 border border-white/5">${taskId}</span>
                                    <h4 class="text-[14px] font-bold ${titleClass}">${titleText}</h4>
                                </div>
                                <span class="text-[11px] text-zinc-500 font-mono flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full ${isRead?'bg-zinc-700':`bg-${themeColor}-500 animate-pulse`}"></span> ${dateStr}</span>
                            </div>
                            <p class="text-[13px] text-zinc-300 leading-relaxed mb-4">${contentText}</p>
                            <button onclick="markSingleAndGo('${n.id}', '${targetUrl}')" class="text-[11px] font-bold text-zinc-300 bg-white/5 hover:bg-white/10 border border-white/5 px-3 py-1.5 rounded flex items-center gap-1.5 transition-colors w-max btn-press">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg> 点击穿梭至详情页处理
                            </button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;

                // 保存给全读按钮用
                window.currentMyUnreadIds = myNotifs.filter(n => !n.is_read).map(n => n.id);

            } catch(e) {
                console.error("加载消息失败:", e);
                container.innerHTML = '<div class="text-center py-20 text-zinc-500">拉取云端数据失败，请刷新重试</div>';
            }
        }

        // 🚀 更新云端消除红点
        window.markAllAsRead = async function(btnNode) {
            if (!window.supabase || !window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            
            const originalText = btnNode.innerHTML;
            btnNode.innerHTML = `<svg class="animate-spin h-3.5 w-3.5 mr-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 处理中...`;
            
            try {
                await window.supabase.from('notifications')
                    .update({ is_read: true })
                    .in('id', window.currentMyUnreadIds);
                
                await window.loadMsgs(); // 重新拉取
            } catch(e) { console.error(e); }
            
            btnNode.innerHTML = originalText;
        }

        // 🚀 单个点击跳转并消除红点
        window.markSingleAndGo = async function(id, url) {
            try {
                await window.supabase.from('notifications').update({ is_read: true }).eq('id', id);
            } catch(e) {}
            window.location.href = url;
        }

        window.logout = function(e) { e.stopPropagation(); localStorage.removeItem('activeUserObj'); window.location.href = 'login.html'; }
        
        window.openPwdModal = function() { document.getElementById('pwd-modal-overlay').classList.remove('hidden'); setTimeout(() => { document.getElementById('pwd-modal-overlay').classList.remove('opacity-0'); document.getElementById('pwd-modal').classList.remove('hidden', 'scale-95'); }, 10); }
        window.closePwdModal = function() { document.getElementById('pwd-modal-overlay').classList.add('opacity-0'); document.getElementById('pwd-modal').classList.add('scale-95'); setTimeout(() => { document.getElementById('pwd-modal-overlay').classList.add('hidden'); document.getElementById('pwd-modal').classList.add('hidden'); }, 300); }

        window.goBack = function() {
            if (currentRole === 'req') window.location.href = 'index.html';
            else if (currentRole === 'design') window.location.href = 'assistant-workspace.html';
            else window.location.href = 'manager-workspace.html';
        }
    </script>
</body>
</html>
