<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>快捷交方案｜戴维斯设计系统</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#09090b;color:#f4f4f5;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(760px,100%);background:#121217;border:1px solid rgba(255,255,255,.09);border-radius:28px;padding:34px;box-shadow:0 30px 90px rgba(0,0,0,.45)}
    .icon{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#fb923c,#f97316);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:18px}
    h1{margin:0 0 10px;font-size:28px;font-weight:900}
    p{color:#a1a1aa;line-height:1.75;margin:0}
    .info{margin:24px 0;padding:18px;border-radius:18px;background:#18181b;border:1px solid rgba(255,255,255,.08)}
    .row{display:grid;grid-template-columns:110px 1fr;gap:14px;margin:10px 0;font-size:14px}
    .k{color:#71717a;font-weight:800}
    .v{color:#fff;font-weight:800}
    .tip{background:#1c1917;border:1px solid rgba(251,146,60,.25);color:#fed7aa;padding:14px 16px;border-radius:16px;margin:20px 0;font-size:14px;line-height:1.7}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
    a,button{border:0;text-decoration:none;border-radius:15px;padding:14px 18px;font-size:15px;font-weight:900;cursor:pointer}
    .primary{background:linear-gradient(135deg,#fb923c,#f97316);color:#111;flex:1;text-align:center;min-width:240px}
    .secondary{background:#27272a;color:#fff}
    .err{background:#3f1d1d;border:1px solid rgba(248,113,113,.35);color:#fecaca;padding:16px;border-radius:16px;white-space:pre-wrap;line-height:1.7;margin-top:20px}
    .muted{font-size:12px;color:#71717a;margin-top:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚀</div>
    <h1>快捷交方案入口</h1>
    <p>这里不会直接改写需求字段，只负责校验企业微信一次性链接，然后带你进入系统原有的「设计师传图交方案」页面。</p>

    <div id="state" class="tip">正在读取链接信息...</div>
    <div id="info" class="info" style="display:none">
      <div class="row"><div class="k">需求编号</div><div class="v" id="task-id">--</div></div>
      <div class="row"><div class="k">需求标题</div><div class="v" id="task-title">--</div></div>
      <div class="row"><div class="k">当前状态</div><div class="v" id="task-status">--</div></div>
      <div class="row"><div class="k">执行人</div><div class="v" id="task-assignee">--</div></div>
    </div>

    <div class="actions" id="actions" style="display:none">
      <a id="designer-link" class="primary" href="#">进入设计师交方案页面</a>
      <button class="secondary" onclick="location.reload()">重新读取</button>
    </div>

    <p class="muted">进入后请使用页面右侧/下方原有的上传区域提交预览图、工时、AI工具和说明；状态、历史、通知都由原页面逻辑处理。</p>
    <div id="error" class="err" style="display:none"></div>
  </div>

<script>
const GATEWAY_URL = "https://supffjeeouibhqdfqosk.supabase.co/functions/v1/davis-task-action-plugin";
const ticket = new URLSearchParams(location.search).get("ticket") || "";

function setText(id, value){ const el = document.getElementById(id); if(el) el.textContent = value || "--"; }
function showError(msg){
  document.getElementById("state").textContent = "读取失败";
  const el = document.getElementById("error");
  el.style.display = "block";
  el.textContent = msg || "链接无效，请回企业微信重新生成。";
}
async function postJson(payload){
  const res = await fetch(GATEWAY_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.ok === false) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function init(){
  if(!ticket) return showError("链接缺少 ticket，请回企业微信重新生成快捷交方案入口。");
  try{
    const data = await postJson({action:"read_delivery_ticket", ticket});
    const t = data.task || {};
    const url = data.designer_url || `https://davis-design.cn/task-detail-designer.html?id=${encodeURIComponent(t.id || "")}&quick=delivery`;

    setText("task-id", t.id);
    setText("task-title", t.title);
    setText("task-status", t.status_label || t.status);
    setText("task-assignee", t.assignee);

    document.getElementById("designer-link").href = url;
    document.getElementById("info").style.display = "block";
    document.getElementById("actions").style.display = "flex";
    document.getElementById("state").textContent = "已校验。点击下方按钮进入设计师原有交方案页面。";

    // 轻量快捷：1 秒后自动跳转；如果用户想先看信息，可以点返回停留。
    setTimeout(() => { location.href = url; }, 1000);
  }catch(err){
    showError(err.message || String(err));
  }
}
init();
</script>
</body>
</html>
