<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>快捷提交方案｜戴维斯设计系统</title>
  <style>
    :root{color-scheme:dark}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#09090b;color:#f4f4f5}
    .wrap{max-width:860px;margin:40px auto;padding:0 20px}
    .card{background:#111116;border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:34px;box-shadow:0 28px 80px rgba(0,0,0,.38)}
    .head{display:flex;gap:16px;align-items:center;margin-bottom:24px}
    .icon{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#fb923c,#f97316);display:flex;align-items:center;justify-content:center;font-size:28px}
    h1{font-size:26px;margin:0 0 8px;font-weight:900}
    .sub{color:#a1a1aa;font-size:14px;line-height:1.7;margin:0}
    .tip{background:#1c1917;border:1px solid rgba(251,146,60,.25);color:#fed7aa;padding:14px 16px;border-radius:16px;margin:18px 0 24px;font-size:14px;line-height:1.65}
    label{display:block;font-size:14px;font-weight:800;color:#d4d4d8;margin:20px 0 8px}
    input,textarea,select{width:100%;background:#09090b;border:1px solid #3f3f46;border-radius:14px;padding:13px 14px;color:#fff;font-size:15px;outline:none}
    textarea{min-height:110px;resize:vertical;line-height:1.6}
    input:focus,textarea:focus,select:focus{border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,.12)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .filebox{position:relative;border:1px dashed #52525b;border-radius:18px;padding:24px;text-align:center;background:#0c0c10;min-height:150px;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#a1a1aa}
    .filebox input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .preview{max-width:100%;max-height:280px;border-radius:14px;border:1px solid rgba(255,255,255,.08);margin-top:12px;display:none}
    .chips{display:flex;flex-wrap:wrap;gap:10px}
    .chip{border:1px solid #3f3f46;border-radius:999px;padding:9px 12px;color:#d4d4d8;background:#0b0b0e;font-size:13px;cursor:pointer}
    .chip input{width:auto;margin-right:6px}
    .actions{display:flex;gap:12px;margin-top:28px}
    button{border:0;border-radius:14px;padding:14px 18px;font-weight:900;font-size:15px;cursor:pointer}
    .primary{background:linear-gradient(135deg,#fb923c,#f97316);color:#111;flex:1}
    .secondary{background:#27272a;color:#fff}
    .muted{color:#71717a;font-size:12px;line-height:1.6;margin-top:8px}
    .ok{background:#052e16;border:1px solid rgba(34,197,94,.35);color:#bbf7d0;padding:16px;border-radius:16px;white-space:pre-wrap;line-height:1.7}
    .err{background:#3f1d1d;border:1px solid rgba(248,113,113,.35);color:#fecaca;padding:16px;border-radius:16px;white-space:pre-wrap;line-height:1.7}
    .hidden{display:none!important}
    @media(max-width:720px){.grid{grid-template-columns:1fr}.card{padding:24px;border-radius:22px}.actions{flex-direction:column}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="icon">🚀</div>
        <div>
          <h1>快捷提交方案</h1>
          <p class="sub" id="subtitle">正在读取一次性链接信息...</p>
        </div>
      </div>

      <div id="state" class="tip">这个链接由企业微信机器人生成。提交后会自动写入需求历史、工时、方案图，并通知下一环节处理人。</div>

      <form id="form" class="hidden">
        <div class="grid">
          <div>
            <label>需求编号</label>
            <input id="task-id" disabled />
          </div>
          <div>
            <label>当前状态</label>
            <input id="task-status" disabled />
          </div>
        </div>

        <label>需求标题</label>
        <input id="task-title" disabled />

        <label>提交类型 *</label>
        <select id="phase">
          <option value="framework">框架方案 / 中期方案，提交后进入领导审批</option>
          <option value="draft">正式稿 / 终稿，提交后进入需求方验收</option>
        </select>

        <label>预览图 <span id="img-required-tip" style="color:#fb7185">*</span></label>
        <div class="filebox">
          <input type="file" id="image-file" accept="image/jpeg,image/png,image/webp"/>
          <div id="file-text">点击或拖拽上传 JPG / PNG / WEBP 预览图</div>
          <img id="preview" class="preview"/>
        </div>
        <p class="muted">框架方案必须上传预览图。正式稿至少上传预览图或填写源文件/网盘链接。</p>

        <label>源文件 / 网盘链接</label>
        <input id="source-link" placeholder="如腾讯文档、网盘、图片链接等。正式稿建议填写。" />

        <div class="grid">
          <div>
            <label>本次工时（小时）*</label>
            <input type="number" id="work-hours" step="0.5" min="0.5" placeholder="例如：2.5" />
          </div>
          <div>
            <label>使用 AI 工具</label>
            <input id="ai-manual" placeholder="可选，例如：Midjourney / PS / 即梦" />
          </div>
        </div>

        <label>提交说明</label>
        <textarea id="desc" placeholder="说明本次提交内容、修改点、交付说明等。"></textarea>

        <label>常用 AI 工具</label>
        <div class="chips">
          <label class="chip"><input type="checkbox" value="ChatGPT">ChatGPT</label>
          <label class="chip"><input type="checkbox" value="Midjourney">Midjourney</label>
          <label class="chip"><input type="checkbox" value="Photoshop">Photoshop</label>
          <label class="chip"><input type="checkbox" value="即梦">即梦</label>
          <label class="chip"><input type="checkbox" value="Figma">Figma</label>
        </div>

        <div class="actions">
          <button class="primary" id="submit-btn" type="submit">提交方案与工时</button>
          <button class="secondary" type="button" onclick="location.reload()">重新读取</button>
        </div>
      </form>

      <div id="result" class="hidden"></div>
    </div>
  </div>

<script>
const GATEWAY_URL = "https://supffjeeouibhqdfqosk.supabase.co/functions/v1/davis-task-action-plugin";
const params = new URLSearchParams(location.search);
const ticket = params.get("ticket") || "";
let imageData = null;

function setState(text, type='tip') {
  const el = document.getElementById('state');
  el.className = type === 'err' ? 'err' : type === 'ok' ? 'ok' : 'tip';
  el.textContent = text;
}

function showResult(text, ok=true) {
  const el = document.getElementById('result');
  el.className = ok ? 'ok' : 'err';
  el.textContent = text;
  el.classList.remove('hidden');
}

async function postJson(payload) {
  const res = await fetch(GATEWAY_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function compressToDataUrl(file, maxWidth=1600, quality=0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let {width, height} = img;
        if (width > maxWidth) {
          height = Math.round(height * maxWidth / width);
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('图片读取失败'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('文件读取失败'));
    reader.readAsDataURL(file);
  });
}

document.getElementById('image-file').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  document.getElementById('file-text').textContent = `正在压缩：${file.name}`;
  try {
    const dataUrl = await compressToDataUrl(file);
    imageData = { file_name: file.name, mime_type: file.type || 'image/jpeg', data_url: dataUrl };
    const preview = document.getElementById('preview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    document.getElementById('file-text').textContent = `已选择：${file.name}`;
  } catch(err) {
    imageData = null;
    setState(err.message || String(err), 'err');
  }
});

document.getElementById('phase').addEventListener('change', () => {
  document.getElementById('img-required-tip').style.display = document.getElementById('phase').value === 'framework' ? 'inline' : 'none';
});

async function init() {
  if (!ticket) {
    setState('链接缺少 ticket，请回企业微信重新生成方案上传链接。', 'err');
    return;
  }
  try {
    const data = await postJson({ action: 'read_delivery_ticket', ticket });
    const t = data.task || {};
    document.getElementById('subtitle').textContent = `提交身份：${data.display_name || data.creator}（${data.creator}）`;
    document.getElementById('task-id').value = t.id || '';
    document.getElementById('task-status').value = t.status_label || t.status || '';
    document.getElementById('task-title').value = t.title || '';
    document.getElementById('phase').value = t.phase || 'framework';
    document.getElementById('img-required-tip').style.display = document.getElementById('phase').value === 'framework' ? 'inline' : 'none';
    setState(`已读取需求：${t.id}。请上传方案图并填写工时。链接有效期内只能提交一次。`);
    document.getElementById('form').classList.remove('hidden');
  } catch(err) {
    setState(err.message || String(err), 'err');
  }
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const phase = document.getElementById('phase').value;
  const sourceLink = document.getElementById('source-link').value.trim();
  const hours = document.getElementById('work-hours').value;
  if (!hours || Number(hours) <= 0) return setState('请填写大于 0 的工时。', 'err');
  if (phase === 'framework' && !imageData) return setState('提交框架方案必须上传预览图。', 'err');
  if (phase === 'draft' && !imageData && !sourceLink) return setState('提交正式稿至少需要上传预览图或填写源文件/网盘链接。', 'err');

  const aiTools = Array.from(document.querySelectorAll('.chips input:checked')).map(x => x.value);
  const manual = document.getElementById('ai-manual').value.trim();
  if (manual) aiTools.push(manual);

  btn.disabled = true;
  btn.textContent = '正在提交...';
  setState('正在上传并写入系统，请不要关闭页面。');
  try {
    const data = await postJson({
      action: 'submit_delivery',
      ticket,
      phase,
      source_link: sourceLink,
      work_hours: hours,
      desc: document.getElementById('desc').value.trim(),
      ai_tools: aiTools,
      image: imageData
    });
    document.getElementById('form').classList.add('hidden');
    setState('提交成功。', 'ok');
    showResult(data.replyText || '提交成功', true);
  } catch(err) {
    setState(err.message || String(err), 'err');
    btn.disabled = false;
    btn.textContent = '提交方案与工时';
  }
});

init();
</script>
</body>
</html>
