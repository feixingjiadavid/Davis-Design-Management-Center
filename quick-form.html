<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>快捷提单 - 戴维斯设计系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { background:#09090b; color:#e4e4e7; font-family:'Inter', system-ui, -apple-system, sans-serif; }
    .form-card { background:#121217; border:1px solid rgba(255,255,255,.06); }
    input, select, textarea { background:#09090b !important; border:1px solid #27272a !important; color:white !important; outline:none; transition:all .2s; }
    input:focus, textarea:focus, select:focus { border-color:#6366f1 !important; box-shadow:0 0 0 2px rgba(99,102,241,.20); }
    .pill-checkbox:checked + div { background-color:rgba(99,102,241,.15); border-color:#6366f1; color:#a5b4fc; font-weight:700; }
    .drop-item:hover { background-color:rgba(99,102,241,.15); color:#a5b4fc; }
    .custom-scrollbar::-webkit-scrollbar { width:4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background:rgba(255,255,255,.14); border-radius:10px; }
    .invalid-field { border-color:#ef4444 !important; animation:shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .hint { background:rgba(99,102,241,.10); border:1px solid rgba(99,102,241,.22); }
    .error-hint { background:rgba(244,63,94,.12); border:1px solid rgba(244,63,94,.32); }
  </style>
</head>
<body class="p-4 md:p-10 flex justify-center items-start min-h-screen">
  <div class="w-full max-w-2xl form-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-8 shadow-2xl relative">
    <div class="flex items-center gap-4 mb-6">
      <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 shrink-0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-white tracking-tight">快捷提单</h1>
        <p class="text-zinc-500 text-[11px] mt-1">提单身份：<span id="display-creator" class="text-indigo-400 font-bold font-mono">识别中...</span></p>
      </div>
    </div>

    <div id="secure-hint" class="hint rounded-2xl p-4 mb-6 text-[12px] leading-6 text-indigo-100">
      这个链接由小戴维斯校验企业微信身份后生成。提交时系统会再次校验一次性票据，并以 Bot 识别到的企业微信英文名作为提单人。
    </div>
    <div id="fatal-hint" class="hidden error-hint rounded-2xl p-4 mb-6 text-[12px] leading-6 text-rose-100"></div>

    <form id="quickForm" class="space-y-6" novalidate>
      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">1. 需求标题 <span class="text-rose-500">*</span></label>
        <input type="text" id="req-short-title" class="w-full px-4 py-3.5 rounded-xl text-sm" placeholder="例如：年度大会主视觉设计" maxlength="80">
      </div>

      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">2. 设计内容 <span class="text-rose-500">*</span></label>
        <textarea id="req-title" class="w-full px-4 py-3.5 rounded-xl text-sm h-32 resize-none custom-scrollbar" placeholder="请说明背景、用途、文案、尺寸、风格、参考方向、交付物等。" maxlength="3000"></textarea>
        <p class="text-[11px] text-zinc-600 mt-2">建议写清：用在哪里、尺寸、文案是否已定、是否需要源文件、参考图/链接。</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">3. 产出类型 <span class="text-rose-500">*</span></label>
          <select id="req-type" class="w-full px-4 py-3.5 rounded-xl text-sm cursor-pointer">
            <option value="">-- 请选择 --</option>
            <option value="平面视觉">平面视觉</option>
            <option value="视频动效">视频动效</option>
          </select>
        </div>
        <div class="relative" id="project-wrapper">
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">4. 归属项目 <span class="text-rose-500">*</span></label>
          <input type="text" id="req-project" class="w-full px-4 py-3.5 rounded-xl text-sm" placeholder="点选或搜索..." readonly>
          <div id="project-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-2xl z-[999] max-h-56 overflow-y-auto custom-scrollbar py-2"></div>
        </div>
      </div>

      <div id="channel-container">
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">5. 期望分发渠道 <span class="text-rose-500">*</span></label>
        <div class="flex flex-wrap gap-2">
          <label class="cursor-pointer"><input type="checkbox" value="企业号" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">企业号</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="邮件" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">邮件</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="小蓝书" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">小蓝书</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="立地屏" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">立地屏</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="电视机" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">电视机</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="异形牌" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">异形牌</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="We视角" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">We视角</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="其他" id="channel-other-cb" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">其他</div></label>
        </div>
        <input type="text" id="req-channel-other" placeholder="请手写具体渠道..." class="hidden w-full mt-3 bg-[#09090b] border border-zinc-700 rounded-xl px-4 py-2.5 text-sm">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="relative" id="assignee-wrapper">
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">6. 期望执行人 <span class="text-zinc-600">可选</span></label>
          <input type="text" id="req-assignee-input" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="默认系统统筹" readonly>
          <div id="assignee-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-2xl z-[999] max-h-56 overflow-y-auto custom-scrollbar py-2"></div>
        </div>
        <div>
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">7. 期望交付日 <span class="text-rose-500">*</span></label>
          <input type="date" id="req-date" class="w-full px-4 py-3 rounded-xl text-sm" style="color-scheme: dark;">
        </div>
      </div>

      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">8. 参考链接 <span class="text-zinc-600">选填</span></label>
        <input type="url" id="req-link" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="腾讯文档、网盘、图片链接等。">
      </div>

      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">9. 参考补充说明 <span class="text-zinc-600">选填</span></label>
        <textarea id="req-extra" class="w-full px-4 py-3 rounded-xl text-sm h-24 resize-none" placeholder="例如：参考图已发群里 / 文案在腾讯文档里 / 需要透明底 PNG 等。" maxlength="1000"></textarea>
        <p class="text-[11px] text-zinc-600 mt-2">为保护数据库 IO，本页不再上传大附件。请使用腾讯文档、网盘、群文件或图片链接。</p>
      </div>

      <button type="submit" id="submitBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold shadow-xl transition-all active:scale-95">
        确认提交并同步至大厅
      </button>
    </form>
  </div>

  <script>
    const GATEWAY_URL = 'https://supffjeeouibhqdfqosk.supabase.co/functions/v1/quick-form-gateway';
    const PROJECT_LIST = ["Smart文化-OpenTalk","Smart文化-1024","Smart文化-后勤小管家","Smart文化-小蓝书运营","Smart文化-送物机器人","荣誉体系-即时激励","荣誉体系-荣誉奖项","荣誉体系-AI奖项","荣誉体系-最佳拍档","荣誉体系-科技合作社","荣誉体系-极客团","年度大会-武汉","年度大会-上海","年度大会-行庆","HR侧相关-周年庆","HR侧相关-初八团拜","工会相关-团建旅游","工会相关-运动季","工会相关-文体活动","常规活动-新人入职","常规活动-科技合规银监人行类支持","常规活动-年决","常规活动-管理团队活动","常规活动-外籍员工支持","品宣支持","科技子支持","行品宣设计对接","部门-基科","部门-数业","部门-贷款","部门-存款","部门-企同","部门-财富","部门-政科","部门-数发","部门-安全","部门-上海","部门-武汉","部门-成都","部门-科管","其他-待统筹判断"];
    const ASSIGNEE_LIST = ['不指定 (系统统筹)','anckyyu','davidxxu','debbiehuang','evazzhu','hscheng','mengmengli','skylerhuang','sophiachen','tiaouyang','v_lijuangchen','v_lucui','v_sijieli','v_siyifu','v_sjtian','v_wbchye','v_wbjgao','v_wbmtli','v_zqlan','wenjiawu','yamyzhang','yaozhong','yoshyliu','zoeyzhou'].sort();

    const params = new URLSearchParams(window.location.search);
    const ticket = params.get('ticket') || '';
    const payloadStr = params.get('payload') || '';
    let prefill = {};

    function b64JsonDecode(s) {
      try {
        const pad = '='.repeat((4 - s.length % 4) % 4);
        const raw = atob((s + pad).replace(/-/g, '+').replace(/_/g, '/'));
        const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
        return JSON.parse(new TextDecoder().decode(bytes));
      } catch(e) { return {}; }
    }

    function failPage(msg) {
      const hint = document.getElementById('fatal-hint');
      hint.classList.remove('hidden');
      hint.innerText = msg;
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').classList.add('opacity-50');
    }

    function setVal(id, v) { const el = document.getElementById(id); if (el && v) el.value = v; }
    function norm(v){ return String(v || '').trim(); }

    function initPrefill() {
      if (!ticket) failPage('这个链接缺少一次性提单票据。请回到企业微信，让小戴维斯重新生成提单链接。');
      prefill = payloadStr ? b64JsonDecode(payloadStr) : {};
      const creator = prefill.creator || '已由 Bot 校验';
      document.getElementById('display-creator').innerText = creator;
      setVal('req-short-title', prefill.title || '');
      setVal('req-title', prefill.desc || '');
      setVal('req-type', prefill.type || '');
      setVal('req-project', prefill.project || '');
      setVal('req-date', prefill.due_date || '');
      if (Array.isArray(prefill.channels)) {
        document.querySelectorAll('.req-channel').forEach(cb => { if (prefill.channels.includes(cb.value)) cb.checked = true; });
      }
    }

    function renderDrop(id, data, inputId, filter='') {
      const drop = document.getElementById(id);
      drop.classList.remove('hidden');
      const filtered = data.filter(i => i.toLowerCase().includes(filter.toLowerCase()));
      drop.innerHTML = filtered.map(item => `<div class="px-4 py-2.5 drop-item cursor-pointer text-[13px] border-b border-white/5 last:border-0" data-v="${item.replace(/"/g, '&quot;')}">${item}</div>`).join('');
      drop.querySelectorAll('[data-v]').forEach(el => el.onclick = () => { document.getElementById(inputId).value = el.dataset.v; drop.classList.add('hidden'); });
    }

    document.addEventListener('click', (e) => {
      const p = document.getElementById('project-wrapper');
      const a = document.getElementById('assignee-wrapper');
      if (p && !p.contains(e.target)) document.getElementById('project-dropdown').classList.add('hidden');
      if (a && !a.contains(e.target)) document.getElementById('assignee-dropdown').classList.add('hidden');
    });
    document.getElementById('req-project').addEventListener('click', () => renderDrop('project-dropdown', PROJECT_LIST, 'req-project'));
    document.getElementById('req-assignee-input').addEventListener('click', () => renderDrop('assignee-dropdown', ASSIGNEE_LIST, 'req-assignee-input'));
    document.getElementById('channel-other-cb').addEventListener('change', () => document.getElementById('req-channel-other').classList.toggle('hidden', !document.getElementById('channel-other-cb').checked));

    function validate() {
      document.querySelectorAll('.invalid-field').forEach(el => el.classList.remove('invalid-field'));
      const fields = [['req-short-title','需求标题'],['req-title','设计内容'],['req-type','产出类型'],['req-project','归属项目'],['req-date','交付日期']];
      for (const [id, name] of fields) {
        const el = document.getElementById(id);
        if (!norm(el.value)) { el.classList.add('invalid-field'); alert(`请填写必填项：${name}`); el.focus(); return false; }
      }
      if (document.querySelectorAll('.req-channel:checked').length === 0) { document.getElementById('channel-container').classList.add('invalid-field'); alert('请至少选择一个期望分发渠道！'); return false; }
      return true;
    }

    document.getElementById('quickForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;
      const btn = document.getElementById('submitBtn');
      btn.innerText = '提交中...'; btn.disabled = true;
      const assigneeInput = norm(document.getElementById('req-assignee-input').value);
      const channels = Array.from(document.querySelectorAll('.req-channel:checked')).map(cb => cb.value);
      const other = norm(document.getElementById('req-channel-other').value);
      if (other) channels.push(`其他: ${other}`);
      const fullDesc = norm(document.getElementById('req-title').value) + (norm(document.getElementById('req-extra').value) ? `\n\n补充说明：${norm(document.getElementById('req-extra').value)}` : '');
      const body = {
        action: 'submit_quick_form',
        ticket,
        payload: {
          title: norm(document.getElementById('req-short-title').value),
          full_desc: fullDesc,
          type: norm(document.getElementById('req-type').value),
          project: norm(document.getElementById('req-project').value),
          due_date: norm(document.getElementById('req-date').value),
          assignee: (assigneeInput && assigneeInput !== '不指定 (系统统筹)') ? assigneeInput : 'none',
          link: norm(document.getElementById('req-link').value),
          channels
        }
      };
      try {
        const res = await fetch(GATEWAY_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
        document.body.innerHTML = `<div class="flex flex-col items-center justify-center min-h-screen text-center p-6"><div class="w-20 h-20 bg-emerald-500/20 text-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-emerald-500/20"><svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></div><h2 class="text-2xl font-bold text-white">需求已同步成功</h2><p class="text-zinc-500 mt-3 text-sm leading-relaxed">工单号 ${data.task_id || ''} 已录入戴维斯大厅。<br>提单人：${data.creator || '系统已校验'}</p></div>`;
      } catch (err) {
        alert('提交失败：' + err.message + '\n\n请截图发给 davidxxu。');
        btn.innerText = '重新提交'; btn.disabled = false;
      }
    });

    initPrefill();
  </script>
</body>
</html>
