<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>快捷提单 - 戴维斯设计系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { background:#09090b; color:#e4e4e7; font-family:'Inter', system-ui, -apple-system, sans-serif; }
    .form-card { background:#121217; border:1px solid rgba(255,255,255,.06); }
    input, select, textarea { background:#09090b !important; border:1px solid #27272a !important; color:white !important; outline:none; transition:all .2s; }
    input:focus, textarea:focus, select:focus { border-color:#6366f1 !important; box-shadow:0 0 0 2px rgba(99,102,241,.20); }
    .pill-checkbox:checked + div { background-color:rgba(99,102,241,.15); border-color:#6366f1; color:#a5b4fc; font-weight:700; }
    .drop-item:hover { background-color:rgba(99,102,241,.15); color:#a5b4fc; }
    .custom-scrollbar::-webkit-scrollbar { width:4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background:rgba(255,255,255,.14); border-radius:10px; }
    .invalid-field { border-color:#ef4444 !important; animation:shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .hint { background:rgba(99,102,241,.10); border:1px solid rgba(99,102,241,.22); }
  </style>
</head>
<body class="p-4 md:p-10 flex justify-center items-start min-h-screen">
  <div class="w-full max-w-2xl form-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-8 shadow-2xl relative">
    <div class="flex items-center gap-4 mb-6">
      <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 shrink-0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-white tracking-tight">快捷提单</h1>
        <p class="text-zinc-500 text-[11px] mt-1">提单身份：<span id="display-creator" class="text-indigo-400 font-bold font-mono">识别中...</span></p>
      </div>
    </div>

    <div id="bot-prefill-hint" class="hidden hint rounded-2xl p-4 mb-6 text-[12px] leading-6 text-indigo-100">
      小戴维斯已帮你预填部分内容。请检查并补齐红星字段，确认后即可免登录提交。
    </div>

    <form id="quickForm" class="space-y-6" novalidate>
      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">1. 需求标题 <span class="text-rose-500">*</span></label>
        <input type="text" id="req-short-title" class="w-full px-4 py-3.5 rounded-xl text-sm" placeholder="例如：年度大会主视觉设计" maxlength="80">
      </div>

      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">2. 需求描述 <span class="text-rose-500">*</span></label>
        <textarea id="req-title" class="w-full px-4 py-3.5 rounded-xl text-sm h-32 resize-none custom-scrollbar" placeholder="请说明背景、用途、文案、尺寸、风格、参考方向、交付物等。" maxlength="3000"></textarea>
        <p class="text-[11px] text-zinc-600 mt-2">建议写清：用在哪里、尺寸、文案是否已定、是否需要源文件、参考图/链接。</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">3. 产出类型 <span class="text-rose-500">*</span></label>
          <select id="req-type" class="w-full px-4 py-3.5 rounded-xl text-sm cursor-pointer">
            <option value="">-- 请选择 --</option>
            <option value="平面视觉">平面视觉</option>
            <option value="视频动效">视频动效</option>
          </select>
        </div>
        <div class="relative" id="project-wrapper">
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">4. 归属项目 <span class="text-rose-500">*</span></label>
          <input type="text" id="req-project" class="w-full px-4 py-3.5 rounded-xl text-sm" placeholder="点选或搜索..." onfocus="showProjectDrop()" oninput="filterProjectDrop()">
          <div id="project-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-2xl z-[999] max-h-56 overflow-y-auto custom-scrollbar py-2"></div>
        </div>
      </div>

      <div id="channel-container">
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">5. 期望分发渠道 <span class="text-rose-500">*</span></label>
        <div class="flex flex-wrap gap-2">
          <label class="cursor-pointer"><input type="checkbox" value="企业号" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">企业号</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="邮件" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">邮件</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="小蓝书" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">小蓝书</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="立地屏" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">立地屏</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="电视机" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">电视机</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="异形牌" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">异形牌</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="We视角" class="hidden pill-checkbox req-channel"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">We视角</div></label>
          <label class="cursor-pointer"><input type="checkbox" value="其他" id="channel-other-cb" class="hidden pill-checkbox req-channel" onchange="toggleOtherInput()"><div class="border border-zinc-700 bg-[#09090b] text-zinc-500 text-[10px] px-4 py-2 rounded-full transition-all">其他</div></label>
        </div>
        <input type="text" id="req-channel-other" placeholder="请填写具体渠道..." class="hidden w-full mt-3 rounded-xl px-4 py-2.5 text-sm" maxlength="80">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="relative" id="assignee-wrapper">
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">6. 期望执行人 <span class="text-zinc-600">可选</span></label>
          <input type="text" id="req-assignee-input" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="不确定就选系统统筹" onfocus="showAssigneeDrop()" oninput="filterAssigneeDrop()">
          <div id="assignee-dropdown" class="hidden absolute left-0 right-0 top-[100%] mt-1 bg-[#121217] border border-zinc-700 rounded-xl shadow-2xl z-[999] max-h-56 overflow-y-auto custom-scrollbar py-2"></div>
        </div>
        <div>
          <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">7. 期望交付日 <span class="text-rose-500">*</span></label>
          <input type="date" id="req-date" class="w-full px-4 py-3 rounded-xl text-sm" style="color-scheme: dark;">
        </div>
      </div>

      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">8. 参考链接 / 附件链接 <span class="text-zinc-600">选填</span></label>
        <input type="url" id="req-link" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="腾讯文档、网盘、图片链接等。为了保护数据库，不在这里上传大文件。" maxlength="1000">
      </div>

      <div>
        <label class="block text-[12px] font-bold text-zinc-400 mb-2 uppercase">9. 参考补充说明 <span class="text-zinc-600">选填</span></label>
        <textarea id="req-extra" class="w-full px-4 py-3.5 rounded-xl text-sm h-20 resize-none custom-scrollbar" placeholder="例如：参考图已发群里 / 文案在腾讯文档里 / 需要透明底 PNG 等。" maxlength="800"></textarea>
      </div>

      <button type="submit" id="submitBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold shadow-xl transition-all active:scale-95">
        确认提交并同步至大厅
      </button>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    const supabase = createClient('https://supffjeeouibhqdfqosk.supabase.co', 'sb_publishable_v6fbIaU52lLFacywiIKvUw_x1gc1ckQ');

    const PROJECT_LIST = ["Smart文化-OpenTalk", "Smart文化-1024", "Smart文化-后勤小管家", "Smart文化-小蓝书运营", "Smart文化-送物机器人", "荣誉体系-即时激励", "荣誉体系-荣誉奖项", "荣誉体系-AI奖项", "荣誉体系-最佳拍档", "荣誉体系-科技合作社", "荣誉体系-极客团", "年度大会-武汉", "年度大会-上海", "年度大会-行庆", "HR侧相关-周年庆", "HR侧相关-初八团拜", "工会相关-团建旅游", "工会相关-运动季", "工会相关-文体活动", "常规活动-新人入职", "常规活动-科技合规银监人行类支持", "常规活动-年决", "常规活动-管理团队活动", "常规活动-外籍员工支持", "品宣支持", "科技子支持", "行品宣设计对接", "部门-基科", "部门-数业", "部门-贷款", "部门-存款", "部门-企同", "部门-财富", "部门-政科", "部门-数发", "部门-安全", "部门-上海", "部门-武汉", "部门-成都", "部门-科管", "其他-待统筹判断"];
    const ASSIGNEE_LIST = ['不指定 (系统统筹)', 'anckyyu', 'davidxxu', 'debbiehuang', 'evazzhu', 'hscheng', 'mengmengli', 'skylerhuang', 'sophiachen', 'tiaouyang', 'v_lijuangchen', 'v_lucui', 'v_sijieli', 'v_siyifu', 'v_sjtian', 'v_wbchye', 'v_wbjgao', 'v_wbmtli', 'v_zqlan', 'wenjiawu', 'yamyzhang', 'yaozhong', 'yoshyliu', 'zoeyzhou'].sort();

    const params = new URLSearchParams(window.location.search);
    let creatorId = clean(params.get('creator') || '神秘提单人', 80);
    document.getElementById('display-creator').innerText = creatorId;

    function clean(value, maxLen = 3000) {
      return String(value || '').replace(/[\u0000-\u001f\u007f]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, maxLen);
    }
    function decodePayload(raw) {
      if (!raw) return null;
      try {
        let s = raw.replace(/-/g, '+').replace(/_/g, '/');
        while (s.length % 4) s += '=';
        const bin = atob(s);
        const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
        return JSON.parse(new TextDecoder().decode(bytes));
      } catch (e) {
        console.warn('payload 解析失败', e);
        return null;
      }
    }
    function setVal(id, val) { if (val) document.getElementById(id).value = clean(val, id === 'req-link' ? 1000 : 3000); }
    function checkChannels(raw) {
      const values = Array.isArray(raw) ? raw : String(raw || '').split(',').map(s => s.trim()).filter(Boolean);
      values.forEach(v => {
        const target = Array.from(document.querySelectorAll('.req-channel')).find(cb => cb.value === v);
        if (target) target.checked = true;
      });
    }
    function prefillFromBot() {
      const payload = decodePayload(params.get('payload')) || {};
      const data = Object.assign({}, payload);
      ['title','desc','project','type','assignee','due_date','link','extra','creator','channels'].forEach(k => {
        if (params.has(k)) data[k] = params.get(k);
      });
      if (data.creator) {
        creatorId = clean(data.creator, 80);
        document.getElementById('display-creator').innerText = creatorId;
      }
      setVal('req-short-title', data.title);
      setVal('req-title', data.desc || data.full_desc);
      setVal('req-project', data.project);
      setVal('req-type', data.type);
      setVal('req-assignee-input', data.assignee);
      setVal('req-date', data.due_date || data.date);
      setVal('req-link', data.link);
      setVal('req-extra', data.extra);
      if (data.channels) checkChannels(data.channels);
      if (Object.keys(data).length > 0) document.getElementById('bot-prefill-hint').classList.remove('hidden');
    }

    document.addEventListener('click', (e) => {
      const projWrap = document.getElementById('project-wrapper');
      const assWrap = document.getElementById('assignee-wrapper');
      if (projWrap && !projWrap.contains(e.target)) document.getElementById('project-dropdown').classList.add('hidden');
      if (assWrap && !assWrap.contains(e.target)) document.getElementById('assignee-dropdown').classList.add('hidden');
    });

    function validate() {
      document.querySelectorAll('.invalid-field').forEach(el => el.classList.remove('invalid-field'));
      const fields = [
        { id: 'req-short-title', name: '需求标题' },
        { id: 'req-title', name: '需求描述' },
        { id: 'req-type', name: '产出类型' },
        { id: 'req-project', name: '归属项目' },
        { id: 'req-date', name: '交付日期' }
      ];
      for (let field of fields) {
        const el = document.getElementById(field.id);
        if (!el.value.trim()) {
          el.classList.add('invalid-field');
          alert(`请填写必填项：${field.name}`);
          el.focus();
          return false;
        }
      }
      if (document.querySelectorAll('.req-channel:checked').length === 0) {
        document.getElementById('channel-container').classList.add('invalid-field');
        alert('请至少选择一个期望分发渠道。');
        return false;
      }
      return true;
    }

    window.showProjectDrop = () => renderDrop('project-dropdown', PROJECT_LIST, 'req-project', document.getElementById('req-project').value);
    window.filterProjectDrop = () => renderDrop('project-dropdown', PROJECT_LIST, 'req-project', document.getElementById('req-project').value);
    window.showAssigneeDrop = () => renderDrop('assignee-dropdown', ASSIGNEE_LIST, 'req-assignee-input', document.getElementById('req-assignee-input').value);
    window.filterAssigneeDrop = () => renderDrop('assignee-dropdown', ASSIGNEE_LIST, 'req-assignee-input', document.getElementById('req-assignee-input').value);

    function renderDrop(id, data, inputId, filter = '') {
      const drop = document.getElementById(id);
      drop.classList.remove('hidden');
      const f = clean(filter, 80).toLowerCase();
      const filtered = data.filter(i => i.toLowerCase().includes(f));
      drop.innerHTML = filtered.map(item => `<div class="px-4 py-2.5 drop-item cursor-pointer text-[13px] border-b border-white/5 last:border-0" data-val="${encodeURIComponent(item)}">${escapeHtml(item)}</div>`).join('');
      Array.from(drop.querySelectorAll('[data-val]')).forEach(node => {
        node.onclick = () => { document.getElementById(inputId).value = decodeURIComponent(node.dataset.val); drop.classList.add('hidden'); };
      });
    }
    function escapeHtml(value) { return String(value || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    window.toggleOtherInput = () => {
      const el = document.getElementById('req-channel-other');
      el.classList.toggle('hidden', !document.getElementById('channel-other-cb').checked);
    }

    document.getElementById('quickForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      const btn = document.getElementById('submitBtn');
      const original = btn.innerText;
      btn.innerText = '提交中...';
      btn.disabled = true;

      const assigneeInput = clean(document.getElementById('req-assignee-input').value, 80);
      const assigneeVal = (!assigneeInput || assigneeInput === '不指定 (系统统筹)') ? 'none' : assigneeInput;
      const channels = Array.from(document.querySelectorAll('.req-channel:checked')).map(cb => cb.value);
      const other = clean(document.getElementById('req-channel-other').value, 80);
      if (other) channels.push(`其他: ${other}`);
      const extra = clean(document.getElementById('req-extra').value, 800);
      const fullDesc = clean(document.getElementById('req-title').value, 3000) + (extra ? `\n\n【参考补充说明】\n${extra}` : '');
      const taskId = 'TK-' + Date.now().toString().slice(-6);

      const taskData = {
        id: taskId,
        title: clean(document.getElementById('req-short-title').value, 80),
        full_desc: fullDesc,
        project: clean(document.getElementById('req-project').value, 120),
        due_date: document.getElementById('req-date').value,
        assignee: assigneeVal,
        link: clean(document.getElementById('req-link').value, 1000),
        creator: creatorId,
        channels: channels,
        status: assigneeVal === 'none' ? 'pending' : 'pending_accept',
        file_name: '',
        file_data: null,
        summary_desc: assigneeVal === 'none' ? '已通过企业微信免登录快捷提单提交，等待统筹。' : `已通过企业微信免登录快捷提单提交，指派给 ${assigneeVal}，等待接单。`,
        history_json: JSON.stringify([{ action: 'create', operator: `${creatorId} (需求方)`, time: new Date().toISOString(), reply: '通过企业微信 Bot / 免登录快捷提单发起新需求' }])
      };

      const { error } = await supabase.from('test_tasks').insert([taskData]);
      if (error) {
        alert('提交失败：' + error.message + '\n\n请截图发给 davidxxu。');
        btn.innerText = original;
        btn.disabled = false;
        return;
      }
      const detailUrl = `task-detail-requester.html?id=${encodeURIComponent(taskId)}`;
      document.body.innerHTML = `<div class="flex flex-col items-center justify-center min-h-screen text-center p-6"><div class="w-20 h-20 bg-emerald-500/20 text-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-emerald-500/20"><svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></div><h2 class="text-2xl font-bold text-white">需求已同步成功</h2><p class="text-zinc-500 mt-3 text-sm leading-relaxed">工单号 <b class="text-indigo-300">${escapeHtml(taskId)}</b> 已录入戴维斯大厅。<br>后续可在企业微信里问“小戴，查我的需求”。</p><a href="${detailUrl}" class="mt-8 inline-flex px-5 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">查看需求详情</a></div>`;
    });

    prefillFromBot();
  </script>
</body>
</html>
