<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的提单记录 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        
        tr { transition: background-color 0.2s ease; }
        tr:hover td { background-color: rgba(255, 255, 255, 0.03); }
        .table-row-hover { cursor: pointer; }

        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .dropdown-enter { animation: dropIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
        @keyframes dropIn { 0% { opacity: 0; transform: scale(0.95) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-indigo-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-medium text-[14px]">需求排号大厅</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                <span class="font-bold text-[14px]">我的提单记录</span>
            </button>
            <button onclick="window.location.href='calendar.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="font-medium text-[14px]">我的需求日历</span>
            </button>
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-50">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-indigo-400 hover:bg-indigo-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        
        <header class="px-10 py-8 border-b border-white/5 shrink-0 bg-[#09090b]/80 backdrop-blur-xl flex justify-between items-end relative z-[999]">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight mb-2">我的全部提单记录</h2>
                <p class="text-sm text-zinc-500">追踪、查询或下载您过去发起的所有需求及产出物文件。</p>
            </div>
            
            <div class="flex items-center gap-4 relative">
                
                <div class="relative z-[120]" id="notif-wrapper">
                    <button id="notifBtn" class="w-11 h-11 rounded-2xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="bell-dot" class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                    </button>
                    <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                        <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                            <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                            <button onclick="window.markAllAsRead(event)" class="text-[11px] text-indigo-400 hover:text-indigo-300 btn-press transition-colors">全部已读</button>
                        </div>
                        <div class="max-h-[300px] overflow-y-auto custom-scrollbar" id="notif-list-container">
                            <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>
                        </div>
                        <div class="pt-3 px-5 border-t border-white/5 text-center">
                            <button onclick="window.location.href='message-center.html?role=req'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                        </div>
                    </div>
                </div>

                <div class="relative" id="identity-wrapper">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-5 py-3 rounded-[14px] flex items-center gap-3 text-[13px] font-medium hover:bg-[#1a1a1f] transition-colors btn-press">
                        加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-hidden flex flex-col">
            
            <div class="flex items-center justify-between mb-6 shrink-0">
                <div class="flex items-center gap-4">
                    <div class="relative w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        <input type="text" id="searchInput" onkeyup="window.filterTable()" class="w-full bg-[#121217] border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-[13px] text-white outline-none focus:border-indigo-500 transition-colors" placeholder="搜索单号、标题、执行人...">
                    </div>
                    
                    <select id="projectFilter" onchange="window.filterTable()" class="bg-[#121217] border border-white/10 rounded-xl px-4 py-2.5 text-[13px] text-zinc-300 outline-none hover:border-white/20 transition-colors cursor-pointer appearance-none">
                        <option value="all">所有归属项目</option>
                    </select>
                    
                    <select id="statusFilter" onchange="window.filterTable()" class="bg-[#121217] border border-white/10 rounded-xl px-4 py-2.5 text-[13px] text-zinc-300 outline-none hover:border-white/20 transition-colors cursor-pointer appearance-none min-w-[140px]">
                        <option value="all">所有状态</option>
                        <option value="doing">执行中/待确认</option>
                        <option value="done">已完结归档</option>
                    </select>
                    
                    <div class="w-px h-6 bg-white/10 mx-2"></div>
                    <button onclick="window.exportExcel(this)" class="bg-[#1a1a24] border border-white/10 hover:border-indigo-500/50 text-zinc-300 px-4 py-2.5 rounded-xl text-[13px] font-medium transition-all flex items-center gap-2 btn-press">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="export-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        <span class="export-text">导出记录报表</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 bg-[#121217] border border-white/5 rounded-2xl overflow-hidden flex flex-col shadow-xl relative">
                
                <div id="table-loading" class="absolute inset-0 bg-[#121217]/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
                    <svg class="animate-spin h-8 w-8 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">PULLING DATA...</p>
                </div>

                <div class="overflow-y-auto custom-scrollbar flex-1 relative">
                    <table class="w-full text-left border-collapse" id="recordTable">
                        <thead class="bg-[#18181b] sticky top-0 z-10">
                            <tr>
                                <th class="py-4 px-6 text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-white/5">工单编号</th>
                                <th class="py-4 px-6 text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-white/5">需求标题</th>
                                <th class="py-4 px-6 text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-white/5">归属项目</th>
                                <th class="py-4 px-6 text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-white/5">期望交付日</th>
                                <th class="py-4 px-6 text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-white/5">执行人</th>
                                <th class="py-4 px-6 text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-white/5">当前状态</th>
                                <th class="py-4 px-6 text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-white/5 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="text-[13px] text-zinc-300 divide-y divide-white/5" id="recordTableBody">
                            </tbody>
                    </table>
                    
                    <div id="emptyState" class="hidden flex-col items-center justify-center py-24 opacity-50 w-full absolute top-10 left-0 pointer-events-none">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-zinc-500 mb-4"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <p class="text-[14px] font-medium text-zinc-400">没有找到匹配的工单记录</p>
                    </div>
                </div>

                <div class="p-5 border-t border-white/5 flex items-center justify-between bg-[#16161d] mt-auto">
                    <span class="text-[12px] text-zinc-500" id="table-stats">数据加载中...</span>
                    <div class="flex items-center gap-1.5 opacity-30 pointer-events-none">
                        <button class="px-3 py-1.5 flex items-center justify-center rounded-lg bg-zinc-800/50 text-zinc-600 text-[12px]">上一页</button>
                        <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-indigo-600 text-white font-bold text-[12px]">1</button>
                        <button class="px-3 py-1.5 flex items-center justify-center rounded-lg bg-zinc-800/50 text-zinc-600 text-[12px]">下一页</button>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-indigo-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-indigo-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="window.closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label>
                    <input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="输入原密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label>
                    <input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="输入新密码">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label>
                    <input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-colors" placeholder="再次输入新密码">
                </div>
            </div>
            <button onclick="window.submitPwdChange()" class="w-full mt-6 py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(79,70,229,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[1000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 bg-emerald-500/20 text-emerald-400">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-zinc-400 text-[11px] mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks'; 
        
        if(window.loadTasksFromCloud) window.loadTasksFromCloud();
    </script>

    <script>
        const PAGE_TYPE = 'req'; 

        // ================= 高级弹窗引擎 =================
        window.closeCustomDialog = function() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.add('opacity-0');
            dialog.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function setupDialog(title, message, type) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerHTML = message;
            const colorBar = document.getElementById('dialog-color-bar');
            const icon = document.getElementById('dialog-icon');
            
            if(type === 'danger') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-rose-500';
                icon.className = 'w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            } else if(type === 'success') {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-emerald-500';
                icon.className = 'w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-indigo-500';
                icon.className = 'w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center shrink-0';
                icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }
        }

        function showDialogUI() {
            const overlay = document.getElementById('custom-dialog-overlay');
            const dialog = document.getElementById('custom-dialog');
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); dialog.classList.remove('scale-95'); }, 10);
        }

        window.showAlert = function(title, message, type="primary") {
            setupDialog(title, message, type);
            const btnContainer = document.getElementById('dialog-buttons');
            let btnColor = type === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : (type === 'success' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-indigo-600 hover:bg-indigo-500');

        window.loadTasksFromCloud = async function() {
            if(!window.supabase) return;
            const currentUser = initRBAC();
            if(!currentUser) return;
            const currentUserEn = currentUser.enName ? currentUser.enName.toLowerCase() : '';
            const isSuperAdmin = currentUserEn === 'davidxxu' || currentUserEn === 'judyzzhang';

            try {
                const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').order('created_at', { ascending: false });
                if(error) throw error;

                const tbody = document.getElementById('recordTableBody');
                tbody.innerHTML = '';
                
                let renderCount = 0;
                let projectSet = new Set(); 

                (data || []).forEach(task => {
                    const creator = task.creator || '';
                    const isOwner = creator === currentUser.displayName || creator === currentUser.cnName || creator === currentUser.enName || creator === currentUser.enName.toLowerCase();
                    
                    if(!isOwner && !isSuperAdmin) return;

                    if(task.project) projectSet.add(task.project);

                    let sColor, sText, sIcon, doingFlag;
                    const isFinished = ['completed','archived','terminated'].includes(task.status);
                    
                    switch(task.status) {
                        case 'rejected': 
                            sColor = 'rose'; sText = '需求被打回修改'; doingFlag = 'doing';
                            sIcon = `<span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>`; break;
                        case 'reviewing': 
                            sColor = 'emerald'; sText = '方案待验收'; doingFlag = 'doing';
                            sIcon = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>`; break;
                        case 'pending_accept': 
                            sColor = 'sky'; sText = '待设计确认接单'; doingFlag = 'doing';
                            sIcon = `<svg class="animate-spin h-3 w-3 text-sky-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; break;
                        case 'pending_approval': 
                            sColor = 'amber'; sText = '领导审批框架中'; doingFlag = 'doing';
                            sIcon = `<svg class="animate-spin h-3 w-3 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; break;
                        case 'processing': 
                            sColor = 'orange'; sText = '设计制作中'; doingFlag = 'doing';
                            sIcon = `<svg class="animate-spin h-3 w-3 text-orange-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; break;
                        case 'completed': 
                        case 'archived': 
                            sColor = 'zinc'; sText = '✓ 已完结归档'; doingFlag = 'done';
                            sIcon = ``; break;
                        case 'terminated': 
                            sColor = 'rose'; sText = '已强行终止 (废弃)'; doingFlag = 'done';
                            sIcon = ``; break;
                        default: 
                            sColor = 'sky'; sText = '待排期统筹'; doingFlag = 'doing';
                            sIcon = `<span class="w-1.5 h-1.5 rounded-full bg-sky-400"></span>`; 
                    }

                    let isUrgent = false;
                    let dateText = task.due_date || '未定';
                    if(task.due_date && !isFinished) {
                        const due = new Date(task.due_date);
                        const today = new Date();
                        due.setHours(0,0,0,0); today.setHours(0,0,0,0);
                        const diffDays = (due - today) / (1000 * 60 * 60 * 24);
                        if(diffDays <= 2 && diffDays >= -999) isUrgent = true;
                    }
                    const dateCol = isFinished ? 'text-zinc-500' : (isUrgent ? 'text-rose-500 font-bold' : 'text-sky-400 font-bold');

                    const displayAssignee = (task.assignee && task.assignee !== 'none') ? task.assignee : '暂未分配';
                    const avatText = displayAssignee !== '暂未分配' ? displayAssignee.substring(0,2).toUpperCase() : '?';
                    const avatCol = displayAssignee !== '暂未分配' ? 'bg-indigo-900 text-indigo-200' : 'bg-zinc-800 text-zinc-400';

                    const badgeHtml = `<span class="bg-${sColor}-500/10 text-${sColor}-400 border border-${sColor}-500/20 px-2.5 py-1 rounded text-[11px] font-bold flex items-center w-max gap-1.5">${sIcon}${sText}</span>`;

                    let btnHtml = '';
                    if(task.status === 'reviewing' && isOwner) {
                        btnHtml = `<button class="text-[12px] text-indigo-400 font-bold hover:text-indigo-300 transition-colors btn-press">去验收</button>`;
                    } else if (isFinished) {
                        btnHtml = `<button class="text-[12px] text-indigo-400/80 font-bold hover:text-indigo-300 transition-colors flex items-center justify-end gap-1 ml-auto btn-press">去查看 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>`;
                    } else {
                        if (isSuperAdmin) {
                            const urgeTarget = ['pending_approval'].includes(task.status) ? '文哥' : task.assignee;
                            btnHtml = `<button onclick="window.urgeTask(event, this, '${urgeTarget}')" class="text-[12px] text-indigo-400 bg-indigo-500/10 px-3 py-1.5 rounded-lg hover:bg-indigo-500/20 transition-colors btn-press ml-auto">督导催办</button>`;
                        } else {
                            btnHtml = `<button class="text-[12px] text-zinc-500 hover:text-zinc-300 transition-colors btn-press">查看进度</button>`;
                        }
                    }

                    const rowHtml = `
                        <tr data-status="${doingFlag}" data-project="${task.project || 'other'}" class="table-row-hover ${isFinished ? 'opacity-60' : ''}" onclick="window.location.href='task-detail-requester.html?id=${task.id}'">
                            <td class="py-4 px-6 font-mono font-bold text-zinc-400">${task.id}</td>
                            <td class="py-4 px-6 font-medium text-zinc-100 max-w-xs truncate" title="${task.title}">${task.title}</td>
                            <td class="py-4 px-6 text-zinc-400">${task.project || '--'}</td>
                            <td class="py-4 px-6 ${dateCol}">${dateText}</td>
                            <td class="py-4 px-6">
                                <div class="flex items-center gap-2">
                                    <div class="w-6 h-6 rounded-full ${avatCol} flex items-center justify-center text-[10px] font-bold shrink-0">${avatText}</div>
                                    <span class="text-[13px] text-zinc-300">${displayAssignee}</span>
                                </div>
                            </td>
                            <td class="py-4 px-6">${badgeHtml}</td>
                            <td class="py-4 px-6 text-right">${btnHtml}</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', rowHtml);
                    renderCount++;
                });

                document.getElementById('table-loading').classList.add('hidden');
                document.getElementById('table-stats').innerText = `找到 ${renderCount} 条匹配记录`;

                if(projectSet.size > 0) {
                    const sel = document.getElementById('projectFilter');
                    let selHtml = `<option value="all">所有归属项目</option>`;
                    Array.from(projectSet).forEach(p => {
                        selHtml += `<option value="${p}">${p}</option>`;
                    });
                    sel.innerHTML = selHtml;
                }

            } catch (err) {
                console.error(err);
                document.getElementById('table-loading').innerHTML = `<p class="text-rose-500 font-bold">数据拉取失败</p><p class="text-xs text-zinc-500">${err.message}</p>`;
            }
        }

        window.filterTable = function() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const projectFilter = document.getElementById("projectFilter").value;
            const statusFilter = document.getElementById("statusFilter").value;
            
            const tbody = document.getElementById("recordTableBody");
            const trs = tbody.getElementsByTagName("tr");
            
            let visibleCount = 0;

            for (let i = 0; i < trs.length; i++) {
                const tr = trs[i];
                const rowStatus = tr.getAttribute('data-status');
                const rowProject = tr.getAttribute('data-project');
                
                const idText = tr.getElementsByTagName("td")[0].textContent.toLowerCase();
                const titleText = tr.getElementsByTagName("td")[1].textContent.toLowerCase();
                const userText = tr.getElementsByTagName("td")[4].textContent.toLowerCase();
                
                const matchSearch = idText.includes(input) || titleText.includes(input) || userText.includes(input);
                const matchProject = projectFilter === 'all' || rowProject === projectFilter;
                const matchStatus = statusFilter === 'all' || rowStatus === statusFilter;

                if (matchSearch && matchProject && matchStatus) {
                    tr.style.display = "";
                    visibleCount++;
                } else {
                    tr.style.display = "none";
                }
            }

            const emptyState = document.getElementById('emptyState');
            const tableStats = document.getElementById('table-stats');
            
            if(visibleCount === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                tableStats.innerText = `找到 0 条匹配记录`;
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                tableStats.innerText = `显示匹配的 ${visibleCount} 条记录`;
            }
        }

        window.exportExcel = function(btn) {
            const icon = btn.querySelector('.export-icon');
            const text = btn.querySelector('.export-text');
            
            btn.disabled = true;
            icon.innerHTML = `<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>`;
            icon.classList.add('animate-spin', 'text-indigo-400');
            text.innerText = "数据抓取中...";
            
            showToast('开始生成报表', '系统正在拉取最新的历史提单记录...', 'info');

            setTimeout(() => {
                btn.disabled = false;
                icon.classList.remove('animate-spin', 'text-indigo-400');
                icon.innerHTML = `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>`;
                text.innerText = "导出记录报表";

                const tbody = document.getElementById("recordTableBody");
                const trs = tbody.getElementsByTagName("tr");
                
                if (trs.length === 0) {
                    return showToast('导出失败', '当前没有任何数据可导出！', 'error');
                }

                let csvContent = "工单编号,需求标题,归属项目,期望交付日,执行人,当前状态\n";
                let hasData = false;

                for (let i = 0; i < trs.length; i++) {
                    const tr = trs[i];
                    if(tr.style.display !== "none") {
                        const tds = tr.getElementsByTagName("td");
                        if (tds.length >= 6) {
                            const id = tds[0].textContent.trim();
                            const title = `"${tds[1].textContent.trim().replace(/"/g, '""')}"`; 
                            const project = tds[2].textContent.trim();
                            const date = tds[3].textContent.trim();
                            const assignee = `"${tds[4].innerText.replace(/\n/g, ' ').trim()}"`;
                            const status = `"${tds[5].innerText.replace(/\n/g, ' ').trim()}"`;

                            csvContent += `${id},${title},${project},${date},${assignee},${status}\n`;
                            hasData = true;
                        }
                    }
                }

                if(!hasData) return showToast('导出失败', '当前筛选条件下没有可导出的数据！', 'error');

                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' }); 
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `戴维斯需求台账_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast('导出成功', 'Excel 报表已下载至本地。', 'success');
            }, 1000);
        }

        // ================= 🔔 全局消息通知 =================
        window.loadNotifications = function() {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const user = JSON.parse(userStr);
            const enName = user.enName ? user.enName.toLowerCase() : '';
            const isLeader = enName === 'judyzzhang' || enName === 'davidxxu';

            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');

            let myNotifs = sysNotifs.filter(n => {
                if (n.role === 'req') return true;
                if (isLeader && n.role === 'admin') return true;
                return false;
            });

            myNotifs.sort((a, b) => b.id - a.id);

            const unreadCount = myNotifs.filter(n => !n.read).length;
            const bellDot = document.getElementById('bell-dot');
            const notifContainer = document.getElementById('notif-list-container');

            if (bellDot) {
                if (unreadCount > 0) {
                    bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent');
                    bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]');
                } else {
                    bellDot.classList.add('hidden');
                }
            }

            if (notifContainer) {
                if (myNotifs.length === 0) {
                    notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>';
                } else {
                    let html = '';
                    myNotifs.forEach(n => {
                        const dot = n.read ? '' : '<span class="w-2 h-2 rounded-full bg-rose-500 shrink-0 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></span>';
                        const opacity = n.read ? 'opacity-50' : '';
                        const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        html += `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer ${opacity}" onclick="window.markSingleAsRead(${n.id}, '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-[13px] font-bold text-white flex items-center gap-2">${n.title} ${dot}</h4>
                                    <span class="text-[10px] text-zinc-500">${dateStr}</span>
                                </div>
                                <p class="text-[11px] text-zinc-400 leading-relaxed">${n.desc}</p>
                            </div>
                        `;
                    });
                    notifContainer.innerHTML = html;
                }
            }
        }

        window.markSingleAsRead = function(id, taskId) {
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            let target = sysNotifs.find(n => n.id === id);
            if(target) { target.read = true; localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs)); }
            if (taskId && taskId !== 'KANBAN') window.location.href = `task-detail-requester.html?id=${taskId}`;
            else window.loadNotifications();
        }

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            let sysNotifs = JSON.parse(localStorage.getItem('sys_notifications') || '[]');
            sysNotifs.forEach(n => { if (n.role === 'req' || n.role === 'admin') n.read = true; });
            localStorage.setItem('sys_notifications', JSON.stringify(sysNotifs));
            window.loadNotifications();
        }

        // 统一在页面渲染完成后，挂载一次后台轮询和下拉框交互
        document.addEventListener('DOMContentLoaded', () => {
            const idBtn = document.getElementById('identityBtn');
            const idMenu = document.getElementById('identityMenu');
            if(idBtn && idMenu) idBtn.addEventListener('click', (e) => { e.stopPropagation(); idMenu.classList.toggle('hidden'); });
            
            const notifBtn = document.getElementById('notifBtn');
            const notifMenu = document.getElementById('notifMenu');
            if(notifBtn && notifMenu) notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifMenu.classList.toggle('hidden'); });

            document.addEventListener('click', (e) => { 
                if(idMenu && !idMenu.contains(e.target)) idMenu.classList.add('hidden'); 
                if(notifMenu && !notifMenu.contains(e.target)) notifMenu.classList.add('hidden'); 
            });

            window.loadNotifications();
            // 每 10 秒刷新一次未读通知状态
            setInterval(() => { window.loadNotifications(); }, 10000);
        });

    </script>
</body>
</html>
