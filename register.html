<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .bg-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vw; height: 80vh; background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 60%); border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .glass-card { background: rgba(18, 18, 23, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }

        /* 弹窗专用动画 */
        @keyframes checkDraw { 
            0% { stroke-dasharray: 50; stroke-dashoffset: 50; opacity: 0; transform: scale(0.5); } 
            100% { stroke-dasharray: 50; stroke-dashoffset: 0; opacity: 1; transform: scale(1); } 
        }
        .animate-check { animation: checkDraw 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex h-screen items-center justify-center relative selection:bg-indigo-500/30">

    <div class="bg-glow"></div>

    <div class="glass-card w-full max-w-md rounded-3xl p-10 shadow-2xl relative z-10 transform transition-all">
        <div class="flex justify-center mb-6">
            <div class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.4)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
        </div>
        
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-white tracking-tight mb-2">欢迎加入戴维斯系统</h1>
            <p class="text-sm text-zinc-500">创建您的企业账号以接入协同工作流</p>
        </div>

        <form id="registerForm" class="space-y-5" onsubmit="handleRegister(event)">
            <div>
                <label class="block text-[12px] font-bold text-zinc-400 mb-1.5 ml-1">企微英文名 <span class="text-rose-500">*</span></label>
                <input type="text" id="reg-en" required placeholder="例如: davidxxu" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
            </div>
            
            <div>
                <label class="block text-[12px] font-bold text-zinc-400 mb-1.5 ml-1">企微中文名 <span class="text-rose-500">*</span></label>
                <input type="text" id="reg-cn" required placeholder="例如: 许博文" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
            </div>

            <div>
                <label class="block text-[12px] font-bold text-zinc-400 mb-1.5 ml-1">系统花名 (选填)</label>
                <input type="text" id="reg-nick" placeholder="展示用的花名，如不填则展示中文名" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
            </div>

            <div>
                <label class="block text-[12px] font-bold text-zinc-400 mb-1.5 ml-1">设置登录密码 <span class="text-rose-500">*</span></label>
                <input type="password" id="reg-pwd" required placeholder="••••••••" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-indigo-500 transition-colors">
            </div>

            <button type="submit" id="register-btn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold shadow-[0_10px_20px_-10px_rgba(79,70,229,0.6)] transition-all btn-press mt-4">
                立即注册
            </button>
        </form>

        <p class="text-center text-xs text-zinc-500 mt-8">
            已有账号？ <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors">直接登录 ↗</a>
        </p>
    </div>

    <div id="custom-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100000] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-modal-content" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl p-8 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.9)] transform scale-95 opacity-0 transition-all duration-500 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>
            
            <div class="w-20 h-20 rounded-full bg-indigo-500/10 border border-indigo-500/30 flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(79,70,229,0.2)]">
                <svg id="modal-icon" class="w-10 h-10 text-indigo-500 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h2 id="modal-title" class="text-[22px] font-bold text-white mb-3 tracking-tight">注册成功</h2>
            <div id="modal-desc" class="text-zinc-400 text-[13px] leading-relaxed mb-8">
                </div>
            
            <button onclick="window.location.href='login.html'" class="w-full py-3.5 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl text-sm font-bold transition-all btn-press border border-white/5 flex items-center justify-center gap-2">
                <span id="btn-countdown">去登录</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
    </script>

    <script>
        function showCustomModal(title, descHtml) {
            const overlay = document.getElementById('custom-modal-overlay');
            const content = document.getElementById('custom-modal-content');
            const icon = document.getElementById('modal-icon');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerHTML = descHtml;
            
            overlay.classList.remove('hidden');
            void overlay.offsetWidth; 
            
            overlay.classList.remove('opacity-0');
            content.classList.remove('scale-95', 'opacity-0');
            
            icon.classList.remove('hidden');
            icon.classList.add('animate-check');

            let count = 3;
            const btnSpan = document.getElementById('btn-countdown');
            btnSpan.innerText = `去登录 (${count}s)`;
            
            const timer = setInterval(() => {
                count--;
                if(count > 0) {
                    btnSpan.innerText = `去登录 (${count}s)`;
                } else {
                    clearInterval(timer);
                    window.location.href = 'login.html';
                }
            }, 1000);
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            if(!window.supabase) {
                return alert("云端服务未连接，请确保您使用 Live Server 打开此页面！");
            }

            const enName = document.getElementById('reg-en').value.trim().toLowerCase();
            const cnName = document.getElementById('reg-cn').value.trim();
            const nickName = document.getElementById('reg-nick').value.trim();
            const pwd = document.getElementById('reg-pwd').value;

            // 权限分配引擎
            let perms = ['req', 'design']; 
            let roleDesc = '行政 / 业务岗';
            let color = 'bg-zinc-800';

            if (enName === 'judyzzhang') {
                perms = ['req', 'admin']; 
                roleDesc = '部门领导';
                color = 'bg-rose-700';
            } else if (enName === 'davidxxu') {
                perms = ['req', 'design', 'admin']; 
                roleDesc = '系统管理员';
                color = 'bg-indigo-600';
            }

            const displayName = nickName || cnName;
            const avatarName = cnName.substring(0, 1).toUpperCase(); 

            // 修改点：拼接成真实的企微后缀
            const realEmail = enName + '@webank.com';

            const btn = document.getElementById('register-btn');
            const originalText = btn.innerText;
            btn.innerText = "云端写入中...";
            btn.disabled = true;

            // 【核心】写入 Supabase 云端
            const { data, error } = await window.supabase.auth.signUp({
                email: realEmail,
                password: pwd,
                options: {
                    data: {
                        enName: enName,
                        cnName: cnName,
                        displayName: displayName,
                        perms: perms,
                        role: roleDesc,
                        avatar: avatarName,
                        color: color
                    }
                }
            });

            btn.innerText = originalText;
            btn.disabled = false;

            if (error) {
                alert("注册失败：" + (error.message.includes('already registered') ? "该企微账号已被注册！" : error.message));
                return;
            }
            
            showCustomModal(
                "🎉 注册成功", 
                `欢迎 <span class="text-white font-bold">${displayName}</span> 加入系统。<br>您的系统权限已被分配为：<br><span class="inline-block mt-3 px-3 py-1.5 bg-white/5 border border-white/10 rounded-lg text-indigo-400 font-bold">${roleDesc}</span>`
            );
        }
    </script>
</body>
</html>
