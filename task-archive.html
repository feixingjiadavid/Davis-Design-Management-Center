<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>归档需求回顾 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-zinc-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>
        <div class="flex-1 p-5 space-y-2">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-medium">需求排号大厅</span>
            </button>
            <button onclick="window.location.href='record-list.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                <span class="font-bold">我的提单记录</span>
            </button>
        </div>
        <div class="px-7 py-7 mt-auto border-t border-white/5 bg-[#09090b] shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-zinc-800 flex items-center justify-center text-white font-bold text-sm">DE</div>
                <div><p class="text-xs font-bold text-white mb-0.5">Debbie</p><p class="text-[10px] text-zinc-500">行政部门 · 需求方</p></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl shrink-0 flex items-center justify-between">
            <div class="flex flex-col gap-1">
                <button onclick="window.location.href='record-list.html'" class="text-zinc-500 hover:text-white text-[12px] font-bold flex items-center gap-1.5 transition-colors btn-press">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    返回列表
                </button>
                <div class="flex items-center gap-4 mt-1">
                    <div class="bg-zinc-500/10 border border-zinc-500/20 px-3 py-1 rounded-lg">
                        <span class="text-zinc-400 font-mono text-sm font-bold">TK-0650</span>
                    </div>
                    <h2 class="text-[22px] font-bold text-white tracking-tight">妇女节活动物料套版</h2>
                    <span class="bg-zinc-500/20 border border-zinc-500/30 text-zinc-500 px-2.5 py-1 rounded text-[11px] font-bold flex items-center gap-1.5 uppercase">
                        ✓ 已完结归档
                    </span>
                </div>
            </div>
            <button onclick="alert('最终源文件打包下载中...')" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[14px] font-bold shadow-lg shadow-indigo-600/20 transition-all btn-press flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                下载最终交付成果
            </button>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-10 flex justify-center">
            <div class="w-full max-w-[1280px] grid grid-cols-3 gap-10 items-start">
                
                <div class="col-span-2 space-y-8">
                    <div class="grid grid-cols-4 gap-4">
                        <div class="bg-[#121217] border border-white/5 p-4 rounded-2xl">
                            <p class="text-[11px] text-zinc-500 mb-1">归属项目</p>
                            <p class="text-[13px] font-bold text-zinc-200">日常行政支撑</p>
                        </div>
                        <div class="bg-[#121217] border border-white/5 p-4 rounded-2xl">
                            <p class="text-[11px] text-zinc-500 mb-1">实际完成日</p>
                            <p class="text-[13px] font-bold text-zinc-200">2026-03-05</p>
                        </div>
                        <div class="bg-[#121217] border border-white/5 p-4 rounded-2xl">
                            <p class="text-[11px] text-zinc-500 mb-1">需求类型</p>
                            <p class="text-[13px] font-bold text-zinc-200">平面延展</p>
                        </div>
                        <div class="bg-[#121217] border border-white/5 p-4 rounded-2xl">
                            <p class="text-[11px] text-zinc-500 mb-1">累计工时</p>
                            <p class="text-[13px] font-bold text-indigo-400">4.5 h</p>
                        </div>
                    </div>

                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-8">
                        <h3 class="text-white font-bold text-[16px] mb-4">最终产出预览</h3>
                        <div class="w-full aspect-video bg-[#09090b] rounded-2xl border border-white/10 flex items-center justify-center overflow-hidden mb-6 relative group">
                            <img src="https://images.unsplash.com/photo-1512418490979-92798cedec83?q=80&w=2560&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="bg-white/10 backdrop-blur-md px-6 py-2 rounded-full border border-white/20 text-white text-sm">查看大图</span>
                            </div>
                        </div>
                        <div class="p-6 bg-[#09090b] border border-white/5 rounded-2xl">
                            <h4 class="text-zinc-500 text-[12px] font-bold uppercase tracking-wider mb-2">原始需求明细</h4>
                            <p class="text-sm text-zinc-300 leading-relaxed">
                                需要基于2026妇女节主视觉，延展出一套针对公司茶水间的立地屏海报。主要内容包含：节日祝福语、当日茶点供应时间表。
                            </p>
                        </div>
                    </div>
                </div>

                <div class="col-span-1 bg-[#121217] border border-white/5 rounded-3xl p-8 shrink-0">
                    <h3 class="text-[14px] font-bold text-white mb-8 border-b border-white/5 pb-5">全过程追溯</h3>
                    <div class="relative space-y-8">
                        <div class="absolute left-3.5 top-2 bottom-4 w-px bg-white/10"></div>
                        <div class="relative flex gap-4">
                            <div class="w-7 h-7 rounded-full bg-emerald-500/20 border border-emerald-500/50 flex items-center justify-center shrink-0 z-10"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                            <div><p class="text-[13px] font-bold text-zinc-200">Debbie 最终验收通过</p><p class="text-[11px] text-zinc-500">03-05 10:00</p></div>
                        </div>
                        <div class="relative flex gap-4 opacity-70">
                            <div class="w-7 h-7 rounded-full bg-white/5 border border-white/10 flex items-center justify-center shrink-0 z-10"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                            <div><p class="text-[13px] font-bold text-zinc-300">王助理 提交最终交付件</p><p class="text-[11px] text-zinc-500">03-04 17:30</p></div>
                        </div>
                        <div class="relative flex gap-4 opacity-50">
                            <div class="w-7 h-7 rounded-full bg-white/5 border border-white/10 flex items-center justify-center shrink-0 z-10"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>
                            <div><p class="text-[13px] font-bold text-zinc-300">文哥 审批通过框架草图</p><p class="text-[11px] text-zinc-500">03-02 09:15</p></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
