<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已完结归档 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .timeline-line { position: absolute; left: 11px; top: 24px; bottom: -8px; width: 2px; background-color: rgba(255,255,255,0.05); z-index: 0; }
        #image-preview-modal { display: none; position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px); z-index: 999999; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        #image-preview-modal.visible { display: flex; opacity: 1; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-zinc-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-zinc-700 flex items-center justify-center shadow-lg shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">历史归档中心</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.history.back()" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-zinc-800/50 text-zinc-300 hover:text-white hover:bg-zinc-800 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span class="font-bold text-[14px]">返回上级列表</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl shrink-0 flex items-center justify-between">
            <div>
                <div class="flex items-center gap-4">
                    <div class="bg-zinc-800/50 border border-zinc-700 px-3 py-1.5 rounded-lg flex items-center gap-2">
                        <span class="text-zinc-400 font-mono text-sm font-bold" id="req-id">读取中...</span>
                    </div>
                    <h2 class="text-[22px] font-bold text-zinc-300 tracking-tight" id="req-title-display">正在拉取归档数据...</h2>
                    <span class="bg-zinc-800/50 text-zinc-400 border border-zinc-700 px-2.5 py-1 rounded text-[11px] font-bold flex items-center gap-1.5">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg> 需求已闭环
                    </span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-10 flex justify-center">
            <div class="w-full max-w-[1400px] flex gap-10 items-start">
                
                <div class="flex-1 flex flex-col gap-8 min-w-0">
                    
                    <div class="bg-[#121217] border border-zinc-800/50 rounded-2xl p-8 relative overflow-hidden shadow-2xl grayscale-[30%]">
                        <div class="absolute right-0 top-0 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold px-4 py-1.5 rounded-bl-xl border-b border-l border-emerald-500/30">甲方已验收的最终稿件</div>
                        <h3 class="text-[16px] font-bold text-white mb-5 flex items-center gap-2">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> 
                            完结产出物
                        </h3>
                        
                        <div class="w-full aspect-[16/9] bg-[#09090b] rounded-xl border border-white/5 overflow-hidden relative shadow-inner flex items-center justify-center p-2 mb-6">
                            <img id="draft-img" src="" class="max-w-full max-h-full object-contain cursor-pointer transition-transform hover:scale-[1.02] hidden" onclick="openPreview(this.src)">
                        </div>

                        <div id="draft-source-link-container" class="hidden bg-zinc-800/30 border border-zinc-700/50 p-4 rounded-xl flex items-center justify-between mb-5">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-zinc-800 rounded-lg flex items-center justify-center text-zinc-400"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg></div>
                                <div><p class="text-sm font-bold text-zinc-300">最终源文件 / 高清包</p><p class="text-[10px] text-zinc-500">点击右侧按钮直接提取</p></div>
                            </div>
                            <a id="draft-source-link-btn" href="#" target="_blank" class="px-5 py-2.5 bg-zinc-700 hover:bg-zinc-600 text-white text-xs font-bold rounded-lg transition-colors">提取源文件</a>
                        </div>
                    </div>

                    <div class="bg-[#121217] border border-white/5 rounded-2xl p-8 relative overflow-hidden mt-4 opacity-50">
                        <div class="absolute right-0 top-0 bg-white/5 text-zinc-500 text-[10px] font-bold px-3 py-1 rounded-bl-xl">留底数据</div>
                        <div class="grid grid-cols-2 gap-8 mb-6 pb-6 border-b border-white/5">
                            <div><p class="text-xs text-zinc-600 mb-1">归属项目</p><p class="text-sm font-bold text-zinc-400" id="dt-project">--</p></div>
                            <div><p class="text-xs text-zinc-600 mb-1">执行人</p><p class="text-sm font-bold text-zinc-400" id="dt-assignee">--</p></div>
                        </div>
                        <h3 class="text-sm font-bold text-zinc-400 mb-3">📋 原始需求描述</h3>
                        <div class="text-sm text-zinc-500 leading-relaxed bg-[#09090b] border border-white/5 p-5 rounded-xl min-h-[60px] custom-scrollbar" id="req-desc-display">数据读取中...</div>
                    </div>

                </div>

                <div class="w-[380px] shrink-0 flex flex-col gap-6">
                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-7 flex flex-col shadow-xl opacity-80">
                        <h3 class="text-[14px] font-bold text-zinc-300 mb-6 border-b border-white/5 pb-4">任务生命周期日志</h3>
                        <div class="relative space-y-6 flex-1" id="task-timeline-container"></div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="image-preview-modal" onclick="closePreview()">
        <div class="w-full h-full flex items-center justify-center relative p-8">
            <img id="modal-image" src="" alt="预览图" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-2xl" onclick="event.stopPropagation()">
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks';
        if(window.loadTaskDetail) window.loadTaskDetail();
    </script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentTaskId = urlParams.get('id');

        function renderTimeline(data, history) {
            let html = '';
            html += `<div class="relative flex gap-4 z-10"><div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-zinc-500 flex items-center justify-center shrink-0 text-zinc-500"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></div><div class="pt-0.5 pb-4"><p class="text-[13px] font-bold text-zinc-400 mb-0.5">任务已完结归档</p></div></div>`;

            if (history && history.length > 0) {
                [...history].reverse().forEach(h => {
                    if (h.reply) {
                        html += `<div class="relative flex gap-4 z-10 pb-4"><div class="timeline-line"></div><div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-zinc-600 flex items-center justify-center shrink-0 text-zinc-500 z-10"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></div><div class="pt-0.5 w-full pr-2 z-10"><p class="text-[12px] font-bold text-zinc-500 mb-0.5">${h.reply_by} ${h.is_rejected ? '打回' : '通过'}</p><div class="bg-white/5 border border-white/5 p-2.5 rounded-lg mt-1.5"><p class="text-[11px] text-zinc-500 leading-relaxed whitespace-pre-wrap">${h.reply}</p></div></div></div>`;
                    }
                    let actText = h.action === 'submit_draft' ? '提交正式设计稿' : '提交框架方案';
                    html += `<div class="relative flex gap-4 z-10 pb-4 opacity-50"><div class="timeline-line"></div><div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-zinc-600 flex items-center justify-center shrink-0 z-10"><div class="w-1.5 h-1.5 bg-zinc-600 rounded-full"></div></div><div class="pt-0.5 w-full pr-2 z-10"><div class="flex items-center justify-between"><p class="text-[12px] font-bold text-zinc-400 mb-0.5">设计师 ${actText} <span class="bg-white/10 text-zinc-500 px-1.5 py-0.5 rounded text-[9px] ml-1">${h.version || ''}</span></p></div><p class="text-[10px] text-zinc-600 mb-1.5">${new Date(h.created_at).toLocaleString()}</p></div></div>`;
                });
            }
            html += `<div class="relative flex gap-4 z-10 opacity-30 pb-4"><div class="timeline-line"></div><div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-zinc-700 flex items-center justify-center shrink-0 z-10"><div class="w-1.5 h-1.5 bg-zinc-700 rounded-full"></div></div><div class="pt-0.5 z-10"><p class="text-[12px] font-bold text-zinc-500 mb-0.5">需求立项</p></div></div>`;
            document.getElementById('task-timeline-container').innerHTML = html;
        }

        window.loadTaskDetail = async function() {
            if(!window.supabase || !currentTaskId) return;
            const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').eq('id', currentTaskId).single();
            if(error || !data) return;

            const safeSetTxt = (id, txt) => { const el = document.getElementById(id); if (el) el.innerText = txt; };
            safeSetTxt('req-id', data.id || '--');
            safeSetTxt('req-title-display', data.title || '无标题');
            safeSetTxt('dt-project', data.project || '--');
            safeSetTxt('dt-assignee', data.assignee || '--');
            
            const descEl = document.getElementById('req-desc-display');
            if(descEl) descEl.innerHTML = (data.full_desc || '暂无描述').replace(/\n/g, '<br>');

            let historyArr = [];
            try { historyArr = JSON.parse(data.history_json || '[]'); } catch(e) {}

            let finalImgUrl = data.design_img_url; 
            let finalLink = data.source_file_link;

            for(let i = historyArr.length - 1; i >= 0; i--) {
                const h = historyArr[i];
                if(h.action === 'submit_draft') {
                    finalImgUrl = h.img_url || finalImgUrl; 
                    finalLink = h.source_link || finalLink;
                    break;
                }
            }

            if (finalImgUrl) {
                const img = document.getElementById('draft-img');
                if(img) { img.src = finalImgUrl; img.classList.remove('hidden'); }
            }

            if(finalLink) {
                const slContainer = document.getElementById('draft-source-link-container');
                if(slContainer) {
                    slContainer.classList.remove('hidden');
                    let finalHref = finalLink.trim();
                    if(!finalHref.match(/^https?:\/\//i) && !finalHref.startsWith('//')) finalHref = 'http://' + finalHref;
                    const linkBtn = document.getElementById('draft-source-link-btn');
                    if(linkBtn) linkBtn.href = finalHref; 
                }
            }

            renderTimeline(data, historyArr);
        }

        window.openPreview = function(srcUrl) {
            if(!srcUrl) return; 
            const mImg = document.getElementById('modal-image');
            const modal = document.getElementById('image-preview-modal');
            if(mImg) mImg.src = srcUrl;
            if(modal) { modal.classList.remove('hidden'); void modal.offsetWidth; modal.style.display = 'flex'; setTimeout(() => modal.classList.add('visible'), 10); }
        }

        window.closePreview = function() {
            const modal = document.getElementById('image-preview-modal');
            if(modal) { modal.classList.remove('visible'); setTimeout(() => { modal.style.display = 'none'; }, 300); }
        }
    </script>
</body>
</html>
