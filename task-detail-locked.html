<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案流转中心 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 0px; } 
        .custom-scrollbar { overflow-y: auto; padding-right: 8px; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .btn-press { transition: all 0.15s ease; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        .toast-slide-in { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 锁定状态的斜纹背景动画 */
        .striped-bg {
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(245, 158, 11, 0.05) 10px, rgba(245, 158, 11, 0.05) 20px);
            background-size: 28px 28px;
            animation: moveStripes 2s linear infinite;
        }
        @keyframes moveStripes { 0% { background-position: 0 0; } 100% { background-position: 28px 0; } }

        /* 全屏大图预览组件 */
        #image-preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            z-index: 999999;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #image-preview-modal.visible {
            display: flex;
            opacity: 1;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-amber-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-amber-900/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-amber-600 flex items-center justify-center shadow-[0_0_15px_rgba(245,158,11,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">方案流转中心</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.history.back()" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-amber-500/10 text-amber-500 border border-amber-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span class="font-bold text-[14px]">实时进度追踪</span>
            </button>
        </div>

        <div class="px-5 py-5 mt-auto border-t border-white/5 bg-[#09090b] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shadow-lg">?</div>
                <div><p id="sidebar-name" class="text-xs font-bold text-white mb-0.5">加载中...</p><p id="sidebar-role" class="text-[10px] text-zinc-500">读取中</p></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="px-10 py-6 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl shrink-0 flex items-center justify-between">
            <div>
                <button onclick="window.history.back()" class="text-zinc-500 hover:text-white text-[12px] font-bold mb-3 flex items-center gap-1.5 transition-colors btn-press">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    返回上级大厅
                </button>
                <div class="flex items-center gap-4">
                    <div class="bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-lg flex items-center gap-2">
                        <span class="text-amber-500 font-mono text-sm font-bold" id="req-id">读取中...</span>
                    </div>
                    <h2 class="text-[22px] font-bold text-white tracking-tight" id="req-title-display">正在同步需求数据...</h2>
                    <span id="header-status-badge" class="bg-amber-500/20 text-amber-500 border border-amber-500/30 px-2.5 py-1 rounded text-[11px] font-bold shadow-[0_0_10px_rgba(245,158,11,0.2)] flex items-center gap-1.5">
                        <svg class="animate-spin h-3 w-3 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 
                        方案审核中
                    </span>
                </div>
            </div>
            <div class="flex items-center gap-3" id="header-action-container"></div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-10 flex justify-center">
            <div class="w-full max-w-[1400px] flex gap-10 items-start">
                
                <div class="flex-1 flex flex-col gap-8 min-w-0">
                    <div class="bg-[#121217] border border-white/5 rounded-2xl p-8 relative overflow-hidden">
                        <div class="absolute right-0 top-0 bg-white/5 text-zinc-500 text-[10px] font-bold px-3 py-1 rounded-bl-xl">原始需求</div>
                        <div class="grid grid-cols-2 gap-8 mb-6 pb-6 border-b border-white/5">
                            <div><p class="text-xs text-zinc-500 mb-1">归属项目</p><p class="text-sm font-bold text-zinc-300" id="dt-project">--</p></div>
                            <div><p class="text-xs text-zinc-500 mb-1">期望交付日</p><p class="text-sm font-bold text-sky-400" id="dt-date">--</p></div>
                            <div><p class="text-xs text-zinc-500 mb-1">发起人</p><p class="text-sm font-bold text-zinc-300" id="dt-creator">--</p></div>
                            <div><p class="text-xs text-zinc-500 mb-1">执行人</p><p class="text-sm font-bold text-orange-400" id="dt-assignee">--</p></div>
                        </div>
                        <h3 class="text-sm font-bold text-white mb-3">📋 详细描述</h3>
                        <div class="text-sm text-zinc-400 leading-relaxed bg-[#09090b] border border-white/5 p-5 rounded-xl min-h-[100px]" id="req-desc-display">数据读取中...</div>
                    </div>

                    <div>
                        <h3 class="text-[15px] font-bold text-amber-500 mb-3 flex items-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            当前方案预览
                        </h3>
                        <div class="w-full aspect-[16/9] bg-[#121217] rounded-2xl border border-amber-500/20 flex flex-col items-center justify-center overflow-hidden mb-4 relative striped-bg shadow-lg">
                            <img id="framework-img" src="" class="w-full h-full object-contain cursor-pointer hidden" onclick="openPreview(this.src)" title="点击全屏放大">
                            <div id="no-img-placeholder" class="hidden text-amber-500/50 text-center p-6">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mx-auto mb-2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                                <p class="text-sm font-bold mb-1">未检测到直接预览图</p>
                                <a id="cloud-download-btn" href="#" target="_blank" class="mt-4 px-4 py-2 bg-amber-500/20 text-amber-400 rounded-lg inline-block hover:bg-amber-500 hover:text-white transition-colors hidden">点击提取源文件</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-[380px] shrink-0 flex flex-col gap-6">
                    <div id="leader-panel" class="hidden bg-gradient-to-b from-[#291b0c] to-[#121217] border border-amber-500/40 rounded-3xl p-7 shadow-2xl relative overflow-hidden">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-amber-500"></div>
                        <h3 class="text-[16px] font-bold text-amber-500 mb-6">框架大方向审批 (领导权限)</h3>
                        <button onclick="submitApprove()" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-[13px] font-bold mb-3 btn-press shadow-lg">同意并推进正稿</button>
                        <button onclick="submitReject()" class="w-full py-3.5 bg-rose-600/10 text-rose-500 border border-rose-500/30 hover:bg-rose-500 hover:text-white rounded-xl text-[13px] font-bold btn-press transition-colors">偏离需求，打回重新修改</button>
                    </div>

                    <div id="req-panel" class="hidden bg-[#18181b] border border-zinc-700 rounded-3xl p-7 shadow-xl relative overflow-hidden">
                        <div class="absolute right-0 top-0 bottom-0 w-1.5 bg-zinc-500"></div>
                        <h3 class="text-[16px] font-bold text-white mb-3" id="req-panel-title">方案审核中</h3>
                        <p class="text-xs text-zinc-400 mb-6" id="req-panel-desc">设计已提交方案，请等待相关人员审核结果。</p>
                        <button onclick="alert('已发送系统红点提醒。')" class="w-full py-3.5 bg-amber-500/20 text-amber-400 border border-amber-500/50 hover:bg-amber-500/30 rounded-xl text-[13px] font-bold transition-colors btn-press">发送催促提醒</button>
                    </div>

                    <div class="bg-[#121217] border border-white/5 rounded-3xl p-7 flex flex-col shadow-xl">
                        <h3 class="text-[14px] font-bold text-white mb-6 border-b border-white/5 pb-4">任务历史进度</h3>
                        <div class="relative space-y-6 flex-1" id="task-timeline-container">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="image-preview-modal" onclick="closePreview()">
        <div class="w-full h-full flex items-center justify-center relative p-8">
            <button onclick="closePreview()" class="absolute top-8 right-8 text-white/50 hover:text-white bg-white/10 hover:bg-rose-500 rounded-full p-2 transition-all btn-press z-50">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <img id="modal-image" src="" alt="预览图" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-2xl" onclick="event.stopPropagation()">
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        window.supabase = supabase;
        window.DB_TABLE = 'test_tasks';
        
        if(window.loadTaskDetail) window.loadTaskDetail();
    </script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentTaskId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('activeUserObj');
            if (!userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('sidebar-avatar').innerText = user.avatar;
            document.getElementById('sidebar-name').innerText = user.displayName || user.cnName || user.enName;

            if(!currentTaskId) {
                alert("未找到需求编号！"); window.history.back(); 
            }
        });

        // 💡 动态渲染完整时间轴
        function renderTimeline(data, history) {
            let html = '';
            
            let currentStatusText = '任务进行中';
            let currentStatusColor = 'sky-400';
            let currentStatusDesc = '等待处理';

            if (data.status === 'pending_approval') {
                currentStatusText = '领导审批框架方案中';
                currentStatusColor = 'amber-500';
                currentStatusDesc = '等待丹楠姐给出审批结果';
            } else if (data.status === 'reviewing') {
                currentStatusText = '甲方正式稿验收中';
                currentStatusColor = 'emerald-500';
                currentStatusDesc = '等待需求方最终确认或打回';
            } else if (data.status === 'processing') {
                currentStatusText = '设计制作正稿中';
                currentStatusColor = 'orange-500';
                currentStatusDesc = '设计师正在作图中';
            } else if (data.status === 'rejected') {
                currentStatusText = '已被打回，需重新修改';
                currentStatusColor = 'rose-500';
                currentStatusDesc = '请根据反馈意见调整并重新提交';
            } else if (data.status === 'completed' || data.status === 'archived') {
                currentStatusText = '需求已验收完结';
                currentStatusColor = 'zinc-400';
                currentStatusDesc = '所有流程已结束';
            }

            // 当前状态顶部闪烁点
            html += `
                <div class="relative flex gap-4 z-10">
                   <div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-${currentStatusColor.split('-')[0]}-500 flex items-center justify-center shrink-0 shadow-[0_0_10px_currentColor] text-${currentStatusColor.split('-')[0]}-500">
                       <div class="w-1.5 h-1.5 bg-currentColor rounded-full animate-pulse"></div>
                   </div>
                   <div class="pt-0.5 pb-4">
                       <p class="text-[13px] font-bold text-${currentStatusColor.split('-')[0]}-400 mb-0.5">${currentStatusText}</p>
                       <p class="text-[10px] text-zinc-400">${currentStatusDesc}</p>
                   </div>
                </div>
            `;

            // 倒序遍历历史记录
            if (history && history.length > 0) {
                let revHistory = [...history].reverse();
                revHistory.forEach(h => {
                    // 如果有审批回复，渲染意见气泡
                    if (h.reply) {
                        let replyCol = h.is_rejected ? 'rose' : 'emerald';
                        let replyText = h.is_rejected ? '打回了该方案' : '审批通过了该方案';
                        html += `
                        <div class="relative flex gap-4 z-10 pb-4">
                           <div class="absolute left-[11px] top-6 bottom-[-8px] w-[2px] bg-white/5 z-0"></div>
                           <div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-${replyCol}-500 flex items-center justify-center shrink-0 text-${replyCol}-500 z-10">
                               <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                           </div>
                           <div class="pt-0.5 w-full pr-2 z-10">
                               <p class="text-[12px] font-bold text-${replyCol}-400 mb-0.5">${h.reply_by} ${replyText}</p>
                               <div class="bg-${replyCol}-500/10 border border-${replyCol}-500/20 p-2.5 rounded-lg mt-1.5">
                                   <p class="text-[11px] text-${replyCol}-300 leading-relaxed whitespace-pre-wrap">🗣️ 意见：${h.reply}</p>
                               </div>
                           </div>
                        </div>`;
                    }

                    // 渲染提交记录
                    let actionText = h.action === 'submit_draft' ? '提交正式稿' : '提交框架方案';
                    html += `
                    <div class="relative flex gap-4 z-10 pb-4 opacity-70">
                       <div class="absolute left-[11px] top-6 bottom-[-8px] w-[2px] bg-white/5 z-0"></div>
                       <div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-zinc-500 flex items-center justify-center shrink-0 z-10">
                           <div class="w-1.5 h-1.5 bg-zinc-500 rounded-full"></div>
                       </div>
                       <div class="pt-0.5 w-full pr-2 z-10">
                           <div class="flex items-center justify-between">
                               <p class="text-[12px] font-bold text-white mb-0.5">设计师 ${actionText} <span class="bg-white/10 text-zinc-300 px-1.5 py-0.5 rounded text-[9px] ml-1">${h.version || ''}</span></p>
                           </div>
                           <p class="text-[10px] text-zinc-500 mb-1.5">${new Date(h.created_at).toLocaleString()}</p>
                           <div class="bg-white/5 border border-white/10 p-2.5 rounded-lg">
                               <p class="text-[11px] text-zinc-300 leading-relaxed whitespace-pre-wrap">📝 说明：${h.desc || '未填写说明'}</p>
                           </div>
                       </div>
                    </div>`;
                });
            }

            // 底部固定起因
            html += `
                <div class="relative flex gap-4 z-10 opacity-40 grayscale pb-4">
                   <div class="absolute left-[11px] top-6 bottom-[-8px] w-[2px] bg-white/5 z-0"></div>
                   <div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-zinc-500 flex items-center justify-center shrink-0 z-10"><div class="w-1.5 h-1.5 bg-zinc-500 rounded-full"></div></div>
                   <div class="pt-0.5 z-10">
                       <p class="text-[12px] font-bold text-white mb-0.5">需求立项并接单</p>
                       <p class="text-[10px] text-zinc-500">执行人: ${data.assignee || '未知'}</p>
                   </div>
                </div>
                <div class="relative flex gap-4 z-10 opacity-30 grayscale">
                   <div class="w-6 h-6 rounded-full bg-[#121217] border-2 border-zinc-500 flex items-center justify-center shrink-0 z-10"><div class="w-1.5 h-1.5 bg-zinc-500 rounded-full"></div></div>
                   <div class="pt-0.5 z-10">
                       <p class="text-[12px] font-bold text-white mb-0.5">需求提单成功</p>
                       <p class="text-[10px] text-zinc-500">发起人: ${data.creator || '系统'}</p>
                   </div>
                </div>
            `;
            document.getElementById('task-timeline-container').innerHTML = html;
        }

        window.loadTaskDetail = async function() {
            if(!window.supabase || !currentTaskId) return;

            const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').eq('id', currentTaskId).single();
            if(error || !data) return alert("未找到该需求或已被撤销删除！");

            document.getElementById('req-id').innerText = data.id || '--';
            document.getElementById('req-title-display').innerText = data.title || '无标题';
            document.getElementById('dt-project').innerText = data.project || '--';
            document.getElementById('dt-date').innerText = data.due_date || '--';
            document.getElementById('dt-creator').innerText = data.creator || '系统记录';
            document.getElementById('dt-assignee').innerText = data.assignee || '--';
            document.getElementById('req-desc-display').innerHTML = (data.full_desc || '暂无描述').replace(/\n/g, '<br>');

            // 解析历史记录
            let historyArr = [];
            try { historyArr = JSON.parse(data.history_json || '[]'); } catch(e) {}

            // 💡 三重保底图片提取机制，绝对能让图片出得来
            let displayImgUrl = data.design_img_url; 
            if (!displayImgUrl && historyArr.length > 0) {
                // 如果外面字段丢了，找历史记录里最新的一张图
                for (let i = historyArr.length - 1; i >= 0; i--) {
                    if (historyArr[i].img_url) {
                        displayImgUrl = historyArr[i].img_url;
                        break;
                    }
                }
            }
            if (!displayImgUrl) {
                // 最后保底：找以前系统存的 localStorage
                displayImgUrl = localStorage.getItem('design_output_' + currentTaskId);
            }

            const imgEl = document.getElementById('framework-img');
            const phEl = document.getElementById('no-img-placeholder');

            if(displayImgUrl) {
                imgEl.src = displayImgUrl;
                imgEl.classList.remove('hidden');
                phEl.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                phEl.classList.remove('hidden');
            }

            // 处理附件网盘链接
            let fileLink = data.source_file_link;
            if(!fileLink && historyArr.length > 0) {
                for (let i = historyArr.length - 1; i >= 0; i--) {
                    if (historyArr[i].source_link) { fileLink = historyArr[i].source_link; break; }
                }
            }
            if(fileLink) {
                const btn = document.getElementById('cloud-download-btn');
                if(btn) {
                    btn.classList.remove('hidden');
                    let href = fileLink.trim();
                    if(!href.startsWith('http')) href = 'https://' + href;
                    btn.href = "javascript:void(0);";
                    btn.onclick = (e) => { e.preventDefault(); window.open(href, '_blank'); };
                }
            }

            // 渲染时间轴
            renderTimeline(data, historyArr);

            // 千人千面面板控制
            const userStr = localStorage.getItem('activeUserObj');
            const user = JSON.parse(userStr);
            const enName = user.enName.toLowerCase();
            const dispName = user.displayName || user.cnName || user.enName;
            
            const isLeader = enName === 'judyzzhang';
            const isRequester = dispName === data.creator || enName === (data.creator || '').toLowerCase();
            const isDesigner = enName === (data.assignee || '').toLowerCase();

            if (data.status === 'pending_approval') {
                if (isLeader) {
                    document.getElementById('leader-panel').classList.remove('hidden');
                } else {
                    document.getElementById('req-panel').classList.remove('hidden');
                    document.getElementById('req-panel-title').innerText = "框架方案审核中";
                    document.getElementById('req-panel-desc').innerText = "设计已提交框架方案，请等待领导审核结果。";
                }
            } else if (data.status === 'reviewing') {
                if (isRequester) {
                    // 甲方自己的视角，需要加两个原生按钮用来写记录
                    document.getElementById('req-panel').classList.remove('hidden');
                    document.getElementById('req-panel-title').innerText = "正式方案待您验收";
                    document.getElementById('req-panel-desc').innerHTML = `
                        <button onclick="submitReqAccept()" class="w-full py-3 mb-3 bg-emerald-600 text-white rounded-lg text-xs font-bold transition-all">验收通过，确认完结</button>
                        <button onclick="submitReject(true)" class="w-full py-3 bg-rose-500/10 text-rose-500 border border-rose-500/30 rounded-lg text-xs font-bold transition-all">不满意，打回修改</button>
                    `;
                } else {
                    document.getElementById('req-panel').classList.remove('hidden');
                    document.getElementById('req-panel-title').innerText = "正式稿已提交甲方";
                    document.getElementById('req-panel-desc').innerText = "等待甲方最终验收。如果被打回，您需要重新修改并提交新版本。";
                }
            }
        }

        window.openPreview = function(src) {
            document.getElementById('modal-image').src = src;
            const modal = document.getElementById('image-preview-modal');
            modal.classList.remove('hidden'); void modal.offsetWidth; 
            modal.style.display = 'flex'; setTimeout(() => modal.classList.add('visible'), 10);
        }
        window.closePreview = function() {
            const modal = document.getElementById('image-preview-modal');
            modal.classList.remove('visible'); setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        // ================= 💡 极其清爽的记录追加方法 =================
        window.submitApprove = async function() {
            const notes = prompt("请输入审批意见（选填）：", "大方向没问题，同意推进正稿。");
            if(notes === null) return; // 用户取消

            const { data } = await window.supabase.from(window.DB_TABLE).select('history_json').eq('id', currentTaskId).single();
            let historyArr = [];
            try { historyArr = JSON.parse(data.history_json || '[]'); } catch(e) {}
            
            if (historyArr.length > 0) {
                historyArr[historyArr.length - 1].reply = notes;
                historyArr[historyArr.length - 1].is_rejected = false;
                historyArr[historyArr.length - 1].reply_by = '丹楠姐 (领导)';
            }

            await window.supabase.from(window.DB_TABLE).update({ 
                status: 'processing',
                summary_desc: `框架已过审：${notes}`,
                history_json: JSON.stringify(historyArr)
            }).eq('id', currentTaskId);
            
            alert('审批通过！已将反馈记入历史档案。'); window.history.back();
        }

        window.submitReject = async function(isReqReject = false) {
            const reason = prompt("请务必填写详细的打回原因，系统将记入底账发给设计师：");
            if(!reason) return alert("必须填写打回原因！");

            const userStr = localStorage.getItem('activeUserObj');
            const dispName = JSON.parse(userStr).displayName || JSON.parse(userStr).enName;
            const replyRoleStr = isReqReject ? `${dispName} (需求方)` : '丹楠姐 (领导)';

            const { data } = await window.supabase.from(window.DB_TABLE).select('history_json').eq('id', currentTaskId).single();
            let historyArr = [];
            try { historyArr = JSON.parse(data.history_json || '[]'); } catch(e) {}
            
            if (historyArr.length > 0) {
                historyArr[historyArr.length - 1].reply = reason;
                historyArr[historyArr.length - 1].is_rejected = true;
                historyArr[historyArr.length - 1].reply_by = replyRoleStr;
            }

            await window.supabase.from(window.DB_TABLE).update({ 
                status: 'rejected',
                summary_desc: `被打回：${reason}`,
                history_json: JSON.stringify(historyArr)
            }).eq('id', currentTaskId);
            
            alert('已成功打回！修改意见已记入历史档案并通知设计师。'); window.history.back();
        }

        window.submitReqAccept = async function() {
            if (!confirm("确认对当前设计方案非常满意，同意验收并完结任务吗？")) return;
            
            const userStr = localStorage.getItem('activeUserObj');
            const dispName = JSON.parse(userStr).displayName || JSON.parse(userStr).enName;

            const { data } = await window.supabase.from(window.DB_TABLE).select('history_json').eq('id', currentTaskId).single();
            let historyArr = [];
            try { historyArr = JSON.parse(data.history_json || '[]'); } catch(e) {}

            if (historyArr.length > 0) {
                historyArr[historyArr.length - 1].reply = '甲方对正稿非常满意，已验收通过！';
                historyArr[historyArr.length - 1].is_rejected = false;
                historyArr[historyArr.length - 1].reply_by = `${dispName} (需求方)`;
            }

            await window.supabase.from(window.DB_TABLE).update({
                status: 'completed', 
                summary_desc: '甲方已确认验收，任务圆满完结。',
                history_json: JSON.stringify(historyArr)
            }).eq('id', currentTaskId);

            alert('恭喜，该任务已顺利验收完结！'); window.history.back();
        }
    </script>
</body>
</html>
