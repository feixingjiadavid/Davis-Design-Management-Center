        // ================= 高级弹窗引擎 =================

        function setupDialog(title, message, type) {

            } else {
                colorBar.className = 'absolute top-0 left-0 right-0 h-1 bg-sky-500';
                icon.className = 'w-8 h-8 rounded-full bg-sky-500/20 text-sky-400 flex items-center justify-center shrink-0';

        // ================= 工具库 =================
        const safeSetTxt = (id, txt) => { const el = document.getElementById(id); if (el) el.innerText = txt; };
        
        function showToast(title, desc, type = 'success') {
            const toast = document.getElementById('action-toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;

            } else if(type === 'info') {

            } else {
                icon.className = "w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0";

        window.openPreview = function(srcUrl) {
            if(!srcUrl) return; 
            document.getElementById('modal-image').src = srcUrl;
            const modal = document.getElementById('image-preview-modal');
            modal.classList.remove('hidden'); void modal.offsetWidth; modal.style.display = 'flex'; setTimeout(() => modal.classList.add('visible'), 10);
        }

        // ================= Signed URL 准备层：bucket private 后图片必须先换成 signed URL =================
        function escapeAttr(value) {
            return String(value || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        function extractDesignFilePath(imgUrl) {
            const raw = String(imgUrl || '').trim();
            if (!raw || raw.startsWith('data:') || raw.startsWith('blob:')) return '';
            const markers = [
                '/storage/v1/object/public/designs/',
                '/storage/v1/object/sign/designs/',
                '/storage/v1/object/authenticated/designs/'
            ];
            for (const marker of markers) {
                const idx = raw.indexOf(marker);
                if (idx >= 0) return decodeURIComponent(raw.slice(idx + marker.length).split('?')[0]);
            }
            // 兼容只存文件名/path 的历史数据
            if (!/^https?:\/\//i.test(raw) && !raw.startsWith('/') && !raw.includes('..') && /\.(png|jpe?g|webp|gif|pdf)$/i.test(raw)) return raw;
            return '';
        }

        async function resolveDesignImageUrl(imgUrl, filePath) {
            const fallbackUrl = String(imgUrl || '').trim();
            const path = String(filePath || '').trim() || extractDesignFilePath(fallbackUrl);
            if (!path) return fallbackUrl;

            try {
                // 用当前 supabase client 调 Edge Function，避免硬编码错误 anon key / Authorization
                if (window.supabase?.functions?.invoke) {
                    const { data, error } = await window.supabase.functions.invoke('get-design-signed-url', {
                        body: { filePath: path }
                    });
                    if (!error && data?.ok && data?.signedUrl) return data.signedUrl;
                    if (error) console.warn('signed URL function error:', error);
                }
            } catch (err) {
                console.warn('signed URL 获取失败，回退 public URL：', err);
            }
            return fallbackUrl;
        }

        window.openSignedPreview = async function(publicUrl, filePath) {
            const finalUrl = await resolveDesignImageUrl(publicUrl, filePath);
            if (finalUrl) window.openPreview(finalUrl);
        };

        window.upgradeDesignImagesToSignedUrl = function(root) {
            const scope = root || document;
            const imgs = scope.querySelectorAll ? scope.querySelectorAll('img[data-design-img="1"], img[data-design-public-url], img[data-design-file-path]') : [];
            imgs.forEach(async (img) => {
                const originalUrl = img.dataset.publicUrl || img.getAttribute('data-design-public-url') || img.getAttribute('src') || '';
                const filePath = img.dataset.filePath || img.getAttribute('data-design-file-path') || extractDesignFilePath(originalUrl);
                const previewWrap = img.closest('[data-design-preview-wrap="1"]') || img.parentElement;
                const brokenTip = previewWrap?.querySelector?.('.img-broken-tip');
                if (previewWrap && originalUrl && !previewWrap.dataset.originalPublicUrl) previewWrap.dataset.originalPublicUrl = originalUrl;

                try {
                    const signedUrl = await resolveDesignImageUrl(originalUrl, filePath);
                    if (signedUrl) {
                        img.onload = () => {
                            img.style.opacity = '1';
                            img.style.display = '';
                            brokenTip?.classList.add('hidden');
                        };
                        img.onerror = () => {
                            img.style.opacity = '0.35';
                            img.style.display = '';
                            brokenTip?.classList.remove('hidden');
                        };
                        img.src = signedUrl;
                        img.dataset.signedUrl = signedUrl;
                        img.setAttribute('data-design-public-url', originalUrl);
                        img.setAttribute('data-design-file-path', filePath || '');
                        if (previewWrap) {
                            previewWrap.dataset.signedUrl = signedUrl;
                            previewWrap.dataset.filePath = filePath || previewWrap.dataset.filePath || '';
                        }
                    }
                } catch (err) {
                    console.warn('预览图 signed URL 加载失败：', err);
                }
            });
        };

        window.closePreview = function() {
            const modal = document.getElementById('image-preview-modal');
            modal.classList.remove('visible'); setTimeout(() => { modal.style.display = 'none'; modal.classList.add('hidden'); }, 300);

        window.downloadBase64Attachment = function(name, dataBase64) {
            const a = document.createElement('a'); a.href = dataBase64; a.download = name; a.click();

        window.insertDbNotification = async function(targetEnName, content, link_url, category = 'update') {
            if (!window.supabase || !targetEnName) return;
            try {
                const { data: usersData } = await window.supabase.from('users')
                    .select('id, email, name, enName')
                    .eq('enName', targetEnName.toLowerCase());

                let targetUserId = '00000000-0000-0000-0000-000000000000';
                let targetEmail = targetEnName + '@webank.com';

                if (usersData && usersData.length > 0) {
                    targetUserId = usersData[0].id;
                    targetEmail = usersData[0].email || targetEmail;
                }

                if (window.SysNotification) {
                    await window.SysNotification.sendNotice({
                        targetId: targetUserId, targetEmail: targetEmail, content: content, category: category, url: link_url
                    });
                }
            } catch(e) { console.error("通知派发异常:", e); }
        }

        function getTaskAbsoluteUrl(pageType) {

            return `https://davis-design.cn/${page}?id=${currentTaskId}`;
        }

        function normalizeNotifyTarget(rawTarget) {
            const target = (rawTarget || '').toString().trim();
            if (!target || target === 'none') return { enName: null, displayName: null, email: null };
            const isLikelyEnName = /^[a-zA-Z][a-zA-Z0-9_.-]*$/.test(target);
            return {
                enName: target,
                displayName: target,
                email: isLikelyEnName ? `${target.toLowerCase()}@webank.com` : null
            };
        }

        window.safeCreateNotifyEvent = async function({
            taskId = currentTaskId,
            eventType = 'general',
            targetEnName,
            targetDisplayName,
            targetEmail,
            mobile,
            title,
            content,
            actionUrl
        } = {}) {
            try {
                if (!window.createNotifyEvent) {
                    console.warn('notify-events.js 未加载，跳过站外通知事件写入');
                    return { ok: false, skipped: true };
                }
                if (!title || !content) return { ok: false, skipped: true };
                return await window.createNotifyEvent({
                    taskId,
                    eventType,
                    targetEnName,
                    targetDisplayName,
                    targetEmail,
                    mobile,
                    title,
                    content,
                    actionUrl
                });
            } catch (err) {
                console.error('站外通知事件写入失败，但不影响主流程:', err);
                return { ok: false, error: err?.message || String(err) };
            }
        };

        async function fetchTaskData() {
            try {
                const { data, error } = await window.supabase.from(window.DB_TABLE).select('*').eq('id', currentTaskId).single();
                if(error || !data) { showAlert("错误", "需求拉取失败或已被撤销！", "danger"); setTimeout(() => window.location.href = 'index.html', 1500); return; }
                
                globalTaskData = data;
                try { globalHistoryArr = JSON.parse(data.history_json || '[]'); } catch(e) { globalHistoryArr = []; }
                
                calculateRejectThreshold();
                renderStaticInfo();
                renderVersionHistory(); 
                renderResourceSummary(); 
                renderSmartActionPanel();
                renderTimeline();

            } catch(e) { console.error(e); showToast("数据加载失败", e.message, "error"); }
        }

        function calculateRejectThreshold() {
            currentRejectCount = 0;
            globalHistoryArr.forEach(h => {
                if(h.is_rejected === true || (h.action && h.action.startsWith('reject'))) currentRejectCount++;
            });
        }

                if (h.action === 'submit_framework' || h.action === 'submit_draft') {
                    let op = h.operator || '未知设计师';
                    if (!stats[op]) stats[op] = { hours: 0, tools: new Set() };
                    stats[op].hours += parseFloat(h.work_hours || 0);
                    if (h.ai_tools && Array.isArray(h.ai_tools)) h.ai_tools.forEach(t => stats[op].tools.add(t));

        function renderVersionHistory() {
            const container = document.getElementById('version-history-container');
            const block = document.getElementById('version-history-block');
            
            let submissions = [];
            for(let i=0; i<globalHistoryArr.length; i++) {
                let h = globalHistoryArr[i];
                if(h.action === 'submit_framework' || h.action === 'submit_draft') {
                    let fate = 'pending'; 
                    let fateReason = '';
                    for(let j = i + 1; j < globalHistoryArr.length; j++) {
                        let nextH = globalHistoryArr[j] || {};
                        const nextAction = String(nextH.action || '');

                        // 关键修复：催办/提醒类记录有 reply，但不是审批意见，不能把它当成“过审”。
                        const isUrgeAction =
                            nextAction === 'urge_leader' ||
                            nextAction === 'urge_req' ||
                            nextAction === 'urge_requester' ||
                            nextAction === 'bot_urge' ||
                            nextAction === 'urgent' ||
                            nextAction.includes('urge');

                        if (nextAction.startsWith('submit_')) { break; }
                        if (isUrgeAction) { continue; }

                        if (nextAction.startsWith('reject_') || nextH.is_rejected) {
                            fate = 'rejected';
                            fateReason = nextH.reply || nextH.desc || '';
                            break;
                        }

                        if (nextAction.startsWith('approve_') || nextAction === 'complete') {
                            fate = 'approved';
                            fateReason = nextH.reply || nextH.desc || '';
                            break;
                        }
                    }
                    submissions.push({ ...h, fate, fateReason });
                }
            }

            if(submissions.length === 0) {
                block.classList.add('hidden');
                return;
            }

            block.classList.remove('hidden');

                            提取提交的源文件

                    `;

                        <div class="absolute right-0 top-0 bg-${badgeCol}-500/10 text-${badgeCol}-500 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-b border-l border-${badgeCol}-500/20">${badgeTxt}</div>
                        
                        <div data-design-preview-wrap="1" data-public-url="${safeImgPublicUrl}" data-file-path="${safeImgFilePath}" class="w-[280px] aspect-video bg-[#09090b] rounded-xl border border-white/10 overflow-hidden relative shadow-inner p-1 flex items-center justify-center shrink-0 cursor-pointer" onclick="openSignedPreview(this.dataset.originalPublicUrl || this.dataset.publicUrl || this.dataset.signedUrl, this.dataset.filePath)">
                            <img data-design-img="1" data-public-url="${safeImgPublicUrl}" data-file-path="${safeImgFilePath}" src="" alt="设计稿预览图" class="max-w-full max-h-full object-contain group-hover:scale-[1.02] transition-transform opacity-40">
                            <div class="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded backdrop-blur-sm pointer-events-none">点击看大图</div>

                        <div class="flex-1 flex flex-col justify-center space-y-3">

                            ${sub.fate === 'rejected' ? `<div class="text-[12px] text-rose-400 bg-rose-500/10 p-3 rounded-lg border border-rose-500/20"><span class="font-bold">💥 被驳回原因:</span> ${sub.fateReason || '无详细意见'}</div>` : ''}
                            ${sub.fate === 'approved' ? `<div class="text-[12px] text-emerald-400 bg-emerald-500/10 p-3 rounded-lg border border-emerald-500/20"><span class="font-bold">✅ 过审意见:</span> ${sub.fateReason || '直接通过'}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            // designs bucket 已改 private 后，卡片小图必须主动换成 signed URL；否则旧 public URL 会破图

        // ================= 💡 智能 Action Panel =================
        function hasDesignerSubmittedWork() {
            return (globalHistoryArr || []).some(h =>
                h && (h.action === 'submit_framework' || h.action === 'submit_draft')
            );
        }

        function canRequesterCancelCurrentTask(status) {
            // 产品规则：需求方在设计师未提交设计图前可以撤销。
            // 待接单/待分配阶段可撤销；已接单 processing 但没有任何设计师提交记录时也可撤销。
            return (status === 'pending' || status === 'pending_accept' || (status === 'processing' && !hasDesignerSubmittedWork()));

        function renderTimeline() {
            let html = '';
            
            if (globalHistoryArr && globalHistoryArr.length > 0) {
                let revHistory = [...globalHistoryArr].reverse();
                revHistory.forEach(h => {
                    let dotColor = 'zinc', actionTxt = h.action, subTxt = '';
                    if(h.is_rejected) { dotColor = 'rose'; actionTxt = '被打回修改'; subTxt = `原因: ${h.reply || h.desc || ''}`; }
                    else if(h.action === 'approve_framework') { dotColor = 'emerald'; actionTxt = '领导审批通过'; subTxt = h.reply || '同意'; }
                    else if(h.action === 'submit_draft') { dotColor = 'sky'; actionTxt = '设计师上传了正稿版本 ' + h.version; }
                    else if(h.action === 'submit_framework') { dotColor = 'amber'; actionTxt = '设计师上传了框架版本 ' + h.version; }
                    else if(h.action === 'complete') { dotColor = 'emerald'; actionTxt = '甲方验收成功完结'; }
                    else if(h.action === 'terminate') { dotColor = 'rose'; actionTxt = '任务被强行终止'; subTxt = h.reply || ''; }
                    else if(h.action === 'restore_terminated') { dotColor = 'sky'; actionTxt = '误终止需求已恢复'; subTxt = h.reply || ''; }
                    else if(h.action === 'transfer') { dotColor = 'orange'; actionTxt = '任务发生转单'; subTxt = h.reply || ''; }
                    else if(h.action === 'accept') { dotColor = 'sky'; actionTxt = '接单并给出排期'; subTxt = h.reply || ''; }
                    else if(h.action === 'urge' || h.action === 'urge_req' || h.action === 'urge_leader') { dotColor = 'rose'; actionTxt = '发送了催办提醒'; subTxt = h.reply || ''; }
                    
                    html += `
                    <div class="relative flex gap-4 z-10 pb-6 group">
                       <div class="timeline-line group-last:hidden"></div>
                       <div class="w-5 h-5 rounded-full bg-[#121217] border-[2px] border-${dotColor}-500 flex items-center justify-center shrink-0 z-10 mt-0.5 shadow-[0_0_8px_rgba(var(--tw-colors-${dotColor}-500),0.3)]"><div class="w-1.5 h-1.5 bg-${dotColor}-500 rounded-full"></div></div>
                       <div class="w-full pr-2 z-10">
                           <p class="text-[12px] font-bold text-zinc-300 flex justify-between">${actionTxt} <span class="text-[9px] text-zinc-600 font-mono font-normal">${new Date(h.created_at || h.time).toLocaleDateString()}</span></p>
                           ${subTxt ? `<p class="text-[10px] text-zinc-500 mt-1 line-clamp-2">${subTxt}</p>` : ''}
                       </div>
                    </div>`;
                });
            }
            html += `<div class="text-[10px] text-zinc-600 font-mono pl-9 mt-2">-- 需求创建起点 --</div>`;
            document.getElementById('task-timeline-container').innerHTML = html;
        }

        // ================= 🚀🚀🚀 全局动作状态同步与智能邮件分发枢纽 🚀🚀🚀 =================
        async function updateSupabaseState(newStatus, newSummary, actionPayload, extraFields = {}) {
            globalHistoryArr.push(actionPayload);
            const { error } = await window.supabase.from(window.DB_TABLE).update({
                status: newStatus, 
                summary_desc: newSummary,
                history_json: JSON.stringify(globalHistoryArr),
                ...extraFields
            }).eq('id', currentTaskId);
            
            if(error) { showAlert("错误", "云端状态更新失败：" + error.message, "danger"); return false; }
            
            try {
                if (globalTaskData) {
                    const act = actionPayload.action;
                    let notifyRole = ''; 
                    let content = '';

                    if (act === 'approve_framework') { notifyRole = 'assignee'; content = `【审核通过】领导已同意大方向：《${globalTaskData.title}》，请继续推进正稿。`; }
                    else if (act.startsWith('reject_')) { notifyRole = 'assignee'; content = `【打回修改】你的设计单《${globalTaskData.title}》已被打回，请立刻查看修改意见。`; }
                    else if (act === 'complete') { notifyRole = 'assignee'; content = `【验收完结】恭喜！你的设计单《${globalTaskData.title}》已被甲方满意验收，任务闭环。`; }
                    
                    if (notifyRole && content) {
                        let targetIdentifier = '';
                        if (notifyRole === 'assignee') targetIdentifier = globalTaskData.assignee;

                        if (targetIdentifier && targetIdentifier !== 'none') {
                            await window.insertDbNotification(targetIdentifier, content, `task-detail-designer.html?id=${currentTaskId}`, 'update');

                            const targetInfo = normalizeNotifyTarget(targetIdentifier);
                            const externalTitleMap = {
                                approve_framework: '框架方案已通过',
                                reject_framework: '框架方案被打回',
                                reject_draft: '正稿被打回',
                                complete: '需求已验收完成'
                            };
                            await window.safeCreateNotifyEvent({
                                eventType: act || 'task_update',
                                targetEnName: targetInfo.enName,
                                targetDisplayName: targetInfo.displayName,
                                targetEmail: targetInfo.email,
                                title: externalTitleMap[act] || '需求流程更新',
                                content: content,
                                actionUrl: getTaskAbsoluteUrl('designer')
                            });
                        }
                    }
                }
            } catch(err) { console.error("邮件触发布局失败", err); }
            
            return true;
        }

        // 💡 产品逻辑：需求方在设计师未提交设计图前可撤销；撤销进入 cancelled 存档，不再用 terminated

        function inferStatusBeforeTerminate() {
            const effectiveHistory = (globalHistoryArr || []).filter(h => h && h.action !== 'terminate' && h.action !== 'restore_terminated');
            const last = effectiveHistory[effectiveHistory.length - 1] || null;
            const hasAssignee = globalTaskData && globalTaskData.assignee && globalTaskData.assignee !== 'none';

            if (last) {
                if (last.action === 'submit_draft') return 'reviewing';
                if (last.action === 'submit_framework') return 'pending_approval';
                if (last.action === 'approve_framework') return 'processing';
                if (last.action === 'accept') return 'processing';
                if (last.action === 'reject_draft' || last.action === 'reject_framework' || last.is_rejected) return 'rejected';
                if (last.action === 'create') return hasAssignee ? 'pending_accept' : 'pending';
            }
            return hasAssignee ? 'processing' : 'pending_accept';
        }

        // 💡 误操作终止恢复：仅需求方/超管可用，恢复到终止前最合理的流程状态
        window.actionRestoreTerminated = async function() {
            if (globalTaskData?.status !== 'terminated') {
                showAlert('无法恢复', '当前需求不是终止状态，不需要恢复。', 'warning');
                return;
            }

            const enName = (currentUser.enName || '').toLowerCase();
            const dispName = currentUser.displayName || currentUser.cnName || currentUser.enName;
            const isCreator = (dispName === globalTaskData.creator || enName === (globalTaskData.creator || '').toLowerCase());
            const isSuperAdmin = enName === 'davidxxu' || enName === 'davidxu' || enName === 'ponyxu';
            if (!isCreator && !isSuperAdmin) {
                showAlert('无权恢复', '只有需求发起人或超管可以恢复误终止的需求。', 'danger');
                return;
            }

            const restoreStatus = inferStatusBeforeTerminate();
            const statusTextMap = {
                pending: '排队统筹中',
                pending_accept: '待设计接单',
                processing: '设计制作中',
                pending_approval: '框架待审批',
                reviewing: '正稿待验收',
                rejected: '打回重修中'
            };

            showConfirm('确认恢复需求', `确定要恢复这条误终止的需求吗？<br><br>系统将恢复到：<b>${statusTextMap[restoreStatus] || restoreStatus}</b><br>历史版本和终止记录都会保留。`, async () => {
                const payload = {
                    action: 'restore_terminated',
                    operator: `${dispName} (恢复操作)`,
                    time: new Date().toISOString(),
                    reply: `误操作终止后恢复需求，状态恢复为：${statusTextMap[restoreStatus] || restoreStatus}`,
                    is_rejected: false,
                    reply_by: '恢复终止'
                };

                if (await updateSupabaseState(restoreStatus, '误操作终止已恢复，需求继续流转。', payload)) {
                    try {
                        const targetInfo = normalizeNotifyTarget(globalTaskData.assignee);
                        if (globalTaskData.assignee && globalTaskData.assignee !== 'none') {
                            await window.safeCreateNotifyEvent({
                                eventType: 'restore_terminated',
                                targetEnName: targetInfo.enName,
                                targetDisplayName: targetInfo.displayName,
                                targetEmail: targetInfo.email,
                                title: '需求已恢复流转',
                                content: `《${globalTaskData.title || currentTaskId}》已从误终止状态恢复，请继续处理。`,
                                actionUrl: getTaskAbsoluteUrl('designer')
                            });
                        }
                    } catch (err) { console.error('恢复通知发送失败', err); }
                    showToast('已恢复需求', `需求已恢复到「${statusTextMap[restoreStatus] || restoreStatus}」。`, 'success');
                    setTimeout(() => window.location.reload(), 900);
                }
            }, 'primary');
        }

        window.actionCancel = async function() { 
            const status = globalTaskData?.status;
            if (!canRequesterCancelCurrentTask(status)) {
                showAlert("不可撤销", "当前需求已经进入设计图提交/验收阶段，不能再直接撤销；如需中止，请走关闭/作废流程。", "warning");
                return;
            }

            showConfirm("确认撤销", "确定要撤销该需求单吗？<br><br>规则：设计师未提交设计图前可以撤销；撤销后会进入【已撤销需求存档】，不会删除历史记录。", async () => {
                const dispName = currentUser.displayName || currentUser.enName || '需求方';
                const payload = {
                    action: 'cancel_archive', 
                    operator: `${dispName} (需求方)`, 
                    time: new Date().toISOString(),
                    reply: '设计师未提交设计图前，发起人主动撤销了该需求单，已归入撤销存档。',
                    is_rejected: false, 
                    reply_by: '发起人撤回'
                };

                if(await updateSupabaseState('cancelled', '需求已撤销并存档，后续可重新编辑恢复。', payload, { assignee: 'none' })) {
                    const targetInfo = normalizeNotifyTarget(globalTaskData.assignee);
                    if (globalTaskData.assignee && globalTaskData.assignee !== 'none') {
                        await window.safeCreateNotifyEvent({
                            eventType: 'cancelled',
                            targetEnName: targetInfo.enName,
                            targetDisplayName: targetInfo.displayName,
                            targetEmail: targetInfo.email,
                            title: '需求已撤销',
                            content: `《${globalTaskData.title || currentTaskId}》已由需求方撤销并进入存档，无需继续设计。`,
                            actionUrl: getTaskAbsoluteUrl('designer')

    <script>
        setTimeout(() => {
            const roleEl = document.getElementById('sidebar-role');
            if(roleEl && roleEl.innerText.includes('读取中')) {
                // UI defaults to requester
            }
        }, 1000);

        window.syncNotificationsFromCloud = async function(isSilent = true) {
            if(!window.supabase) return;
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            const isAdmin = (currentUser.perms || []).includes('admin');
            const rolePrefix = isAdmin ? 'admin' : 'req';

            try {
                // 直接拉取所有工单数据，通过内部流转历史智能生成通知！
                const { data: tasks, error } = await window.supabase.from(window.DB_TABLE)
                    .select('id, title, creator, history_json')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;

                let myNotifs = [];

                tasks.forEach(task => {
                    const creatorStr = (task.creator || '').toLowerCase();
                    const isMyTask = creatorStr.includes(myName) || myName.includes(creatorStr);
                    
                    if (!isAdmin && !isMyTask) return;

                    let hist = [];
                    try { hist = JSON.parse(task.history_json || '[]'); } catch(e){}

                    hist.forEach((h, index) => {
                        const op = (h.operator || '').toLowerCase();
                        // 忽略自己操作产生的动作
                        if (op.includes(myName)) return;

                        let title = ''; let content = ''; let icon = 'bg-indigo-500';
                        
                        // 1. 如果我是发单人（需求方视角关注点）
                        if (isMyTask) {
                            if (h.action === 'accept') { title = '✅ 设计已接单'; content = `${h.operator} 已接手并排期：《${task.title}》`; icon = 'bg-sky-500'; }
                            else if (h.action === 'submit_framework') { title = '👀 框架方案已提'; content = `设计师提交了中期方案，正等待主管把关：《${task.title}》`; icon = 'bg-amber-500'; }
                            else if (h.action === 'submit_draft') { title = '🎁 正稿待验收'; content = `设计师交付了正式稿，请火速前往验收：《${task.title}》`; icon = 'bg-emerald-500'; }
                            else if (h.action === 'reject_framework') { title = '💥 框架被打回'; content = `主管打回了设计方案，设计师正在重修：《${task.title}》`; icon = 'bg-rose-500'; }
                            else if (h.action === 'transfer') { title = '🔄 任务转移'; content = `设计师发生了转单或退回动作：《${task.title}》`; icon = 'bg-orange-500'; }
                            else if (h.action === 'terminate') { title = '🚨 任务终止'; content = `单据已被撤销或强行终止：《${task.title}》`; icon = 'bg-rose-500'; }
                            else if ((h.action && h.action.includes('urge')) && op.includes('设计')) { title = '🚨 紧急催办'; content = `系统提醒您及时跟进单据验收：《${task.title}》`; icon = 'bg-rose-500'; }
                        }
                        
                        // 2. 如果我是管理员/领导（上帝视角关注点）
                        if (isAdmin) {
                            if (h.action === 'submit_framework') { title = '👀 框架待审批'; content = `${h.operator} 提交了中期方案，等待您的审批把关：《${task.title}》`; icon = 'bg-amber-500'; }
                            else if (h.action === 'submit_draft') { title = '🎁 正稿待验收'; content = `${h.operator} 交付了正式稿，等待甲方验收：《${task.title}》`; icon = 'bg-emerald-500'; }
                            else if (h.action === 'reject_framework' || h.action === 'reject_draft' || h.is_rejected) { title = '💥 方案被打回'; content = `单据发生打回重修：《${task.title}》- ${h.reply || h.desc}`; icon = 'bg-rose-500'; }
                            else if (h.action === 'complete') { title = '✅ 任务圆满结案'; content = `甲方已验收通过该单据：《${task.title}》`; icon = 'bg-emerald-500'; }
                            else if (h.action === 'transfer') { title = '🔄 任务转单/退回'; content = `发生人员转单或退回大厅：《${task.title}》`; icon = 'bg-orange-500'; }
                            else if (h.action === 'create') { title = '🆕 新需求发布'; content = `大厅有新的需求发布：《${task.title}》`; icon = 'bg-indigo-500'; }
                            else if (h.action === 'terminate') { title = '🚨 任务撤销/终止'; content = `单据已被撤销或强行终止：《${task.title}》`; icon = 'bg-rose-500'; }
                            else if ((h.action && h.action.includes('urge')) || (h.reply && h.reply.includes('催办'))) { title = '🚨 紧急催办提醒'; content = `单据产生催办行为：《${task.title}》`; icon = 'bg-rose-500'; }
                        }

                        if (title) {
                            const notifId = `${task.id}_${index}_${title}`;
                            if (!myNotifs.some(n => n.id === notifId)) {
                                myNotifs.push({
                                    id: notifId,
                                    taskId: task.id,
                                    title: title,
                                    content: content,
                                    time: h.time || h.created_at || new Date().toISOString(),
                                    icon: icon
                                });
                            }
                        }
                    });
                });

                myNotifs.sort((a, b) => new Date(b.time) - new Date(a.time));

                let readReceipts = JSON.parse(localStorage.getItem(`notif_read_${rolePrefix}_` + myName) || '[]');
                const unreadNotifs = myNotifs.filter(n => !readReceipts.includes(n.id));
                const unreadCount = unreadNotifs.length;

                let prevUnreadCount = parseInt(localStorage.getItem(`prevUnreadCount_${rolePrefix}_` + myName) || '0');
                if (isSilent && unreadCount > prevUnreadCount) {
                    const newCount = unreadCount - prevUnreadCount;
                    if(window.showToast) window.showToast('🔔 收到新消息', `您有 ${newCount} 条系统动态，请点击右上角铃铛查看。`, 'info');
                }
                localStorage.setItem(`prevUnreadCount_${rolePrefix}_` + myName, unreadCount.toString());

                const bellDot = document.getElementById('bell-dot');
                if (bellDot) {
                    if (unreadCount > 0) {
                        bellDot.classList.remove('hidden', 'bg-zinc-600', 'border-transparent');
                        bellDot.classList.add('bg-rose-500', 'animate-pulse', 'border-[#141417]');
                    } else {
                        bellDot.classList.add('hidden');
                    }
                }

                const notifContainer = document.getElementById('notif-list-container');
                if (notifContainer) {
                    if (unreadCount === 0) {
                        notifContainer.innerHTML = '<div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无未读消息</div>';
                    } else {
                        notifContainer.innerHTML = unreadNotifs.map(n => {
                            const dateStr = new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            return `
                            <div class="px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors" onclick="window.markSingleAsRead('${n.id}', '${n.taskId}')">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-[13px] font-bold text-white flex items-center gap-2"><span class="w-2 h-2 rounded-full ${n.icon} shrink-0 shadow-[0_0_8px_currentColor]"></span>${n.title}</h4>
                                    <span class="text-[10px] text-zinc-500">${dateStr}</span>
                                </div>
                                <p class="text-[11px] text-zinc-400 pl-4 line-clamp-2">${n.content}</p>
                            </div>`;
                        }).join('');
                    }
                }
                window.currentMyUnreadIds = unreadNotifs.map(n => n.id);
            } catch(e) { console.error("通知同步失败", e); }
        };

        window.toggleNotificationPanel = function(event) {
            if(event) event.stopPropagation();
            const dropdown = document.getElementById('notifMenu');
            const btn = document.getElementById('notifBtn');
            if(dropdown) {
                dropdown.classList.add('notif-floating');
                const willOpen = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (willOpen && btn) {
                    const rect = btn.getBoundingClientRect();
                    const menuWidth = 340;
                    const gap = 10;
                    const left = Math.max(12, Math.min(window.innerWidth - menuWidth - 12, rect.right - menuWidth));
                    const top = Math.min(window.innerHeight - 20, rect.bottom + gap);
                    dropdown.style.left = `${left}px`;
                    dropdown.style.right = 'auto';
                    dropdown.style.top = `${top}px`;
                    dropdown.style.width = `${menuWidth}px`;
                    window.syncNotificationsFromCloud(true);
                }
            }
        }

        window.markSingleAsRead = function(id, taskId) {
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            const isAdmin = (currentUser.perms || []).includes('admin');
            const rolePrefix = isAdmin ? 'admin' : 'req';
            
            let readReceipts = JSON.parse(localStorage.getItem(`notif_read_${rolePrefix}_` + myName) || '[]');
            if (!readReceipts.includes(id)) {
                readReceipts.push(id);
                localStorage.setItem(`notif_read_${rolePrefix}_` + myName, JSON.stringify(readReceipts));
            }
            
            // 已在当前详情页，刷新自身
            const urlParams = new URLSearchParams(window.location.search);
            const currentTaskId = urlParams.get('id');
            if (currentTaskId === taskId) {
                window.syncNotificationsFromCloud(true);
            } else {
                window.location.href = 'task-detail-requester.html?id=' + taskId;
            }
        };

        window.markAllAsRead = function(event) {
            if(event) event.stopPropagation();
            if (!window.currentMyUnreadIds || window.currentMyUnreadIds.length === 0) return;
            
            const userStr = localStorage.getItem('activeUserObj');
            if(!userStr) return;
            const currentUser = JSON.parse(userStr);
            const myName = (currentUser.displayName || currentUser.cnName || currentUser.enName || '').toLowerCase();
            const isAdmin = (currentUser.perms || []).includes('admin');
            const rolePrefix = isAdmin ? 'admin' : 'req';

            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "处理中...";

            let readReceipts = JSON.parse(localStorage.getItem(`notif_read_${rolePrefix}_` + myName) || '[]');
            readReceipts = [...new Set([...readReceipts, ...window.currentMyUnreadIds])];
            localStorage.setItem(`notif_read_${rolePrefix}_` + myName, JSON.stringify(readReceipts));
            
            window.syncNotificationsFromCloud(true);
            if(window.showToast) window.showToast('全部已读', '消息红点已清除。', 'success');
            btn.innerHTML = originalText;
        };

        document.addEventListener('DOMContentLoaded', () => {
            // 全局点击监听（保证点击非菜单区域收起）
            document.addEventListener('click', (e) => { 
                const notifMenu = document.getElementById('notifMenu');
                const notifBtn = document.getElementById('notifBtn');
                if(notifMenu && !notifMenu.contains(e.target) && notifBtn && !notifBtn.contains(e.target)) {
                    notifMenu.classList.add('hidden'); 
                }
            });

            // 启动轮询
            setTimeout(() => { window.syncNotificationsFromCloud(true); }, 1500);
            setInterval(() => { window.syncNotificationsFromCloud(true); }, 8000);
        });
    </script>

    <script>
        // 终版兜底：保证主题同步、通知菜单脱离局部层级、不再被页面卡片遮挡
        (function(){
            function syncThemeImmediately(){
                try {
                    const isLight = localStorage.getItem('requestHallTheme') === 'light';
                    document.documentElement.classList.toggle('theme-light-preload', isLight);
                    document.body && document.body.classList.toggle('theme-light', isLight);
                    if (typeof window.applyPageTheme === 'function') window.applyPageTheme(isLight ? 'light' : 'dark');
                } catch(e) {}
            }

            function mountNotifToBody(){
                const menu = document.getElementById('notifMenu');
                if (menu && menu.parentElement !== document.body) {
                    document.body.appendChild(menu);
                }
                if (menu) {
                    menu.classList.add('notif-floating');
                    menu.style.position = 'fixed';
                    menu.style.zIndex = '2147483000';
                    menu.style.right = 'auto';
                    menu.style.transform = 'none';
                }
                return menu;
            }

            window.toggleNotificationPanel = function(event){
                if (event) event.stopPropagation();
                const btn = document.getElementById('notifBtn');
                const menu = mountNotifToBody();
                if (!menu || !btn) return;

                const willOpen = menu.classList.contains('hidden');
                if (!willOpen) {
                    menu.classList.add('hidden');
                    return;
                }

                const rect = btn.getBoundingClientRect();
                const width = Math.min(340, window.innerWidth - 24);
                const gap = 12;
                let left = rect.right - width;
                left = Math.max(12, Math.min(window.innerWidth - width - 12, left));
                let top = rect.bottom + gap;
                const maxTop = Math.max(12, window.innerHeight - 420 - 12);
                top = Math.min(top, Math.max(rect.bottom + gap, maxTop));

                menu.style.width = width + 'px';
                menu.style.left = left + 'px';
                menu.style.top = top + 'px';
                menu.style.right = 'auto';
                menu.style.bottom = 'auto';
                menu.classList.remove('hidden');
                if (window.syncNotificationsFromCloud) window.syncNotificationsFromCloud(true);
            };

            document.addEventListener('DOMContentLoaded', function(){
                syncThemeImmediately();
                mountNotifToBody();
                document.addEventListener('click', function(e){
                    const menu = document.getElementById('notifMenu');
                    const btn = document.getElementById('notifBtn');
                    if(menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) menu.classList.add('hidden');
                }, true);
            });
            window.addEventListener('pageshow', syncThemeImmediately);
        })();
    </script>

    <script>
        // ================= 手机端侧边栏辅助交互（只处理展示，不触碰权限/登录/数据逻辑） =================
        (function() {
            const mobileQuery = window.matchMedia ? window.matchMedia('(max-width: 768px)') : null;

            function isMobileView() {
                return mobileQuery ? mobileQuery.matches : window.innerWidth <= 768;
            }

            window.openMobileSidebar = function() {
                if (!isMobileView()) return;
                document.body.classList.add('mobile-sidebar-open');
                const btn = document.getElementById('mobile-sidebar-toggle');
                if (btn) btn.setAttribute('aria-label', '关闭侧边导航');
            };

            window.closeMobileSidebar = function() {
                document.body.classList.remove('mobile-sidebar-open');
                const btn = document.getElementById('mobile-sidebar-toggle');
                if (btn) btn.setAttribute('aria-label', '打开侧边导航');
            };

            window.toggleMobileSidebar = function(event) {
                if (event) event.stopPropagation();
                if (!isMobileView()) return;
                if (document.body.classList.contains('mobile-sidebar-open')) {
                    window.closeMobileSidebar();
                } else {
                    window.openMobileSidebar();
                }
            };

            function bindMobileSidebarClose() {
                const aside = document.querySelector('body > aside');
                if (!aside || aside.dataset.mobileCloseBound === '1') return;
                aside.dataset.mobileCloseBound = '1';
                aside.addEventListener('click', function(event) {
                    const actionBtn = event.target.closest('button');
                    if (actionBtn && isMobileView()) {
                        setTimeout(window.closeMobileSidebar, 80);
                    }
                });
            }

            document.addEventListener('DOMContentLoaded', function() {
                bindMobileSidebarClose();
                if (mobileQuery && mobileQuery.addEventListener) {
                    mobileQuery.addEventListener('change', function(e) {
                        if (!e.matches) window.closeMobileSidebar();
                    });
                } else {
                    window.addEventListener('resize', function() {
                        if (!isMobileView()) window.closeMobileSidebar();
                    });
                }
            });
        })();
    </script>


    <script>
        // ================= 移动端适配辅助：仅控制抽屉关闭，不碰业务逻辑 =================
        (function() {
            const mobileQuery = window.matchMedia('(max-width: 768px)');
            function closeMobileSidebarWhenPc(e) {
                if (!e.matches) document.body.classList.remove('mobile-sidebar-open');
            }
            if (mobileQuery.addEventListener) {
                mobileQuery.addEventListener('change', closeMobileSidebarWhenPc);
            } else if (mobileQuery.addListener) {
                mobileQuery.addListener(closeMobileSidebarWhenPc);
            }
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') document.body.classList.remove('mobile-sidebar-open');
            });
        })();
    </script>

</body>
</html>
